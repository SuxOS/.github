# Keeps the SHA-pinned third-party GitHub Actions across .github/workflows/**
# current. Dependabot opens weekly PRs that bump each pinned commit SHA (and its
# `# vX` comment) to the latest release — turning a manual, error-prone
# multi-file find-and-replace into a reviewable PR. Pair with the
# pin-consistency self-CI check, which fails if the same action ever resolves to
# two different SHAs.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
