name: Skill sync (reusable)

# Keeps a repo's Claude skill(s), plugin mirror, and generated function reference
# in sync — all derived from the repo itself, no live server or secrets required.
# check job — gates PRs that touch the watched paths + runs on schedule/dispatch.
#             Offline, no secrets.
# fix job   — schedule/dispatch only: re-mirrors the plugin skill, then opens/
#             refreshes a PR if anything changed. Needs the repo setting "Allow
#             GitHub Actions to create and approve pull requests".
#
# This assumes the caller repo has an equivalent of sux-mcp's
# `scripts/check-skill-sync.mjs` (--offline / --write modes). Point
# `check-script` at wherever that lives in the caller repo.
#
# Caller (needs its own schedule/dispatch/pull_request triggers):
#   uses: SuxOS/.github/.github/workflows/skill-sync.yml@main
#   with: { check-script: "scripts/check-skill-sync.mjs", mirror-path: "plugins/sux/skills" }
#   secrets: inherit

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "22"
      check-script:
        type: string
        default: "scripts/check-skill-sync.mjs"
      mirror-path:
        description: "Path git-status is checked against to decide whether the fix job has anything to commit."
        type: string
        default: "plugins/sux/skills"
      pr-branch:
        type: string
        default: "bot/docs-update"

concurrency:
  group: skill-sync-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Skill / docs / plugin mirror sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Check (source-derived, offline)
        run: node ${{ inputs.check-script }} --offline

  fix:
    name: Re-mirror plugin skill
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Re-mirror plugin skill from source
        run: node ${{ inputs.check-script }} --write

      - name: Open or refresh PR if anything changed
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          MIRROR_PATH: ${{ inputs.mirror-path }}
          PR_BRANCH: ${{ inputs.pr-branch }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Plugin skill mirror already up to date." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$PR_BRANCH"
          git add -A
          git commit -m "docs: re-mirror plugin skill"
          git push -f origin "$PR_BRANCH"
          existing=$(gh pr list --state open --head "$PR_BRANCH" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh pr comment "$existing" --body "Refreshed by the latest Skill sync run."
            echo "Updated existing PR #$existing." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            gh pr create \
              --title "docs: re-mirror plugin skill" \
              --body "$(printf 'Automated source-derived re-mirror by the **Skill sync** workflow:\n\n- `%s` — re-mirrored from source\n\nRun: %s/%s/actions/runs/%s' "$MIRROR_PATH" "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}")"
            echo "Opened new docs PR." | tee -a "$GITHUB_STEP_SUMMARY"
          fi
