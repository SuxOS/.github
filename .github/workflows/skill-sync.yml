name: Skill sync (reusable)

# Keeps a repo's Claude skill(s), plugin mirror, and generated function reference
# in sync — all derived from the repo itself, no live server or secrets required.
# check job — gates PRs that touch the watched paths + runs on schedule/dispatch.
#             Offline, no secrets.
# fix job   — schedule/dispatch only: re-mirrors the plugin skill, then opens/
#             refreshes a PR if anything changed. Needs the repo setting "Allow
#             GitHub Actions to create and approve pull requests".
#
# This assumes the caller repo has an equivalent of sux-mcp's
# `scripts/check-skill-sync.mjs` (--offline / --write modes). Point
# `check-script` at wherever that lives in the caller repo.
#
# Caller (needs its own schedule/dispatch/pull_request triggers):
#   uses: SuxOS/.github/.github/workflows/skill-sync.yml@main
#   with: { check-script: "scripts/check-skill-sync.mjs", mirror-path: "plugins/sux/skills" }
#   secrets: inherit

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "22"
      check-script:
        type: string
        default: "scripts/check-skill-sync.mjs"
      mirror-path:
        description: "Path git-status is checked against to decide whether the fix job has anything to commit."
        type: string
        default: "plugins/sux/skills"
      pr-branch:
        type: string
        default: "bot/docs-update"

permissions:
  contents: read

concurrency:
  group: skill-sync-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Skill / docs / plugin mirror sync
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Check (source-derived, offline)
        env:
          CHECK_SCRIPT: ${{ inputs.check-script }}
        run: node "$CHECK_SCRIPT" --offline

  fix:
    name: Re-mirror plugin skill
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      # GitHub suppresses new workflow runs for pushes/PRs attributed to GITHUB_TOKEN, so
      # this job — like every other push/merge job in this repo — mints a SUX_BOT App
      # token first. Without it the PR this job opens would never fire CI/security-review
      # and would sit permanently unable to satisfy branch protection.
      - name: Mint app token
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Re-mirror plugin skill from source
        env:
          CHECK_SCRIPT: ${{ inputs.check-script }}
        run: node "$CHECK_SCRIPT" --write

      - name: Open or refresh PR if anything changed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          MIRROR_PATH: ${{ inputs.mirror-path }}
          PR_BRANCH: ${{ inputs.pr-branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Plugin skill mirror already up to date." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$PR_BRANCH"
          git add -A
          git commit -m "docs: re-mirror plugin skill"
          git push -f origin "$PR_BRANCH"
          existing=$(gh pr list --state open --head "$PR_BRANCH" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh pr comment "$existing" --body "Refreshed by the latest Skill sync run."
            echo "Updated existing PR #$existing." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            # shellcheck disable=SC2016  # backticks below are literal Markdown, not command substitution
            gh pr create \
              --title "docs: re-mirror plugin skill" \
              --body "$(printf 'Automated source-derived re-mirror by the **Skill sync** workflow:\n\n- `%s` — re-mirrored from source\n\nRun: %s' "$MIRROR_PATH" "$RUN_URL")"
            echo "Opened new docs PR." | tee -a "$GITHUB_STEP_SUMMARY"
          fi
