name: Claude mention + review (reusable)

# Two hands-off assists (both inert until CLAUDE_CODE_OAUTH_TOKEN is set):
# Runs on a Claude Pro/Max subscription (claude setup-token), not a metered API key.
#   1. @claude — mention the bot in any PR/issue comment or review and it responds.
#   2. Review on open — a review pass on every non-draft PR.
# Cost-bounded: concurrency cancel-in-progress, --max-turns, review only on
# opened/ready (not every push).
#
# Caller (needs its own comment/review/pull_request triggers):
#   uses: SuxOS/.github/.github/workflows/claude.yml@main
#   secrets: inherit

on:
  workflow_call:
    inputs:
      mention-model:
        type: string
        default: "sonnet"
      mention-max-turns:
        type: number
        default: 20
      review-model:
        type: string
        default: "sonnet"
      review-max-turns:
        type: number
        default: 20
      review-prompt:
        type: string
        default: |
          Review this PR for correctness bugs and reuse/simplification/efficiency
          issues (use the repo's /code-review skill if present). Post concise, concrete
          inline findings; don't rewrite the PR. If it looks clean, say so in one line.

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  mention:
    if: >
      github.event.sender.type != 'Bot' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association || github.event.review.author_association) && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Own concurrency group (distinct from `review` below) so a fresh @claude mention
    # only supersedes a stale mention on the same PR/issue, not an in-progress review —
    # sharing one workflow-level group meant either job type could cancel the other,
    # silently dropping the advisory review. See #96.
    concurrency:
      group: claude-mention-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Preflight — need the key
        id: pre
        run: |
          if [ "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}" != "true" ]; then
            echo "CLAUDE_CODE_OAUTH_TOKEN not set → inert (run 'claude setup-token')"; echo "go=false" >> "$GITHUB_OUTPUT"
          else echo "go=true" >> "$GITHUB_OUTPUT"; fi
      # Push with the App identity, not GITHUB_TOKEN — see automerge.yml comment;
      # GITHUB_TOKEN pushes never re-fire required CI checks.
      - name: Mint app token
        if: steps.pre.outputs.go == 'true'
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}
      - name: Checkout
        if: steps.pre.outputs.go == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Claude respond
        if: steps.pre.outputs.go == 'true'
        # The action can hard-fail (e.g. error_max_turns) even when nothing is actually
        # wrong with the PR/comment — just a model that didn't wrap up in time. Advisory-
        # only job (posts a reply, no downstream gate reads its result), so let it fail
        # visibly in the log without turning into a hard red X on the trigger event.
        continue-on-error: true
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1
        env:
          ENABLE_PROMPT_CACHING_1H: "1"
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          # NOTE: this job's OWN `if:` (above) still requires
          # github.event.sender.type != 'Bot', so suxbot[bot] can't actually reach this step
          # today — that's a deliberate separate gate (a bot puppeting @claude via a comment
          # is a different risk than a bot's own issue/PR existing). Only stops the action's
          # default bot-trigger block from adding a SECOND reason to refuse suxbot[bot], for
          # if/when the job-level gate is intentionally relaxed for it.
          allowed_bots: suxbot[bot]
          trigger_phrase: "@claude"
          # MENTION job: gated to trusted (non-bot OWNER/MEMBER/COLLABORATOR) actors above and
          # can legitimately be asked to make changes and push commits, so tools stay broad
          # (no --allowedTools restriction) by design.
          claude_args: "--max-turns ${{ inputs.mention-max-turns }} --model ${{ inputs.mention-model }}"

  review:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.sender.type != 'Bot' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Job-level override: this is the only thing that actually makes the ambient
    # GITHUB_TOKEN read-only. The workflow-level `permissions:` above grants
    # contents: write for the mention job's benefit; without this override the
    # review job would inherit that write scope despite being advisory-only.
    permissions:
      contents: read
      pull-requests: read
      issues: read
    # Own concurrency group (distinct from `mention` above) — see comment there.
    concurrency:
      group: claude-review-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Preflight — need the key
        id: pre
        run: |
          if [ "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}" != "true" ]; then
            echo "CLAUDE_CODE_OAUTH_TOKEN not set → inert (run 'claude setup-token')"; echo "go=false" >> "$GITHUB_OUTPUT"
          else echo "go=true" >> "$GITHUB_OUTPUT"; fi
      - name: Checkout
        if: steps.pre.outputs.go == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 0 }
      - name: Claude review
        if: steps.pre.outputs.go == 'true'
        # Same rationale as the mention job above: review is advisory-only (posts inline
        # findings, never blocks merge), so a reviewer that hits error_max_turns or another
        # non-content failure shouldn't paint the PR with a hard red X.
        continue-on-error: true
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1
        env:
          ENABLE_PROMPT_CACHING_1H: "1"
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # NOTE: this job's OWN `if:` still requires github.event.pull_request.author_association
          # in OWNER/MEMBER/COLLABORATOR with sender.type != 'Bot' — suxbot[bot] can't reach this
          # step today (that gate is deliberate, separate from this). Only stops the action's
          # default bot-trigger block from adding a second reason to refuse it, in case a
          # bot-authored PR is ever meant to get automated review.
          allowed_bots: suxbot[bot]
          prompt: ${{ inputs.review-prompt }}
          # Review is advisory only — it posts inline findings, never edits or pushes.
          # Restrict to read tools + the specific git/gh-pr reads the /code-review skill
          # needs to see the change (diff/log/show, PR view/diff) — not the blanket
          # Bash(git:*)/Bash(gh pr:*) this used to grant, which included push/commit and
          # gh pr merge/close/edit. The job-level `permissions:` above is what actually
          # makes the ambient GITHUB_TOKEN read-only; this tool restriction is
          # defense-in-depth on top of that. NO Write/Edit. (The mention job below can be
          # asked to make changes and keeps broad tools.)
          claude_args: '--max-turns ${{ inputs.review-max-turns }} --model ${{ inputs.review-model }} --allowedTools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(gh pr view:*),Bash(gh pr diff:*)"'
