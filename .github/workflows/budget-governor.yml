name: Budget governor

# The feedback loop that keeps automation inside ~80% of the Max 20x subscription
# (docs/design/budget-and-cadence.md). Every 6 hours:
#   1. Sweep `gh run list` across the org's repos for the trailing 7 days (App token —
#      the repos are private, so the ambient GITHUB_TOKEN can't see them).
#   2. Roll up wall-clock minutes for Claude-invoking workflows, split opus/sonnet by
#      workflow name. Same caveat as pipeline-utilization.yml: wall-clock is a PROXY
#      that correlates with subscription spend — it is not a bill. Calibrate the
#      thresholds against claude.ai's usage page (see the design doc's ritual).
#   3. Simulate a token bucket (capacity = budget, continuous linear refill) over the
#      same trailing-window events, per tier, and derive the throttle level from the
#      bucket's *current available headroom* rather than the raw trailing-window sum.
#      See docs/design/budget-governor-reconciliation.md for why (cliff-edge sum vs.
#      smoothed bucket) and the empirical comparison that motivated it. No new
#      persisted state: the bucket is replayed fresh each run from the same event
#      list the sweep already fetches.
#   4. Upsert one org-wide report issue in THIS repo, and a per-repo "Autonomy throttle"
#      issue (body line `level: green|yellow|red`) in every managed repo. Scheduled
#      Claude workloads read that signal via the check-throttle composite; merge gates
#      never do. Throttle issues labeled `throttle-manual` are left untouched.
#
# Runs directly in this repo (like pin-consistency/self-check) — it is NOT a reusable.

on:
  schedule:
    - cron: "13 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: budget-governor
  cancel-in-progress: true

env:
  # Workflow-name → model classification (case-insensitive extended regexes).
  # Three-loop rework (2026-07-15): the standalone opus `triage` stage was removed — its
  # buildability call folded into issue-build (sonnet). Opus runs in the nightly deep-audit
  # + weekly org-consistency passes, and in `fixer` (its default `model` flipped sonnet→opus
  # in #286, fixer.yml:40-42); everything else Claude-ish is sonnet.
  # Known accepted gaps (see docs/design/budget-and-cadence.md § "The budget governor" for
  # why neither is worth fixing precisely yet):
  #  - issue-build.yml's build step adaptively escalates to opus per-batch (`sensedOpus`,
  #    #172) for high-tier/effort:large work, but the workflow name doesn't change, so those
  #    runner-minutes are counted as sonnet here.
  #  - a caller repo that overrides fixer's `model` input back to sonnet is now over-counted
  #    as opus, since fixer matches OPUS_WF_RE by name regardless of the input. Every current
  #    sonnet-pinned self-fixer-*.yml cadence tier (self-fixer-30m.yml "Self fixer (30m,
  #    bugs+feats)", self-fixer-bugs.yml "Self fixer (15m, bugs only)") is special-cased out
  #    below by its `(<duration>m` name suffix, since each runs frequently enough to trip the
  #    opus throttle on a pure mis-count; any other such caller still rides the imprecision
  #    above. Only the bare "Self fixer" name (the deep/1h tier, opus by default) and
  #    fixer.yml's own reusable-def name still classify as opus. This lookahead is a name-
  #    substring guess, not a `model:` read — see scripts/test-budget-governor-opus-classify.sh,
  #    which MUST be updated (and re-run) whenever a self-fixer-*.yml is renamed or a cadence
  #    tier is added/removed (#307, #308 were this same regression resurrected by a rename).
  CLAUDE_WF_RE: "claude|security review|fixer|issue build|deep audit|org consistency"
  OPUS_WF_RE: "deep audit|org consistency|fixer(?! ?\\((?:\\d+m|hourly))"
  # Weekly runner-minute budgets for AUTOMATION (not the whole subscription) — see the
  # design doc for how these were derived and how to calibrate them.
  OPUS_BUDGET_MIN: "900"
  TOTAL_BUDGET_MIN: "6000"
  # Fraction of a budget at which the throttle goes yellow.
  YELLOW_FRACTION: "0.75"
  LOOKBACK_DAYS: "7"
  # The runner-minute token bucket above is a PROXY for subscription spend — it is
  # blind to the actual Claude account five-hour usage window, which is metered by
  # Anthropic on tokens/requests, not GH Actions runtime (the #236 blind spot: a
  # short-wall-clock run can still exhaust the five-hour pool). claude-code-action logs
  # a `rate_limit_event`/`resetsAt` epoch straight into the run log the moment it
  # actually hits that ceiling — the one real (if only reactive, not predictive) signal
  # of pool exhaustion available without a dedicated usage API. The scan below looks
  # for that signal directly instead of only inferring it from runner-minutes, so a
  # live rate-limit forces `red` immediately rather than waiting for the bucket to
  # eventually reflect it (or never, if the hit was short wall-clock but token-heavy).
  RATE_LIMIT_LOOKBACK_HOURS: "6"
  RATE_LIMIT_MAX_RUNS_SCANNED: "30"
  # Plausibility bound on a scanned resetsAt: a five-hour-window reset can sit at most
  # ~5h past the moment the event was emitted, and scanned runs are at most
  # RATE_LIMIT_LOOKBACK_HOURS old — so any resetsAt further out than this from `now` is
  # garbage or forged log text (run logs contain untrusted diff/tool output; see the
  # spoof-resistance note in scripts/classify-security-noverdict.sh). Discard it rather
  # than let one bad value pin the whole org red until an arbitrary epoch.
  RATE_LIMIT_MAX_FUTURE_HOURS: "6"

jobs:
  govern:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Repos whose runs are scanned AND whose throttle issues are maintained: the
      # managed-repo list (.github/managed-repos.json, single source of truth shared
      # with pin-consistency.yml/deep-audit.yml — see #233) plus this repo itself.
      - name: Load managed-repo list
        id: repos
        run: |
          set -euo pipefail
          all_csv=$(jq -r '(.repos + [".github"]) | join(",")' .github/managed-repos.json)
          all_space=$(jq -r '(.repos + [".github"]) | join(" ")' .github/managed-repos.json)
          echo "all_csv=$all_csv" >> "$GITHUB_OUTPUT"
          echo "REPOS=$all_space" >> "$GITHUB_ENV"

      # `owner:` with no per-repo scoping isn't used — enumerate exactly the repos this
      # job reads runs from and writes issues to (same pattern as pin-consistency).
      - name: Mint org-scoped app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}
          owner: SuxOS
          repositories: ${{ steps.repos.outputs.all_csv }}

      - name: Sweep runs and compute utilization
        id: sweep
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          since=$(date -u -d "-${LOOKBACK_DAYS} days" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-"${LOOKBACK_DAYS}"d +%Y-%m-%dT%H:%M:%SZ)

          all="[]"
          for r in $REPOS; do
            if ! runs=$(gh run list --repo "SuxOS/$r" --limit 1000 --created ">=$since" \
                --json workflowName,conclusion,status,startedAt,updatedAt); then
              echo "::error::gh run list failed for SuxOS/$r — refusing to govern on partial data"
              exit 1
            fi
            all=$(jq -c --arg repo "$r" '.[0] + [.[1][] | . + {repo: $repo}]' \
              <<<"[$all, $runs]")
          done

          # In-progress/queued runs are counted too (using elapsed-so-far, `now` -
          # startedAt) — a wedged run must show up in the rollup while it's still
          # burning minutes, not only retroactively once it finally completes.
          #
          # Throttle level is driven by a token-bucket simulation, not a raw
          # trailing-window sum. `opus_min`/`total_min` below are still the plain
          # trailing-${LOOKBACK_DAYS}-day sum (kept for the report table — real
          # diagnostic value, "how much ran this week"). `opus_avail_min`/
          # `total_avail_min` are what actually sets `level`: each tier's events are
          # replayed in time order as discrete debits against a bucket of capacity
          # `<TIER>_BUDGET_MIN` that continuously refills at `budget / (LOOKBACK_DAYS
          # * 1440)` tokens/minute (i.e. spend at exactly the budgeted average rate
          # never drains it) — no persisted state, the whole trajectory is
          # recomputed from this run's event list every time. This makes a burst
          # register immediately (same as before) but recover continuously as the
          # bucket refills, instead of staying pinned at whatever level it hit until
          # the offending runs physically age out of the fixed trailing window (up
          # to a full ${LOOKBACK_DAYS}-day stall after a single burst). See
          # docs/design/budget-governor-reconciliation.md for the empirical
          # comparison and rationale; the two `<TIER>_BUDGET_MIN`/`YELLOW_FRACTION`
          # inputs keep their existing meaning and calibration ritual unchanged.
          rollup=$(jq -c --arg cre "$CLAUDE_WF_RE" --arg ore "$OPUS_WF_RE" \
              --arg since "$since" --argjson now "$(date -u +%s)" \
              --argjson opusBudget "$OPUS_BUDGET_MIN" --argjson totalBudget "$TOTAL_BUDGET_MIN" \
              --argjson lookbackDays "$LOOKBACK_DAYS" --argjson yellowFrac "$YELLOW_FRACTION" '
            def bucket_avail($capacity; $refillPerMin; $windowMin; $evs):
              ($evs | sort_by(.atMin)) as $evs
              | (reduce $evs[] as $e
                   ({level: $capacity, lastMin: 0};
                     (.level + (($e.atMin - .lastMin) * $refillPerMin)) as $refilled
                     | { level: ([$capacity, ([$refilled - $e.cost, 0] | max)] | min),
                         lastMin: $e.atMin })
                ) as $s
              | ([$capacity, ($s.level + (($windowMin - $s.lastMin) * $refillPerMin))] | min);

            ($since | fromdateiso8601) as $sinceEpoch
            | (($now - $sinceEpoch) / 60) as $windowMin
            | [ .[] | select(.startedAt != null)
                | select(.workflowName | test($cre; "i"))
                | ((if .status == "completed" then (.updatedAt | fromdateiso8601) else $now end)) as $endEpoch
                | . + {
                    mins: (($endEpoch - (.startedAt | fromdateiso8601)) / 60),
                    atMin: ([0, (($endEpoch - $sinceEpoch) / 60)] | max),
                    tier: (if (.workflowName | test($ore; "i")) then "opus" else "sonnet" end)
                  } ] as $events
            | { opus_min:  ([$events[] | select(.tier == "opus")  | .mins] | add // 0 | floor),
                total_min: ([$events[] | .mins] | add // 0 | floor),
                opus_avail_min: (bucket_avail($opusBudget; ($opusBudget / ($lookbackDays * 1440)); $windowMin;
                                    [$events[] | select(.tier == "opus") | {atMin, cost: .mins}]) | floor),
                total_avail_min: (bucket_avail($totalBudget; ($totalBudget / ($lookbackDays * 1440)); $windowMin;
                                    [$events[] | {atMin, cost: .mins}]) | floor),
                by_repo_wf: ($events | group_by({r: .repo, w: .workflowName})
                  | map({repo: .[0].repo, workflow: .[0].workflowName, tier: .[0].tier,
                         runs: length, mins: ([.[] | .mins] | add | floor),
                         failed: ([.[] | select(.conclusion == "failure")] | length)})
                  | sort_by(-.mins)) }
            | . + { level: (if (.opus_avail_min <= ($opusBudget * (1 - $yellowFrac)))
                               or (.total_avail_min <= ($totalBudget * (1 - $yellowFrac)))
                            then (if (.opus_avail_min <= 0) or (.total_avail_min <= 0) then "red" else "yellow" end)
                            else "green" end) }' <<<"$all")

          opus_min=$(jq -r '.opus_min' <<<"$rollup")
          total_min=$(jq -r '.total_min' <<<"$rollup")
          opus_avail_min=$(jq -r '.opus_avail_min' <<<"$rollup")
          total_avail_min=$(jq -r '.total_avail_min' <<<"$rollup")
          level=$(jq -r '.level' <<<"$rollup")

          echo "opus_min=$opus_min total_min=$total_min opus_avail_min=$opus_avail_min total_avail_min=$total_avail_min level=$level"
          {
            echo "rollup<<EOF_GOV_ROLLUP"
            printf '%s\n' "$rollup"
            echo "EOF_GOV_ROLLUP"
            echo "opus_min=$opus_min"
            echo "total_min=$total_min"
            echo "opus_avail_min=$opus_avail_min"
            echo "total_avail_min=$total_avail_min"
            echo "level=$level"
          } >> "$GITHUB_OUTPUT"

      - name: Scan recent failed Claude runs for a live five-hour rate-limit
        id: ratelimit
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -uo pipefail
          since=$(date -u -d "-${RATE_LIMIT_LOOKBACK_HOURS} hours" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-"${RATE_LIMIT_LOOKBACK_HOURS}"H +%Y-%m-%dT%H:%M:%SZ)

          # Gather every candidate failure across ALL repos first, THEN sort by
          # recency and apply the scan cap — scanning by fixed repo-list order let an
          # early-listed repo's unrelated failure storm exhaust the whole budget
          # before a later-listed repo's genuine, more recent five_hour marker was
          # ever looked at (#302). One `gh run list` per repo is cheap; it's the
          # per-run `gh run view --log-failed` below that's rate-limited, so the cap
          # must bind on that, applied globally by recency.
          all_candidates="[]"
          for r in $REPOS; do
            runs=$(gh run list --repo "SuxOS/$r" --limit 50 --created ">=$since" \
                --json databaseId,workflowName,conclusion,createdAt 2>/dev/null \
              | jq -c --arg cre "$CLAUDE_WF_RE" --arg repo "$r" \
                '[.[] | select(.conclusion == "failure") | select(.workflowName | test($cre; "i")) |
                  {repo: $repo, id: .databaseId, createdAt}]') \
              || { echo "::warning::gh run list (rate-limit scan) failed for SuxOS/$r — skipping"; continue; }
            all_candidates=$(jq -c -n --argjson a "$all_candidates" --argjson b "$runs" '$a + $b')
          done
          scan_targets=$(jq -c --argjson cap "$RATE_LIMIT_MAX_RUNS_SCANNED" \
            '[sort_by(.createdAt) | reverse | .[0:$cap][]]' <<<"$all_candidates")

          max_resets_at=0
          scanned=0
          while IFS=$'\t' read -r repo id; do
            [ -n "$id" ] || continue
            scanned=$((scanned + 1))
            log=$(gh run view --repo "SuxOS/$repo" "$id" --log-failed 2>/dev/null) || continue
            # Take resetsAt ONLY from a line that itself carries the five_hour marker:
            # a genuine rate_limit_event is one compact JSON line with both fields
            # inside rate_limit_info (see scripts/test-classify-security-noverdict.sh
            # for the shape). Run logs also contain untrusted text (diffs, tool
            # output), so a stray "resetsAt" elsewhere in the log must never be read
            # as the reset epoch. Same-line pairing + the plausibility cap below bound
            # a forged marker to at most one RATE_LIMIT_MAX_FUTURE_HOURS red window —
            # no worse than an attacker genuinely exhausting the pool.
            this_reset=$(grep '"rateLimitType":"five_hour"' <<<"$log" \
              | grep -oE '"resetsAt":[0-9]+' | grep -oE '[0-9]+' | sort -rn | head -1)
            [ -n "${this_reset:-}" ] || continue
            # resetsAt may be epoch seconds or milliseconds (same normalization as
            # pr-unstick.yml): 13+ digits is milliseconds.
            if [ "${#this_reset}" -ge 13 ]; then this_reset=$(( this_reset / 1000 )); fi
            if [ "$this_reset" -gt "$max_resets_at" ]; then
              max_resets_at=$this_reset
            fi
          done < <(jq -r '.[] | [.repo, .id] | @tsv' <<<"$scan_targets")

          now=$(date -u +%s)
          cap=$(( now + RATE_LIMIT_MAX_FUTURE_HOURS * 3600 ))
          if [ "$max_resets_at" -gt "$cap" ]; then
            echo "::warning::rate-limit scan: resetsAt=$max_resets_at is more than ${RATE_LIMIT_MAX_FUTURE_HOURS}h out — implausible for a five-hour window; ignoring"
            max_resets_at=0
          fi
          if [ "$max_resets_at" -le "$now" ]; then
            max_resets_at=0
          fi
          echo "live five-hour rate-limit scan: scanned=$scanned resets_at=$max_resets_at (now=$now)"
          echo "resets_at=$max_resets_at" >> "$GITHUB_OUTPUT"

      - name: Combine bucket headroom with the live rate-limit signal
        id: final
        env:
          BUCKET_LEVEL: ${{ steps.sweep.outputs.level }}
          RESETS_AT: ${{ steps.ratelimit.outputs.resets_at }}
        run: |
          set -euo pipefail
          level="$BUCKET_LEVEL"
          now=$(date -u +%s)
          # A live rate_limit_event is definitive, present-tense proof the pool is
          # exhausted right now — override the (lagging, proxy-based) bucket level
          # outright rather than blend it in, and hold `red` until the account's own
          # resetsAt epoch passes so inflow stays paced for the exact known window
          # instead of only the next scheduled run 6h later.
          if [ "${RESETS_AT:-0}" -gt "$now" ]; then
            level="red"
          fi
          echo "level=$level" >> "$GITHUB_OUTPUT"

      - name: Build report body
        id: body
        env:
          ROLLUP: ${{ steps.sweep.outputs.rollup }}
          OPUS_MIN: ${{ steps.sweep.outputs.opus_min }}
          TOTAL_MIN: ${{ steps.sweep.outputs.total_min }}
          OPUS_AVAIL_MIN: ${{ steps.sweep.outputs.opus_avail_min }}
          TOTAL_AVAIL_MIN: ${{ steps.sweep.outputs.total_avail_min }}
          LEVEL: ${{ steps.final.outputs.level }}
          RESETS_AT: ${{ steps.ratelimit.outputs.resets_at }}
        run: |
          set -euo pipefail
          rows=$(jq -r '.by_repo_wf[] |
            "| \(.repo) | \(.workflow) | \(.tier) | \(.runs) | \(.mins) | \(.failed) |"' <<<"$ROLLUP")
          rate_limit_note=""
          if [ "${RESETS_AT:-0}" -gt 0 ]; then
            rate_limit_note="**Live five-hour rate limit detected** — the account hit its Claude usage ceiling; forcing \`red\` until it resets at $(date -u -d "@${RESETS_AT}" '+%Y-%m-%d %H:%M UTC' 2>/dev/null || date -u -r "${RESETS_AT}" '+%Y-%m-%d %H:%M UTC')."
          fi
          # YELLOW_FRACTION is the fraction of capacity still owed as headroom before
          # yellow fires (e.g. 0.75 -> yellow triggers once headroom drops to the
          # complementary 25%, per bucket_avail's `<= capacity * (1 - yellowFrac)` check
          # above) — the report must show that trigger fraction, not the raw input (#301).
          yellow_trigger_pct=$(awk -v f="$YELLOW_FRACTION" 'BEGIN { printf "%.0f", (1 - f) * 100 }')
          body=$(printf '%s\n' \
            "Auto-maintained by budget-governor.yml. Last updated $(date -u '+%Y-%m-%d %H:%M UTC'). Window: trailing ${LOOKBACK_DAYS} days." \
            "" \
            "**Throttle level: \`${LEVEL}\`** — token-bucket headroom: opus-tier ${OPUS_AVAIL_MIN}/${OPUS_BUDGET_MIN} runner-min available, all Claude workflows ${TOTAL_AVAIL_MIN}/${TOTAL_BUDGET_MIN} runner-min available (yellow when either drops to ${yellow_trigger_pct}% capacity or below, red at 0)." \
            "" \
            "${rate_limit_note}" \
            "" \
            "Raw trailing-${LOOKBACK_DAYS}-day sum (diagnostic only, does not drive the level): opus-tier ${OPUS_MIN} runner-min, all Claude workflows ${TOTAL_MIN} runner-min." \
            "" \
            "Wall-clock runner minutes are a **proxy** for subscription spend, not a bill — calibrate the budgets against claude.ai's usage page per docs/design/budget-and-cadence.md. The bucket capacity/refill rate derive from the same \`*_BUDGET_MIN\`/\`YELLOW_FRACTION\` inputs as before; see docs/design/budget-governor-reconciliation.md for why the level now comes from bucket headroom instead of the raw sum. The live rate-limit scan (trailing ${RATE_LIMIT_LOOKBACK_HOURS}h of failed Claude-workflow runs, capped at ${RATE_LIMIT_MAX_RUNS_SCANNED} scanned) overrides the bucket to \`red\` whenever the account's own five-hour ceiling was actually hit, independent of runner-minutes." \
            "" \
            "| Repo | Workflow | Tier | Runs | Minutes | Failed |" \
            "|------|----------|------|-----:|--------:|-------:|" \
            "$rows")
          {
            echo "body<<EOF_GOV_BODY"
            printf '%s\n' "$body"
            echo "EOF_GOV_BODY"
          } >> "$GITHUB_OUTPUT"

      - name: Refresh org-wide report issue
        uses: SuxOS/.github/.github/actions/upsert-tracking-issue@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: open
          update-mode: replace
          title: "Autonomy budget report"
          body: ${{ steps.body.outputs.body }}
          labels: "tracking"

      - name: Set per-repo throttle issues
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          LEVEL: ${{ steps.final.outputs.level }}
          OPUS_MIN: ${{ steps.sweep.outputs.opus_min }}
          TOTAL_MIN: ${{ steps.sweep.outputs.total_min }}
          OPUS_AVAIL_MIN: ${{ steps.sweep.outputs.opus_avail_min }}
          TOTAL_AVAIL_MIN: ${{ steps.sweep.outputs.total_avail_min }}
          RESETS_AT: ${{ steps.ratelimit.outputs.resets_at }}
        run: |
          set -euo pipefail
          stamp=$(date -u '+%Y-%m-%d %H:%M UTC')
          rate_limit_line=""
          if [ "${RESETS_AT:-0}" -gt 0 ]; then
            rate_limit_line="Live five-hour rate limit detected — forcing red until $(date -u -d "@${RESETS_AT}" '+%Y-%m-%d %H:%M UTC' 2>/dev/null || date -u -r "${RESETS_AT}" '+%Y-%m-%d %H:%M UTC')."
          fi
          body=$(printf '%s\n' \
            "level: ${LEVEL}" \
            "" \
            "Auto-maintained by SuxOS/.github budget-governor.yml (${stamp}); scheduled Claude workloads in this repo read the level line above via the check-throttle action. Token-bucket headroom: opus-tier ${OPUS_AVAIL_MIN}/${OPUS_BUDGET_MIN} runner-min available, total ${TOTAL_AVAIL_MIN}/${TOTAL_BUDGET_MIN} runner-min available (raw trailing-7-day sum: opus-tier ${OPUS_MIN}, total ${TOTAL_MIN}). ${rate_limit_line} To pin a level manually, edit the level line and add the \`throttle-manual\` label — the governor skips labeled issues.")
          for r in $REPOS; do
            # gh issue create/edit --label errors on a label the repo doesn't have yet —
            # ensure it exists first (idempotent). Bookkeeping issues like this one carry
            # no other signal marking them non-work, so issue-build's backlog selector
            # excludes by this label instead of misreading them as buildable.
            gh label create tracking --repo "SuxOS/$r" --color ededed \
              --description "Bookkeeping issue maintained by automation — not buildable work" 2>/dev/null || true

            # `--search` narrows server-side to matching issues instead of paging through
            # every open issue in the repo, so this stays correct past the old --limit 100
            # cap (#247) without needing a pagination loop. `in:title` still returns
            # partial/fuzzy title matches, so the exact-match select below is required.
            found=$(gh issue list --repo "SuxOS/$r" --state open --search "\"Autonomy throttle\" in:title" \
                --limit 100 --json number,title,labels \
              | jq -c '[.[] | select(.title == "Autonomy throttle")] | first // empty')
            if [ -n "$found" ]; then
              num=$(jq -r '.number' <<<"$found")
              manual=$(jq -r '[.labels[].name] | contains(["throttle-manual"])' <<<"$found")
              if [ "$manual" = "true" ]; then
                echo "SuxOS/$r#$num is pinned (throttle-manual) — leaving as-is"
                continue
              fi
              gh issue edit "$num" --repo "SuxOS/$r" --body "$body" --add-label tracking >/dev/null
              echo "SuxOS/$r#$num → level: $LEVEL"
            else
              url=$(gh issue create --repo "SuxOS/$r" --title "Autonomy throttle" --body "$body" --label tracking)
              echo "created $url → level: $LEVEL"
            fi
          done
