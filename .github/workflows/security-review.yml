name: Security review (reusable)

# Focused Claude security review, gating merge on high/critical findings via `hold`.
# Verdict is read from claude-code-action's `structured_output` (--json-schema), NEVER
# a written file — the action's sandbox cwd is not the checkout the gate would read
# from, so a file-write verdict silently disappears. See SuxOS/.github README /
# docs for the "structured_output, not a file" gotcha.
#
# AUTH: unified onto the Pro/Max subscription (CLAUDE_CODE_OAUTH_TOKEN), same as every other
# Claude workflow. ACCEPTED RISK: security-review is a REQUIRED merge gate, so if the shared
# subscription pool exhausts, this check cannot run → nothing can merge, including humans'
# PRs (native auto-merge waits on this required check). This was previously kept on the
# metered ANTHROPIC_API_KEY specifically to avoid that failure mode; the split was dropped
# by explicit decision to consolidate on one token. If merge stalls from an exhausted pool
# become a problem, revert this file to anthropic_api_key — see docs/design/backlog-pipeline.md § auth split.
#
# Caller:
#   uses: SuxOS/.github/.github/workflows/security-review.yml@main
#   secrets: inherit

on:
  workflow_call:
    inputs:
      model:
        type: string
        # sonnet, deliberately (was opus until 2026-07): this gate fires on every PR push —
        # the highest-frequency Claude workflow in the org — and Sonnet is near-Opus on code
        # review at a fraction of the subscription budget weight. The compensating control is
        # deep-audit.yml: a nightly Opus pass over the day's MERGED diff that catches what the
        # fast per-PR review missed. See docs/design/budget-and-cadence.md.
        default: "sonnet"
      max-turns:
        type: number
        default: 22
      prompt-context:
        description: "Optional repo-specific context prepended to the review prompt (e.g. deployment shape, blast radius). Empty to skip."
        type: string
        default: ""
      allowed-bots:
        description: "Comma-separated bot LOGINS, exactly as GitHub reports them — INCLUDING the [bot] suffix (e.g. \"suxbot[bot]\"), matching claude-code-action's own allowed_bots convention (docs example: \"dependabot[bot],renovate[bot]\"). Defaults to the org bot suxbot[bot] so a caller that forgets to pass it doesn't make the action refuse a bot PR and hard-fail this required gate (a mechanical block, never a security signal). Empty allows no bots. Do not use '*' without reading claude-code-action's security.md."
        type: string
        default: "suxbot[bot]"

permissions:
  contents: read
  pull-requests: write
  issues: write
  # claude-code-action fetches a GitHub OIDC token. A reusable workflow's own permissions
  # block is the ceiling for its jobs, so a caller that grants `id-token: write` has it
  # silently dropped unless it's ALSO listed here. Its absence left the OIDC fetch ungranted
  # — intermittently failing ("Could not fetch an OIDC token") → no verdict → a spurious
  # fail-closed `hold` on legitimate PRs. Listing it here makes the caller's grant effective.
  id-token: write

concurrency:
  group: secreview-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security-review:
    # STATIC literal, NOT an expression. The check-run name must render even when this job
    # is SKIPPED — and GitHub does NOT evaluate a reusable job's `name:` expression on skip,
    # so a `${{ inputs.job-name }}` here rendered as the literal `inputs.job-name` on any
    # skipped (draft) PR. That reported the required check under the WRONG name, so the
    # ruleset's required `security-review / security-review` context never appeared and the
    # PR stayed permanently BLOCKED (observed on the .github draft self-PR #269, 2026-07-16).
    # With a static name the skipped check reports under the required name → GitHub's
    # "skipped required check == passing" semantics apply and a draft is no longer wedged.
    # Every caller's branch ruleset requires exactly this string; none passed a custom name.
    name: security-review
    # Runs on EVERY non-draft PR regardless of author_association — this is a REQUIRED
    # merge gate, and GitHub treats a SKIPPED required check as PASSING. Any author-based
    # skip (as a prior version had, gating on trusted author_association / a `self-improve`
    # label) therefore let an untrusted or unlabelled PR bypass the security review entirely
    # by being skipped — an unreviewed change merging on deterministic CI alone. The only
    # skip condition kept is draft PRs; self-improve PRs are non-draft so they still run here.
    # (fork/public-repo hardening: re-earn at go-public, not before — private today)
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Preflight — need the key
        id: pre
        if: github.event_name == 'pull_request'
        run: |
          if [ "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}" != "true" ]; then
            echo "CLAUDE_CODE_OAUTH_TOKEN not set → security review inert (run 'claude setup-token')"; echo "go=false" >> "$GITHUB_OUTPUT"
          else echo "go=true" >> "$GITHUB_OUTPUT"; fi
          # Whether the metered break-glass is armed (secrets aren't allowed in a step `if:`,
          # so surface presence as an output the break-glass step can gate on).
          echo "apikey=${{ secrets.ANTHROPIC_API_KEY != '' }}" >> "$GITHUB_OUTPUT"
      - name: Checkout
        if: steps.pre.outputs.go == 'true'
        # fetch-depth 0 (was shallow): the review now gets read-only git diff/log/show
        # (below) so it can actually SEE the diff instead of guessing from post-change file
        # contents. Shallow history made a real `git diff <base>...<head>` impossible even
        # once the tool was granted — full history is needed to resolve the base SHA.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Claude security review
        id: claude
        if: steps.pre.outputs.go == 'true'
        # The action can hard-fail (exit 1) even when the model ran fine but didn't emit
        # --json-schema structured_output (flaky/refusing model, mid-review API error, etc).
        # Without continue-on-error, that failure aborts the job before the Gate step below
        # ever runs — skipping its deliberate no-verdict fail-closed/advisory policy entirely
        # and just hard-failing the check with no comment, no hold, no explanation. Let the
        # step fail visibly in the log but keep going so Gate's existing logic decides the
        # outcome from the (here, empty) verdict, same as any other no-verdict case.
        continue-on-error: true
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1
        env:
          ENABLE_PROMPT_CACHING_1H: "1"
          # Unattended-CI resilience: wait out a subscription usage-limit/capacity (429/529) window
          # and retry instead of failing — the pool-exhaustion jam, without a metered key.
          CLAUDE_CODE_RETRY_WATCHDOG: "1"
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: ${{ inputs.allowed-bots }}
          prompt: |
            ${{ inputs.prompt-context }}
            Do a SECURITY review of this PR's diff vs the base branch. FIRST run
            `git diff ${{ env.BASE_SHA }}...${{ env.HEAD_SHA }}` to see the full diff — do not
            try to infer what changed from reading post-change files alone, and do not spend
            turns hunting for the diff any other way. Use `git log`/`git show` for commit-level
            context only where the diff alone is ambiguous.

            Weigh: secret handling/exposure, auth-gate bypass, SSRF, injection (incl. shell
            injection via `github.event.*` interpolation in workflows), GitHub Actions abuse
            (pull_request_target + untrusted checkout, missing author gates, over-scoped
            tokens), auto-merge/auto-deploy blast radius, and any autonomous-bot action that
            could touch prod or user data unsafely. Use the repo's /security-review skill if
            present. Post concise inline findings.

            Your FINAL message MUST be the machine-readable verdict object matching the provided
            JSON schema: {"critical":N,"high":N,"note":"..."} — the counts of CONFIRMED
            critical/high issues (zeros if the diff is clean). Do NOT write any file; the verdict
            is captured from your structured output, not the filesystem.
          claude_args: >-
            --max-turns ${{ inputs.max-turns }} --model ${{ inputs.model }}
            --allowedTools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*),Bash(git show:*)"
            --json-schema '{"type":"object","properties":{"critical":{"type":"integer"},"high":{"type":"integer"},"note":{"type":"string"}},"required":["critical","high","note"],"additionalProperties":false}'
      - name: Claude security review (retry — first attempt produced no verdict)
        id: claude_retry
        # Only fires when the first attempt emitted no structured_output — a transient OIDC/API
        # blip or a mid-review model error, NOT a clean review. One retry turns the common
        # seconds-long infra hiccup into an auto-recovery instead of a fail-closed `hold` that
        # needs a human to re-run. A genuinely broken/refusing review still yields no verdict
        # after this and the Gate below fails closed exactly as before. Guarded on go so it
        # never runs when the review was intentionally inert (missing key).
        if: steps.pre.outputs.go == 'true' && steps.claude.outputs.structured_output == ''
        continue-on-error: true
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1
        env:
          ENABLE_PROMPT_CACHING_1H: "1"
          # Unattended-CI resilience: wait out a subscription usage-limit/capacity (429/529) window
          # and retry instead of failing — the pool-exhaustion jam, without a metered key.
          CLAUDE_CODE_RETRY_WATCHDOG: "1"
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: ${{ inputs.allowed-bots }}
          prompt: |
            ${{ inputs.prompt-context }}
            Do a SECURITY review of this PR's diff vs the base branch. FIRST run
            `git diff ${{ env.BASE_SHA }}...${{ env.HEAD_SHA }}` to see the full diff — do not
            try to infer what changed from reading post-change files alone, and do not spend
            turns hunting for the diff any other way. Use `git log`/`git show` for commit-level
            context only where the diff alone is ambiguous.

            Weigh: secret handling/exposure, auth-gate bypass, SSRF, injection (incl. shell
            injection via `github.event.*` interpolation in workflows), GitHub Actions abuse
            (pull_request_target + untrusted checkout, missing author gates, over-scoped
            tokens), auto-merge/auto-deploy blast radius, and any autonomous-bot action that
            could touch prod or user data unsafely. Use the repo's /security-review skill if
            present. Post concise inline findings.

            Your FINAL message MUST be the machine-readable verdict object matching the provided
            JSON schema: {"critical":N,"high":N,"note":"..."} — the counts of CONFIRMED
            critical/high issues (zeros if the diff is clean). Do NOT write any file; the verdict
            is captured from your structured output, not the filesystem.
          claude_args: >-
            --max-turns ${{ inputs.max-turns }} --model ${{ inputs.model }}
            --allowedTools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*),Bash(git show:*)"
            --json-schema '{"type":"object","properties":{"critical":{"type":"integer"},"high":{"type":"integer"},"note":{"type":"string"}},"required":["critical","high","note"],"additionalProperties":false}'
      # Break-glass: if BOTH subscription attempts produced no verdict AND a metered
      # ANTHROPIC_API_KEY secret is present, fall back to the metered API so a subscription
      # pool-exhaustion can never leave this REQUIRED gate un-runnable (the merge-queue-jam
      # accepted-risk in CLAUDE.md § Auth). Inert until the operator adds ANTHROPIC_API_KEY —
      # the `secrets.ANTHROPIC_API_KEY != ''` guard skips it cleanly when unset, so nothing
      # changes for callers without the key. The retry-watchdog on the two subscription
      # attempts above already waits out most transient exhaustion; this is the last resort,
      # and it's the automatic version of the manual "revert to anthropic_api_key" this file's
      # CLAUDE.md documents.
      - name: Claude security review (break-glass — metered API fallback)
        id: claude_apikey
        if: steps.pre.outputs.go == 'true' && steps.claude.outputs.structured_output == '' && steps.claude_retry.outputs.structured_output == '' && steps.pre.outputs.apikey == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1
        env:
          ENABLE_PROMPT_CACHING_1H: "1"
          CLAUDE_CODE_RETRY_WATCHDOG: "1"
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          show_full_output: true
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: ${{ inputs.allowed-bots }}
          prompt: |
            ${{ inputs.prompt-context }}
            Do a SECURITY review of this PR's diff vs the base branch. FIRST run
            `git diff ${{ env.BASE_SHA }}...${{ env.HEAD_SHA }}` to see the full diff — do not
            try to infer what changed from reading post-change files alone, and do not spend
            turns hunting for the diff any other way. Use `git log`/`git show` for commit-level
            context only where the diff alone is ambiguous.

            Weigh: secret handling/exposure, auth-gate bypass, SSRF, injection (incl. shell
            injection via `github.event.*` interpolation in workflows), GitHub Actions abuse
            (pull_request_target + untrusted checkout, missing author gates, over-scoped
            tokens), auto-merge/auto-deploy blast radius, and any autonomous-bot action that
            could touch prod or user data unsafely. Use the repo's /security-review skill if
            present. Post concise inline findings.

            Your FINAL message MUST be the machine-readable verdict object matching the provided
            JSON schema: {"critical":N,"high":N,"note":"..."} — the counts of CONFIRMED
            critical/high issues (zeros if the diff is clean). Do NOT write any file; the verdict
            is captured from your structured output, not the filesystem.
          claude_args: >-
            --max-turns ${{ inputs.max-turns }} --model ${{ inputs.model }}
            --allowedTools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*),Bash(git show:*)"
            --json-schema '{"type":"object","properties":{"critical":{"type":"integer"},"high":{"type":"integer"},"note":{"type":"string"}},"required":["critical","high","note"],"additionalProperties":false}'
      # SuxOS/.github is PRIVATE, so the caller repo's own GITHUB_TOKEN (scoped only to the
      # caller repo) 404s on this cross-repo checkout — a plain "repository not found", not an
      # auth-prompt, since GitHub returns 404 rather than 403 for a private repo a token can't
      # see. This fails the job on EVERY run (clean-verdict included) once .github went private,
      # not just on findings — a false-red gating the whole fleet's merges (#457). Mint a token
      # explicitly scoped to `.github` via mint-app-token's owner/repositories passthrough
      # (mirrors issue-build.yml's "Mint app token for suxlib" sibling-checkout pattern) — the
      # default call with no owner/repositories still scopes to the CALLING repo only.
      - name: Mint app token for classifier checkout (SuxOS/.github)
        if: steps.pre.outputs.go == 'true'
        id: classifier-token
        # Matches the continue-on-error pattern on the three review-attempt steps above (see
        # lines 104-111): without it, a transient App-installation/token-mint hiccup aborts the
        # job before Gate ever runs, reproducing the #457 fleet-wide stall via a different root
        # cause (a bare failed required check, no hold, no explanation).
        continue-on-error: true
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}
          owner: SuxOS
          repositories: .github
      - name: Checkout classifier (SuxOS/.github — scripts/classify-security-noverdict.sh lives only there, never in caller repos)
        if: steps.pre.outputs.go == 'true'
        continue-on-error: true
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: SuxOS/.github
          ref: main
          path: .suxos-ci
          token: ${{ steps.classifier-token.outputs.token }}
      - name: Gate — classify no-verdict (infra retry vs diff fail-closed); block on high/critical
        if: always() && steps.pre.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          # Read the verdict from whichever attempt produced one (OAuth first, OAuth retry, then
          # the metered break-glass — each only runs if the prior produced nothing).
          VERDICT: ${{ steps.claude.outputs.structured_output || steps.claude_retry.outputs.structured_output || steps.claude_apikey.outputs.structured_output }}
          # Execution-log paths for each attempt. On a no-verdict these carry the ONLY signal
          # that distinguishes an account rate-limit (transient infra) from a diff-controlled
          # starvation/refusal (the evasion vector). Missing/empty paths are ignored downstream.
          EXEC_MAIN: ${{ steps.claude.outputs.execution_file }}
          EXEC_RETRY: ${{ steps.claude_retry.outputs.execution_file }}
          EXEC_APIKEY: ${{ steps.claude_apikey.outputs.execution_file }}
        run: |
          set -euo pipefail
          verdict="${VERDICT:-}"

          # ── PRODUCED VERDICT ─────────────────────────────────────────────────────────────
          # The reviewer finished and emitted structured output → trust it. Clean → pass;
          # confirmed critical/high → hold + block (unchanged behavior, real signal).
          if [ -n "$verdict" ]; then
            crit=$(printf '%s' "$verdict" | jq -r '.critical // 0'); high=$(printf '%s' "$verdict" | jq -r '.high // 0')
            echo "security verdict: critical=$crit high=$high"
            if [ "${crit:-0}" -gt 0 ] || [ "${high:-0}" -gt 0 ]; then
              gh pr edit "$PR" --add-label hold 2>/dev/null || true
              gh pr comment "$PR" --body "🛑 **security review**: found $crit critical / $high high security issue(s). Applied \`hold\` (blocks auto-merge). Resolve or justify, then remove \`hold\`." 2>/dev/null || true
              echo "::error::security review blocked this PR ($crit critical, $high high)"; exit 1
            fi
            echo "✓ no high/critical security findings"
            exit 0
          fi

          # ── NO VERDICT — classify by CAUSE (SuxOS/.github#236 + #209) ─────────────────────
          # Never a blanket advisory-pass anymore: an empty verdict is either a transient
          # account rate-limit (must requeue, not pass) or a diff-controlled starvation/refusal
          # (the evasion vector — must FAIL CLOSED). The classifier reads the execution logs
          # and returns `infra` ONLY on a genuine account-level rate-limit signal; anything
          # else (incl. unreadable logs / internal error) returns `fail-closed`.
          cls=$(bash .suxos-ci/scripts/classify-security-noverdict.sh "$EXEC_MAIN" "$EXEC_RETRY" "$EXEC_APIKEY" </dev/null || echo fail-closed)
          echo "no-verdict classification: $cls"

          if [ "$cls" = "infra" ]; then
            # INFRA (account five-hour rate-limit): NOT diff-controllable, NOT a security
            # signal. Do NOT pass (never ship an unreviewed diff) and do NOT `hold` (that's a
            # human-gate for real findings). Exit non-zero → this run is RED and blocks THIS
            # PR's merge, but the PR stays armed, so security-review re-runs on the next branch
            # synchronize (pr-auto-update rebases armed PRs when main moves) and goes green once
            # the limit resets → auto-merge fires. `security-review-retry` is a visible marker
            # for that transient state (and the hook a future active-requeue sweep keys on).
            gh pr edit "$PR" --add-label security-review-retry 2>/dev/null || true
            gh pr comment "$PR" --body "⏳ **security review deferred**: the Claude account hit a five-hour usage limit before it could review this diff — a transient infra gap, **not** a security finding and **not** a pass. This run is red on purpose (an unreviewed diff must not merge); it re-runs automatically on the next branch update / once the limit resets, then merges normally. No action needed." 2>/dev/null || true
            echo "::error::security review could not run (account rate-limit) — blocking transiently, will auto-requeue"; exit 1
          fi

          # FAIL CLOSED (#209): the reviewer engaged but produced no usable verdict on THIS
          # diff with no infra signal (refusal, looping, max-turns/timeout, or an unrecognized
          # failure) — the exact starvation path an attacker could use to make the required
          # gate pass by making the reviewer not finish. Block it: `hold` + non-zero exit.
          gh pr edit "$PR" --add-label hold 2>/dev/null || true
          gh pr comment "$PR" --body "🛑 **security review**: produced no verdict on this diff (no account rate-limit signal — the reviewer did not complete a review). Failing closed and applying \`hold\` so a starved/unreviewable diff cannot merge unreviewed. Investigate (very large diff, refusal, looping), then re-run; remove \`hold\` only after a clean review." 2>/dev/null || true
          echo "::error::security review produced no verdict and no infra signal — failing closed (hold)"; exit 1
