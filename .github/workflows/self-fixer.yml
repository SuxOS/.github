name: Self fixer

# Wires the backlog "propose" stage onto THIS repo (SuxOS/.github), same as every
# consumer repo's fixer.yml caller stub. Added 2026-07-15 to unblock the 16 issues
# piling up here that never entered the pipeline (issue-build.yml/fixer.yml/
# automerge.yml in this repo are only the reusable *definitions* — nothing
# previously called them against .github itself). TEMPORARY: this consciously
# lets suxbot[bot] author PRs that edit this repo's own shared workflow files;
# see self-issue-build.yml and self-automerge.yml for the matching build/merge
# stages and self-security-review.yml for the gate that still applies to them.

on:
  schedule: [{ cron: "37 8 * * *" }]
  workflow_dispatch:

jobs:
  fixer:
    # Default GITHUB_TOKEN perms are read-only; the reusable requests more than that,
    # so a caller that doesn't grant these fails at STARTUP (observed: the first
    # self-fixer dispatch 2026-07-15 was a startup_failure for exactly this reason —
    # self-issue-build.yml already had its block and ran fine). Grant exactly what
    # fixer.yml needs, mirroring sux/suxrouter's proven fixer stub.
    permissions:
      contents: read
      issues: write
      id-token: write
    uses: SuxOS/.github/.github/workflows/fixer.yml@main
    with:
      # Full-repo sweep across this repo's workflows/docs needs more than the default 25
      # turns to read broadly before proposing (same tuning as sux's fixer stub).
      max-turns: 40
    secrets: inherit
