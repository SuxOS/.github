name: Triage — investigate untriaged issues, queue for build (reusable)

# The INVESTIGATOR in the three-stage backlog pipeline (propose -> investigate -> build).
# Independent of whoever filed the issue: it re-checks every open UNTRIAGED issue — ones
# fixer.yml proposed AND ones a human filed — and decides, on its own read of the code,
# what's real and what should get built.
#
# "Untriaged" = open, and NOT already labeled `queued-for-build` / `building` / `hold` /
# `triaged` (see below). For each such issue the investigator:
#   1. Investigates: for a bug, reads enough code to judge whether it actually reproduces;
#      for a feature/idea, judges whether it's coherent and safely buildable unattended.
#   2. Assigns its OWN type (`bug`/`enhancement`/`security`/`documentation`) and confidence
#      (`confidence:high|medium|low`) — overriding the proposer's guess. High is reserved
#      for changes that are narrow, unambiguous, and low-risk REGARDLESS of type (most
#      net-new features never qualify), because high confidence is what clears a build to
#      auto-merge unattended (see issue-build.yml).
#   3. Decides buildable vs not. OPT-OUT DEFAULT: it queues MOST issues for build — the aim
#      is that most work drains autonomously. It withholds `queued-for-build` only when the
#      issue genuinely can't be built by an unattended session: a question, a duplicate,
#      needs external info/credentials/a human decision, or is too vague/large to attempt
#      safely. Those it labels `triaged` + `needs-human` and comments why, so they're not
#      re-investigated every run but a human sees them.
# Applying `queued-for-build` fires issue-build.yml via its `issues: labeled` trigger; a
# manual issue-build dispatch is the backstop. Everything the investigator queues also gets
# `triaged` so a partial/failed run (or the label-claim race in issue-build) can't cause it
# to be picked up twice.
#
# Deterministic-apply pattern: the model returns a structured plan (--json-schema
# structured_output, never a written file — see README gotcha) and a SHELL step applies the
# labels, so the labeling is auditable and can't half-happen inside a model turn.
#
# Runs on a Claude Pro/Max subscription (CLAUDE_CODE_OAUTH_TOKEN), not a metered
# ANTHROPIC_API_KEY — inert until that secret is set.
#
# Caller (owns its own dispatch/schedule triggers — workflow_call can't re-expose them):
#   uses: SuxOS/.github/.github/workflows/triage.yml@main
#   secrets: inherit

on:
  workflow_call:
    inputs:
      model:
        type: string
        # opus, deliberately: triage's confidence:high call is what lets a build merge with NO
        # human review — the single most consequential judgment in the pipeline. Adversarial
        # verification + a merge-gating decision → the strongest model (CLAUDE.md model doctrine).
        default: "opus"
      max-turns:
        type: number
        default: 30
      max-issues:
        description: "Cap issues investigated per run — a burst of proposals can't run up an unbounded bill."
        type: number
        default: 20

permissions:
  contents: read
  issues: write

concurrency:
  group: triage-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  triage:
    # FAST-PATH actor gate for the `issues` trigger only — the real, authoritative gate is
    # per-issue in the "Select untriaged issues" step below (see its comment), because on a
    # schedule/workflow_dispatch run this job investigates a BATCH of issues filed by
    # whoever, not one issue from a trusted trigger. This job forwards the full secret set
    # into an autonomous agent that reads attacker-controllable issue title/body and can
    # opt-out-queue an issue → issue-build → automerge, on a repo this org runs PUBLIC
    # (see automerge.yml) — so "someone with write access triggered the schedule" does NOT
    # make an arbitrary open issue's body safe to feed to that agent.
    if: >-
      (
        github.event_name != 'issues' ||
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Preflight — need the token
        id: pre
        run: |
          if [ "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}" != "true" ]; then
            echo "CLAUDE_CODE_OAUTH_TOKEN not set → triage inert"; echo "go=false" >> "$GITHUB_OUTPUT"
          else echo "go=true" >> "$GITHUB_OUTPUT"; fi

      - name: Mint app token
        if: steps.pre.outputs.go == 'true'
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      - name: Select untriaged issues
        id: select
        if: steps.pre.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          MAX_ISSUES: ${{ inputs.max-issues }}
        run: |
          set -euo pipefail
          # Untriaged = open, carrying NONE of the exclusion labels (queued-for-build /
          # building / hold / triaged), AND filed by a TRUSTED author (or the bot itself,
          # e.g. fixer.yml's proposals) — the actual actor gate for this job, since a
          # schedule/dispatch run reaches every open issue regardless of who filed it (the
          # job-level `if:` only covers the `issues`-event fast path). An untrusted issue
          # is attacker-controlled input into an autonomous agent that can opt-out-queue it
          # straight into an unattended build; excluding it here means it's simply never
          # selected, not silently trusted. Pull all open issues with their labels and
          # filter in jq — a label-set predicate is more robust than composing a GitHub
          # search string. Cap to MAX_ISSUES oldest-first so a proposal burst can't blow the
          # budget in one run; the rest wait for the next run.
          # `gh issue list --json` has no author_association field, so this reads the REST
          # issues endpoint directly (it returns author_association per-issue) — and must
          # exclude entries carrying a `pull_request` key, since that endpoint lists PRs too.
          all=$(gh api "repos/${GITHUB_REPOSITORY}/issues?state=open&per_page=100" --paginate 2>/dev/null || echo '[]')
          picked=$(printf '%s' "$all" | jq -sc --argjson n "$MAX_ISSUES" '
            [ .[][]
              | select(has("pull_request") | not)
              | (.labels | map(.name)) as $l
              | select(([ "queued-for-build","building","hold","triaged" ] - $l) | length == 4)
              | select((.author_association | IN("OWNER","MEMBER","COLLABORATOR")) or (.user.type == "Bot"))
            ] | sort_by(.number) | .[0:$n] | map(.number)')
          count=$(echo "$picked" | jq 'length')
          echo "untriaged issues to investigate ($count): $picked"
          echo "numbers=$picked" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.pre.outputs.go == 'true' && steps.select.outputs.count != '0'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 0 }

      - name: Claude — investigate and decide
        id: claude
        if: steps.pre.outputs.go == 'true' && steps.select.outputs.count != '0'
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1
        env:
          ISSUE_NUMBERS: ${{ steps.select.outputs.numbers }}
          ENABLE_PROMPT_CACHING_1H: "1"
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: |
            You are the investigator. These open issue numbers are untriaged: $ISSUE_NUMBERS

            Investigate EACH (`gh issue view <n>` for the full text; whoever filed it — the
            fixer bot or a human — is irrelevant, judge the substance). Read enough of the
            actual code to form your own view; do NOT trust the filer's framing or their
            confidence label.

            RESEARCH — ONLY WHERE THE CODE CAN'T ANSWER IT. Most issues are decided from the
            repo alone; do NOT research those. Research only when your confidence/buildable
            call genuinely hinges on an external fact the code cannot settle — an upstream
            library/API/runtime's actual documented behavior, whether a symptom is a known
            bug/CVE (and if it's fixed upstream), what a spec/standard mandates, or the current
            best practice for a "should we do X" call. Then do a FOCUSED lookup (1–3 targeted
            WebSearch/WebFetch queries, not open-ended browsing) and fold the finding in. Do
            NOT research style/refactor calls or anything the repo is source-of-truth for.
            "needs external info" is often no longer a blocker: if you can research the missing
            fact yourself, the issue becomes buildable — reserve needs-human for what research
            genuinely can't resolve. When research materially changed or confirmed a call, put
            a one-line finding + source URL in `research_note` (else leave it "").

            For each issue decide, on your own read:
              - type: `bug` | `enhancement` | `security` | `documentation`
              - confidence: `high` | `medium` | `low`.
                  high  = you confirmed it's real by reading the code AND the change is narrow,
                          unambiguous, and low-risk. This is the bar that lets a build merge
                          with NO human review, so reserve it — most net-new features and any
                          issue you couldn't fully confirm are NOT high.
                  medium = real/worthwhile but with scope or judgment to it.
                  low   = weak, big, ambiguous, or you couldn't confirm it.
              - buildable: true unless an unattended coding session genuinely can't do it —
                  a question, a duplicate, needs credentials/private access/a human decision, or
                  too vague/large to attempt safely. DEFAULT TO true: the aim is that most work
                  drains autonomously.
              - research_note: a one-line finding + source URL IF research was material, else "".

            Do NOT modify any issue or write any code here — just return the plan via the
            structured output schema, one entry per issue number you were given.
          # Investigator reads code + does focused open-web research, then returns a plan;
          # the labeling is a separate shell step, so Claude here never labels or writes code.
          # Allow read + WebSearch/WebFetch (the research contract) + `gh issue`/`gh label`
          # bash (issue inspection); NO Write/Edit to code.
          claude_args: >-
            --max-turns ${{ inputs.max-turns }} --model ${{ inputs.model }}
            --allowedTools "Read,Grep,Glob,WebSearch,WebFetch,Bash(gh issue:*),Bash(gh label:*)"
            --json-schema '{"type":"object","properties":{"decisions":{"type":"array","items":{"type":"object","properties":{"number":{"type":"integer"},"type":{"type":"string","enum":["bug","enhancement","security","documentation"]},"confidence":{"type":"string","enum":["high","medium","low"]},"buildable":{"type":"boolean"},"reason":{"type":"string"},"research_note":{"type":"string"}},"required":["number","type","confidence","buildable","reason","research_note"],"additionalProperties":false}}},"required":["decisions"],"additionalProperties":false}'

      - name: Apply triage labels
        if: steps.pre.outputs.go == 'true' && steps.select.outputs.count != '0'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERDICT: ${{ steps.claude.outputs.structured_output }}
        run: |
          set -euo pipefail
          if [ -z "${VERDICT:-}" ]; then echo "no verdict → nothing to label"; exit 0; fi
          echo "$VERDICT" | jq -c '.decisions[]' | while read -r d; do
            n=$(echo "$d" | jq -r '.number')
            type=$(echo "$d" | jq -r '.type')
            conf=$(echo "$d" | jq -r '.confidence')
            buildable=$(echo "$d" | jq -r '.buildable')
            reason=$(echo "$d" | jq -r '.reason // ""')
            research=$(echo "$d" | jq -r '.research_note // ""')

            add=(--add-label "triaged" --add-label "$type" --add-label "confidence:$conf")
            if [ "$buildable" = "true" ]; then
              add+=(--add-label "queued-for-build")
              echo "issue #$n → triaged, $type, confidence:$conf, queued-for-build"
            else
              add+=(--add-label "needs-human")
              echo "issue #$n → triaged, $type, confidence:$conf, NOT buildable ($reason)"
            fi
            gh issue edit "$n" --repo "$GITHUB_REPOSITORY" "${add[@]}" 2>/dev/null || echo "::warning::could not label #$n"
            # Post the research finding (if any) so it's auditable and the build stage inherits it.
            if [ -n "$research" ]; then
              gh issue comment "$n" --repo "$GITHUB_REPOSITORY" \
                --body "🔎 Triage research: $research" 2>/dev/null || true
            fi
            if [ "$buildable" != "true" ] && [ -n "$reason" ]; then
              gh issue comment "$n" --repo "$GITHUB_REPOSITORY" \
                --body "🤖 Triage held this off autonomous build: $reason (labeled \`needs-human\`). Add \`queued-for-build\` yourself to override." 2>/dev/null || true
            fi
          done
