name: Actions budget guard (reusable)

# Hourly (and on demand), sums THIS REPO's billable Actions minutes this
# calendar month (via the runs-timing API — org billing endpoints are
# unreachable by a GitHub App token, so this deliberately avoids them) and, if
# it crosses a soft cap, PAUSES only the DISCRETIONARY spenders (the @claude
# review/mention bot and the CI autofix bot) — leaving every safety/deploy gate
# untouched. Two brakes: (1) sets repo variable ACTIONS_BUDGET_PAUSED=true, a
# race-free fast-path the discretionary jobs gate their `if:` on, and (2)
# `gh workflow disable`s them. Never touches ci/deploy/security-review/audit/
# secret-scan. Hysteresis (resume-below < soft-cap) avoids flapping at the
# boundary. If the runs listing comes back empty (API/perms issue), it does
# NOTHING — a blind guard must never brake.
#
# Caller (needs its own schedule/dispatch triggers):
#   uses: SuxOS/.github/.github/workflows/budget-guard.yml@main
#   with: { budget: "6000", resume-below: "5800", discretionary-workflows: "claude.yml claude-autofix.yml" }
#   secrets: inherit

on:
  workflow_call:
    inputs:
      budget:
        type: string
        default: "6000"
      resume-below:
        type: string
        default: "5800"
      discretionary-workflows:
        description: "Space-separated workflow filenames this guard is allowed to pause."
        type: string
        default: "claude.yml claude-autofix.yml"
      issue-title:
        type: string
        default: "Actions budget — discretionary spenders paused"

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: budget-guard-${{ github.workflow }}
  cancel-in-progress: false

env:
  BUDGET: ${{ inputs.budget }}
  RESUME_BELOW: ${{ inputs.resume-below }}
  ISSUE_TITLE: ${{ inputs.issue-title }}
  DISCRETIONARY: ${{ inputs.discretionary-workflows }}

jobs:
  guard:
    name: Watch the Actions minute budget
    runs-on: ubuntu-latest
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      - name: Read used minutes and pause/resume the discretionary spenders
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail

          # Org billing endpoints (old /users/.../billing/actions, current
          # /orgs/.../settings/billing/usage) are BOTH unreachable by a GitHub App
          # installation token — billing is PAT/OAuth-user-only at the platform level,
          # no permission grant changes that. So don't use billing APIs at all: sum
          # this REPO's billable Actions minutes straight from the runs-timing API
          # (needs only `actions: read`, which this App already has), for runs created
          # since the 1st of the current UTC month. Per-repo, not org-wide — matches
          # how each caller repo runs its own guard instance anyway.
          cycle_start="$(date -u +%Y-%m-01)"
          total_ms=0
          run_count=0
          for run_id in $(gh api "/repos/${REPO}/actions/runs?created=%3E%3D${cycle_start}&per_page=100" --paginate \
              --jq '.workflow_runs[]?.id' 2>/dev/null); do
            run_count=$((run_count + 1))
            ms=$(gh api "/repos/${REPO}/actions/runs/${run_id}/timing" --jq '.run_duration_ms // 0' 2>/dev/null || echo 0)
            case "$ms" in ''|*[!0-9]*) ms=0 ;; esac
            total_ms=$((total_ms + ms))
          done
          if [ "$run_count" -eq 0 ]; then
            echo "::warning::could not list any Actions runs this cycle (API/perms issue) — no-op this run"
            exit 0
          fi
          used=$((total_ms / 60000))
          echo "used Actions minutes this cycle ($REPO, since $cycle_start, $run_count runs): $used (soft cap $BUDGET, resume-below $RESUME_BELOW)"

          set_var() {
            gh api --method PATCH "/repos/${REPO}/actions/variables/ACTIONS_BUDGET_PAUSED" \
              -f "name=ACTIONS_BUDGET_PAUSED" -f "value=$1" >/dev/null 2>&1 && return 0
            gh api --method POST "/repos/${REPO}/actions/variables" \
              -f "name=ACTIONS_BUDGET_PAUSED" -f "value=$1" >/dev/null 2>&1 || true
          }

          existing=$(gh issue list --repo "$REPO" --state open --limit 100 --json number,title \
            | jq -r --arg t "$ISSUE_TITLE" '[.[] | select(.title == $t) | .number] | first // empty')

          if [ "$used" -ge "$BUDGET" ]; then
            echo "OVER soft cap → pausing discretionary spenders ($DISCRETIONARY)"
            set_var "true"
            for wf in $DISCRETIONARY; do
              gh workflow disable "$wf" --repo "$REPO" 2>/dev/null && echo "disabled $wf" || echo "::warning::could not disable $wf (already off / perms)"
            done
            body=$(printf '%s\n' \
              "Auto-maintained by the Actions budget guard (${GITHUB_SERVER_URL}/${REPO}/actions/workflows/budget-guard.yml). $(date -u '+%Y-%m-%d %H:%M UTC')." \
              "" \
              "Used Actions minutes (**$used**) crossed the soft cap (**$BUDGET**). To protect the bill, the DISCRETIONARY spenders are paused:" \
              "" \
              "$(for wf in $DISCRETIONARY; do echo "- \`$wf\`"; done)" \
              "" \
              "Safety/deploy gates are untouched and still run." \
              "" \
              "Auto-resumes once used minutes drop below **$RESUME_BELOW**. To resume now: enable the discretionary workflows and set the repo variable \`ACTIONS_BUDGET_PAUSED=false\`.")
            if [ -n "$existing" ]; then
              gh issue edit "$existing" --repo "$REPO" --body "$body" && echo "refreshed tracking issue #$existing"
            else
              gh issue create --repo "$REPO" --title "$ISSUE_TITLE" --body "$body" && echo "opened tracking issue"
            fi
            exit 0
          fi

          if [ "$used" -lt "$RESUME_BELOW" ]; then
            echo "UNDER resume-below → ensuring discretionary spenders are enabled"
            set_var "false"
            for wf in $DISCRETIONARY; do
              gh workflow enable "$wf" --repo "$REPO" 2>/dev/null && echo "enabled $wf" || echo "$wf already enabled / perms"
            done
            if [ -n "$existing" ]; then
              gh issue comment "$existing" --repo "$REPO" \
                --body "Used Actions minutes back under the resume threshold ($used < $RESUME_BELOW) as of $(date -u '+%Y-%m-%d %H:%M UTC'). Discretionary spenders re-enabled. Closing." 2>/dev/null || true
              gh issue close "$existing" --repo "$REPO" 2>/dev/null && echo "closed tracking issue #$existing" || true
            fi
            exit 0
          fi

          echo "in the hysteresis band ($RESUME_BELOW ≤ $used < $BUDGET) → leaving current state unchanged"
