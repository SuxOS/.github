name: Self automerge

# Arms auto-merge for suxbot[bot] PRs against THIS repo — see self-fixer.yml.
# Org rulesets (SuxOS/.github#669) require only `security-review` fleet-wide —
# actionlint/pin-consistency are no longer required status checks, so listing
# them here just makes assert-branch-protection refuse to arm (see PR #700).

on:
  pull_request_target:
    types: [opened, reopened, synchronize, labeled, unlabeled, ready_for_review, edited]
  pull_request_review:
    types: [submitted]

jobs:
  automerge:
    # Reusable requests more than the read-only default GITHUB_TOKEN → grant it here or
    # the job startup-fails (same class of bug as self-fixer's first dispatch). Mirrors
    # the proven sux-fileops automerge stub.
    permissions:
      contents: write
      pull-requests: write
    uses: SuxOS/.github/.github/workflows/automerge.yml@main
    with:
      required-gates: |
    secrets: inherit
