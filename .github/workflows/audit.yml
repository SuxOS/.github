name: Audit & SBOM (reusable)

# Dependency vulnerability audit + CycloneDX SBOM. Fails the build on advisories
# at or above `audit-level` (default high); stays advisory when npm can't reach
# the registry. Opens/updates a tracking issue on a genuine failure so a
# scheduled trip isn't silently red with nobody watching.
#
# Caller:
#   uses: SuxOS/.github/.github/workflows/audit.yml@main
#   secrets: inherit
#
# Non-Node caller (no package.json): pass `enabled: false` to skip the
# npm install/audit/SBOM steps entirely.

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "22"
      audit-level:
        description: "Minimum severity that fails the build (low, moderate, high, critical)."
        type: string
        default: "high"
      enabled:
        description: "Set to false to skip the npm install/audit/SBOM steps entirely (for non-Node callers)."
        type: boolean
        default: true

permissions:
  contents: read
  issues: write

# Scoped per-repo-per-ref: a bare `${{ github.workflow }}` group is identical
# across every caller repo (the reusable workflow's own name), so all repos'
# audit runs shared one org-wide queue lane. GitHub Actions keeps at most one
# *pending* run per concurrency group — when a newer run queues into that
# lane, the older queued run is evicted (cancelled) regardless of
# cancel-in-progress, which is what caused the org-wide spurious "failed"
# checks. Scoping the group to repo+ref keeps queueing/dedup behavior within
# a single PR/branch instead of colliding across unrelated repos.
# cancel-in-progress stays false so concurrent audits on the same ref queue
# instead of cancelling each other's issue bookkeeping.
concurrency:
  group: audit-issue-${{ github.workflow }}-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit:
    name: npm audit & SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.enabled && 'npm' || '' }}

      - name: Install dependencies
        if: inputs.enabled
        run: npm ci

      - name: npm audit (fail at configured severity)
        id: audit
        if: inputs.enabled
        env:
          AUDIT_LEVEL: ${{ inputs.audit-level }}
        run: |
          npm audit --audit-level="$AUDIT_LEVEL" --json > audit-report.json || true
          node -e '
            const fs = require("fs");
            const level = process.env.AUDIT_LEVEL;
            const order = ["low", "moderate", "high", "critical"];
            const threshold = order.includes(level) ? order.indexOf(level) : order.indexOf("high");
            let r;
            try {
              r = JSON.parse(fs.readFileSync("audit-report.json", "utf8"));
            } catch (e) {
              let head = "";
              try { head = fs.readFileSync("audit-report.json", "utf8").slice(0, 500); } catch (_) {}
              console.log("::warning::Could not parse npm audit output; treating as advisory. Error: " + e.message + "; first 500 bytes: " + JSON.stringify(head));
              process.exit(0);
            }
            if (r.error) {
              const code = (r.error && r.error.code) || "unknown";
              console.log("::warning::npm audit could not reach the registry (" + code + "); treating as advisory.");
              process.exit(0);
            }
            const v = (r.metadata && r.metadata.vulnerabilities) || {};
            const counts = { low: v.low || 0, moderate: v.moderate || 0, high: v.high || 0, critical: v.critical || 0 };
            console.log("Vulnerabilities: critical=" + counts.critical + " high=" + counts.high + " moderate=" + counts.moderate + " low=" + counts.low);
            const atOrAbove = order.slice(threshold).reduce((sum, sev) => sum + counts[sev], 0);
            if (atOrAbove > 0) {
              console.log("::error::Found " + atOrAbove + " vulnerabilities at or above severity " + level + " (see audit-report.json).");
              process.exit(1);
            }
            console.log("No vulnerabilities at or above severity " + level + ".");
          '

      # SBOM generation is advisory, not a merge gate (like the npm audit step above).
      # `npm sbom` hard-errors (ESBOMPROBLEMS) on an unmet/invalid tree entry — e.g. a
      # local `file:` dependency that isn't checked out in CI — which must not fail the
      # required check. Treat a failed generation as advisory and skip the upload.
      - name: Generate SBOM (CycloneDX)
        if: inputs.enabled
        run: |
          if ! npm sbom --sbom-format cyclonedx > sbom.cyclonedx.json; then
            echo "::warning::npm sbom failed (e.g. unresolved file: dependency); treating as advisory."
            rm -f sbom.cyclonedx.json
          fi

      - name: Upload SBOM artifact
        if: inputs.enabled && hashFiles('sbom.cyclonedx.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          if-no-files-found: error

      - name: Build audit-failure issue body
        id: audit-issue
        if: failure() && steps.audit.outcome == 'failure'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let advisories = [];
            let counts = "";
            try {
              const r = JSON.parse(fs.readFileSync("audit-report.json", "utf8"));
              const v = (r.metadata && r.metadata.vulnerabilities) || {};
              counts = `critical=${v.critical || 0} high=${v.high || 0} moderate=${v.moderate || 0} low=${v.low || 0}`;
              const seen = new Set();
              for (const pkg of Object.values(r.vulnerabilities || {})) {
                for (const via of pkg.via || []) {
                  if (typeof via !== "object") continue;
                  if (!["high", "critical"].includes(via.severity)) continue;
                  const key = via.url || via.title;
                  if (seen.has(key)) continue;
                  seen.add(key);
                  advisories.push(via);
                }
              }
            } catch (e) {
              core.warning(`Could not parse audit-report.json: ${e.message}`);
            }

            const advisoryLines = advisories.length
              ? advisories.map(
                  (a) =>
                    `- **${a.severity}** ${a.title || a.name}${a.url ? ` (${a.url})` : ""}` +
                    `${a.name ? ` — pkg \`${a.name}\`` : ""}${a.range ? ` \`${a.range}\`` : ""}`,
                )
              : ["- (advisory details unavailable — see audit-report.json in the run logs)"];

            const body = [
              `The dependency audit tripped on a high/critical advisory on ${new Date().toISOString()}.`,
              "",
              `- Workflow run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              counts ? `- Counts: ${counts}` : "",
              "",
              "### Advisories",
              ...advisoryLines,
              "",
              "Run `npm audit` locally, then `npm audit fix` (or bump the offending",
              "dependency) and open a PR. This issue is updated on each subsequent",
              "failing run and can be closed once the audit is green.",
            ]
              .filter((l) => l !== "")
              .join("\n");

            core.setOutput("body", body);

      - name: Open or update audit-failure issue on failure
        if: failure() && steps.audit.outcome == 'failure'
        uses: SuxOS/.github/.github/actions/upsert-tracking-issue@main
        with:
          github-token: ${{ github.token }}
          title: "npm audit: high/critical advisory"
          body: ${{ steps.audit-issue.outputs.body }}
