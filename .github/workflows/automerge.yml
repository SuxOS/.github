name: Auto-merge (reusable)

# Enable GitHub NATIVE auto-merge on eligible PRs. GitHub then merges the PR by
# itself the moment branch protection is satisfied — so nothing red ever reaches
# an auto-deploying main. This job only *enables* auto-merge; it never force-merges.
# Merge method: squash.
#
# Eligibility (2026-07-15, three-loop-pipeline.md Phase 1): not a draft, and not
# labelled `hold`. That's the whole predicate. The prior safe-type-title/eligible-label/
# breaking-change taxonomy is gone — on a private, single-operator repo it was re-encoding
# "did CI + security-review pass," which native auto-merge + branch protection already
# enforce as the actual merge condition. `hold` (applied only by a CONFIRMED critical/high
# security finding, or by hand) is the one write-gate; everything else is advisory.
#
# Uses pull_request_target (base-repo context, write token) but never checks out PR
# code — it only reads the event payload and calls the API.
#
# Pushed/enabled with a GitHub App token (create-github-app-token), NOT GITHUB_TOKEN:
# GitHub suppresses workflow runs for GITHUB_TOKEN-attributed pushes/merges, so a
# GITHUB_TOKEN-enabled auto-merge fires neither CI nor a deploy workflow on main.
#
# Caller:
#   uses: SuxOS/.github/.github/workflows/automerge.yml@main
#   with: { required-gates: ... }  # optional; see inputs below
#   secrets: inherit
#
# NOTE: this workflow mints its App token from the FIXED secret names
# SUX_BOT_APP_ID / SUX_BOT_PRIVATE_KEY, inherited via `secrets: inherit`. The
# caller must define the App id/key under exactly those names (there is no
# secret-name input — reusable workflows can't read secret names dynamically).
# For a different bot identity, store its id/key under SUX_BOT_APP_ID /
# SUX_BOT_PRIVATE_KEY in the caller repo, or fork this file.

on:
  workflow_call:
    inputs:
      required-gates:
        description: >-
          Newline-separated check-run names that main branch protection (or a
          ruleset) must require before auto-merge is trusted to be gated (job
          `name`s, one per line). Secret scanning is GitHub's native
          secret-scanning + push-protection (repo Settings → Security), not a
          status check, so it needs no entry here.
        type: string
        default: |
          Type-check & build
          security-review
          npm audit & SBOM

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: automerge-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-automerge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # No author-trust gate: the repos are PRIVATE (verified 2026-07-15) — there is no
    # anonymous-fork attacker, so gating on author_association/bot-login/self-improve
    # defended against an actor that can't exist here. Draft/hold are checked below in
    # the run step (structural filters); a confirmed security finding still blocks via
    # `hold`, applied by security-review.yml on a CONFIRMED critical/high verdict.
    if: github.event.pull_request.state == 'open'
    steps:
      - name: Mint app token
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}
          tier: sudo

      # Refuse to enable auto-merge unless every required gate is present in main's
      # required checks — native auto-merge completes the instant REQUIRED checks go
      # green, so a slow security review only guards the merge if it's actually
      # required. Shared with pr-drain.yml (the other path that arms auto-merge) via
      # the assert-branch-protection composite action so both mutation paths enforce
      # the identical safety gate.
      - name: Assert main branch protection requires the security gates
        uses: SuxOS/.github/.github/actions/assert-branch-protection@main
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          required-gates: ${{ inputs.required-gates }}
          # Hardcoding "main" here broke for any caller whose default branch isn't
          # literally main: the read 404s, which resolves to rules_ok=false, which
          # takes the "can't determine, continue WITHOUT blocking" path — silently
          # disabling this fail-closed gate instead of erroring loudly.
          base-branch: ${{ github.event.pull_request.base.ref || github.event.repository.default_branch }}

      - name: Decide eligibility and enable auto-merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUM: ${{ github.event.pull_request.number }}
          TITLE: ${{ github.event.pull_request.title }}
          DRAFT: ${{ github.event.pull_request.draft }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set -euo pipefail
          echo "PR #$PR_NUM  title=$TITLE  draft=$DRAFT  labels=$LABELS"

          has_label() { echo ",$LABELS," | grep -qi ",$1,"; }

          ineligible() {
            echo "$1 → not auto-merge-eligible; disabling any pending auto-merge"
            gh pr merge --disable-auto "$PR_URL" || {
              echo "::warning::could not disable auto-merge on ineligible PR ($1) — if it was previously armed it may still complete once checks go green; disable it manually"; }
            exit 0
          }

          # The whole predicate: not draft, not held. CI + security-review are enforced by
          # native auto-merge waiting on branch-protection required checks, not re-checked here.
          if [ "$DRAFT" = "true" ]; then ineligible "draft"; fi
          if has_label hold;    then ineligible "hold label"; fi

          echo "eligible → enabling native auto-merge (squash)"
          gh pr merge --auto --squash "$PR_URL" || {
            echo "::warning::could not enable auto-merge (branch protection unmet or already merging)"; exit 0; }
          gh pr edit "$PR_URL" --add-label automerge 2>/dev/null || true
