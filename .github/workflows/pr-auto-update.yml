name: PR auto-update / self-drain (reusable)

# Branch protection strict=true means a PR must be up-to-date with main to merge,
# but nothing else re-bases open PRs when main moves — so every other
# armed-auto-merge PR flips BEHIND and stalls until a human clicks "Update branch".
# This runs `gh pr update-branch` on armed-but-BEHIND PRs so the queue self-drains.
#
# update-branch pushes to the PR branch (never main), so a push:main trigger
# cannot self-loop. Only mutates armed PRs (auto-merge enabled) that are BEHIND
# and not held.
#
# Push with the App token, NOT GITHUB_TOKEN — GitHub suppresses workflow runs for
# GITHUB_TOKEN-attributed pushes (recursion prevention), so a GITHUB_TOKEN
# update-branch changes the PR head SHA but never re-fires the required checks.
#
# Skips any PR labelled `autofix-in-progress` — claude-autofix.yml also pushes to PR
# branches and holds that label for the duration of its run, so this avoids racing
# it and dropping a losing push. See claude-autofix.yml's lock/unlock steps.
#
# Caller (needs its own push/schedule/dispatch triggers):
#   uses: SuxOS/.github/.github/workflows/pr-auto-update.yml@main
#   secrets: inherit

on:
  workflow_call:
    inputs:
      pr-limit:
        description: "Max open PRs to list per run. Raise on repos with a busy queue (>100 open PRs) so armed-but-BEHIND PRs past the first page still get updated."
        type: string
        default: "100"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-auto-update-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update-behind:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Mint app token
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      - name: Update armed BEHIND PRs onto main
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          PR_LIMIT: ${{ inputs.pr-limit }}
        run: |
          set -uo pipefail
          # mergeStateStatus alone under-selects: GitHub reports BLOCKED (not BEHIND)
          # whenever required checks are failing/pending, even if the PR is ALSO
          # behind main — e.g. a stale merge base whose checks inherited a bug
          # already fixed on main. Candidate on BEHIND or BLOCKED, then confirm via
          # compare's behind_by so a BLOCKED-but-current PR (blocked for some other
          # reason) isn't needlessly churned.
          if ! prs=$(gh pr list --state open --limit "$PR_LIMIT" \
            --json number,mergeStateStatus,isDraft,autoMergeRequest,labels,headRefName \
            --jq '.[]
              | select(.isDraft == false)
              | select(.autoMergeRequest != null)
              | select(.mergeStateStatus == "BEHIND" or .mergeStateStatus == "BLOCKED")
              | select(([.labels[].name] | index("hold")) | not)
              | select(([.labels[].name] | index("autofix-in-progress")) | not)
              | "\(.number)\t\(.headRefName)"'); then
            echo "::error::gh pr list failed (auth/API error) — cannot distinguish from no BEHIND/BLOCKED PRs"
            exit 1
          fi
          if [ -z "$prs" ]; then
            echo "No armed BEHIND/BLOCKED PRs to update."
            exit 0
          fi
          while IFS=$'\t' read -r n head_ref; do
            [ -z "$n" ] && continue
            behind_by=$(gh api "repos/$GH_REPO/compare/main...$head_ref" --jq '.behind_by' 2>/dev/null) || behind_by=""
            if ! [ "$behind_by" -gt 0 ] 2>/dev/null; then
              echo "PR #$n ($head_ref) not behind main (behind_by=${behind_by:-unknown}) — skipping"
              continue
            fi
            echo "::group::update-branch PR #$n"
            if gh pr update-branch "$n"; then
              echo "updated #$n onto main"
            else
              echo "::warning::update-branch failed for #$n (skipping, will retry next run)"
            fi
            echo "::endgroup::"
            sleep 3
          done <<< "$prs"
