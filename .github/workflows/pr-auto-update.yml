name: PR auto-update / self-drain (reusable)

# Branch protection strict=true means a PR must be up-to-date with main to merge,
# but nothing else re-bases open PRs when main moves — so every other
# armed-auto-merge PR flips BEHIND and stalls until a human clicks "Update branch".
# This runs `gh pr update-branch` on armed-but-BEHIND PRs so the queue self-drains.
#
# update-branch pushes to the PR branch (never main), so a push:main trigger
# cannot self-loop. Only mutates armed PRs (auto-merge enabled) that are BEHIND
# and not held.
#
# Push with the App token, NOT GITHUB_TOKEN — GitHub suppresses workflow runs for
# GITHUB_TOKEN-attributed pushes (recursion prevention), so a GITHUB_TOKEN
# update-branch changes the PR head SHA but never re-fires the required checks.
#
# Skips any PR labelled `autofix-in-progress` — claude-autofix.yml also pushes to PR
# branches and holds that label for the duration of its run, so this avoids racing
# it and dropping a losing push. See claude-autofix.yml's lock/unlock steps.
#
# Caller (needs its own push/schedule/dispatch triggers):
#   uses: SuxOS/.github/.github/workflows/pr-auto-update.yml@main
#   secrets: inherit

on:
  workflow_call:
    inputs:
      pr-limit:
        description: "Starting page size for the exhaustive open-PR list (quadruples until a short page is seen, or fails loud past gh-list-exhaustive's max-limit — see #401). Raise only if a repo's open-PR count is large enough that the default start makes the first page-quadrupling pass slower than useful."
        type: string
        default: "100"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-auto-update-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update-behind:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Mint app token
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}
          tier: sudo

      # A bounded `gh pr list --limit N` silently drops armed BEHIND/BLOCKED PRs past
      # page N on a busy queue — the same undercount shape gh-list-exhaustive (#396)
      # was built to eliminate; this site was simply missed until #401.
      - name: List open PRs (exhaustive)
        id: list-prs
        uses: SuxOS/.github/.github/actions/gh-list-exhaustive@main
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          json-fields: number,mergeStateStatus,isDraft,autoMergeRequest,labels,headRefName
          start-limit: ${{ inputs.pr-limit }}
          args: |
            pr
            list
            --repo
            ${{ github.repository }}
            --state
            open

      - name: Update armed BEHIND PRs onto default branch
        id: update-behind
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          PRS_JSON: ${{ steps.list-prs.outputs.json }}
        run: |
          set -uo pipefail
          # mergeStateStatus alone under-selects: GitHub reports BLOCKED (not BEHIND)
          # whenever required checks are failing/pending, even if the PR is ALSO
          # behind the default branch — e.g. a stale merge base whose checks inherited
          # a bug already fixed there. Candidate on BEHIND or BLOCKED, then confirm via
          # compare's behind_by so a BLOCKED-but-current PR (blocked for some other
          # reason) isn't needlessly churned.
          # Resolved dynamically, not hardcoded "main" — a caller whose default branch
          # isn't literally main would otherwise always see behind_by="" and never
          # rebase any PR (SuxOS/.github#612), same fix as pr-watch.yml.
          default_branch=$(gh api "repos/$GH_REPO" --jq .default_branch 2>/dev/null) || default_branch=""
          default_branch="${default_branch:-main}"
          # GitHub computes mergeStateStatus LAZILY: the first query for a PR returns
          # UNKNOWN and merely STARTS the background computation; a later query returns the
          # real value. Because this sweep is usually the first thing to ask about these PRs
          # in a given window, it reliably got UNKNOWN — so the BEHIND/BLOCKED filter matched
          # nothing and the step exited green having updated nothing, on every run. That was
          # the NORMAL path, not an intermittent blip, and it masked itself by succeeding
          # (SuxOS/.github#723).
          # Re-query only the candidates (armed, non-draft, unheld) that are still UNKNOWN,
          # bounded — computation is typically sub-second, so a couple of passes is plenty.
          candidates_unknown() {
            jq -r '.[]
              | select(.isDraft == false)
              | select(.autoMergeRequest != null)
              | select(([.labels[].name] | index("hold")) | not)
              | select(([.labels[].name] | index("autofix-in-progress")) | not)
              | select(.mergeStateStatus == "UNKNOWN")
              | .number' <<<"$PRS_JSON"
          }
          for attempt in 1 2 3; do
            unknown=$(candidates_unknown) || unknown=""
            if [ -z "$unknown" ]; then
              break
            fi
            echo "mergeStateStatus still UNKNOWN for: $(tr '\n' ' ' <<<"$unknown")(attempt ${attempt}/3, re-querying)"
            sleep 4
            while read -r u; do
              if [ -z "$u" ]; then
                continue
              fi
              live=$(gh pr view "$u" --json mergeStateStatus --jq '.mergeStateStatus' 2>/dev/null) || live=""
              if [ -z "$live" ] || [ "$live" = "UNKNOWN" ]; then
                continue
              fi
              PRS_JSON=$(jq --argjson n "$u" --arg s "$live" 'map(if .number == $n then .mergeStateStatus = $s else . end)' <<<"$PRS_JSON")
            done <<<"$unknown"
          done
          still_unknown=$(candidates_unknown) || still_unknown=""
          if [ -n "$still_unknown" ]; then
            # By number, never silently dropped — an unresolvable PR is a real stall, and the
            # whole point of #723 is that a green no-op must not be indistinguishable from
            # "nothing to do".
            echo "::warning::mergeStateStatus unresolved after retries for PR(s): $(tr '\n' ' ' <<<"$still_unknown")— skipping them this run"
          fi
          considered=$(jq -r 'length' <<<"$PRS_JSON")
          unknown_count=$(printf '%s' "$still_unknown" | grep -c . || true)
          if ! prs=$(jq -r '.[]
              | select(.isDraft == false)
              | select(.autoMergeRequest != null)
              | select(.mergeStateStatus == "BEHIND" or .mergeStateStatus == "BLOCKED")
              | select(([.labels[].name] | index("hold")) | not)
              | select(([.labels[].name] | index("autofix-in-progress")) | not)
              | "\(.number)\t\(.headRefName)"' <<<"$PRS_JSON"); then
            echo "::error::failed to parse open-PR list — cannot distinguish from no BEHIND/BLOCKED PRs"
            exit 1
          fi
          if [ -z "$prs" ]; then
            echo "No armed BEHIND/BLOCKED PRs to update (${considered} open PR(s) considered, ${unknown_count} still UNKNOWN after retries)."
            exit 0
          fi
          while IFS=$'\t' read -r n head_ref; do
            [ -z "$n" ] && continue
            behind_by=$(gh api "repos/$GH_REPO/compare/${default_branch}...$head_ref" --jq '.behind_by' 2>/dev/null) || behind_by=""
            if ! [ "$behind_by" -gt 0 ] 2>/dev/null; then
              echo "PR #$n ($head_ref) not behind ${default_branch} (behind_by=${behind_by:-unknown}) — skipping"
              continue
            fi
            echo "::group::update-branch PR #$n"
            if gh pr update-branch "$n"; then
              echo "updated #$n onto main"
            else
              echo "::warning::update-branch failed for #$n (skipping, will retry next run)"
            fi
            echo "::endgroup::"
            sleep 3
          done <<< "$prs"
