name: PR drain — close-stale + reconcile (reusable)

# Two drain gaps: pr-auto-update.yml handles the rebase-behind limb; this adds:
#   CLOSE-STALE — bot PRs (`self-improve`) and human-punted ones (`needs-human`) idle
#     past STALE_DAYS get a heads-up comment and are closed. Opt out with `hold`/`keep`.
#   RECONCILE — a green, mergeable PR eligible under the same predicate automerge.yml
#     uses (not-draft, not-hold, plus the shared pr-eligibility action) but never
#     armed gets `gh pr merge --auto --squash`. Native auto-merge still
#     gates the actual merge on CI + branch protection — this only ARMS it. Before
#     arming, this shares automerge.yml's branch-protection assertion (the
#     assert-branch-protection composite action) so it never re-arms auto-merge when
#     main's required checks have lost a security gate.
# gh CLI + jq only, no checkout. App token so mutations carry the bot identity.
# Every mutation is per-PR `|| true` so one failure can't wedge the sweep. The batch
# PR list only picks CANDIDATES — each PR's live labels/state are re-read immediately
# before acting, so a `hold`/`keep` or a mergeStateStatus change from a concurrent bot
# (automerge.yml, security-review.yml) in the intervening seconds is honoured.
#
# Caller (needs its own schedule/dispatch triggers):
#   uses: SuxOS/.github/.github/workflows/pr-drain.yml@main
#   with: { stale-days: "14" }
#   secrets: inherit

on:
  workflow_call:
    inputs:
      stale-days:
        type: string
        default: "14"
      pr-limit:
        description: "Max open PRs to list per run. Raise on repos with a busy queue so the sweep doesn't silently skip PRs past the first page (truncation is invisible, so err high)."
        type: string
        default: "200"
      dry-run:
        description: "If true, log the computed close-set but skip the actual `gh pr close` mutation (and the heads-up comment that announces it). Read-only preview of CLOSE-STALE."
        type: boolean
        default: false
      required-gates:
        description: >-
          Newline-separated check-run names that main branch protection (or a
          ruleset) must require before RECONCILE is trusted to arm auto-merge —
          shared with automerge.yml's identical assertion. Keep in sync with the
          caller's automerge `required-gates`.
        type: string
        default: |
          Type-check & build
          security-review
          npm audit & SBOM

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: pr-drain-${{ github.workflow }}
  cancel-in-progress: false

env:
  STALE_DAYS: ${{ inputs.stale-days }}
  PR_LIMIT: ${{ inputs.pr-limit }}
  DRY_RUN: ${{ inputs.dry-run }}

jobs:
  drain:
    name: Close stale PRs and reconcile unarmed green ones
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Mint app token
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      # ── CLOSE-STALE ────────────────────────────────────────────────────────────────
      # The batch list picks candidates; each PR is re-read live before closing so a
      # `hold`/`keep` or fresh activity from a concurrent bot in the interim wins.
      - name: Close stale PRs
        id: drain
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -uo pipefail

          if ! [[ "$STALE_DAYS" =~ ^[0-9]+$ ]]; then
            echo "::error::invalid stale-days input '${STALE_DAYS}' — expected a non-negative integer"
            exit 1
          fi

          if ! prs=$(gh pr list --state open --limit "$PR_LIMIT" \
            --json number,title,isDraft,labels,mergeStateStatus,autoMergeRequest,updatedAt); then
            echo "::error::gh pr list failed — aborting drain instead of no-opping both passes"
            exit 1
          fi

          stale=$(( STALE_DAYS * 86400 ))

          # shellcheck disable=SC2016  # jq program; $now/$stale/$l are jq vars, not shell
          stale_filter='
            select(.isDraft | not)
            | ([.labels[].name]) as $l
            | select(($l | index("self-improve")) or ($l | index("needs-human")))
            | select(($l | index("hold")) | not)
            | select(($l | index("keep")) | not)
            | select((($now | tonumber) - (.updatedAt | fromdateiso8601)) >= ($stale | tonumber))
            | .number'

          candidates=$(printf '%s' "$prs" \
            | jq -r --arg now "$(date -u +%s)" --arg stale "$stale" ".[] | $stale_filter")

          echo "close-stale candidate set: $(printf '%s' "$candidates" | tr '\n' ' ')"

          for n in $candidates; do
            echo "::group::close-stale PR #$n"
            # Re-read this PR's live state; skip if it no longer qualifies.
            if ! gh pr view "$n" --json number,isDraft,labels,updatedAt 2>/dev/null \
              | jq -e --arg now "$(date -u +%s)" --arg stale "$stale" "$stale_filter" >/dev/null; then
              echo "#$n no longer stale-eligible (state changed) — skipping"
              echo "::endgroup::"
              continue
            fi
            if [ "$DRY_RUN" = "true" ]; then
              echo "[dry-run] would close #$n as stale (no activity in ${STALE_DAYS}+ days)"
              echo "::endgroup::"
              continue
            fi
            gh pr comment "$n" --body "🧹 Closing as stale — no activity in ${STALE_DAYS}+ days. This was a bot/needs-human PR; reopen it, or add \`keep\`/\`hold\` to retain it next time." 2>/dev/null || true
            gh pr close "$n" && echo "closed #$n" || echo "::warning::could not close #$n (see gh error above)"
            echo "::endgroup::"
            sleep 2
          done

          # ── RECONCILE ────────────────────────────────────────────────────────────────
          # RETAINED (three-loop-pipeline.md §5 open item, verified 2026-07-15): NOT redundant
          # with automerge.yml. automerge.yml is event-driven (pull_request_target) — it can't
          # self-heal a PR that reached green with no triggering event (missed/failed arm event,
          # PR predating the workflow). This periodic sweep is the only thing that arms those;
          # pr-watch.yml flags exactly that "green + auto-merge not armed" state as stuck.
          # Structural filter only (green, unarmed, not held/feature). The
          # drift-prone safe-type/label/breaking core predicate is applied by the
          # shared pr-eligibility action in the next step.
          # `feature` is intentionally NOT excluded — a feature PR reconciles iff it satisfies
          # the shared eligibility predicate (next step), same bar as any other PR.
          # No author-trust check: automerge.yml deliberately dropped its
          # authorAssociation/login gate (private repo, no anonymous-fork attacker —
          # see automerge.yml's own predicate comment), so RECONCILE mirrors that
          # not-draft/not-hold predicate rather than a stricter, stale one.
          candidates=$(printf '%s' "$prs" | jq -c '
            [ .[]
              | select(.isDraft | not)
              | select(.mergeStateStatus == "CLEAN")
              | select(.autoMergeRequest == null)
              | ([.labels[].name]) as $l
              | select(($l | index("hold")) | not)
              | {number, title, labels: [.labels[].name]} ]')
          echo "reconcile-candidates=$candidates" >> "$GITHUB_OUTPUT"

      - name: Evaluate shared eligibility predicate
        id: eligible
        uses: SuxOS/.github/.github/actions/pr-eligibility@main
        with:
          prs-json: ${{ steps.drain.outputs.reconcile-candidates }}

      # Share automerge.yml's fail-closed branch-protection gate before arming any
      # auto-merge, so a misconfigured main that dropped a required security gate
      # stops this sweep from re-arming just as it stops automerge.yml.
      - name: Assert main branch protection requires the security gates
        uses: SuxOS/.github/.github/actions/assert-branch-protection@main
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          required-gates: ${{ inputs.required-gates }}

      # The batch list picks candidates; each PR is re-read live before arming so a
      # `hold`, a lost mergeStateStatus, or an already-armed auto-merge set by a
      # concurrent bot in the interim wins.
      - name: Reconcile — arm auto-merge on eligible green PRs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          ELIGIBLE_NUMBERS: ${{ steps.eligible.outputs.eligible-numbers }}
        run: |
          set -uo pipefail

          # shellcheck disable=SC2016  # jq program; $l is a jq var, not shell
          # Mirrors the batch filter: `feature` is not excluded and there's no
          # author-trust gate — see the batch filter's comment above for why.
          structural_filter='
            select(.isDraft | not)
            | select(.mergeStateStatus == "CLEAN")
            | select(.autoMergeRequest == null)
            | ([.labels[].name]) as $l
            | select(($l | index("hold")) | not)'

          for n in $ELIGIBLE_NUMBERS; do
            echo "::group::reconcile PR #$n (arm auto-merge)"
            # Re-read this PR's live state; skip if it no longer structurally qualifies
            # (the safe-type/label/breaking predicate was already checked above; only
            # the fast-changing structural fields are worth re-reading here).
            if ! pr_json=$(gh pr view "$n" --json number,isDraft,labels,mergeStateStatus,autoMergeRequest 2>/dev/null); then
              echo "#$n no longer arm-eligible (state changed) — skipping"
              echo "::endgroup::"
              continue
            fi
            if ! printf '%s' "$pr_json" | jq -e "$structural_filter" >/dev/null; then
              echo "#$n no longer arm-eligible (state changed) — skipping"
              echo "::endgroup::"
              continue
            fi
            gh pr merge --auto --squash "$n" 2>/dev/null && echo "armed auto-merge on #$n" || echo "::warning::could not arm auto-merge on #$n (branch protection unmet / already merging)"
            echo "::endgroup::"
            sleep 2
          done

          echo "drain complete"
