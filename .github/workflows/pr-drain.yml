name: PR drain — close-stale + reconcile (reusable)

# Two drain gaps: pr-auto-update.yml handles the rebase-behind limb; this adds:
#   CLOSE-STALE — bot PRs (`self-improve`) and human-punted ones (`needs-human`) idle
#     past STALE_DAYS get a heads-up comment and are closed. Opt out with `hold`/`keep`.
#   RECONCILE — a green, mergeable PR eligible under the same predicate automerge.yml
#     uses but never armed gets `gh pr merge --auto --squash`. Native auto-merge still
#     gates the actual merge on CI + branch protection — this only ARMS it.
# gh CLI + jq only, no checkout. App token so mutations carry the bot identity.
# Every mutation is per-PR `|| true` so one failure can't wedge the sweep.
#
# Caller (needs its own schedule/dispatch triggers):
#   uses: SuxOS/.github/.github/workflows/pr-drain.yml@main
#   with: { stale-days: "14" }
#   secrets: inherit

on:
  workflow_call:
    inputs:
      stale-days:
        type: string
        default: "14"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: pr-drain-${{ github.workflow }}
  cancel-in-progress: false

env:
  STALE_DAYS: ${{ inputs.stale-days }}

jobs:
  drain:
    name: Close stale PRs and reconcile unarmed green ones
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Mint app token
        id: app-token
        uses: ./.github/actions/mint-app-token
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      - name: Drain the open-PR queue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -uo pipefail

          if ! [[ "$STALE_DAYS" =~ ^[0-9]+$ ]]; then
            echo "::error::invalid stale-days input '${STALE_DAYS}' — expected a non-negative integer"
            exit 1
          fi

          if ! prs=$(gh pr list --state open --limit 100 \
            --json number,title,isDraft,labels,mergeStateStatus,autoMergeRequest,authorAssociation,updatedAt); then
            echo "::error::gh pr list failed — aborting drain instead of no-opping both passes"
            exit 1
          fi

          now=$(date -u +%s)
          stale=$(( STALE_DAYS * 86400 ))

          # ── CLOSE-STALE ──────────────────────────────────────────────────────────────
          to_close=$(echo "$prs" | jq -r --argjson now "$now" --argjson stale "$stale" '
            .[]
            | select(.isDraft | not)
            | ([.labels[].name]) as $l
            | select(($l | index("self-improve")) or ($l | index("needs-human")))
            | select(($l | index("hold")) | not)
            | select(($l | index("keep")) | not)
            | select(($now - (.updatedAt | fromdateiso8601)) >= $stale)
            | .number')
          for n in $to_close; do
            echo "::group::close-stale PR #$n"
            gh pr comment "$n" --body "🧹 Closing as stale — no activity in ${STALE_DAYS}+ days. This was a bot/needs-human PR; reopen it, or add \`keep\`/\`hold\` to retain it next time." 2>/dev/null || true
            gh pr close "$n" && echo "closed #$n" || echo "::warning::could not close #$n (see gh error above)"
            echo "::endgroup::"
            sleep 2
          done

          # ── RECONCILE ────────────────────────────────────────────────────────────────
          to_arm=$(echo "$prs" | jq -r '
            .[]
            | select(.isDraft | not)
            | select(.mergeStateStatus == "CLEAN")
            | select(.autoMergeRequest == null)
            | select(["OWNER","MEMBER","COLLABORATOR"] | index(.authorAssociation))
            | ([.labels[].name]) as $l
            | select(($l | index("hold")) | not)
            | select(($l | index("feature")) | not)
            | select((.title | test("^[a-z]+(\\([^)]*\\))?!:"; "i")) | not)
            | select(
                (($l | index("automerge")) or ($l | index("bug")) or ($l | index("security")) or ($l | index("chore-safe")))
                or (.title | test("^(fix|security|perf|refactor|chore|docs|test|build|ci|revert)(\\([^)]*\\))?:"; "i"))
              )
            | .number')
          for n in $to_arm; do
            echo "::group::reconcile PR #$n (arm auto-merge)"
            gh pr merge --auto --squash "$n" && echo "armed auto-merge on #$n" || echo "::warning::could not arm auto-merge on #$n (see gh error above)"
            echo "::endgroup::"
            sleep 2
          done

          echo "drain complete"
