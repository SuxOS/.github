# Self-CI: supply-chain pin hygiene for GitHub Actions `uses:` refs.
#
# Two guarantees, in two jobs:
#
#   check (this repo, HARD-FAIL — this is our own required gate):
#     • DRIFT — the same third-party action must not be SHA-pinned to two
#       different commits by hand (as actions/checkout once was across v4/v7).
#     • UNPINNED — every third-party `uses:` ref must be a full 40-hex commit
#       SHA, never a mutable tag (`@v4`) or branch. A `@v4` tag silently moves,
#       so pinning to it defeats the whole point of SHA-pinning. First-party
#       `SuxOS/…@main` refs (our own reusable workflows / composite actions) are
#       intentionally tracked at @main and are exempt.
#
#   consumers (sux, suxrouter, sux-fileops — ADVISORY, never fails a merge here):
#     Checks the same rules across the caller repos' own workflows, plus a
#     canonical-SHA comparison for the two actions the whole org standardises on,
#     and reports drift/unpinned refs as warnings. It cannot see other repos'
#     trees directly, so it checks each out with the SUX_BOT App identity (the
#     org bot the rest of this pipeline uses). Reporting-only by design: a
#     consumer repo's own pin hygiene is that repo's gate, not this one's.
#
# Canonical org pins (bump here when the org upgrades):
#   actions/checkout   9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
#   actions/setup-node 820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
#
# Runs directly on this repo — it is NOT a reusable workflow_call file.
name: pin-consistency

on:
  push:
    paths: [".github/workflows/**", ".github/actions/**"]
  pull_request:
    paths: [".github/workflows/**", ".github/actions/**"]

permissions:
  contents: read

jobs:
  check:
    name: pin-consistency
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Assert third-party actions are SHA-pinned and drift-free
        run: |
          set -euo pipefail
          # Collect "owner/action<TAB>ref" for every real action `uses:` ref, across
          # both the reusable workflows and the composite actions they call into.
          # The ref-shape anchor (owner-char, a slash, a path, an @ref of pin chars)
          # deliberately does NOT match this file's own grep-pattern string literals
          # (those start with a `[` bracket right after `uses:`), so the guard can scan
          # itself without tripping on its own regexes.
          pairs="$(grep -rhoE "uses:[[:space:]]*['\"]?[A-Za-z0-9][A-Za-z0-9._-]*/[A-Za-z0-9._/-]+@[A-Za-z0-9._./-]+" \
              .github/workflows/ .github/actions/*/action.yml \
            | sed -E "s/uses:[[:space:]]*['\"]?//" \
            | awk -F@ '{print $1"\t"$2}' \
            | sort -u)"

          rc=0

          # ── UNPINNED: third-party ref that is not a 40-hex SHA (a mutable tag/branch).
          # First-party SuxOS/… refs are tracked at @main on purpose and are skipped.
          unpinned="$(printf '%s\n' "$pairs" \
            | awk -F'\t' '$1 !~ /^SuxOS\// && $2 !~ /^[0-9a-fA-F]{40}$/ {print $1"@"$2}')"
          if [ -n "$unpinned" ]; then
            echo "::error::Third-party action(s) not pinned to a full 40-hex commit SHA (mutable tag/branch):"
            printf '%s\n' "$unpinned" | sed 's/^/    /'
            rc=1
          fi

          # ── DRIFT: a SHA-pinned third-party action appearing at more than one SHA.
          sha_pairs="$(printf '%s\n' "$pairs" | awk -F'\t' '$1 !~ /^SuxOS\// && $2 ~ /^[0-9a-fA-F]{40}$/')"
          dupes="$(printf '%s\n' "$sha_pairs" | cut -f1 | sort | uniq -d || true)"
          if [ -n "$dupes" ]; then
            echo "::error::Inconsistent action pins — the same action is pinned to multiple SHAs:"
            while IFS= read -r action; do
              [ -z "$action" ] && continue
              echo "  $action:"
              printf '%s\n' "$sha_pairs" | awk -F'\t' -v a="$action" '$1==a{print "    "$2}'
            done <<< "$dupes"
            rc=1
          fi

          # ── DOCKER: a docker://image:tag ref (Docker Hub image, addressed by tag) is
          # invisible to the owner/repo@ref regex above (no path shape before an @) and
          # must be pinned to a digest — a mutable tag here is the same supply-chain hole
          # as an unpinned owner/repo@ref.
          docker_unpinned="$(grep -rhoE "uses:[[:space:]]*['\"]?docker://[^'\"[:space:]]+" \
              .github/workflows/ .github/actions/*/action.yml 2>/dev/null \
            | sed -E "s/uses:[[:space:]]*['\"]?//" \
            | grep -vE '@sha256:[0-9a-fA-F]{64}$' || true)"
          if [ -n "$docker_unpinned" ]; then
            echo "::error::Docker action(s) not pinned to a sha256 digest (mutable tag):"
            printf '%s\n' "$docker_unpinned" | sed 's/^/    /'
            rc=1
          fi

          # ── LOCAL: a ./path/to/action ref (local composite action) has no @ref shape at
          # all and starts with `.`, so the owner/repo@ref regex can't match it either. They're
          # exempt-by-design (same rationale as the SuxOS/* exemption — the ref is this
          # repo's own commit, there's nothing to pin) but are logged here so a local
          # action isn't a silent, unconsidered blind spot in this gate.
          local_refs="$(grep -rhoE "uses:[[:space:]]*['\"]?\./[^'\"[:space:]]+" \
              .github/workflows/ .github/actions/*/action.yml 2>/dev/null \
            | sed -E "s/uses:[[:space:]]*['\"]?//" \
            | sort -u || true)"
          if [ -n "$local_refs" ]; then
            echo "Local composite action ref(s) found (exempt-by-design, no @ref to pin):"
            printf '%s\n' "$local_refs" | sed 's/^/    /'
          fi

          if [ "$rc" -ne 0 ]; then exit 1; fi
          echo "OK: every third-party action is SHA-pinned to a single, consistent commit."

  consumers:
    # ADVISORY cross-repo scan. Never fails a merge in THIS repo (a consumer's pin
    # hygiene is that consumer's own gate); it only surfaces drift/unpinned refs as
    # warnings. `continue-on-error` + a token-presence guard mean a missing secret or
    # a repo the SUX_BOT App is not installed on degrades to a logged skip, never a
    # hard failure. NOTE: cross-repo reach depends on the SUX_BOT App being installed
    # on each target repo with `contents: read`; where it is not, that repo is skipped
    # with a warning rather than scanned.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        repo: [sux, suxrouter, sux-fileops, claude-config]
    steps:
      - name: Mint org-scoped app token
        id: app-token
        continue-on-error: true
        # Same pinned version as .github/actions/mint-app-token (kept in lock-step so
        # the DRIFT check above stays green). `owner:` with no `repositories:` scopes
        # the token to every SuxOS repo the App is installed on — the cross-repo read
        # this job needs. Direct use (not the composite) because mint-app-token is
        # repo-scoped by design and other callers depend on that.
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}
          owner: SuxOS
          repositories: ${{ matrix.repo }}

      - name: Checkout SuxOS/${{ matrix.repo }}
        id: checkout
        continue-on-error: true
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: SuxOS/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: consumer

      - name: Scan SuxOS/${{ matrix.repo }} pins (advisory)
        env:
          REPO: ${{ matrix.repo }}
          TOKEN_OK: ${{ steps.app-token.outcome }}
          CHECKOUT_OK: ${{ steps.checkout.outcome }}
        run: |
          set -euo pipefail

          if [ "$TOKEN_OK" != "success" ]; then
            echo "::warning::[$REPO] could not mint an app token (secret missing or App not installed) — skipping advisory pin scan"
            exit 0
          fi
          if [ "$CHECKOUT_OK" != "success" ] || [ ! -d consumer/.github ]; then
            echo "::warning::[$REPO] could not check out repo / no .github tree (App may lack contents:read) — skipping advisory pin scan"
            exit 0
          fi

          CANON_CHECKOUT="9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"
          CANON_SETUP_NODE="820762786026740c76f36085b0efc47a31fe5020"

          pairs="$(grep -rhoE "uses:[[:space:]]*['\"]?[A-Za-z0-9][A-Za-z0-9._-]*/[A-Za-z0-9._/-]+@[A-Za-z0-9._./-]+" \
              consumer/.github/workflows/ consumer/.github/actions/*/action.yml 2>/dev/null \
            | sed -E "s/uses:[[:space:]]*['\"]?//" \
            | awk -F@ '{print $1"\t"$2}' \
            | sort -u || true)"

          if [ -z "$pairs" ]; then
            echo "[$REPO] no third-party action refs found under .github/ — nothing to scan."
            exit 0
          fi

          violations=0
          while IFS=$'\t' read -r action ref; do
            [ -z "$action" ] && continue
            case "$action" in SuxOS/*) continue ;; esac
            if ! printf '%s' "$ref" | grep -qE '^[0-9a-fA-F]{40}$'; then
              echo "::warning::[$REPO] third-party action not SHA-pinned (mutable tag/branch): $action@$ref"
              violations=$((violations + 1))
              continue
            fi
            case "$action" in
              actions/checkout)
                if [ "$ref" != "$CANON_CHECKOUT" ]; then
                  echo "::warning::[$REPO] actions/checkout pinned to $ref — canonical org value is $CANON_CHECKOUT # v7.0.0"
                  violations=$((violations + 1))
                fi ;;
              actions/setup-node)
                if [ "$ref" != "$CANON_SETUP_NODE" ]; then
                  echo "::warning::[$REPO] actions/setup-node pinned to $ref — canonical org value is $CANON_SETUP_NODE # v7.0.0"
                  violations=$((violations + 1))
                fi ;;
            esac
          done <<< "$pairs"

          if [ "$violations" -gt 0 ]; then
            echo "[$REPO] advisory: $violations pin issue(s) reported above (not blocking)."
          else
            echo "[$REPO] OK: all third-party actions SHA-pinned; checkout/setup-node match canonical."
          fi
