name: Claude autofix CI (reusable)

# When CI fails on a PR, Claude reads the failure and pushes a fix to the PR branch.
# CI re-runs; if green, the already-enabled native auto-merge merges it — fully
# async, no human. Bounded so it can't loop forever:
#   - only bug/security/chore-safe/fix-type PRs (features are a human's job)
#   - a hard cap of max-attempts bot commits per branch, then tags `needs-human`
#   - --max-turns per run + concurrency cancel-in-progress + a cheaper model
# Runs on a Claude Pro/Max subscription (CLAUDE_CODE_OAUTH_TOKEN via 'claude setup-token'),
# not a metered API key. Inert until that secret is set.
#
# Caller (needs its own `workflow_run: workflows: ["<caller's CI workflow name>"]` trigger —
# workflow_run can't be re-exposed through workflow_call, so the caller repo owns this trigger
# and calls this file from a thin wrapper job, or duplicates the workflow_run block pointing at
# this reusable file directly. See README for the exact pattern):
#   uses: SuxOS/.github/.github/workflows/claude-autofix.yml@main
#   with: { ci-workflow-name: "CI", gates-summary: "..." }
#   secrets: inherit

on:
  workflow_call:
    inputs:
      max-attempts:
        type: string
        default: "6"
      gates-summary:
        description: "Human-readable list of the gates the fix must pass, injected into the prompt."
        type: string
        default: |
          npm run type-check · npm test · npm run check:node ·
          npm run gen:index (commit the regenerated index.ts) ·
          npx wrangler deploy --dry-run --config sux/wrangler.jsonc
      model:
        type: string
        default: "sonnet"
      max-turns:
        type: number
        default: 16

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: autofix-${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  MAX_ATTEMPTS: ${{ inputs.max-attempts }}

jobs:
  autofix:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Preflight — resolve the PR, check the gate, count attempts
        id: pre
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          HAVE_KEY: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        run: |
          set -euo pipefail
          if [ "$HAVE_KEY" != "true" ]; then
            echo "CLAUDE_CODE_OAUTH_TOKEN not set → autofix inert. Run 'claude setup-token' and add it to arm."; echo "go=false" >> "$GITHUB_OUTPUT"; exit 0; fi

          if ! prs=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$HEAD_BRANCH" --base "$BASE_BRANCH" --state open \
                 --json number,labels,title,isDraft,isCrossRepository,headRefName,baseRefName); then
            echo "::warning::gh pr list failed for head=$HEAD_BRANCH base=$BASE_BRANCH → cannot determine PR state, skipping (this is NOT a genuine 'no open PR')"; echo "go=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          matches=$(echo "$prs" | jq -c --arg h "$HEAD_BRANCH" --arg b "$BASE_BRANCH" '[.[] | select(.headRefName==$h and .baseRefName==$b)]')
          count=$(echo "$matches" | jq 'length')
          if [ "$count" -eq 0 ]; then echo "no open PR for $HEAD_BRANCH → $BASE_BRANCH → skip"; echo "go=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if [ "$count" -gt 1 ]; then echo "::warning::$count PRs match head=$HEAD_BRANCH base=$BASE_BRANCH → ambiguous, refusing to guess"; echo "go=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          pr=$(echo "$matches" | jq -c '.[0]')
          num=$(echo "$pr" | jq -r .number)
          title=$(echo "$pr" | jq -r .title)
          draft=$(echo "$pr" | jq -r .isDraft)
          labels=$(echo "$pr" | jq -r '[.labels[].name] | join(",")')
          # gh's --json flag has no authorAssociation field for PRs; the REST API does.
          # Read the login too — the org bot (suxbot[bot]) is a first-class trusted author
          # matched BY LOGIN, independent of whatever association an App-token PR resolves to
          # (same read shape pr-drain.yml/issue-build.yml use).
          meta=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$num" -q '{assoc: .author_association, login: .user.login}' 2>/dev/null || echo '{"assoc":"NONE","login":""}')
          assoc=$(printf '%s' "$meta" | jq -r '.assoc // "NONE"')
          login=$(printf '%s' "$meta" | jq -r '.login // ""')
          fork=$(echo "$pr" | jq -r .isCrossRepository)
          echo "PR #$num  title=$title  labels=$labels  draft=$draft  author=$assoc  login=$login  fork=$fork"

          # RCE GUARD: this job checks out and RUNS the PR's code with a write token
          # + the Claude OAuth token. Only ever do that for a trusted author's same-repo
          # branch — never a fork or external contributor's untrusted code.
          # The org bot (suxbot[bot]) is trusted by LOGIN: pipeline-authored PRs (issue-build,
          # fixer) come from the suxbot App and resolve author_association=NONE because the App
          # token lacks org `members: read` (the same starvation documented in issue-build.yml
          # #185/#186), so association alone refuses every one of the pipeline's OWN PRs and
          # Loop 3 never fixes their red CI. Matching by login is safe here: this is a PRIVATE
          # org, no fork attacker can forge the suxbot[bot] login, and the not-a-fork check
          # below still fires for everyone. Mirrors issue-build.yml / pr-drain.yml exactly.
          case "$assoc" in
            OWNER|MEMBER|COLLABORATOR)
              ;;
            *)
              if [ "$login" = "suxbot[bot]" ]; then
                echo "trusted org bot by login (assoc=$assoc) → allowed"
              else
                echo "untrusted author (assoc=$assoc login=$login) → refuse to run PR code"; echo "go=false" >> "$GITHUB_OUTPUT"; exit 0
              fi
              ;;
          esac
          if [ "$fork" = "true" ]; then echo "cross-repo/fork PR → refuse to run PR code"; echo "go=false" >> "$GITHUB_OUTPUT"; exit 0; fi

          has(){ echo ",$labels," | grep -qi ",$1,"; }
          if has hold || has needs-human; then echo "hold/needs-human → skip"; echo "go=false" >> "$GITHUB_OUTPUT"; exit 0; fi

          # Structural gate passed; the shared safe-type/label/breaking predicate is
          # applied next via the pr-eligibility action (single source of truth).
          echo "go=true" >> "$GITHUB_OUTPUT"
          echo "pr=$num" >> "$GITHUB_OUTPUT"
          jq -cn --argjson n "$num" --arg t "$title" --arg l "$labels" \
            '[{number: $n, title: $t, labels: ($l | split(",") | map(select(. != "")))}]' \
            > "$RUNNER_TEMP/pr-eligibility.json"
          echo "prs-json=$(cat "$RUNNER_TEMP/pr-eligibility.json")" >> "$GITHUB_OUTPUT"

      - name: Evaluate shared eligibility predicate
        if: steps.pre.outputs.go == 'true'
        id: eligible
        uses: SuxOS/.github/.github/actions/pr-eligibility@main
        with:
          prs-json: ${{ steps.pre.outputs.prs-json }}

      - name: Gate on shared eligibility predicate
        if: steps.pre.outputs.go == 'true'
        id: gate
        env:
          PR_NUM: ${{ steps.pre.outputs.pr }}
          ELIGIBLE_NUMBERS: ${{ steps.eligible.outputs.eligible-numbers }}
        run: |
          set -euo pipefail
          if printf ' %s ' "$ELIGIBLE_NUMBERS" | grep -qw "$PR_NUM"; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "not an auto-fix-eligible PR → skip (a human drives features)"
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mint app token
        if: steps.gate.outputs.go == 'true'
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      - name: Checkout PR branch
        if: steps.gate.outputs.go == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Pin local branch to the checked-out commit
        if: steps.gate.outputs.go == 'true'
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: git checkout -B "$HEAD_BRANCH"

      - name: Attempt cap — stop looping after MAX_ATTEMPTS bot commits
        if: steps.gate.outputs.go == 'true'
        id: cap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$MAX_ATTEMPTS" | grep -qE '^[0-9]+$'; then
            echo "::error::max-attempts must be a non-negative integer, got '$MAX_ATTEMPTS'"; exit 1
          fi
          git fetch origin "$BASE_BRANCH" --quiet
          base=$(git merge-base "origin/$BASE_BRANCH" HEAD)
          # Count ONLY genuine autofix attempts: commits carrying the autofix trailer that the
          # Claude step below is instructed to stamp on every commit it makes — NOT every bot
          # commit. The old `%an | grep -i claude|bot` counted ANY bot-authored commit, which
          # over-counts catastrophically on a bot-authored PR: issue-build's build commit(s) and
          # fixer's commits are ALL bot-authored, so a pipeline PR tripped the cap on attempt
          # zero (→ needs-human with no real fix ever attempted) the moment the login bypass
          # above let autofix run on it. The trailer is written by this loop and nothing else,
          # so `git log --grep` over the PR's own commits counts fix attempts and only those.
          attempts=$(git log --grep='Claude-Autofix-Attempt:' --format='%H' "$base"..HEAD | grep -c . || true)
          echo "autofix attempts so far: $attempts (cap $MAX_ATTEMPTS)"
          if [ "$attempts" -ge "$MAX_ATTEMPTS" ]; then
            echo "cap reached → tagging needs-human and stopping"
            gh pr edit "${{ steps.pre.outputs.pr }}" --repo "$GITHUB_REPOSITORY" --add-label needs-human 2>/dev/null || true
            gh pr comment "${{ steps.pre.outputs.pr }}" --repo "$GITHUB_REPOSITORY" \
              --body "🤖 Auto-fix gave up after $attempts attempts — CI is still red. Tagging \`needs-human\`. (Remove the label to let the bot try again.)" 2>/dev/null || true
            echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Claude — fix the CI failure
        if: steps.gate.outputs.go == 'true' && steps.cap.outputs.go == 'true'
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1
        env:
          CI_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          CI_RUN_URL: ${{ github.event.workflow_run.html_url }}
          GATES_SUMMARY: ${{ inputs.gates-summary }}
          ENABLE_PROMPT_CACHING_1H: "1"
          # Unattended-CI resilience: wait out a subscription usage-limit/capacity (429/529) window
          # and retry instead of failing — the pool-exhaustion jam, without a metered key.
          CLAUDE_CODE_RETRY_WATCHDOG: "1"
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          # Trust suxbot[bot] specifically (never "*" — allowed bots skip the action's own
          # write-access check). The job-level RCE guard above (author_association +
          # not-a-fork) is the real enforcement; this only stops the action's default
          # "never trigger on a bot event" block from also applying to our own bot.
          allowed_bots: suxbot[bot]
          prompt: |
            CI failed on this PR (branch $CI_HEAD_BRANCH,
            run $CI_RUN_URL). Read the failing job's logs,
            find the ROOT cause, and fix it. This repo's gates must all pass:
              $GATES_SUMMARY
            Make the smallest correct change, re-run the gates locally, then commit and push
            to this PR branch. In EVERY commit you make, add this exact trailer as a footer line
            (after a blank line, at the end of the commit message):
              Claude-Autofix-Attempt: true
            This is REQUIRED on every commit — the fix loop counts these trailers to enforce its
            safety cap (it stops after a bounded number of attempts and hands off to a human), so
            a commit without it is invisible to the cap and can let the loop run past its limit.
            Do NOT touch secrets, do NOT weaken a test to make it pass, and do NOT change
            unrelated code. If the failure is a genuine design problem you can't safely fix,
            leave a comment explaining it instead of forcing a change.
          # Autofix legitimately writes code and pushes to the PR branch (gated above to a
          # trusted author's same-repo, non-fork branch by the RCE guard), so tools stay broad
          # (no --allowedTools restriction) by design.
          claude_args: "--max-turns ${{ inputs.max-turns }} --model ${{ inputs.model }}"
