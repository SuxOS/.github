name: Claude autofix CI (reusable)

# When CI fails on a PR, Claude reads the failure and pushes a fix to the PR branch.
# CI re-runs; if green, the already-enabled native auto-merge merges it — fully
# async, no human. Bounded so it can't loop forever:
#   - only bug/security/chore-safe/fix-type PRs (features are a human's job)
#   - a hard cap of max-attempts bot commits per branch, then tags `needs-human`
#   - --max-turns per run + concurrency cancel-in-progress + a cheaper model
# Runs on a Claude Pro/Max subscription (CLAUDE_CODE_OAUTH_TOKEN via 'claude setup-token'),
# not a metered API key. Inert until that secret is set.
#
# Caller (needs its own `workflow_run: workflows: ["<caller's CI workflow name>"]` trigger —
# workflow_run can't be re-exposed through workflow_call, so the caller repo owns this trigger
# and calls this file from a thin wrapper job, or duplicates the workflow_run block pointing at
# this reusable file directly. See README for the exact pattern):
#   uses: SuxOS/.github/.github/workflows/claude-autofix.yml@main
#   with: { ci-workflow-name: "CI", gates-summary: "..." }
#   secrets: inherit

on:
  workflow_call:
    inputs:
      max-attempts:
        type: string
        default: "4"
      gates-summary:
        description: "Human-readable list of the gates the fix must pass, injected into the prompt."
        type: string
        default: |
          npm run type-check · npm test · npm run check:node ·
          npm run gen:index (commit the regenerated index.ts) ·
          npx wrangler deploy --dry-run --config sux/wrangler.jsonc
      model:
        type: string
        default: "sonnet"
      max-turns:
        type: number
        default: 10

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  id-token: write

concurrency:
  group: autofix-${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  MAX_ATTEMPTS: ${{ inputs.max-attempts }}

jobs:
  autofix:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Preflight — resolve the PR, check the gate, count attempts
        id: pre
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          HAVE_KEY: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        run: |
          set -euo pipefail
          if [ "$HAVE_KEY" != "true" ]; then
            echo "CLAUDE_CODE_OAUTH_TOKEN not set → autofix inert. Run 'claude setup-token' and add it to arm."; echo "go=false" >> "$GITHUB_OUTPUT"; exit 0; fi

          if ! prs=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$HEAD_BRANCH" --base "$BASE_BRANCH" --state open \
                 --json number,labels,title,isDraft,authorAssociation,isCrossRepository,headRefName,baseRefName); then
            echo "::warning::gh pr list failed for head=$HEAD_BRANCH base=$BASE_BRANCH → cannot determine PR state, skipping (this is NOT a genuine 'no open PR')"; echo "go=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          matches=$(echo "$prs" | jq -c --arg h "$HEAD_BRANCH" --arg b "$BASE_BRANCH" '[.[] | select(.headRefName==$h and .baseRefName==$b)]')
          count=$(echo "$matches" | jq 'length')
          if [ "$count" -eq 0 ]; then echo "no open PR for $HEAD_BRANCH → $BASE_BRANCH → skip"; echo "go=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if [ "$count" -gt 1 ]; then echo "::warning::$count PRs match head=$HEAD_BRANCH base=$BASE_BRANCH → ambiguous, refusing to guess"; echo "go=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          pr=$(echo "$matches" | jq -c '.[0]')
          num=$(echo "$pr" | jq -r .number)
          title=$(echo "$pr" | jq -r .title)
          draft=$(echo "$pr" | jq -r .isDraft)
          labels=$(echo "$pr" | jq -r '[.labels[].name] | join(",")')
          assoc=$(echo "$pr" | jq -r .authorAssociation)
          fork=$(echo "$pr" | jq -r .isCrossRepository)
          echo "PR #$num  title=$title  labels=$labels  draft=$draft  author=$assoc  fork=$fork"

          # RCE GUARD: this job checks out and RUNS the PR's code with a write token
          # + the Claude OAuth token. Only ever do that for a trusted author's same-repo
          # branch — never a fork or external contributor's untrusted code.
          case "$assoc" in OWNER|MEMBER|COLLABORATOR) ;; *) echo "untrusted author ($assoc) → refuse to run PR code"; echo "go=false" >> "$GITHUB_OUTPUT"; exit 0;; esac
          if [ "$fork" = "true" ]; then echo "cross-repo/fork PR → refuse to run PR code"; echo "go=false" >> "$GITHUB_OUTPUT"; exit 0; fi

          has(){ echo ",$labels," | grep -qi ",$1,"; }
          if has hold || has needs-human; then echo "hold/needs-human → skip"; echo "go=false" >> "$GITHUB_OUTPUT"; exit 0; fi

          elig=false
          for l in bug security chore-safe automerge; do has "$l" && elig=true; done
          if printf '%s' "$title" | grep -qiE '^(fix|security|perf|refactor|chore|docs|test|build|ci|revert)(\([^)]*\))?:'; then elig=true; fi
          if [ "$elig" != "true" ]; then echo "not an auto-fix-eligible PR → skip (a human drives features)"; echo "go=false" >> "$GITHUB_OUTPUT"; exit 0; fi

          echo "go=true" >> "$GITHUB_OUTPUT"
          echo "pr=$num" >> "$GITHUB_OUTPUT"

      - name: Mint app token
        if: steps.pre.outputs.go == 'true'
        id: app-token
        uses: ./.github/actions/mint-app-token
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      - name: Checkout PR branch
        if: steps.pre.outputs.go == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Attempt cap — stop looping after MAX_ATTEMPTS bot commits
        if: steps.pre.outputs.go == 'true'
        id: cap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$MAX_ATTEMPTS" | grep -qE '^[0-9]+$'; then
            echo "::error::max-attempts must be a non-negative integer, got '$MAX_ATTEMPTS'"; exit 1
          fi
          git fetch origin "$BASE_BRANCH" --quiet
          base=$(git merge-base "origin/$BASE_BRANCH" HEAD)
          attempts=$(git log --format='%an' "$base"..HEAD | grep -c -iE 'claude|github-actions|sux-bot|\[bot\]' || true)
          echo "bot fix attempts so far: $attempts (cap $MAX_ATTEMPTS)"
          if [ "$attempts" -ge "$MAX_ATTEMPTS" ]; then
            echo "cap reached → tagging needs-human and stopping"
            gh pr edit "${{ steps.pre.outputs.pr }}" --repo "$GITHUB_REPOSITORY" --add-label needs-human 2>/dev/null || true
            gh pr comment "${{ steps.pre.outputs.pr }}" --repo "$GITHUB_REPOSITORY" \
              --body "🤖 Auto-fix gave up after $attempts attempts — CI is still red. Tagging \`needs-human\`. (Remove the label to let the bot try again.)" 2>/dev/null || true
            echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Claude — fix the CI failure
        if: steps.pre.outputs.go == 'true' && steps.cap.outputs.go == 'true'
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1
        env:
          CI_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          CI_RUN_URL: ${{ github.event.workflow_run.html_url }}
          GATES_SUMMARY: ${{ inputs.gates-summary }}
          ENABLE_PROMPT_CACHING_1H: "1"
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: |
            CI failed on this PR (branch $CI_HEAD_BRANCH,
            run $CI_RUN_URL). Read the failing job's logs,
            find the ROOT cause, and fix it. This repo's gates must all pass:
              $GATES_SUMMARY
            Make the smallest correct change, re-run the gates locally, then commit and push
            to this PR branch. Do NOT touch secrets, do NOT weaken a test to make it pass, and
            do NOT change unrelated code. If the failure is a genuine design problem you can't
            safely fix, leave a comment explaining it instead of forcing a change.
          # Autofix legitimately writes code and pushes to the PR branch (gated above to a
          # trusted author's same-repo, non-fork branch by the RCE guard), so tools stay broad
          # (no --allowedTools restriction) by design.
          claude_args: "--max-turns ${{ inputs.max-turns }} --model ${{ inputs.model }}"
