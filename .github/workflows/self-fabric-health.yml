name: Self fabric health

# Scheduled caller for the fabric health spine on THIS repo (the .github org locus).
# Mirrors the self-* pattern (self-pr-watch.yml): the reusable workflow holds the
# logic, this file owns the schedule + org repo list. Read-only; ships the fabric
# snapshot to Grafana Cloud once per run (inert until the GRAFANA_* secrets exist).
#
# Cadence: every 15 min, matching the pipeline sweep cadence so the drain-to-zero
# streak (min_over_time(suxos_backlog_zero[7d])) has enough resolution.

on:
  schedule: [{ cron: "*/15 * * * *" }]
  workflow_dispatch:

jobs:
  # .github/managed-repos.json is the single source of truth for the org repo list
  # (pin-consistency.yml/deep-audit.yml/budget-governor.yml/caller-conformance.yml all
  # derive their matrix from it, #233) — this repeats that same derivation instead of
  # the hardcoded literal fabric-health.yml previously carried here, so a repo
  # added/retired there (as sux-fileops was) doesn't silently go stale in the fabric
  # spine too (#499). A job calling a reusable workflow via `uses:` can't have its own
  # `steps:`, hence the separate job + `needs:` output hop (same shape pin-consistency.yml
  # uses for its `managed-repos` job).
  load-repos:
    name: Load managed-repo list
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      repos: ${{ steps.load.outputs.repos }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - id: load
        run: |
          set -euo pipefail
          echo "repos=$(jq -r '(.repos + [".github"]) | join(" ")' .github/managed-repos.json)" >> "$GITHUB_OUTPUT"

  spine:
    needs: load-repos
    permissions:
      contents: read
      issues: write
      pull-requests: read
      actions: read
      checks: read
    uses: SuxOS/.github/.github/workflows/fabric-health.yml@main
    with:
      repos: ${{ needs.load-repos.outputs.repos }}
      # Edge deploy health: sux is the only deployed Worker (suxos.net). Its /mcp
      # endpoint is public-but-auth-gated, so 401 is the healthy signal (same probe
      # the sux repo's own health.yml uses). Add more `service=url=status` lines here
      # if suxrouter ever deploys as its own Worker.
      edge-smoke-checks: "sux=https://suxos.net/mcp=401"
    secrets: inherit
