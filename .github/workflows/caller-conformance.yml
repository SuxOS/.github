# Caller-stub conformance sweep (#346).
#
# For each repo in .github/managed-repos.json, compares its live SuxOS caller stubs
# (.github/workflows/) against the canonical set scripts/scaffold-caller.sh would emit —
# flagging (a) a reusable with no live caller, (b) a dead/superseded stub still present
# (the R5/#263 `workflow_run` autofix class), (c) a stub missing required triggers /
# `secrets: inherit`, and (d) a stub pinned to a stale `uses: …@ref`.
#
# `managed-repos.json` deliberately excludes `.github` itself (it's this repo, not a
# consumer) — but this repo runs itself via its own self-*.yml caller stubs (see README's
# self-* pattern), so the `self-conformance` job below scans THOSE too (#356), catching the
# same R5/#263 dead-workflow_run-stub class if it recurs in a self-*.yml. It runs
# check-caller-conformance.sh in `self` mode, which restricts the scan to self-*.yml and
# skips the naming-derived (a)/(c)/(d) checks — self-*.yml is legitimately named
# self-<name>.yml (and self-fixer-30m.yml-style cadence variants), so those checks would
# otherwise false-positive on every stub.
#
# Turns invariant 5 of the vX arc — "a merged reusable-workflow migration isn't done until
# every caller adopts it" — from memory into a recurring signal. The comparison logic lives
# in scripts/check-caller-conformance.sh (unit-tested, canonical set derived from
# scaffold-caller.sh so it can't drift); this file is the cross-repo harness only.
#
# ADVISORY, never merge-blocking — same fail-safe posture as pin-consistency.yml's
# `consumers` job: a repo it can't reach (App not installed / secret missing) degrades to a
# logged skip, and every finding is a `::warning::` + step-summary row, never a failure. A
# consumer repo's own stub hygiene is that repo's concern; this only surfaces the drift.
#
# Runs directly in this repo — it is NOT a reusable workflow_call file.
#
# Closing the loop (#355): the `conformance` job above is deliberately read-only advisory —
# a warning still needs a human to notice and act, which is exactly how #263 sat "fixed" for
# hours while every caller stayed dead (docs/design/2026-07-16-suxos-vx-next-arc.md:47,
# 128-130). The opt-in `remediate` job below closes it for the two findings that can never
# be wrong to act on unattended (see scripts/remediate-caller-stubs.sh's header for the
# add-only/remove-only split and why (c)/(d) and ci.yml stay advisory-only). It is opt-in
# and workflow_dispatch-only: `schedule` triggers can't set workflow_dispatch inputs, so a
# scheduled run always sees this input's `false` default and the nightly cron sweep stays
# pure-advisory, same as before. A bigger trust step than the read-only scan — it pushes a
# branch and opens a PR INTO the consumer repo — so it mints a token scoped to ONLY that one
# repo and restricted to just the two permissions the remediation needs.
name: caller-conformance

on:
  schedule:
    - cron: "41 5 * * *"
  workflow_dispatch:
    inputs:
      remediate:
        description: >-
          Open/refresh a per-repo "chore: sync SuxOS caller stubs" PR for any repo with a
          missing-stub or dead-stub finding (#355). Opt-in; has no effect on the scheduled
          run (schedule can't set workflow_dispatch inputs, so it always uses the default
          below).
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: caller-conformance-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  self-conformance:
    # This repo's OWN self-*.yml caller stubs (#356) — not covered by the cross-repo
    # `conformance` job below, since managed-repos.json deliberately excludes `.github`.
    # No cross-repo checkout needed; the stubs being scanned already live in this checkout.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Check .github's own self-*.yml caller stubs (advisory)
        run: |
          set -euo pipefail
          echo "### Caller-stub conformance — .github (self-*.yml)" >> "$GITHUB_STEP_SUMMARY"
          bash scripts/check-caller-conformance.sh ".github" .github/workflows self

  managed-repos:
    # Single source of truth for the matrix below — see .github/managed-repos.json.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      repos: ${{ steps.load.outputs.repos }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - id: load
        run: echo "repos=$(jq -c '.repos' .github/managed-repos.json)" >> "$GITHUB_OUTPUT"

  conformance:
    # ADVISORY cross-repo scan. Never fails a merge in THIS repo; it only surfaces caller-stub
    # drift as warnings + a step-summary. `continue-on-error` + outcome guards mean a missing
    # secret or a repo the SUX_BOT App is not installed on degrades to a logged skip, never a
    # hard failure. Cross-repo reach depends on the SUX_BOT App being installed on each target
    # with `contents: read`; where it is not, that repo is skipped with a warning.
    needs: managed-repos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.managed-repos.outputs.repos) }}
    steps:
      # This repo first (default path): scripts/check-caller-conformance.sh derives the
      # canonical stub set from scripts/scaffold-caller.sh, both of which live here.
      - name: Checkout .github (this repo — canonical stub source)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Mint org-scoped app token
        id: app-token
        continue-on-error: true
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}
          owner: SuxOS
          repositories: ${{ matrix.repo }}

      - name: Checkout SuxOS/${{ matrix.repo }}
        id: checkout
        continue-on-error: true
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: SuxOS/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: consumer

      - name: Check caller-stub conformance for SuxOS/${{ matrix.repo }} (advisory)
        env:
          REPO: ${{ matrix.repo }}
          TOKEN_OK: ${{ steps.app-token.outcome }}
          CHECKOUT_OK: ${{ steps.checkout.outcome }}
        run: |
          set -euo pipefail
          if [ "$TOKEN_OK" != "success" ]; then
            echo "::warning::[$REPO] could not mint an app token (secret missing or App not installed) — skipping conformance scan"
            exit 0
          fi
          if [ "$CHECKOUT_OK" != "success" ] || [ ! -d consumer/.github ]; then
            echo "::warning::[$REPO] could not check out repo / no .github tree (App may lack contents:read) — skipping conformance scan"
            exit 0
          fi
          echo "### Caller-stub conformance — $REPO" >> "$GITHUB_STEP_SUMMARY"
          bash scripts/check-caller-conformance.sh "$REPO" consumer/.github/workflows

  remediate:
    # Opt-in only (#355) — see the file header for why this is workflow_dispatch-gated and
    # what it deliberately does NOT touch. Same degrade-to-skip posture as `conformance`:
    # a repo the App can't reach, or can't be granted write scope on, is skipped with a
    # warning, never a hard failure.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.remediate == 'true'
    needs: managed-repos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.managed-repos.outputs.repos) }}
    steps:
      - name: Checkout .github (this repo — canonical stub source)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Mint repo-scoped app token (contents:write, pull-requests:write only)
        id: app-token
        continue-on-error: true
        # Restricted to just the two permissions this job needs (least privilege beyond
        # what `conformance`'s read-only scan requests) and to the single target repo.
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}
          owner: SuxOS
          repositories: ${{ matrix.repo }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout SuxOS/${{ matrix.repo }}
        id: checkout
        continue-on-error: true
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: SuxOS/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: consumer

      - name: Regenerate missing/dead stubs and open or refresh a remediation PR
        env:
          REPO: ${{ matrix.repo }}
          TOKEN_OK: ${{ steps.app-token.outcome }}
          CHECKOUT_OK: ${{ steps.checkout.outcome }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: SuxOS/${{ matrix.repo }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ "$TOKEN_OK" != "success" ]; then
            echo "::warning::[$REPO] could not mint a write-scoped app token (secret missing, App not installed, or App lacks contents/pull-requests write on this repo) — skipping remediation"
            exit 0
          fi
          if [ "$CHECKOUT_OK" != "success" ] || [ ! -d consumer/.github ]; then
            echo "::warning::[$REPO] could not check out repo — skipping remediation"
            exit 0
          fi

          bash scripts/remediate-caller-stubs.sh consumer/.github/workflows

          cd consumer
          if [ -z "$(git status --porcelain -- .github/workflows)" ]; then
            echo "[$REPO] nothing to remediate — caller stubs already conform."
            exit 0
          fi

          git config user.name "suxbot[bot]"
          git config user.email "304711698+suxbot[bot]@users.noreply.github.com"
          git checkout -B bot/sync-caller-stubs
          git add .github/workflows
          git commit -m "chore: sync SuxOS caller stubs"
          git push -f origin bot/sync-caller-stubs

          existing=$(gh pr list --state open --head bot/sync-caller-stubs --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh pr comment "$existing" --body "Refreshed by the latest caller-conformance remediation run: $RUN_URL"
            echo "[$REPO] refreshed existing remediation PR #$existing."
          else
            # shellcheck disable=SC2016  # backticks below are literal Markdown, not command substitution
            gh pr create \
              --title "chore: sync SuxOS caller stubs" \
              --body "$(printf 'Automated caller-stub remediation by SuxOS/.github'\''s **caller-conformance** workflow (#355): adds any wholly missing canonical stub and removes dead R5/#263-class stubs (a stub wiring a SuxOS reusable on `workflow_run`). Only ever touches `.github/workflows/`, never app code — review before merging.\n\nRun: %s' "$RUN_URL")"
            echo "[$REPO] opened remediation PR."
          fi
