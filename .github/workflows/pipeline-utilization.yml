name: Pipeline utilization report (reusable)

# Rolling visibility into how much the autonomy pipeline is actually running and how much
# of that is real work vs. a free cheap-exit no-op — the signal needed before any
# utilization/waste target is more than a guess. Actual Claude token/spend is Anthropic-side
# and not queryable from here; run count + wall-clock duration per workflow is the closest
# proxy available via the GitHub API, and is what this reports. Read-only; maintains a
# single rolling tracking issue (like audit.yml/health.yml).
#
# A run's wall-clock duration (startedAt → updatedAt) is a PROXY, not a billing figure — it
# correlates with Claude turns/spend but isn't it. Treat the numbers here as directional
# (is this workflow getting slower/more frequent/more failure-prone over time), not as an
# exact cost accounting.
#
# Caller (needs its own schedule/dispatch trigger):
#   uses: SuxOS/.github/.github/workflows/pipeline-utilization.yml@main
#   secrets: inherit

on:
  workflow_call:
    inputs:
      issue-title:
        type: string
        default: "Pipeline utilization report"
      lookback-days:
        description: "How many days of workflow runs to summarize per report."
        type: string
        default: "7"
      run-limit:
        description: "Max recent runs to fetch per report. Raise on a repo with a very high run volume so the lookback window isn't silently truncated."
        type: string
        default: "500"
      fast-run-threshold-seconds:
        description: "Runs at or under this wall-clock duration are counted as likely cheap-exits (a proxy for waste-avoided, not waste itself)."
        type: string
        default: "45"
      issue-limit:
        description: "Max open issues to page through for the tracking-issue de-dup lookup."
        type: string
        default: "100"

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: pipeline-utilization-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  report:
    name: Summarize pipeline run volume and duration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fetch recent runs and summarize
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOOKBACK_DAYS: ${{ inputs.lookback-days }}
          RUN_LIMIT: ${{ inputs.run-limit }}
          FAST_THRESHOLD: ${{ inputs.fast-run-threshold-seconds }}
        run: |
          set -euo pipefail

          since=$(date -u -d "-${LOOKBACK_DAYS} days" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-"${LOOKBACK_DAYS}"d +%Y-%m-%dT%H:%M:%SZ)

          if ! runs=$(gh run list --repo "$GITHUB_REPOSITORY" --limit "$RUN_LIMIT" \
              --json workflowName,conclusion,status,startedAt,updatedAt,createdAt); then
            echo "::error::gh run list failed — aborting instead of reporting an empty/stale summary"
            exit 1
          fi

          # Per-workflow rollup: run count, outcome breakdown, total/avg duration (seconds),
          # and a "fast run" count — runs at or under FAST_THRESHOLD, a proxy for cheap-exits
          # (issue-build's/triage's pre-Claude count check, fixer's preflight, etc.) rather
          # than genuine Claude work. This is directional, not an exact spend accounting.
          summary=$(printf '%s' "$runs" | jq -c \
            --arg since "$since" --argjson fast "$FAST_THRESHOLD" '
            [ .[] | select(.createdAt >= $since) | select(.status == "completed") ]
            | group_by(.workflowName)
            | map({
                workflow: .[0].workflowName,
                runs: length,
                succeeded: ([.[] | select(.conclusion == "success")] | length),
                failed: ([.[] | select(.conclusion == "failure")] | length),
                cancelled: ([.[] | select(.conclusion == "cancelled")] | length),
                durations: [.[] | ((.updatedAt | fromdateiso8601) - (.startedAt | fromdateiso8601))],
              })
            | map(. + {
                total_seconds: (.durations | add // 0),
                avg_seconds: ((.durations | add // 0) / (.durations | length)),
                fast_runs: ([.durations[] | select(. <= $fast)] | length),
              })
            | sort_by(-.runs)')

          echo "workflows summarized: $(printf '%s' "$summary" | jq 'length')"

          {
            echo "summary<<EOF_UTIL_SUMMARY"
            printf '%s\n' "$summary"
            echo "EOF_UTIL_SUMMARY"
          } >> "$GITHUB_OUTPUT"

      - name: Build report body
        id: body
        env:
          SUMMARY: ${{ steps.scan.outputs.summary }}
          LOOKBACK_DAYS: ${{ inputs.lookback-days }}
          FAST_THRESHOLD: ${{ inputs.fast-run-threshold-seconds }}
        run: |
          set -euo pipefail
          rows=$(printf '%s' "$SUMMARY" | jq -r '
            .[] | "| \(.workflow) | \(.runs) | \(.succeeded) | \(.failed) | \(.cancelled) | \(.avg_seconds | floor)s | \(.fast_runs) |"')

          body=$(printf '%s\n' \
            "Auto-maintained by the pipeline utilization report (${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/workflows/pipeline-utilization.yml). Last updated $(date -u '+%Y-%m-%d %H:%M UTC'). Window: last ${LOOKBACK_DAYS} days." \
            "" \
            "**Read this as a proxy, not a bill.** Duration is wall-clock (startedAt → updatedAt), not billed Claude tokens or Actions minutes — it correlates with spend but isn't it. There's no direct token-usage API available here; this is the closest signal the GitHub API can give. Use it directionally: is a stage getting slower, failing more, or running more often than its trigger cadence should produce." \
            "" \
            "| Workflow | Runs | Succeeded | Failed | Cancelled | Avg duration | Fast runs (≤${FAST_THRESHOLD}s) |" \
            "|----------|-----:|----------:|-------:|----------:|-------------:|--------------------------------:|" \
            "$rows" \
            "" \
            "**Fast runs** are completed runs at or under the fast-run threshold — likely a cheap-exit no-op (no build candidates, an already-claimed issue, a disarmed preflight) rather than a real Claude invocation. A high fast-run share on \`issue-build\` means the pipeline's cheap-exit guards are doing their job; a low one means most triggers are doing real (billed) work." \
            "" \
            "**Failed/cancelled runs** worth a look if the count is non-trivial: a failure is discarded work (the run consumed time/spend and produced nothing merged); a cancellation is usually a concurrency-group supersede (expected churn, not necessarily waste) but a persistently high count on a workflow without a fast concurrency group is worth checking.")

          {
            echo "body<<EOF_UTIL_BODY"
            printf '%s\n' "$body"
            echo "EOF_UTIL_BODY"
          } >> "$GITHUB_OUTPUT"

      - name: Refresh the tracking issue
        uses: SuxOS/.github/.github/actions/upsert-tracking-issue@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: open
          update-mode: replace
          list-limit: ${{ inputs.issue-limit }}
          title: ${{ inputs.issue-title }}
          body: ${{ steps.body.outputs.body }}
