name: Fixer — propose work as issues (reusable)

# The PROPOSER in the three-stage backlog pipeline (propose -> investigate -> build):
#   fixer.yml (this)  — scans a repo and FILES bugs + feature ideas as issues, each with a
#                       self-assessed `confidence:*` label. It never verifies deeply and never
#                       decides what gets built — it just proposes.
#   triage.yml        — an INDEPENDENT investigator re-checks each open untriaged issue (these
#                       AND ones a human filed), assigns its own type + confidence, and opts
#                       most of them into building with `queued-for-build` (opt-out default).
#   issue-build.yml   — clusters the queued issues and builds one PR per chunk; only a verified
#                       all-`confidence:high` cluster auto-merges, the rest stage for review.
# Splitting propose from investigate is deliberate: the thing that files an issue should not
# also be the thing that clears it for unattended building — a second, adversarial look
# (triage.yml) catches a confidently-wrong proposal before it ever touches code.
#
# Never opens a PR, never touches code, never applies `queued-for-build` (that's triage's job).
# Runs on a Claude Pro/Max subscription (CLAUDE_CODE_OAUTH_TOKEN, from `claude setup-token`),
# not a metered ANTHROPIC_API_KEY — inert until that secret is set.
#
# Optional: auto-assign a coding agent to freshly filed issues (`auto-assign-agent: true`).
# This is a DIFFERENT auth path than the rest of the pipeline — GitHub's agent-assignment API
# only accepts user-to-server tokens (a PAT), never a GitHub App installation token or the
# default GITHUB_TOKEN (confirmed against GitHub's coding-agent API docs, 2026-07). So this
# needs its own secret, `AGENT_ASSIGN_PAT` — a classic PAT with `repo` scope, or a fine-grained
# PAT with read/write on actions+contents+issues+pull-requests — belonging to a user who has
# the target agent enabled on this repo. Add it as an org/repo secret; inert (skipped, logged)
# until it exists. See docs/design/backlog-pipeline.md for the researched API details and the
# known gap (only `copilot-swe-agent[bot]` supports this today — Claude Code has no equivalent
# GitHub-native assignable agent actor as of 2026-07).
#
# Caller (workflow_dispatch — manual for now; add a schedule: later if desired):
#   uses: SuxOS/.github/.github/workflows/fixer.yml@main
#   secrets: inherit
#   with:
#     auto-assign-agent: true   # optional, default false

on:
  workflow_call:
    inputs:
      model:
        type: string
        default: "sonnet" # a bulk scan whose every proposal is re-verified by triage — bulk tier
      max-turns:
        type: number
        default: 40
      auto-assign-agent:
        description: >-
          After filing, assign each freshly-created issue to a coding agent via GitHub's
          agent-assignment API. Requires the AGENT_ASSIGN_PAT secret (a PAT, not the App
          token) — see the comment block above. No-ops with a log line if the secret is
          unset, so it's safe to flip on before the secret exists.
        type: boolean
        default: false
      agent-assignee:
        description: >-
          Login to assign to. Only `copilot-swe-agent[bot]` is known to work today (GitHub's
          Copilot coding agent) — see docs/design/backlog-pipeline.md for why Claude Code
          has no equivalent as of 2026-07.
        type: string
        default: "copilot-swe-agent[bot]"

permissions:
  contents: read
  issues: write

concurrency:
  group: fixer-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  fixer:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Preflight — need the token
        id: pre
        run: |
          if [ "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}" != "true" ]; then
            echo "CLAUDE_CODE_OAUTH_TOKEN not set → fixer inert. Run 'claude setup-token' and add it as an org/repo secret to arm."; echo "go=false" >> "$GITHUB_OUTPUT"
          else echo "go=true" >> "$GITHUB_OUTPUT"; fi

      - name: Mint app token
        if: steps.pre.outputs.go == 'true'
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      - name: Checkout
        if: steps.pre.outputs.go == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 0 }

      - name: Record scan-start time
        if: steps.pre.outputs.go == 'true' && inputs.auto-assign-agent == true
        id: scan-start
        run: echo "at=$(date -u +%Y-%m-%dT%H:%M:%S+00:00)" >> "$GITHUB_OUTPUT"

      - name: Claude — scan and propose issues
        id: claude
        if: steps.pre.outputs.go == 'true'
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1
        env:
          ENABLE_PROMPT_CACHING_1H: "1"
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: |
            You are the proposer. Find work worth doing in this repo and file it as issues —
            do NOT do the work, do NOT open any PR, do NOT apply `queued-for-build` (a separate
            investigator decides what actually gets built).

            What to look for:
              - Correctness bugs: read code in areas of recent churn
                (`git log --since=30.days --stat`) and anything TODO/FIXME/XXX/HACK comments
                point at — don't cold-scan the whole repo file-by-file.
              - Feature ideas: gaps, rough edges, half-finished work (a flag defined but never
                wired up, a stubbed function, a config option with no effect, PLAN.md/ROADMAP
                items not actually implemented).
              - Missing tests/docs: exported functions with no coverage where the repo has a
                clear test convention; README/CLAUDE.md describing behavior the code no longer
                matches.
              - Dead/stale code: unused exports, commented-out blocks, deprecated patterns a
                newer part of the repo already replaced.

            Before proposing: `gh issue list --limit 300 --state all` and skip anything an
            existing issue already covers (don't even comment, unless you found materially new
            information). Batch candidates first, then dedupe against each other — one root
            cause showing up in three files is ONE issue, not three.

            Do NOT file issues yourself — you have no write access. Return each surviving
            candidate via the structured output schema instead; a separate step files them
            with exactly two kinds of label, a TYPE and a CONFIDENCE:
              - Type: `bug` for a defect; `enhancement` for a feature/idea; `documentation` for
                docs; set `security: true` in addition if it's a security issue.
              - Confidence — YOUR honest self-assessment, since the investigator will re-judge
                it anyway:
                  * `high`   — you read the code and are sure it's real, and the fix is narrow,
                               unambiguous, and low-risk.
                  * `medium` — likely real but you didn't fully confirm, or the fix has some
                               judgment/scope to it.
                  * `low`    — a hunch, a big/ambiguous idea, or anything you couldn't verify.
              - Title: short, specific, imperative ("Fix X", "Add Y"). Body: what/why, file:line
                references, a suggested fix direction if you have one. A paragraph, not a report.

            Skip anything you have no real basis for — a plausible-sounding but baseless guess is
            worse than silence (propose a genuine hunch as confidence low, don't invent one).
            Set discarded_count to how many candidates you dropped as duplicates/baseless.
          # Proposer only READS (code + `gh issue list` for dedup) and returns a structured
          # proposal list — it has no `gh issue create`/write access at all. A separate
          # deterministic step below is the only thing that ever calls `gh issue create`,
          # validating each proposal's type/confidence against an allowlist first (Safe
          # Outputs pattern: agent proposes, a least-privileged step disposes — see
          # docs/design/backlog-pipeline.md and issue #79's recommendation). Read-only git
          # subcommands are enumerated so the write-scoped App token can't push, and
          # `gh issue list` is the only gh subcommand granted (view/create/edit/close/etc are
          # all withheld).
          claude_args: >-
            --max-turns ${{ inputs.max-turns }} --model ${{ inputs.model }}
            --allowedTools "Read,Grep,Glob,Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(git blame:*),Bash(git rev-list:*),Bash(gh issue list:*)"
            --json-schema '{"type":"object","properties":{"proposals":{"type":"array","items":{"type":"object","properties":{"title":{"type":"string"},"body":{"type":"string"},"type":{"type":"string","enum":["bug","enhancement","documentation"]},"security":{"type":"boolean"},"confidence":{"type":"string","enum":["high","medium","low"]}},"required":["title","body","type","security","confidence"],"additionalProperties":false}},"discarded_count":{"type":"integer"}},"required":["proposals","discarded_count"],"additionalProperties":false}'

      # The ONLY step that ever calls `gh issue create` — the agent above has no gh-write
      # access at all. Re-validates type/confidence against an allowlist even though the
      # JSON schema already constrains them (belt-and-suspenders: a schema is the model's
      # contract, this is the pipeline's own gate on what it will actually write).
      - name: File proposed issues
        if: steps.pre.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERDICT: ${{ steps.claude.outputs.structured_output }}
        run: |
          set -euo pipefail
          if [ -z "${VERDICT:-}" ]; then echo "no structured output → nothing to file"; exit 0; fi
          count=$(echo "$VERDICT" | jq '.proposals | length')
          discarded=$(echo "$VERDICT" | jq -r '.discarded_count // 0')
          echo "proposals: $count (discarded as duplicate/baseless: $discarded)"
          echo "$VERDICT" | jq -c '.proposals[]' | while read -r p; do
            title=$(echo "$p" | jq -r '.title')
            body=$(echo "$p" | jq -r '.body')
            type=$(echo "$p" | jq -r '.type')
            security=$(echo "$p" | jq -r '.security')
            conf=$(echo "$p" | jq -r '.confidence')

            case "$type" in bug|enhancement|documentation) ;; *)
              echo "::warning::skipping proposal with unexpected type '$type': $title"; continue ;;
            esac
            case "$conf" in high|medium|low) ;; *)
              echo "::warning::skipping proposal with unexpected confidence '$conf': $title"; continue ;;
            esac

            label_args=(--label "$type" --label "confidence:$conf")
            [ "$security" = "true" ] && label_args+=(--label security)

            url=$(gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body" "${label_args[@]}")
            echo "filed: $url"
          done

      # Deterministic on purpose (cardinal rule: script over model call whenever exact) —
      # we don't ask Claude to self-report which issues it filed; we just ask GitHub, scoped
      # to this run's time window. See the workflow-level comment for why this needs a PAT.
      - name: Auto-assign freshly filed issues to a coding agent
        if: steps.pre.outputs.go == 'true' && inputs.auto-assign-agent == true
        env:
          GH_TOKEN: ${{ secrets.AGENT_ASSIGN_PAT }}
          ASSIGNEE: ${{ inputs.agent-assignee }}
          SINCE: ${{ steps.scan-start.outputs.at }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::auto-assign-agent is true but AGENT_ASSIGN_PAT is not set — skipping assignment. Add it as an org/repo secret (a PAT, not the App token; see the workflow-level comment) to arm this."
            exit 0
          fi

          echo "Looking for issues fixer filed since $SINCE to assign to $ASSIGNEE..."
          # Scope to suxbot[bot]-authored issues, not just the time window: a human or another
          # workflow can file an issue in the same window this run is scanning, and a
          # created:>=SINCE search alone would sweep it in and auto-assign it too.
          mapfile -t issue_numbers < <(
            gh issue list --repo "${{ github.repository }}" --state open \
              --search "created:>=${SINCE}" --json number,author \
              --jq '.[] | select(.author.login == "suxbot[bot]") | .number'
          )

          if [ "${#issue_numbers[@]}" -eq 0 ]; then
            echo "No issues created since $SINCE — nothing to assign."
            exit 0
          fi

          for n in "${issue_numbers[@]}"; do
            echo "Assigning #$n to $ASSIGNEE..."
            if ! gh api "repos/${{ github.repository }}/issues/${n}/assignees" \
                   -f "assignees[]=${ASSIGNEE}" >/dev/null; then
              echo "::warning::Failed to assign #$n to $ASSIGNEE — likely means the agent isn't enabled on this repo, or AGENT_ASSIGN_PAT's owner doesn't have it enabled. Leaving the issue unassigned; the normal triage/build pipeline still picks it up."
            fi
          done

          # Never fail the run over this — assignment is a bonus, not the pipeline's job.
          exit 0
