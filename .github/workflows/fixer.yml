name: Fixer — propose work as issues (reusable)

# The PROPOSER in the two-stage backlog pipeline (propose -> build):
#   fixer.yml (this)  — scans a repo and FILES bugs + feature ideas as issues, typed only
#                       (bug/enhancement/documentation, +security). It never verifies deeply
#                       and never decides what gets built — it just proposes.
#   issue-build.yml   — selects the buildable issues (its own read-only pass judges buildable
#                       vs needs-human), clusters related ones, and builds one PR per chunk;
#                       the PR auto-merges on green (automerge.yml) unless a human adds `hold`.
# The separate Opus `triage` stage and the `confidence:*` taxonomy were removed in the
# three-loop rework (docs/design/three-loop-pipeline.md, 2026-07-15): confidence gated nothing
# once auto-merge stopped reading labels, and the buildability call folded into issue-build.
# fixer stays a distinct, cheap bulk proposer so the expensive builder isn't also the thing
# scanning for work — but it no longer self-assesses confidence.
#
# Never opens a PR, never touches code, never claims an issue (that's issue-build's job).
# Runs on a Claude Pro/Max subscription (CLAUDE_CODE_OAUTH_TOKEN, from `claude setup-token`),
# not a metered ANTHROPIC_API_KEY — inert until that secret is set.
#
# Optional: auto-assign a coding agent to freshly filed issues (`auto-assign-agent: true`).
# This is a DIFFERENT auth path than the rest of the pipeline — GitHub's agent-assignment API
# only accepts user-to-server tokens (a PAT), never a GitHub App installation token or the
# default GITHUB_TOKEN (confirmed against GitHub's coding-agent API docs, 2026-07). So this
# needs its own secret, `AGENT_ASSIGN_PAT` — a classic PAT with `repo` scope, or a fine-grained
# PAT with read/write on actions+contents+issues+pull-requests — belonging to a user who has
# the target agent enabled on this repo. Add it as an org/repo secret; inert (skipped, logged)
# until it exists. See docs/design/backlog-pipeline.md for the researched API details and the
# known gap (only `copilot-swe-agent[bot]` supports this today — Claude Code has no equivalent
# GitHub-native assignable agent actor as of 2026-07).
#
# Caller (workflow_dispatch — manual for now; add a schedule: later if desired):
#   uses: SuxOS/.github/.github/workflows/fixer.yml@main
#   secrets: inherit
#   with:
#     auto-assign-agent: true   # optional, default false

on:
  workflow_call:
    inputs:
      model:
        type: string
        default: "sonnet" # operator directive 2026-07-17: sonnet pinned org-wide, no Opus escalation
        # (a bulk scan whose every proposal is re-judged by issue-build anyway — bulk tier);
        # a caller can still opt a specific tier into "opus" via this input if it wants one.
      max-turns:
        type: number
        default: 120
      scope:
        description: >-
          What this pass looks for — lets callers run a tight, cheap bug-only sweep often and
          a broad, ambitious-idea sweep less often without duplicating this whole workflow.
          `bugs`: correctness bugs only, skip feature ideas entirely (for a tight cadence).
          `bugs-feats`: bugs plus ordinary feature/gap ideas, no push for ambitious ones.
          `deep`: bugs plus feature ideas, explicitly including at least one ambitious/large
          idea per pass when there's a real basis for one.
        type: string
        default: "deep"
      auto-assign-agent:
        description: >-
          After filing, assign each freshly-created issue to a coding agent via GitHub's
          agent-assignment API. Requires the AGENT_ASSIGN_PAT secret (a PAT, not the App
          token) — see the comment block above. No-ops with a log line if the secret is
          unset, so it's safe to flip on before the secret exists.
        type: boolean
        default: false
      agent-assignee:
        description: >-
          Login to assign to. Only `copilot-swe-agent[bot]` is known to work today (GitHub's
          Copilot coding agent) — see docs/design/backlog-pipeline.md for why Claude Code
          has no equivalent as of 2026-07.
        type: string
        default: "copilot-swe-agent[bot]"
      epic-filing:
        description: >-
          Opt-in: when a proposal carries the optional `epic: {"id", "repos"}` field (see
          the --json-schema blocks below), file one child issue per named repo (tagged
          `epic:<id>`, picked up unmodified by that repo's own issue-build.yml) plus a
          tracking issue in `.github` (title `Epic <id>: <title>`, body a checklist of the
          child issues, refreshed in place on repeat runs) — per
          docs/design/2026-07-18-epic-decomposition-design.md §2.2. Default false: per the
          design doc's §2.5/§5 gating note, this mechanism should stay off until the vX-arc
          DoD (7-day drain streak + >=50% opus-bucket headroom) is confirmed live — it's
          landed disabled so it exists and is testable ahead of that, the same shape as
          #452's spine-fetch landing unconsumed first.
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  id-token: write

concurrency:
  group: fixer-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  fixer:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Preflight — need the token
        id: pre
        run: |
          if [ "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}" != "true" ]; then
            echo "CLAUDE_CODE_OAUTH_TOKEN not set → fixer inert. Run 'claude setup-token' and add it as an org/repo secret to arm."; echo "go=false" >> "$GITHUB_OUTPUT"
          else echo "go=true" >> "$GITHUB_OUTPUT"; fi

      # Budget governor signal (docs/design/budget-and-cadence.md). Proposing NEW work is
      # the most deferrable stage, so fixer stands down at yellow — the in-flight backlog
      # keeps draining through issue-build until red.
      - name: Check autonomy throttle
        id: throttle
        uses: SuxOS/.github/.github/actions/check-throttle@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          defer-at: "yellow"

      - name: Mint app token
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      - name: Checkout
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 0 }

      - name: Record scan-start time
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true' && inputs.auto-assign-agent == true
        id: scan-start
        run: echo "at=$(date -u +%Y-%m-%dT%H:%M:%S+00:00)" >> "$GITHUB_OUTPUT"

      - name: Claude — scan and propose issues
        id: claude
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        # The action hard-fails (exit 1) when the model runs fine but ends its turn without
        # emitting --json-schema structured_output ("Result subtype: success" + no output —
        # a proposer that wrote a prose summary instead of the tool call, a flaky/refusing
        # model, or a mid-run API blip). Without continue-on-error that aborts the whole job
        # red — burning a full subscription session AND filing nothing — instead of letting
        # the "File proposed issues" step below treat an empty verdict as "found nothing this
        # pass" (green no-op), which it already does. Same shape as security-review.yml (#139).
        continue-on-error: true
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1
        env:
          ENABLE_PROMPT_CACHING_1H: "1"
          # Unattended-CI resilience: wait out a subscription usage-limit/capacity (429/529) window
          # and retry instead of failing — the pool-exhaustion jam, without a metered key.
          CLAUDE_CODE_RETRY_WATCHDOG: "1"
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          # Inert here today (schedule/workflow_dispatch only, no bot-authored trigger event
          # exists for this job) — added for consistency with every other claude-code-action
          # step in the org so a future trigger change does not quietly need this rediscovered.
          allowed_bots: suxbot[bot]
          prompt: |
            You are the proposer. Find work worth doing in this repo and file it as issues —
            do NOT do the work and do NOT open any PR (the builder, a separate workflow, decides
            what actually gets built and ships it).

            This pass's scope: `${{ inputs.scope }}`.
              - `bugs`: correctness bugs ONLY. Do not propose feature ideas, missing
                tests/docs, or dead-code cleanup this pass — a tight, cheap, frequent sweep.
              - `bugs-feats`: correctness bugs plus ordinary feature/gap ideas (see below).
                Propose incremental ideas only — do not reach for an ambitious one this pass.
              - `deep`: correctness bugs plus feature ideas, AND you should specifically look
                for at least one genuinely ambitious idea this pass when there's a real
                opening: a capability the repo's architecture clearly enables but nobody has
                built yet, a bigger reframe of an existing rough edge, a direction the docs
                gesture at but no issue tracks. "Large" effort is fine and expected here — size
                it honestly, don't downscope an idea just to make it sound safer to propose. It
                still needs the same real basis as anything else (point at the code/doc that
                makes it plausible); ambitious is not a license to invent.

            What to look for (subject to the scope above):
              - Correctness bugs: read code in areas of recent churn
                (`git log --since=30.days --stat`) and anything TODO/FIXME/XXX/HACK comments
                point at — don't cold-scan the whole repo file-by-file. Always in scope.
              - Feature ideas: gaps, rough edges, half-finished work (a flag defined but never
                wired up, a stubbed function, a config option with no effect, PLAN.md/ROADMAP
                items not actually implemented). Skip entirely under `bugs` scope.
              - Missing tests/docs: exported functions with no coverage where the repo has a
                clear test convention; README/CLAUDE.md describing behavior the code no longer
                matches. Skip under `bugs` scope.
              - Dead/stale code: unused exports, commented-out blocks, deprecated patterns a
                newer part of the repo already replaced. Skip under `bugs` scope.

            Before proposing: `gh issue list --limit 300 --state all` and skip anything an
            existing issue already covers (don't even comment, unless you found materially new
            information). Batch candidates first, then dedupe against each other — one root
            cause showing up in three files is ONE issue, not three.

            Before citing a specific file:line as evidence, re-check it against the current
            checkout (grep or `git blame` the exact line) — don't trust a stale snapshot or an
            earlier pass's notes. A finding whose cited sink no longer exists or has already
            been fixed wastes a full builder run; if you can't confirm the citation still
            reproduces at HEAD, drop the candidate instead of filing it.

            Do NOT file issues yourself — you have no write access. Return each surviving
            candidate via the structured output schema instead; a separate step files them
            with a TYPE label and an EFFORT label:
              - Type: `bug` for a defect; `enhancement` for a feature/idea; `documentation` for
                docs; set `security: true` in addition if it's a security issue.
              - Title: short, specific, imperative ("Fix X", "Add Y"). Body: what/why, file:line
                references, a suggested fix direction if you have one. A paragraph, not a report.
              - Effort: your rough gut estimate of how much work the fix is — `small` (a
                one-file, one-concept change), `medium` (a few files or real design thought),
                or `large` (touches many files, a real feature, or needs a design decision).
                A rough guess is fine; this only sizes how many issues a build batch takes in
                one pass, it is not a commitment.

            Skip anything you have no real basis for — a plausible-sounding but baseless guess is
            worse than silence (don't invent one; a genuine hunch is fine, just say so in the body).
            The builder re-judges buildability on its own read, so you don't gate that here.
            Set discarded_count to how many candidates you dropped as duplicates/baseless.

            Your FINAL message MUST be the machine-readable object matching the provided JSON
            schema: {"proposals":[...],"discarded_count":N} — an empty `proposals` array (with
            discarded_count) if you found nothing worth filing. Emit it as your structured
            output; do NOT end with a prose summary instead, and do NOT write any file — the
            proposals are captured from your structured output, not the filesystem. A run that
            ends without this object files nothing and wastes the whole session.
          # Proposer only READS (code + `gh issue list` for dedup) and returns a structured
          # proposal list — it has no `gh issue create`/write access at all. A separate
          # deterministic step below is the only thing that ever calls `gh issue create`,
          # validating each proposal's type against an allowlist first (Safe
          # Outputs pattern: agent proposes, a least-privileged step disposes — see
          # docs/design/backlog-pipeline.md and issue #79's recommendation). Read-only git
          # subcommands are enumerated so the write-scoped App token can't push, and
          # `gh issue list` is the only gh subcommand granted (view/create/edit/close/etc are
          # all withheld).
          claude_args: >-
            --max-turns ${{ inputs.max-turns }} --model ${{ inputs.model }}
            --allowedTools "Read,Grep,Glob,Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(git blame:*),Bash(git rev-list:*),Bash(gh issue list:*)"
            --json-schema '{"type":"object","properties":{"proposals":{"type":"array","items":{"type":"object","properties":{"title":{"type":"string"},"body":{"type":"string"},"type":{"type":"string","enum":["bug","enhancement","documentation"]},"security":{"type":"boolean"},"effort":{"type":"string","enum":["small","medium","large"]},"epic":{"type":"object","properties":{"id":{"type":"string"},"repos":{"type":"array","items":{"type":"string"}}},"required":["id","repos"],"additionalProperties":false}},"required":["title","body","type","security","effort"],"additionalProperties":false}},"discarded_count":{"type":"integer"}},"required":["proposals","discarded_count"],"additionalProperties":false}'

      - name: Claude — scan and propose issues (retry — first attempt produced no output)
        id: claude_retry
        # Only fires when the first attempt emitted no structured_output — a transient API/OIDC
        # blip or a model that ended without the tool call. One retry turns the common hiccup
        # into an auto-recovery instead of a silently-empty pass; a genuinely fruitless scan
        # still yields no output after this and the File step below simply files nothing (green).
        # Mirrors security-review.yml's claude/claude_retry pair (#139).
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true' && steps.claude.outputs.structured_output == ''
        continue-on-error: true
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1
        env:
          ENABLE_PROMPT_CACHING_1H: "1"
          # Unattended-CI resilience: wait out a subscription usage-limit/capacity (429/529) window
          # and retry instead of failing — the pool-exhaustion jam, without a metered key.
          CLAUDE_CODE_RETRY_WATCHDOG: "1"
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          # Inert here today (schedule/workflow_dispatch only, no bot-authored trigger event
          # exists for this job) — added for consistency with every other claude-code-action
          # step in the org so a future trigger change does not quietly need this rediscovered.
          allowed_bots: suxbot[bot]
          prompt: |
            You are the proposer. Find work worth doing in this repo and file it as issues —
            do NOT do the work and do NOT open any PR (the builder, a separate workflow, decides
            what actually gets built and ships it).

            This pass's scope: `${{ inputs.scope }}`.
              - `bugs`: correctness bugs ONLY. Do not propose feature ideas, missing
                tests/docs, or dead-code cleanup this pass — a tight, cheap, frequent sweep.
              - `bugs-feats`: correctness bugs plus ordinary feature/gap ideas (see below).
                Propose incremental ideas only — do not reach for an ambitious one this pass.
              - `deep`: correctness bugs plus feature ideas, AND you should specifically look
                for at least one genuinely ambitious idea this pass when there's a real
                opening: a capability the repo's architecture clearly enables but nobody has
                built yet, a bigger reframe of an existing rough edge, a direction the docs
                gesture at but no issue tracks. "Large" effort is fine and expected here — size
                it honestly, don't downscope an idea just to make it sound safer to propose. It
                still needs the same real basis as anything else (point at the code/doc that
                makes it plausible); ambitious is not a license to invent.

            What to look for (subject to the scope above):
              - Correctness bugs: read code in areas of recent churn
                (`git log --since=30.days --stat`) and anything TODO/FIXME/XXX/HACK comments
                point at — don't cold-scan the whole repo file-by-file. Always in scope.
              - Feature ideas: gaps, rough edges, half-finished work (a flag defined but never
                wired up, a stubbed function, a config option with no effect, PLAN.md/ROADMAP
                items not actually implemented). Skip entirely under `bugs` scope.
              - Missing tests/docs: exported functions with no coverage where the repo has a
                clear test convention; README/CLAUDE.md describing behavior the code no longer
                matches. Skip under `bugs` scope.
              - Dead/stale code: unused exports, commented-out blocks, deprecated patterns a
                newer part of the repo already replaced. Skip under `bugs` scope.

            Before proposing: `gh issue list --limit 300 --state all` and skip anything an
            existing issue already covers (don't even comment, unless you found materially new
            information). Batch candidates first, then dedupe against each other — one root
            cause showing up in three files is ONE issue, not three.

            Before citing a specific file:line as evidence, re-check it against the current
            checkout (grep or `git blame` the exact line) — don't trust a stale snapshot or an
            earlier pass's notes. A finding whose cited sink no longer exists or has already
            been fixed wastes a full builder run; if you can't confirm the citation still
            reproduces at HEAD, drop the candidate instead of filing it.

            Do NOT file issues yourself — you have no write access. Return each surviving
            candidate via the structured output schema instead; a separate step files them
            with a TYPE label and an EFFORT label:
              - Type: `bug` for a defect; `enhancement` for a feature/idea; `documentation` for
                docs; set `security: true` in addition if it's a security issue.
              - Title: short, specific, imperative ("Fix X", "Add Y"). Body: what/why, file:line
                references, a suggested fix direction if you have one. A paragraph, not a report.
              - Effort: your rough gut estimate of how much work the fix is — `small` (a
                one-file, one-concept change), `medium` (a few files or real design thought),
                or `large` (touches many files, a real feature, or needs a design decision).
                A rough guess is fine; this only sizes how many issues a build batch takes in
                one pass, it is not a commitment.

            Skip anything you have no real basis for — a plausible-sounding but baseless guess is
            worse than silence (don't invent one; a genuine hunch is fine, just say so in the body).
            The builder re-judges buildability on its own read, so you don't gate that here.
            Set discarded_count to how many candidates you dropped as duplicates/baseless.

            Your FINAL message MUST be the machine-readable object matching the provided JSON
            schema: {"proposals":[...],"discarded_count":N} — an empty `proposals` array (with
            discarded_count) if you found nothing worth filing. Emit it as your structured
            output; do NOT end with a prose summary instead, and do NOT write any file — the
            proposals are captured from your structured output, not the filesystem. A run that
            ends without this object files nothing and wastes the whole session.
          claude_args: >-
            --max-turns ${{ inputs.max-turns }} --model ${{ inputs.model }}
            --allowedTools "Read,Grep,Glob,Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(git blame:*),Bash(git rev-list:*),Bash(gh issue list:*)"
            --json-schema '{"type":"object","properties":{"proposals":{"type":"array","items":{"type":"object","properties":{"title":{"type":"string"},"body":{"type":"string"},"type":{"type":"string","enum":["bug","enhancement","documentation"]},"security":{"type":"boolean"},"effort":{"type":"string","enum":["small","medium","large"]},"epic":{"type":"object","properties":{"id":{"type":"string"},"repos":{"type":"array","items":{"type":"string"}}},"required":["id","repos"],"additionalProperties":false}},"required":["title","body","type","security","effort"],"additionalProperties":false}},"discarded_count":{"type":"integer"}},"required":["proposals","discarded_count"],"additionalProperties":false}'

      # The ONLY step that ever calls `gh issue create` — the agent above has no gh-write
      # access at all. Re-validates type against an allowlist even though the JSON schema
      # already constrains it (belt-and-suspenders: a schema is the model's contract, this
      # is the pipeline's own gate on what it will actually write).
      # Real JS via the org's already-pinned actions/github-script, not jq-in-bash — same move
      # as issue-build.yml's select step (2026-07-15): a real language for structured
      # model-authored JSON, no shell-quoting surface.
      - name: File proposed issues
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          # Read from whichever attempt produced output (retry only ran if the first was empty).
          VERDICT: ${{ steps.claude.outputs.structured_output || steps.claude_retry.outputs.structured_output }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { owner, repo } = context.repo;
            const raw = process.env.VERDICT;
            if (!raw) { core.info("no structured output → nothing to file"); return; }

            let verdict;
            try { verdict = JSON.parse(raw); } catch { core.warning("structured output is not valid JSON — nothing to file"); return; }
            const proposals = Array.isArray(verdict.proposals) ? verdict.proposals : [];
            core.info(`proposals: ${proposals.length} (discarded as duplicate/baseless: ${verdict.discarded_count ?? 0})`);

            const filed = [];
            for (const p of proposals) {
              const { title, body, type, security, effort } = p || {};
              if (!["bug", "enhancement", "documentation"].includes(type)) { core.warning(`skipping proposal with unexpected type '${type}': ${title}`); continue; }

              const labels = [type];
              if (security === true) labels.push("security");
              // An invalid/missing effort is not fatal to filing — issue-build's select step
              // defaults an unlabeled issue to medium effort. Only a known-good value gets a label.
              if (["small", "medium", "large"].includes(effort)) labels.push(`effort:${effort}`);

              try {
                const { data } = await github.rest.issues.create({ owner, repo, title, body, labels });
                core.info(`filed: ${data.html_url}`);
                filed.push(data.html_url);
              } catch (e) {
                core.warning(`failed to file '${title}': ${e.message}`);
                continue;
              }
            }
            if (filed.length > 0) {
              await core.summary.addHeading("fixer: proposals filed", 3).addList(filed).write();
            }

      # epic-filing (opt-in, default false — see the input's description): mint-app-token's
      # `repositories:` needs its repo list up front, but that list is only known once the
      # model's proposals are parsed, so extract it here (plain jq, no model call) before the
      # token step below can run. `|| true` on the assignment per this repo's CLAUDE.md note
      # that `run:` steps execute under `-e` regardless of `set`, so an unguarded failed
      # pipeline would otherwise abort the step instead of degrading to "nothing to file".
      - name: Extract epic repos to scope the cross-repo token
        id: epic-repos
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true' && inputs.epic-filing == true
        env:
          VERDICT: ${{ steps.claude.outputs.structured_output || steps.claude_retry.outputs.structured_output }}
        run: |
          set -uo pipefail
          list=$(printf '%s' "${VERDICT:-}" | jq -r '
            [(.proposals // [])[] | select(.epic != null and ((.epic.repos // []) | length) > 0)] as $eps
            | if ($eps | length) == 0 then "" else (($eps | map(.epic.repos[])) + [".github"] | unique | join(",")) end
          ' || true)
          echo "list=${list:-}" >> "$GITHUB_OUTPUT"

      # Cross-repo write token (owner+repositories scoped, per create-github-app-token's own
      # multi-repo support) — the ordinary app-token above is same-repo-only and can't file
      # child issues in other repos or the tracking issue in .github. Only minted when there's
      # actually an epic proposal to file (list non-empty), so a normal fixer run with no
      # epic proposals never even attempts the extra token mint.
      - name: Mint app token for epic repos
        id: epic-token
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true' && inputs.epic-filing == true && steps.epic-repos.outputs.list != ''
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ steps.epic-repos.outputs.list }}

      # docs/design/2026-07-18-epic-decomposition-design.md §2.2: one child issue per named
      # repo (tagged `epic:<id>`, each repo's own issue-build.yml picks it up unmodified —
      # only "tracking" not "epic:<id>" is in the shared nonbuildable-labels floor), plus one
      # tracking issue in `.github` whose body is a checklist of the children. The tracking
      # issue lookup is exhaustive-by-title via github.paginate (this file's existing JS-over-
      # jq convention, same discipline gh-list-exhaustive centralizes for bash callers) so an
      # existing tracking issue past the first page is refreshed, not duplicated.
      - name: File epic issues (child + tracking) — opt-in
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true' && inputs.epic-filing == true && steps.epic-repos.outputs.list != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          VERDICT: ${{ steps.claude.outputs.structured_output || steps.claude_retry.outputs.structured_output }}
        with:
          github-token: ${{ steps.epic-token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const trackingRepo = ".github";
            const raw = process.env.VERDICT;
            if (!raw) { core.info("no structured output → no epics to file"); return; }

            let verdict;
            try { verdict = JSON.parse(raw); } catch { core.warning("structured output is not valid JSON — no epics filed"); return; }
            const proposals = Array.isArray(verdict.proposals) ? verdict.proposals : [];
            const epicProposals = proposals.filter((p) => p && p.epic && p.epic.id
              && Array.isArray(p.epic.repos) && p.epic.repos.length > 0);
            if (!epicProposals.length) { core.info("no epic-tagged proposals — nothing to file"); return; }

            for (const p of epicProposals) {
              const { title, body, type, security, effort, epic } = p;
              if (!["bug", "enhancement", "documentation"].includes(type)) { core.warning(`skipping epic proposal with unexpected type '${type}': ${title}`); continue; }

              const labels = [type, `epic:${epic.id}`];
              if (security === true) labels.push("security");
              if (["small", "medium", "large"].includes(effort)) labels.push(`effort:${effort}`);

              const childUrls = [];
              for (const childRepo of epic.repos) {
                try {
                  // epic:<id> is a brand-new label per epic — ensure it exists before use
                  // (issues.create errors on an unknown label), idempotent on repeat runs.
                  await github.rest.issues.createLabel({ owner, repo: childRepo, name: `epic:${epic.id}`, color: "ededed", description: `Child of cross-repo epic ${epic.id} — tracked in ${owner}/.github` }).catch(() => {});
                  const { data } = await github.rest.issues.create({ owner, repo: childRepo, title, body, labels });
                  core.info(`filed epic child: ${data.html_url}`);
                  childUrls.push(data.html_url);
                } catch (e) {
                  core.warning(`failed to file epic child in ${childRepo} for '${title}': ${e.message}`);
                }
              }
              if (!childUrls.length) { core.warning(`epic '${epic.id}' filed no children — skipping its tracking issue`); continue; }

              const trackingTitle = `Epic ${epic.id}: ${title}`;
              const trackingBody = [
                `Tracking issue for epic \`${epic.id}\` — closes automatically once every child below is closed (fabric-health.yml's epic reconciler).`,
                "",
                "Children:",
                ...childUrls.map((u) => `- [ ] ${u}`),
              ].join("\n");
              try {
                const openTracking = await github.paginate(github.rest.issues.listForRepo, { owner, repo: trackingRepo, state: "open", per_page: 100 });
                const existing = openTracking.find((i) => i.title === trackingTitle);
                if (existing) {
                  await github.rest.issues.update({ owner, repo: trackingRepo, issue_number: existing.number, body: trackingBody });
                  core.info(`refreshed epic tracking issue ${owner}/${trackingRepo}#${existing.number}`);
                } else {
                  await github.rest.issues.createLabel({ owner, repo: trackingRepo, name: "epic", color: "ededed", description: "Cross-repo epic tracking issue — not buildable work" }).catch(() => {});
                  const { data } = await github.rest.issues.create({ owner, repo: trackingRepo, title: trackingTitle, body: trackingBody, labels: ["epic", `epic:${epic.id}`, "tracking"] });
                  core.info(`filed epic tracking issue: ${data.html_url}`);
                }
              } catch (e) {
                core.warning(`failed to upsert epic tracking issue for '${epic.id}': ${e.message}`);
              }
            }

      # Deterministic on purpose (cardinal rule: script over model call whenever exact) —
      # we don't ask Claude to self-report which issues it filed; we just ask GitHub, scoped
      # to this run's time window. See the workflow-level comment for why this needs a PAT.
      - name: Auto-assign freshly filed issues to a coding agent
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true' && inputs.auto-assign-agent == true
        env:
          GH_TOKEN: ${{ secrets.AGENT_ASSIGN_PAT }}
          ASSIGNEE: ${{ inputs.agent-assignee }}
          SINCE: ${{ steps.scan-start.outputs.at }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::auto-assign-agent is true but AGENT_ASSIGN_PAT is not set — skipping assignment. Add it as an org/repo secret (a PAT, not the App token; see the workflow-level comment) to arm this."
            exit 0
          fi

          echo "Looking for issues fixer filed since $SINCE to assign to $ASSIGNEE..."
          # Scope to suxbot[bot]-authored issues, not just the time window: a human or another
          # workflow can file an issue in the same window this run is scanning, and a
          # created:>=SINCE search alone would sweep it in and auto-assign it too.
          mapfile -t issue_numbers < <(
            gh issue list --repo "${{ github.repository }}" --state open \
              --search "created:>=${SINCE}" --json number,author \
              --jq '.[] | select(.author.login == "suxbot[bot]") | .number'
          )

          if [ "${#issue_numbers[@]}" -eq 0 ]; then
            echo "No issues created since $SINCE — nothing to assign."
            exit 0
          fi

          for n in "${issue_numbers[@]}"; do
            echo "Assigning #$n to $ASSIGNEE..."
            if ! gh api "repos/${{ github.repository }}/issues/${n}/assignees" \
                   -f "assignees[]=${ASSIGNEE}" >/dev/null; then
              echo "::warning::Failed to assign #$n to $ASSIGNEE — likely means the agent isn't enabled on this repo, or AGENT_ASSIGN_PAT's owner doesn't have it enabled. Leaving the issue unassigned; the normal issue-build pipeline still picks it up."
            fi
          done

          # Never fail the run over this — assignment is a bonus, not the pipeline's job.
          exit 0
