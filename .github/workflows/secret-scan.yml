name: Secret scan (reusable)

# gitleaks over the full history. FAILS the build on any committed secret.
# Allowlist lives in .gitleaks.toml at the caller repo's root (create one if
# it doesn't exist — gitleaks-action works without it too, using its defaults).
#
# Caller:
#   uses: SuxOS/.github/.github/workflows/secret-scan.yml@main
#   secrets: inherit

on:
  workflow_call:
    inputs:
      gitleaks-config:
        description: "Path to the gitleaks config, relative to repo root. Empty to use gitleaks defaults."
        type: string
        default: ".gitleaks.toml"

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    # gitleaks-action@v2 posts a PR comment + uploads an artifact on top of the scan;
    # on the default read-only token (and on fork PRs, where GITHUB_TOKEN is
    # read-only regardless of what's requested) those API calls crash the job with
    # "Resource not accessible by integration" even on a CLEAN scan. Grant
    # pull-requests: write for same-repo PRs, and disable the comment/upload
    # side-channels so the check's pass/fail is purely the scan result.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: ${{ inputs.gitleaks-config != '' && format('{0}/{1}', github.workspace, inputs.gitleaks-config) || '' }}
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
