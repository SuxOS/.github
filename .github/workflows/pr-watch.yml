name: Stuck-PR watcher (reusable)

# Read-only visibility net for the autonomy pipeline. Lists open PRs and flags the
# ones that are silently stalled: BEHIND main, a failing required check, or green +
# mergeable but auto-merge never armed and idle > stale-hours. NEVER merges or
# mutates a PR. Maintains a single rolling tracking issue.
#
# Caller (needs its own schedule/dispatch triggers):
#   uses: SuxOS/.github/.github/workflows/pr-watch.yml@main
#   with: { stale-hours: "6" }
#   secrets: inherit

on:
  workflow_call:
    inputs:
      stale-hours:
        type: string
        default: "6"
      issue-title:
        type: string
        default: "Stuck PRs — pipeline watcher"

permissions:
  contents: read
  pull-requests: read
  issues: write
  checks: read
  statuses: read

concurrency:
  group: pr-watch-${{ github.workflow }}
  cancel-in-progress: true

env:
  STALE_HOURS: ${{ inputs.stale-hours }}

jobs:
  watch:
    name: Flag stuck PRs
    runs-on: ubuntu-latest
    steps:
      - name: Scan open PRs and upsert the tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ inputs.issue-title }}
        run: |
          set -euo pipefail

          prs=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --limit 100 \
            --json number,title,url,isDraft,labels,mergeStateStatus,autoMergeRequest,statusCheckRollup,updatedAt)

          if ! [[ "$STALE_HOURS" =~ ^[0-9]+$ ]]; then
            echo "::error::stale-hours must be a non-negative integer, got '${STALE_HOURS}'"
            exit 1
          fi

          now=$(date -u +%s)
          stale=$(( STALE_HOURS * 3600 ))

          stuck=$(echo "$prs" | jq -c --argjson now "$now" --argjson stale "$stale" '
            [ .[]
              | select(.isDraft | not)
              | select([.labels[].name] | index("hold") | not)
              | ([.statusCheckRollup[]? | (.conclusion // .state // "" | ascii_upcase)]) as $st
              | (($st | map(select(. == "FAILURE" or . == "ERROR" or . == "CANCELLED" or . == "TIMED_OUT" or . == "STARTUP_FAILURE")) | length) > 0) as $failing
              | (($now - (.updatedAt | fromdateiso8601)) >= $stale) as $isStale
              | ( if .mergeStateStatus == "BEHIND" then "behind main — needs rebase/update"
                  elif $failing then "failing required check"
                  elif (.mergeStateStatus == "CLEAN" and (.autoMergeRequest == null) and $isStale) then "green + mergeable but auto-merge not armed"
                  else null end ) as $reason
              | select($reason != null)
              | { number, title, url, reason: $reason, state: .mergeStateStatus }
            ]')

          count=$(echo "$stuck" | jq 'length')
          echo "stuck PRs: $count"
          echo "$stuck" | jq .

          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --limit 100 --json number,title \
            | jq -r --arg t "$ISSUE_TITLE" '[.[] | select(.title == $t) | .number] | first // empty')

          if [ "$count" -eq 0 ]; then
            if [ -n "$existing" ]; then
              gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" \
                --body "All clear — no stuck PRs as of $(date -u '+%Y-%m-%d %H:%M UTC'). Closing."
              gh issue close "$existing" --repo "$GITHUB_REPOSITORY"
              echo "closed stale tracking issue #$existing"
            else
              echo "no stuck PRs, no tracking issue — nothing to do"
            fi
            exit 0
          fi

          rows=$(echo "$stuck" | jq -r '.[] | "| [#\(.number)](\(.url)) | \(.state) | \(.reason) | \(.title | gsub("\\|"; "\\|")) |"')
          body=$(printf '%s\n' \
            "Auto-maintained by the stuck-PR watcher (${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/workflows/pr-watch.yml). Refreshed $(date -u '+%Y-%m-%d %H:%M UTC'); auto-closes when all clear." \
            "" \
            "These open PRs are stalled and will not merge on their own:" \
            "" \
            "| PR | Merge state | Why it's stuck | Title |" \
            "|----|-------------|----------------|-------|" \
            "$rows" \
            "" \
            "- **behind main** → rebase/update the branch onto main." \
            "- **failing required check** → fix CI (or the autofix bot handles it, if eligible)." \
            "- **auto-merge not armed** → add an eligible label / conventional title, or enable auto-merge.")

          if [ -n "$existing" ]; then
            gh issue edit "$existing" --repo "$GITHUB_REPOSITORY" --body "$body"
            echo "refreshed tracking issue #$existing"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$ISSUE_TITLE" --body "$body"
            echo "opened tracking issue"
          fi
