name: Issue build — grab top-priority issues, one builder, one PR (reusable)

# The BUILDER — second stage of the backlog pipeline (fixer proposes -> this builds).
# Rewritten 2026-07-15 (docs/design/three-loop-pipeline.md): the fragile Claude "cluster"
# pass is GONE. It asked one read-only session to view up to 50 candidates and emit a
# grouping plan as structured output in 12 turns — it couldn't, ended without the tool
# call, and the run built nothing. Collation and building are the same act, so we don't
# split them: hand the top-priority issues to ONE builder and it collates for free while
# it plans the work.
#
# GRAB TOP TIER, ALWAYS BUILD:
#   1. select (deterministic shell — no LLM): from open buildable issues (trusted author,
#      not building/hold/needs-human), take the highest NON-EMPTY priority tier —
#      HIGH (`priority:high` or `security`) else MED (`priority:med`) else LOW (everything
#      else — the floor, so there is always something to build). Pack oldest-first by
#      `effort:small|medium|large` points (1/2/4; unlabeled = medium) against
#      `effort-budget`, capped at `max-issues` either way — a bundle sized by real work, not
#      just issue count. Claim each (`building`) so a concurrent run can't double-process it.
#      Build on sonnet by default; auto-escalates to opus only when the batch itself carries
#      `security` or `effort:large` (a sensed signal, not a blind auto-escalation) — or force
#      either way with `model-hint`. Turns scale with the batch's effort points.
#   2. build (ONE job — not a matrix): one Claude session gets all N issue numbers, makes
#      the optimal build plan, implements them as ONE coherent change (fanning out to its
#      own subagents for issues that are independent), runs the repo's gates, and opens ONE
#      PR that Closes every issue. The PR flows into the normal auto-merge path
#      (automerge.yml arms it on green + not-`hold`). No commit -> claims released, retried
#      next run.
#
# Safe Outputs: the only issue/PR/label mutations are in deterministic shell; the model
# step writes code on a throwaway branch that a human/CI gates before merge.
# Subscription auth (CLAUDE_CODE_OAUTH_TOKEN) — inert until that secret is set.
#
# Caller (batched schedule + manual dispatch — NOT an `issues:` trigger; per-event fan-out
# caused the 77-parallel-session incident, SuxOS/.github#140):
#   uses: SuxOS/.github/.github/workflows/issue-build.yml@main
#   with: { gates-summary: "..." }
#   secrets: inherit

on:
  workflow_call:
    inputs:
      # --- KNOBS: all deterministic (the orchestrator must be deterministic even though the
      #     builder isn't). include/exclude/max-issues/effort-budget/model-hint/speed are all
      #     applied in the select step; NONE of them reach the model. How to execute the batch
      #     (serial/parallel/staged, per-issue depth) is the builder's own call — see §3.1.5 —
      #     the orchestrator only decides WHICH issues and WHICH model/turn budget. ---
      max-issues:
        description: "Batch-size max: issues pulled into one build/PR per run, oldest-first within the chosen tier."
        type: number
        # Governor-as-ceiling (operator decision 2026-07-15): the budget-governor's weekly
        # runner-minute cap is the real throttle, so this batch size is set for throughput,
        # not spend-avoidance. In-session Task-tool subagent fan-out (NOT git worktrees — this
        # job is one shared checkout, one branch; the builder's own disjoint-files judgment is
        # the collision filter, not filesystem isolation) lets one builder carry a wide batch.
        # The governor stands the whole stage down at red before spend runs away. Was 8, then
        # 20; raised again 2026-07-15 for a 24h/15min-cadence drain — turns cap and job timeout
        # below were raised together, since turns (not issue count) saturates first otherwise.
        default: 40
      effort-budget:
        description: >-
          Points budget for the bundle, oldest-first within the chosen tier: small=1,
          medium=2 (the default for an issue with no effort:* label), large=4. Sized so
          the batch reflects actual work, not just issue count — a few large issues fill
          it as fast as many small ones. Selection stops at whichever of max-issues or
          effort-budget is hit first (both are hard caps).
        type: number
        default: 80
      flood-threshold:
        description: "Open bot-PR count at which mid-build feature observations stand down (flood-guard backpressure); bug/security/doc observations always file."
        type: number
        default: 8
      include:
        description: "Comma-list of labels; if set, only issues carrying at least one are eligible (also does priority, e.g. `priority:high` or `bug,security`)."
        type: string
        default: ""
      exclude:
        description: "Comma-list of labels; issues carrying any are dropped (e.g. `enhancement,wontfix`)."
        type: string
        default: ""
      model-hint:
        description: "`auto` = the design builder model (sonnet); or force `opus`/`sonnet`/`haiku` for this run."
        type: string
        default: "auto"
      speed:
        description: "`thorough` = full turn budget; `fast` = trimmed (cheaper, quicker)."
        type: string
        default: "thorough"
      simple-model:
        description: "Builder model when model-hint=auto (the design default; Opus is reserved for the nightly audits — opt into it per-run via model-hint=opus)."
        type: string
        default: "sonnet"
      base-max-turns:
        description: "Turn budget floor for the build session; scaled up by issue count, then by speed."
        type: number
        default: 50
      gates-summary:
        description: "Human-readable list of gates the change must pass before it pushes."
        type: string
        default: "the repo's lint/type-check/test/build commands"

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: issue-build-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  select:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      numbers: ${{ steps.pick.outputs.numbers }}
      count: ${{ steps.pick.outputs.count }}
      tier: ${{ steps.pick.outputs.tier }}
      model: ${{ steps.pick.outputs.model }}
      turns: ${{ steps.pick.outputs.turns }}
    steps:
      - name: Preflight — need the token
        id: pre
        run: |
          if [ "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}" != "true" ]; then
            echo "CLAUDE_CODE_OAUTH_TOKEN not set → issue-build inert"; echo "go=false" >> "$GITHUB_OUTPUT"
          else echo "go=true" >> "$GITHUB_OUTPUT"; fi

      # Builds drain the in-flight backlog, so they run at yellow and stand down only at red.
      - name: Check autonomy throttle
        id: throttle
        uses: SuxOS/.github/.github/actions/check-throttle@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          defer-at: "red"

      - name: Mint app token
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      # Real JS via the org's already-pinned actions/github-script (matches audit.yml /
      # sux/deploy.yml / sux/health.yml), not jq-in-bash. This was the most complex shell in
      # the pipeline (a jq reduce doing greedy bin-packing) — bash/jq quoting and word-splitting
      # are a real, recurring source of pipeline bugs in this repo (operator feedback,
      # 2026-07-15); a real language with try/catch and no shell-escaping surface is the fix,
      # not a cleverer bash incantation. Also gets a job-summary for free (real observability,
      # not another log line to grep).
      - name: Reap stale claims, then select the top-priority build batch
        id: pick
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          REAP_STALE_HOURS: "2"
          MAX_ISSUES: ${{ inputs.max-issues }}
          EFFORT_BUDGET: ${{ inputs.effort-budget }}
          INCLUDE: ${{ inputs.include }}
          EXCLUDE: ${{ inputs.exclude }}
          MODEL_HINT: ${{ inputs.model-hint }}
          SPEED: ${{ inputs.speed }}
          SIMPLE_MODEL: ${{ inputs.simple-model }}
          BASE_TURNS: ${{ inputs.base-max-turns }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { owner, repo } = context.repo;
            const maxIssues = Number(process.env.MAX_ISSUES);
            const effortBudget = Number(process.env.EFFORT_BUDGET);
            const reapHours = Number(process.env.REAP_STALE_HOURS);
            const include = (process.env.INCLUDE || "").split(",").filter(Boolean);
            const exclude = (process.env.EXCLUDE || "").split(",").filter(Boolean);

            // 1. Reap: an issue stuck in `building` with no activity for >reapHours is an
            //    orphan from a build run that crashed after claiming — drop the claim.
            const stale = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: "open", labels: "building", per_page: 100,
            });
            const now = Date.now();
            for (const issue of stale) {
              const ageH = (now - new Date(issue.updated_at).getTime()) / 3_600_000;
              if (ageH >= reapHours) {
                core.info(`reaping orphaned building issue #${issue.number} (idle ${ageH.toFixed(1)}h)`);
                await github.rest.issues.removeLabel({ owner, repo, issue_number: issue.number, name: "building" }).catch(() => {});
              }
            }

            // 2. Select. listForRepo also returns PRs (drop entries with a pull_request key).
            const all = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: "open", per_page: 100,
            });

            const buildable = all.filter((i) => {
              if (i.pull_request) return false;
              const labels = i.labels.map((l) => l.name);
              if (["building", "hold", "needs-human"].some((l) => labels.includes(l))) return false;
              const trusted = ["OWNER", "MEMBER", "COLLABORATOR"].includes(i.author_association) || i.user.login === "suxbot[bot]";
              if (!trusted) return false;
              if (include.length > 0 && !include.some((l) => labels.includes(l))) return false;
              if (exclude.length > 0 && exclude.some((l) => labels.includes(l))) return false;
              return true;
            }).map((i) => ({ number: i.number, labels: i.labels.map((l) => l.name) }));

            // Effort points: small=1, medium=2 (also the default for an unlabeled issue — most
            // of today's backlog predates the effort:* label), large=4. Deterministic lookup —
            // the estimate was already made by whichever session (fixer / a prior build's
            // observation-capture) filed the issue; no model call happens here.
            const pointsFor = (labels) => (labels.includes("effort:large") ? 4 : labels.includes("effort:small") ? 1 : 2);

            const high = buildable.filter((i) => i.labels.includes("priority:high") || i.labels.includes("security"));
            const med = buildable.filter((i) => i.labels.includes("priority:med"));
            const low = buildable.filter((i) => !high.includes(i) && !med.includes(i));
            const [tier, set] = high.length > 0 ? ["high", high] : med.length > 0 ? ["med", med] : ["low", low];

            // Greedy pack, oldest-first: keep adding while under BOTH caps (count, points).
            // Always take at least one issue even if its own points exceed the budget alone —
            // "always build at least one thing" (three-loop-pipeline.md) is never overridden
            // by the effort budget (verified: a lone effort:large issue still gets picked
            // even when its 4pts alone exceed a 2pt budget).
            const sorted = [...set].sort((a, b) => a.number - b.number).map((i) => ({ ...i, pts: pointsFor(i.labels) }));
            const picked = [];
            let points = 0;
            for (const it of sorted) {
              if (picked.length >= maxIssues) break;
              if (picked.length === 0) { picked.push(it); points += it.pts; continue; }
              if (points + it.pts <= effortBudget) { picked.push(it); points += it.pts; continue; }
              break;
            }
            const sensedOpus = picked.some((i) => i.labels.includes("security") || i.labels.includes("effort:large"));

            core.info(`selected tier=${tier} count=${picked.length} points=${points}/${effortBudget} sensedOpus=${sensedOpus} issues=${JSON.stringify(picked.map((i) => i.number))}`);

            // Model: auto = sonnet by default (three-loop-pipeline.md — Sonnet is near-Opus on
            // codegen with CI + security-review gating every resulting PR); auto-ESCALATES to
            // opus only on the sensed signal above (security or effort:large in the selected
            // batch) — reusing data already computed for tier/points, not a new judgment call.
            // model-hint always overrides sensing in either direction.
            const modelHint = process.env.MODEL_HINT;
            let model;
            if (modelHint === "auto") {
              model = sensedOpus ? "opus" : process.env.SIMPLE_MODEL;
              if (sensedOpus) core.info("sensed security/large-effort in batch -> auto-escalating to opus");
            } else {
              model = modelHint;
            }

            // Turns scale with selected effort points (not raw issue count — a few large
            // issues cost as much attention as many small ones), then speed. 10 turns/point is
            // a drop-in equivalent of the old 20-turns/issue formula at the medium (2pt)
            // default. Cap 500: turn budget, not issue count or wall-clock, is what actually
            // saturates first on a wide batch; a batch above the cap still runs on a flatter
            // per-point budget past it. The job's own 30min timeout (not the turns cap) is the
            // real backstop against a runaway session — see the build job for that reasoning.
            let turns = Number(process.env.BASE_TURNS) + 10 * points;
            if (process.env.SPEED === "fast") turns = Math.floor(turns / 2);
            turns = Math.max(10, Math.min(500, turns));

            // Claim each selected issue so a concurrent run can't double-process it.
            for (const i of picked) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: i.number, labels: ["building"] }).catch(() => {});
            }

            core.setOutput("numbers", JSON.stringify(picked.map((i) => i.number)));
            core.setOutput("count", String(picked.length));
            core.setOutput("tier", tier);
            core.setOutput("model", model);
            core.setOutput("turns", String(turns));

            await core.summary
              .addHeading("issue-build: select", 3)
              .addTable([
                [{ data: "tier", header: true }, { data: "count", header: true }, { data: "points", header: true }, { data: "model", header: true }, { data: "turns", header: true }],
                [tier, String(picked.length), `${points}/${effortBudget}`, model, String(turns)],
              ])
              .addDetails("issues in this batch", picked.map((i) => `#${i.number}`).join(", ") || "(none)")
              .write();

  build:
    needs: select
    if: needs.select.outputs.count != '' && needs.select.outputs.count != '0'
    runs-on: ubuntu-latest
    # 45 -> 90 -> 30 (2026-07-15, same day): 90 was raised defensively alongside the turns cap
    # (300 -> 500) without real data. Actual runs at the 500-turn cap on 17-19 issue batches
    # completed in 6.5-15 minutes (SuxOS/sux run 29430528029, SuxOS/suxrouter run 29430530912)
    # — the Claude step is API-latency-bound, not something a bigger timeout makes faster. 30min
    # is ~2x observed worst case, a real backstop against a runaway session rather than an
    # unverified guess. The build prompt (step 1, PLAN) now tells the model its actual budget
    # and to trim scope proactively rather than risk the timeout — losing whatever isn't yet
    # committed+pushed is still possible, just meant to be rare, not routine.
    timeout-minutes: 30
    steps:
      - name: Mint app token
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      - name: Checkout default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Create build branch
        id: branch
        env:
          # Deterministic + unique per run — no model-authored value in the branch name, so no
          # injection surface (unlike the old cluster-authored branch).
          BRANCH: bot/issue-build-${{ github.run_id }}
        run: |
          set -euo pipefail
          git checkout -B "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      # Give the builder real symbol-aware navigation instead of grep-and-hope. Runner starts
      # clean each time (no local plugin config carries over), so nothing is set up unless this
      # step does it. Gated on tsconfig.json — a non-TS repo (e.g. suxrouter) skips entirely.
      # Installs real deps (npm ci) BEFORE the Claude session starts so the language server
      # resolves actual project types from turn one, not bare syntax.
      - name: Set up TypeScript language server (if this repo is TS-shaped)
        id: lsp
        run: |
          set -euo pipefail
          if [ -f tsconfig.json ]; then
            npm ci --no-audit --no-fund
            npm install -g typescript-language-server typescript
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Claude — plan and build the batch into one PR
        id: claude
        env:
          # Only real env vars the SDK itself reads go here. claude-code-action's `prompt:`
          # is a plain string handed to the action — it is NOT a shell context, so bare $VAR
          # references are never substituted (confirmed: an earlier version of this prompt
          # shipped literal, unsubstituted "$COUNT"/"$TIER"/"$ISSUE_NUMBERS" text to Claude on
          # every run, which is why builds silently produced nothing). The documented pattern
          # (docs/custom-automations.md) is GitHub Actions `${{ }}` expressions written
          # directly inline in the prompt string below — no env-var indirection needed.
          ENABLE_PROMPT_CACHING_1H: "1"
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_bots: suxbot[bot]
          prompt: |
            You are the builder. These ${{ needs.select.outputs.count }} open issues (priority
            tier: ${{ needs.select.outputs.tier }}) are yours to ship in ONE pull request on the
            current branch: ${{ needs.select.outputs.numbers }}

            Read each with `gh issue view <n>`. Then:

            1. PLAN — your call, not a prescribed shape. You have a turn budget of
               ${{ needs.select.outputs.turns }} and this job is killed at 30 minutes wall-clock
               no matter what — that's a hard stop, and anything not committed+pushed by then is
               lost, so plan to comfortably finish inside it, not to exactly fill it. Pick
               whatever execution shape actually fits this specific batch:
                 - Independent issues (disjoint files, no ordering dependency) are usually best
                   fanned out to Task-tool subagents in parallel, one per issue or tight group —
                   this is the common case and a reasonable default when you're not sure.
                 - Issues that touch the same files or depend on each other are done together,
                   serially, in order, to stay coherent — don't parallelize what isn't independent.
                 - A batch with a couple of genuinely hard/risky issues among easy ones can
                   benefit from a first fast pass on the easy majority, then a slower, more
                   careful second pass on the hard remainder once you've seen the rest of the
                   codebase — use that shape if it fits, don't force it if it doesn't.
               Collate naturally across the batch: dedupe overlapping work, and drop an issue
               from THIS PR if it turns out unbuildable, would conflict, or you're running short
               on turns/time and it's the lowest-value remaining piece — note which and why in
               your final message; a dropped issue keeps its claim released and gets retried
               later (by this builder or a future one, possibly with a different model if it's
               since been marked effort:large or security). Shipping most of the batch solidly
               beats risking all of it on an over-ambitious plan.

            2. BUILD. Make the smallest correct change for each issue. Do NOT touch secrets, do
               NOT weaken a test to make it pass, do NOT touch code unrelated to these issues.
               ${{ steps.lsp.outputs.ready == 'true' && 'A TypeScript language server is running for this repo — prefer the LSP tool (goToDefinition/findReferences/hover) over grep for navigating symbols, checking call sites before a rename, and confirming types.' || '' }}

            3. GATE. All of these must pass before you commit:
               ${{ inputs.gates-summary }}
               Commit (conventional-commit message referencing the issues) and push to this
               branch. One coherent commit history for the batch is fine.

            4. CAPTURE INSIGHT (secondary — only after the build is done and pushed; skip if you
               couldn't finish the build). While working these issues you have the deepest view
               of this code anyone will have today. Don't waste it. If you noticed something
               genuinely worth a SEPARATE follow-up — a real bug OUT OF SCOPE of this batch, a
               concrete feature/improvement the code is asking for, a durable lesson about how
               this repo works that future work should know — record it so the pipeline can act
               on it later. Write a JSON array to the file `${{ runner.temp }}/observations.json`
               using the Write tool (absolute path, OUTSIDE the repo tree so it is never
               committed). Each element: {"title": short imperative, "body": what/why with
               file:line refs, "type": one of "bug"|"enhancement"|"documentation", "security":
               true/false, "effort": your rough gut estimate — "small"|"medium"|"large" (sizes
               how much work it looks like; only affects future batch sizing, not a commitment)}.
               A lesson-worth-recording is a "documentation" observation. Rules:
               at most 3 — the best ones, not a brain-dump; nothing already covered by an open
               issue (check `gh issue list --state open --limit 300` first); nothing that is
               just one of the issues you already built. If you have nothing that clears that
               bar, write `[]` or skip the file entirely — an empty capture is correct and
               better than noise. This is strictly secondary: never spend build turns you need
               for the gates on it.

            If you get the gates passing, finish normally — a later step opens the PR. If you
            can't get them green (genuine design problem, missing context), do NOT push a broken
            commit — say so clearly in your final message and explain what's blocking it.
          # BUILD legitimately writes code, pushes, and fans out to subagents — tools stay broad.
          # bypassPermissions: a headless CI run has no human to satisfy the interactive
          # per-command approval gate (confirmed live: a build session hung retrying `env`,
          # burning turns until timeout, never producing a commit). Matches this org's own
          # ship-and-roll-back trust model (three-loop-pipeline.md) — CI + security-review
          # still gate the merge.
          claude_args: "--max-turns ${{ needs.select.outputs.turns }} --model ${{ needs.select.outputs.model }} --permission-mode bypassPermissions"

      - name: Push and open ONE PR, or release claims on failure
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.branch.outputs.name }}
          TIER: ${{ needs.select.outputs.tier }}
          ISSUE_NUMBERS_JSON: ${{ needs.select.outputs.numbers }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          nums=$(echo "$ISSUE_NUMBERS_JSON" | jq -r '.[]')

          # Only real success is a commit ahead of base — a dirty/uncommitted tree is a failure.
          if [ -z "$(git log "origin/${BASE_BRANCH}"..HEAD 2>/dev/null)" ]; then
            echo "no commits produced → build session couldn't finish; releasing claims"
            for n in $nums; do
              gh issue edit "$n" --repo "$GITHUB_REPOSITORY" --remove-label building 2>/dev/null || true
              gh issue comment "$n" --repo "$GITHUB_REPOSITORY" \
                --body "🤖 Auto-build attempted this issue in a batch but couldn't get the gates green. Released the \`building\` claim so a later run retries it. Run: $RUN_URL" 2>/dev/null || true
            done
            exit 0
          fi

          git push -f origin "$BRANCH"

          closes=$(for n in $nums; do echo "Closes #$n"; done)
          title="build: drain ${TIER}-priority backlog ($(echo "$nums" | wc -w | tr -d ' ') issues)"
          body=$(printf 'Batch build of the %s-priority backlog.\n\n%s\n\n%s\n\nRun: %s' \
            "$TIER" "$closes" "🤖 Opened automatically by issue-build.yml." "$RUN_URL")

          # automerge.yml arms native auto-merge on any non-draft, non-hold PR once required
          # checks (CI + security-review) go green. Add `hold` to stop that.
          gh pr create --repo "$GITHUB_REPOSITORY" --base "$BASE_BRANCH" --head "$BRANCH" \
            --title "$title" --body "$body"

          # Release claims; the PR's `Closes #n` closes each issue on merge.
          for n in $nums; do
            gh issue edit "$n" --repo "$GITHUB_REPOSITORY" --remove-label building 2>/dev/null || true
          done

      # Backpressure for the observations below: if the bot's PR queue is already deep, don't
      # let the builder pile MORE feature work on top (bug/security/doc observations still flow).
      - name: Flood guard
        id: flood
        if: always()
        uses: SuxOS/.github/.github/actions/flood-guard@main
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          threshold: ${{ inputs.flood-threshold }}

      # The builder may have written mid-build observations (a bug out of scope, a feature the
      # code is asking for, a durable lesson) to a file OUTSIDE the repo tree. This is the ONLY
      # step that files them — the model has no gh-write access to issues here. Model-authored
      # content is parsed as real JSON (real language, no shell quoting/word-splitting surface),
      # type is re-validated against an allowlist, enhancements are dropped under flood
      # backpressure, and the whole thing is capped — the Safe Outputs pattern, identical in
      # shape to fixer.yml. Best-effort: a missing/empty/malformed file is a green no-op (the
      # build already shipped either way).
      - name: File builder observations
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          FEATURES_OK: ${{ steps.flood.outputs.features-ok }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;
            const obsFile = `${process.env.RUNNER_TEMP}/observations.json`;
            const MAX_OBS = 3;

            if (!fs.existsSync(obsFile)) { core.info("no observations file → nothing to file"); return; }
            let raw;
            try { raw = JSON.parse(fs.readFileSync(obsFile, "utf8")); } catch { core.warning("observations file is not valid JSON — ignoring"); return; }
            if (!Array.isArray(raw)) { core.warning("observations file is not a JSON array — ignoring"); return; }

            const filed = [];
            for (const p of raw.slice(0, MAX_OBS)) {
              const { title, body, type, security, effort } = p || {};
              if (!title || !body) { core.warning(`skipping observation with empty title/body`); continue; }
              if (!["bug", "enhancement", "documentation"].includes(type)) { core.warning(`skipping observation with unexpected type '${type}': ${title}`); continue; }
              if (type === "enhancement" && process.env.FEATURES_OK === "false") { core.info(`flood guard active → holding feature observation: ${title}`); continue; }

              const labels = [type];
              if (security === true) labels.push("security");
              // Missing/invalid effort is not fatal — select's default (medium) covers it.
              if (["small", "medium", "large"].includes(effort)) labels.push(`effort:${effort}`);

              try {
                const { data } = await github.rest.issues.create({ owner, repo, title, body, labels });
                core.info(`filed observation: ${data.html_url}`);
                filed.push(data.html_url);
              } catch (e) {
                core.warning(`failed to file observation (non-fatal): ${title} — ${e.message}`);
              }
            }
            // Never fail the run over observations — the build already shipped.
            if (filed.length > 0) {
              await core.summary.addHeading("issue-build: observations filed", 3).addList(filed).write();
            }
