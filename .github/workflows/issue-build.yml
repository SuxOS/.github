name: Issue build — grab top-priority issues, one builder, one PR (reusable)

# The BUILDER — second stage of the backlog pipeline (fixer proposes -> this builds).
# Rewritten 2026-07-15 (docs/design/three-loop-pipeline.md): the fragile Claude "cluster"
# pass is GONE. It asked one read-only session to view up to 50 candidates and emit a
# grouping plan as structured output in 12 turns — it couldn't, ended without the tool
# call, and the run built nothing. Collation and building are the same act, so we don't
# split them: hand the top-priority issues to ONE builder and it collates for free while
# it plans the work.
#
# GRAB TOP TIER, ALWAYS BUILD:
#   1. select (deterministic shell — no LLM): from open buildable issues (trusted author,
#      not building/hold/needs-human), take the highest NON-EMPTY priority tier —
#      HIGH (`priority:high` or `security`) else MED (`priority:med`) else LOW (everything
#      else — the floor, so there is always something to build). Pack oldest-first by
#      `effort:small|medium|large` points (1/2/4; unlabeled = medium) against
#      `effort-budget`, capped at `max-issues` either way — a bundle sized by real work, not
#      just issue count. Claim each (`building`) so a concurrent run can't double-process it.
#      Build on sonnet by default; auto-escalates to opus only when the batch itself carries
#      `security` or `effort:large` (a sensed signal, not a blind auto-escalation) — or force
#      either way with `model-hint`. Turns scale with the batch's effort points.
#   2. build (ONE job — not a matrix): one Claude session gets all N issue numbers, makes
#      the optimal build plan, implements them as ONE coherent change (fanning out to its
#      own subagents for issues that are independent), runs the repo's gates, and opens ONE
#      PR that Closes every issue. The PR flows into the normal auto-merge path
#      (automerge.yml arms it on green + not-`hold`). No commit -> claims released, retried
#      next run.
#
# Safe Outputs: the only issue/PR/label mutations are in deterministic shell; the model
# step writes code on a throwaway branch that a human/CI gates before merge.
# Subscription auth (CLAUDE_CODE_OAUTH_TOKEN) — inert until that secret is set.
#
# Caller (batched schedule + manual dispatch — NOT an `issues:` trigger; per-event fan-out
# caused the 77-parallel-session incident, SuxOS/.github#140):
#   uses: SuxOS/.github/.github/workflows/issue-build.yml@main
#   with: { gates-summary: "..." }
#   secrets: inherit

on:
  workflow_call:
    inputs:
      # --- KNOBS: all deterministic (the orchestrator must be deterministic even though the
      #     builder isn't). include/exclude/max-issues/effort-budget/model-hint/speed are all
      #     applied in the select step; NONE of them reach the model. How to execute the batch
      #     (serial/parallel/staged, per-issue depth) is the builder's own call — see §3.1.5 —
      #     the orchestrator only decides WHICH issues and WHICH model/turn budget. ---
      max-issues:
        description: "Batch-size max: issues pulled into one build/PR per run, oldest-first within the chosen tier."
        type: number
        # Governor-as-ceiling (operator decision 2026-07-15): the budget-governor's weekly
        # runner-minute cap is the real throttle, so this batch size is set for throughput,
        # not spend-avoidance. In-session Task-tool subagent fan-out (NOT git worktrees — this
        # job is one shared checkout, one branch; the builder's own disjoint-files judgment is
        # the collision filter, not filesystem isolation) lets one builder carry a wide batch.
        # The governor stands the whole stage down at red before spend runs away. Was 8, 20,
        # 40, 24, 10; shrunk to 3 (2026-07-15, operator: target 2-3 issues/batch) — now that
        # `select` is the only serialized phase and `build` runs unlocked, real wall-clock
        # throughput comes from MORE small concurrent batches (real per-runner isolation,
        # small failure blast radius) rather than one big batch's internal subagent fan-out
        # (shared checkout, trusted-not-verified disjointness). Dynamic expand (§3.1.5) still
        # lets a builder push higher when the work in its own batch is light.
        default: 3
      effort-budget:
        description: >-
          Points budget for the bundle, oldest-first within the chosen tier (spilling into
          lower tiers once the top tier is exhausted — see select): small=1, medium=2 (the
          default for an issue with no effort:* label), large=4. Sized so the batch reflects
          actual work, not just issue count — a few large issues fill it as fast as many
          small ones. Selection stops at whichever of max-issues or effort-budget is hit
          first (both are hard caps). Also the unit the `requeue` job divides remaining
          backlog by to decide how many parallel batches to fire.
        type: number
        # 80 -> 48 -> 16 -> 6 (2026-07-15, operator: target 2-3 issues/batch): shrunk alongside
        # max-issues so a typical backlog splits into more concurrent small batches instead of
        # one big serial one — see max-issues above and `parallel-batches` below.
        default: 6
      parallel-batches:
        description: >-
          Max concurrent issue-build runs (this run plus requeued ones) for one repo.
          The `requeue` job counts currently in-flight runs and only dispatches enough
          more to reach this cap, sized against remaining backlog / effort-budget — so a
          big backlog gets genuine wall-clock parallelism (separate runners, separate
          checkouts, small per-batch failure blast radius) while spend stays bounded and
          predictable rather than growing with an ever-larger single session.
        type: number
        # 4 -> 2 (2026-07-15, operator: "don't run too hot"): with max-issues/effort-budget
        # shrunk to target 2-3 issues/batch, 4 concurrent batches meant up to 4 open PRs
        # racing the same base at once — strict branch protection means any PR sitting open
        # while a sibling merges risks a genuine (non-fast-forward) conflict, not just BEHIND,
        # and pr-auto-update's rebase can't clear those (observed live: 7 PRs stuck `dirty`
        # for 40+ minutes with no auto-resolver — closed and released back to backlog).
        # 2 concurrent batches keeps real wall-clock parallelism while halving collision odds.
        default: 2
      flood-threshold:
        description: "Open bot-PR count at which mid-build feature observations stand down (flood-guard backpressure); bug/security/doc observations always file."
        type: number
        default: 8
      include:
        description: "Comma-list of labels; if set, only issues carrying at least one are eligible (also does priority, e.g. `priority:high` or `bug,security`)."
        type: string
        default: ""
      exclude:
        description: "Comma-list of labels; issues carrying any are dropped (e.g. `enhancement,wontfix`)."
        type: string
        default: ""
      model-hint:
        description: "`auto` = tier-sensed model (opus on HIGH/large-effort, else sonnet); or force `opus`/`sonnet`/`haiku` for this run. Default is `sonnet` (operator directive 2026-07-17: sonnet pinned org-wide, no Opus escalation) — `auto` is opt-in per caller/run."
        type: string
        default: "sonnet"
      speed:
        description: "`thorough` = full turn budget; `fast` = trimmed (cheaper, quicker)."
        type: string
        default: "thorough"
      simple-model:
        description: "Builder model when model-hint=auto (the design default; Opus is reserved for the nightly audits — opt into it per-run via model-hint=opus)."
        type: string
        default: "sonnet"
      base-max-turns:
        description: "Turn budget floor for the build session; scaled up by issue count, then by speed."
        type: number
        default: 50
      gates-summary:
        description: "Human-readable list of gates the change must pass before it pushes."
        type: string
        default: "the repo's lint/type-check/test/build commands"
      needs-suxlib:
        description: >-
          This caller's package.json has a "file:../suxlib" dependency on the private
          SuxOS/suxlib sibling repo, so the build sandbox must clone it before `npm ci`
          (mirrors sux/.github/workflows/ci.yml's own "Clone suxlib" step — mint-app-token's
          token is scoped to the calling repo only, not org-wide, despite the suxbot App
          installation covering all repos). Opt-in and false by default: only a caller that
          actually has this dependency should pay for (or risk) the extra clone.
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  id-token: write

# NO top-level concurrency: the whole run must NOT serialize, or parallel batches can't run.
# Only `select` (the claim step) is serialized — see its job-level concurrency below — so two
# runs never claim overlapping issues, while their `build` jobs run concurrently on separate
# runners/checkouts. That per-runner isolation (not one big session's trusted-disjoint subagent
# fan-out) is where real throughput comes from; the `requeue` job fans out up to
# `parallel-batches` concurrent runs against the remaining backlog.

jobs:
  select:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    # Serialize ONLY the claim step across the repo: two selects running at once could both
    # read an issue as unclaimed and double-claim it (the classic claim race). cancel-in-progress
    # false so a queued select waits its turn rather than being dropped — every dispatched batch
    # gets to claim its own disjoint slice. build/requeue are intentionally NOT in this group.
    concurrency:
      group: issue-build-select-${{ github.workflow }}
      cancel-in-progress: false
    outputs:
      numbers: ${{ steps.pick.outputs.numbers }}
      count: ${{ steps.pick.outputs.count }}
      tier: ${{ steps.pick.outputs.tier }}
      model: ${{ steps.pick.outputs.model }}
      subagent_model: ${{ steps.pick.outputs.subagent_model }}
      effort: ${{ steps.pick.outputs.effort }}
      turns: ${{ steps.pick.outputs.turns }}
      # Spine signal outputs (docs/design/2026-07-18-value-ranking-selection-design.md §2.1,
      # #452): raw fabric-status.json fields, fail-soft (spine_available=false on any miss).
      # Not consumed by `pick` yet — that's the score-sort slice
      # (docs/design/2026-07-18-value-ranking-score-spec.md §5), a separate follow-up issue.
      spine_available: ${{ steps.spine.outputs.available }}
      spine_backlog_total: ${{ steps.spine.outputs.backlog_total }}
      spine_workflow_red_total: ${{ steps.spine.outputs.workflow_red_total }}
      spine_collection_ok: ${{ steps.spine.outputs.collection_ok }}
    steps:
      - name: Preflight — need the token
        id: pre
        run: |
          if [ "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}" != "true" ]; then
            echo "CLAUDE_CODE_OAUTH_TOKEN not set → issue-build inert"; echo "go=false" >> "$GITHUB_OUTPUT"
          else echo "go=true" >> "$GITHUB_OUTPUT"; fi

      # Builds drain the in-flight backlog, so they run at yellow and stand down only at red.
      - name: Check autonomy throttle
        id: throttle
        uses: SuxOS/.github/.github/actions/check-throttle@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          defer-at: "red"

      - name: Mint app token
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      - name: Mint app token for spine signal read (SuxOS/.github)
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        id: spine-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}
          owner: SuxOS
          repositories: .github

      # Cross-workflow spine signal fetch (docs/design/2026-07-18-value-ranking-selection-design.md
      # §2.1, #452): fabric-health.yml uploads fabric-status.json from a DIFFERENT workflow/run
      # (self-fabric-health.yml in SuxOS/.github, 15-min cron), so this is a cross-repo/cross-run
      # `gh run`/artifact lookup, not a same-run artifact reference. select runs for every caller
      # repo with no per-repo blast-radius limit (this repo's own CLAUDE.md), so EVERY failure
      # path below degrades to available=false and continues rather than failing the build.
      # Every command-substitution assignment is `|| true`-guarded per this repo's CLAUDE.md note
      # that `run:` steps execute under `-e` regardless of this script's own `set` line, so an
      # unguarded failed pipeline would otherwise abort the step instead of falling through to
      # the degrade path. Nothing downstream consumes these outputs yet — that's the score-sort
      # slice (docs/design/2026-07-18-value-ranking-score-spec.md), a separate follow-up issue;
      # this step only lands the raw signal so that slice has real data to read.
      - name: Fetch fabric-status.json spine signal (fail-soft)
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        id: spine
        env:
          GH_TOKEN: ${{ steps.spine-token.outputs.token }}
        run: |
          set -uo pipefail
          available=false
          backlog_total=""
          workflow_red_total=""
          collection_ok=""
          age_min=""
          reason=""

          run_id=$( { gh run list --repo SuxOS/.github --workflow self-fabric-health.yml \
            --status success --limit 1 --json databaseId 2>/dev/null \
            | jq -r '.[0].databaseId // empty'; } || true)

          if [ -z "$run_id" ]; then
            reason="no successful self-fabric-health.yml run found"
          else
            updated_at=$( { gh run view "$run_id" --repo SuxOS/.github \
              --json updatedAt --jq '.updatedAt' 2>/dev/null; } || true)
            if [ -z "$updated_at" ]; then
              reason="could not read run $run_id updatedAt"
            else
              # Staleness cap: 60m gives ~4x the 15-min fabric-health cron cadence of slack.
              age_min=$(( ( $(date -u +%s) - $(date -u -d "$updated_at" +%s 2>/dev/null || echo 0) ) / 60 ))
              if [ "$age_min" -gt 60 ]; then
                reason="stale (${age_min}m old, run $run_id)"
              else
                rm -rf /tmp/fabric-status && mkdir -p /tmp/fabric-status
                if ! gh run download "$run_id" --repo SuxOS/.github --name fabric-status \
                    --dir /tmp/fabric-status 2>/dev/null; then
                  reason="artifact download failed for run $run_id"
                elif [ ! -f /tmp/fabric-status/fabric-status.json ]; then
                  reason="fabric-status.json missing from artifact"
                else
                  backlog_total=$( { jq -r '.backlog_total // empty' /tmp/fabric-status/fabric-status.json; } || true)
                  workflow_red_total=$( { jq -r '[.repos[].workflow_red] | add // 0' /tmp/fabric-status/fabric-status.json 2>/dev/null; } || true)
                  collection_ok=$( { jq -r '.collection_ok // empty' /tmp/fabric-status/fabric-status.json; } || true)
                  if [ -z "$backlog_total" ] || [ -z "$collection_ok" ]; then
                    reason="fabric-status.json missing expected fields"
                  else
                    available=true
                  fi
                fi
              fi
            fi
          fi

          if [ "$available" = "true" ]; then
            echo "::notice::spine signal fetched: backlog_total=$backlog_total workflow_red_total=$workflow_red_total collection_ok=$collection_ok (run $run_id, ${age_min}m old)"
          else
            echo "::notice::spine signal unavailable ($reason) — degrading to tier-only pack"
          fi

          {
            echo "available=$available"
            echo "backlog_total=$backlog_total"
            echo "workflow_red_total=$workflow_red_total"
            echo "collection_ok=$collection_ok"
          } >> "$GITHUB_OUTPUT"

      - name: Non-buildable labels
        id: nonbuildable
        uses: SuxOS/.github/.github/actions/nonbuildable-labels@main

      # Real JS via the org's already-pinned actions/github-script (matches audit.yml /
      # sux/deploy.yml / sux/health.yml), not jq-in-bash. This was the most complex shell in
      # the pipeline (a jq reduce doing greedy bin-packing) — bash/jq quoting and word-splitting
      # are a real, recurring source of pipeline bugs in this repo (operator feedback,
      # 2026-07-15); a real language with try/catch and no shell-escaping surface is the fix,
      # not a cleverer bash incantation. Also gets a job-summary for free (real observability,
      # not another log line to grep).
      - name: Reap stale claims, then select the top-priority build batch
        id: pick
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          REAP_STALE_HOURS: "2"
          MAX_ISSUES: ${{ inputs.max-issues }}
          EFFORT_BUDGET: ${{ inputs.effort-budget }}
          INCLUDE: ${{ inputs.include }}
          EXCLUDE: ${{ inputs.exclude }}
          MODEL_HINT: ${{ inputs.model-hint }}
          SPEED: ${{ inputs.speed }}
          SIMPLE_MODEL: ${{ inputs.simple-model }}
          BASE_TURNS: ${{ inputs.base-max-turns }}
          NONBUILDABLE_LABELS: ${{ steps.nonbuildable.outputs.labels }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { owner, repo } = context.repo;
            const maxIssues = Number(process.env.MAX_ISSUES);
            const effortBudget = Number(process.env.EFFORT_BUDGET);
            const reapHours = Number(process.env.REAP_STALE_HOURS);
            const include = (process.env.INCLUDE || "").split(",").filter(Boolean);
            const exclude = (process.env.EXCLUDE || "").split(",").filter(Boolean);
            const nonBuildableLabels = process.env.NONBUILDABLE_LABELS.split(",");

            // Keyed on the IMMUTABLE numeric user.id, not the mutable login — a login is
            // renameable and a freed handle is reclaimable (security-review finding, #186).
            const ORG_OWNER_IDS = [18266472]; // colinxs
            const isTrusted = (u, assoc) => ["OWNER", "MEMBER", "COLLABORATOR"].includes(assoc)
              || u.login === "suxbot[bot]" || ORG_OWNER_IDS.includes(u.id);

            // 0. Issues already covered by an OPEN pull request. The `building` label is only
            //    the in-run claim (it covers select → PR-open); once a PR exists, IT is the
            //    durable "this issue is handled" marker, and the claim is intentionally NOT
            //    re-stripped when the PR opens (see the build job). So the real cross-run dedup
            //    is: an issue named in an open PR's closing keyword (`Closes/Fixes/Resolves #n`)
            //    is off the table until that PR merges (which closes it) or closes (which frees
            //    it). This is what makes fast requeue / parallel batches safe — without it a
            //    second run selects the same issues the moment the first opens its PR but before
            //    it merges, producing duplicate PRs (observed live 2026-07-15 across sux-fileops
            //    and suxrouter; the whole reason this guard exists). It also protects issues
            //    whose `building` label was already stripped by the old release-at-PR-open code.
            //    ONLY a trusted-author PR can suppress an issue this way (security-review finding
            //    on the first version of this guard, #193): without the trust filter, any PR —
            //    including from an untrusted/external author on a repo accepting outside PRs —
            //    whose body merely contains "Closes #N" would indefinitely hide issue #N from
            //    the builder, a decoy-PR DoS on the pipeline. Same trust bar as buildable issues.
            const openPrs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: "open", per_page: 100,
            });
            const CLOSING_KW = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const referencedByOpenPr = new Set();
            for (const pr of openPrs) {
              if (!isTrusted(pr.user, pr.author_association)) continue;
              for (const m of (pr.body || "").matchAll(CLOSING_KW)) referencedByOpenPr.add(Number(m[1]));
            }

            // 1. Reap: an issue stuck in `building` with no activity for >reapHours is an
            //    orphan from a build run that crashed after claiming — drop the claim. But NEVER
            //    reap one whose PR is still open (a slow-CI'ing PR can idle past reapHours while
            //    perfectly healthy) — that would free it for a duplicate rebuild.
            const stale = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: "open", labels: "building", per_page: 100,
            });
            const now = Date.now();
            for (const issue of stale) {
              if (referencedByOpenPr.has(issue.number)) continue;
              const ageH = (now - new Date(issue.updated_at).getTime()) / 3_600_000;
              if (ageH >= reapHours) {
                core.info(`reaping orphaned building issue #${issue.number} (idle ${ageH.toFixed(1)}h)`);
                await github.rest.issues.removeLabel({ owner, repo, issue_number: issue.number, name: "building" }).catch(() => {});
              }
            }

            // 2. Select. listForRepo also returns PRs (drop entries with a pull_request key).
            const all = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: "open", per_page: 100,
            });

            const buildableRaw = all.filter((i) => {
              if (i.pull_request) return false;
              const labels = i.labels.map((l) => l.name);
              // "tracking" = a bookkeeping issue upserted by automation (budget-governor's
              // "Autonomy throttle" / "Autonomy budget report", etc.) — not real work. Without
              // this exclusion it reads as ordinary buildable backlog and gets "built" as if
              // it were a feature request (confirmed live: SuxOS/sux#499 was the ONLY issue
              // this filter returned as buildable before the label existed).
              if (nonBuildableLabels.some((l) => labels.includes(l))) return false;
              // Already covered by an open PR (see step 0) — the durable cross-run dedup that
              // makes parallel/fast-requeue batches safe, and that also covers issues whose
              // `building` claim was stripped by the old release-at-PR-open behaviour.
              if (referencedByOpenPr.has(i.number)) return false;
              // The suxbot App installation (SUX_BOT_APP_ID/SUX_BOT_PRIVATE_KEY, which mints
              // this step's token) has no org `members: read` permission — GitHub silently
              // resolves author_association to "NONE" for real org members when queried via a
              // token that can't verify org membership, not just for outside contributors. That
              // starved every human-authored issue (SuxOS/.github#185): buildable came back
              // empty even with a backlog waiting. ORG_OWNER_IDS (defined above) is a stopgap
              // allowlist until the App is granted `members: read` (org admin action,
              // github.com/organizations/SuxOS/settings/installations) makes association
              // resolve correctly again. See #186 for why it's keyed on immutable user.id.
              if (!isTrusted(i.user, i.author_association)) return false;
              if (include.length > 0 && !include.some((l) => labels.includes(l))) return false;
              if (exclude.length > 0 && exclude.some((l) => labels.includes(l))) return false;
              return true;
            });
            const buildable = buildableRaw.map((i) => ({ number: i.number, labels: i.labels.map((l) => l.name) }));

            // Prerequisite gating (#348): don't batch an issue ahead of a STILL-OPEN issue it
            // names as a hard prerequisite. When #342/#343 ("Extend the dashboard-query gate…")
            // were queued while #339 — which ADDED that gate's script — still sat on an unmerged
            // PR, the builder had to cherry-pick #339's commit just to have the file to extend.
            // We DEFER such an issue behind unblocked work instead. This is advisory and
            // NON-STARVING: a deferred issue is only reordered behind other buildable work, never
            // dropped — if it's the only thing buildable it's still built (the pre-#348 behaviour,
            // cherry-pick and all), so the heuristic can only reorder, never deadlock the backlog.
            //
            // A "blocker" is any OPEN issue OR PR that will plausibly close on merge — i.e. NOT
            // a long-lived tracking/needs-human/hold issue (blocking on those would starve the
            // dependent forever). Open PRs count directly (not just issues): issues and PRs share
            // one number space, and the detection regex/comment explicitly targets PR references
            // ("built by PR #341") — excluding PRs here left that reference silently un-gated
            // (#370). An issue covered by an open (unmerged) PR still counts: its change isn't on
            // main yet, which is exactly the #339 situation. Detection is two narrow signals over
            // the candidate's title+body, kept tight to limit false positives; the non-starving
            // fallback caps any rare false positive at one selection cycle.
            const NON_CLOSEABLE = ["tracking", "needs-human", "hold"];
            const blockerNumbers = new Set(
              all.filter((i) => !i.labels.map((l) => l.name).some((l) => NON_CLOSEABLE.includes(l)))
                 .map((i) => i.number),
            );
            // (1) a dependency phrase directly followed by #NNN ("extends #339", "depends on #339",
            //     "built by PR #341"); (2) an extension verb in the TITLE — a curated one-line
            //     summary, so a strong "builds on prior work" signal — plus any reference to an
            //     open blocker in the title/body (this is what catches #342/#343, whose titles say
            //     "Extend the dashboard-query gate" while the #339 ref sits in the body).
            const PREREQ_ADJ = /\b(?:extend(?:s|ing|ed)?|adds? to|build(?:s|ing)? on|built (?:on|by)|based on|depends? on|dependent on|blocked by|prerequisite|follow[- ]?up to)\b[^\n#]{0,20}#(\d+)/gi;
            const TITLE_EXT = /\b(?:extend(?:s|ing|ed)?|adds? to|build(?:s|ing)? on|based on)\b/i;
            const REF = /#(\d+)/g;
            const blockedBy = (issue) => {
              const title = issue.title || "";
              const text = `${title}\n${issue.body || ""}`;
              const blockers = new Set();
              for (const m of text.matchAll(PREREQ_ADJ)) {
                const n = Number(m[1]);
                if (n !== issue.number && blockerNumbers.has(n)) blockers.add(n);
              }
              if (TITLE_EXT.test(title)) {
                for (const m of text.matchAll(REF)) {
                  const n = Number(m[1]);
                  if (n !== issue.number && blockerNumbers.has(n)) blockers.add(n);
                }
              }
              return [...blockers];
            };
            const deferred = buildableRaw
              .map((i) => ({ number: i.number, blockers: blockedBy(i) }))
              .filter((d) => d.blockers.length);
            const deferredSet = new Set(deferred.map((d) => d.number));
            let selectable = buildable.filter((i) => !deferredSet.has(i.number));
            if (selectable.length === 0) selectable = buildable; // non-starving: gating may reorder, never empty
            if (deferred.length) core.info(`prerequisite-deferred (open blocker unmerged): ${deferred.map((d) => `#${d.number}->${d.blockers.map((b) => "#" + b).join("/")}`).join(", ")}`);

            // Effort points: small=1, medium=2 (also the default for an unlabeled issue — most
            // of today's backlog predates the effort:* label), large=4. Deterministic lookup —
            // the estimate was already made by whichever session (fixer / a prior build's
            // observation-capture) filed the issue; no model call happens here.
            const pointsFor = (labels) => (labels.includes("effort:large") ? 4 : labels.includes("effort:small") ? 1 : 2);

            const high = selectable.filter((i) => i.labels.includes("priority:high") || i.labels.includes("security"));
            const med = selectable.filter((i) => !high.includes(i) && i.labels.includes("priority:med"));
            const low = selectable.filter((i) => !high.includes(i) && !med.includes(i));

            // Greedy pack, oldest-first within each tier, HIGH -> MED -> LOW: keep adding while
            // under BOTH caps (count, points), spilling into the next tier once the current one
            // is exhausted instead of stopping cold at tier boundaries. A thin HIGH tier (e.g.
            // one security issue trickling in) used to starve the whole batch down to count=1
            // even with a full MED/LOW backlog waiting (operator-observed 2026-07-15) — spillover
            // fixes that while still always draining HIGH first. `tier` reports the highest tier
            // actually represented in the picked set (drives the opus-escalation signal below).
            // Always take at least one issue even if its own points exceed the budget alone —
            // "always build at least one thing" (three-loop-pipeline.md) is never overridden
            // by the effort budget (verified: a lone effort:large issue still gets picked
            // even when its 4pts alone exceed a 2pt budget).
            const picked = [];
            let points = 0;
            let tier = "low";
            for (const [tName, tSet] of [["high", high], ["med", med], ["low", low]]) {
              if (picked.length >= maxIssues) break;
              const sorted = [...tSet].sort((a, b) => a.number - b.number).map((i) => ({ ...i, pts: pointsFor(i.labels) }));
              for (const it of sorted) {
                if (picked.length >= maxIssues) break;
                if (picked.length === 0) { picked.push(it); points += it.pts; tier = tName; continue; }
                if (points + it.pts <= effortBudget) { picked.push(it); points += it.pts; continue; }
                continue;
              }
            }
            // sensedOpus flags the whole HIGH tier (security or priority:high) or any
            // effort:large issue — "meaningful work" by the old auto-escalation rule. It only
            // actually escalates the MAIN model when a caller opts into model-hint: auto (see
            // below); the org-wide default is now model-hint: sonnet, no Opus escalation
            // (operator directive 2026-07-17, docs/design/2026-07-17-automation-structure-and-
            // anti-drift.md, superseding the older "default opus sonnet build" quote below it
            // in git history). sensedOpus still independently drives effort depth further down
            // regardless of which model actually runs. Reuses data already computed.
            const sensedOpus = tier === "high" || picked.some((i) => i.labels.includes("effort:large"));

            core.info(`selected tier=${tier} count=${picked.length} points=${points}/${effortBudget} sensedOpus=${sensedOpus} issues=${JSON.stringify(picked.map((i) => i.number))}`);

            // model-hint always overrides the auto choice in either direction.
            const modelHint = process.env.MODEL_HINT;
            let model;
            if (modelHint === "auto") {
              model = sensedOpus ? "opus" : process.env.SIMPLE_MODEL;
              if (sensedOpus) core.info(`high-tier/large-effort batch -> opus main model`);
            } else {
              model = modelHint;
            }

            // Subagent (Task-tool) model: one tier below the main model, floored at sonnet so
            // parallel CODE-writing subagents are never haiku (weaker codegen -> the main
            // session redoing bad work costs more than it saves). So an opus build fans out to
            // sonnet subagents ("opus sonnet build"); a sonnet build keeps sonnet subagents.
            // Passed to the build session via CLAUDE_CODE_SUBAGENT_MODEL (see the build job).
            const subagentModel = modelHint === "auto" ? (model === "opus" ? "sonnet" : model) : model;

            // Effort level scales with tier — the orchestrator picks reasoning depth per build,
            // deterministically, from the same tier signal (operator: "choose model and
            // settings for agent and subagent for each build" automatically). Independent of
            // model-hint: effort was previously reset to "auto" whenever model-hint was
            // pinned (every caller pins model-hint: sonnet, so effort silently never scaled
            // past the model default — operator-observed 2026-07-15, "raise effort
            // everywhere"). Bumped one notch org-wide on top of the fix: low tier now runs at
            // the old med default, med at the old high ceiling, high/large-effort at max
            // depth. Passed via CLAUDE_CODE_EFFORT_LEVEL. Opus 4.8 + Sonnet support
            // low|medium|high|xhigh|max.
            const effort = sensedOpus ? "xhigh" : tier === "med" ? "high" : "medium";

            // Turns scale with selected effort points (not raw issue count — a few large
            // issues cost as much attention as many small ones), then speed. 10 turns/point is
            // a drop-in equivalent of the old 20-turns/issue formula at the medium (2pt)
            // default. Cap 500: turn budget, not issue count or wall-clock, is what actually
            // saturates first on a wide batch; a batch above the cap still runs on a flatter
            // per-point budget past it. The job's own 30min timeout (not the turns cap) is the
            // real backstop against a runaway session — see the build job for that reasoning.
            let turns = Number(process.env.BASE_TURNS) + 10 * points;
            if (process.env.SPEED === "fast") turns = Math.floor(turns / 2);
            turns = Math.max(10, Math.min(500, turns));

            // Claim each selected issue so a concurrent run can't double-process it.
            for (const i of picked) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: i.number, labels: ["building"] }).catch(() => {});
            }

            core.setOutput("numbers", JSON.stringify(picked.map((i) => i.number)));
            core.setOutput("count", String(picked.length));
            core.setOutput("tier", tier);
            core.setOutput("model", model);
            core.setOutput("subagent_model", subagentModel);
            core.setOutput("effort", effort);
            core.setOutput("turns", String(turns));

            await core.summary
              .addHeading("issue-build: select", 3)
              .addTable([
                [{ data: "tier", header: true }, { data: "count", header: true }, { data: "points", header: true }, { data: "model", header: true }, { data: "subagent", header: true }, { data: "effort", header: true }, { data: "turns", header: true }],
                [tier, String(picked.length), `${points}/${effortBudget}`, model, subagentModel, effort, String(turns)],
              ])
              .addDetails("issues in this batch", picked.map((i) => `#${i.number}`).join(", ") || "(none)")
              .write();

  build:
    needs: select
    if: needs.select.outputs.count != '' && needs.select.outputs.count != '0'
    runs-on: ubuntu-latest
    # 45 -> 90 -> 30 (2026-07-15, same day): 90 was raised defensively alongside the turns cap
    # (300 -> 500) without real data. Actual runs at the 500-turn cap on 17-19 issue batches
    # completed in 6.5-15 minutes (SuxOS/sux run 29430528029, SuxOS/suxrouter run 29430530912)
    # — the Claude step is API-latency-bound, not something a bigger timeout makes faster. 30min
    # is ~2x observed worst case, a real backstop against a runaway session rather than an
    # unverified guess. The build prompt (step 1, PLAN) now tells the model its actual budget
    # and to trim scope proactively rather than risk the timeout — losing whatever isn't yet
    # committed+pushed is still possible, just meant to be rare, not routine.
    timeout-minutes: 30
    steps:
      - name: Mint app token
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      - name: Checkout default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Create build branch
        id: branch
        env:
          # Deterministic + unique per run — no model-authored value in the branch name, so no
          # injection surface (unlike the old cluster-authored branch).
          BRANCH: bot/issue-build-${{ github.run_id }}
        run: |
          set -euo pipefail
          git checkout -B "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      # mint-app-token (above) scopes its token to this calling repo only — despite the
      # suxbot App installation covering every org repo, create-github-app-token defaults to
      # `github.repository` when neither `owner:` nor `repositories:` is passed. A caller
      # whose package.json has a "file:../suxlib" dependency (currently only `sux`) needs a
      # second, explicitly suxlib-scoped token to clone that sibling before `npm ci` sees it —
      # mirrors sux/.github/workflows/ci.yml's own "Clone suxlib" step verbatim. Gated on the
      # opt-in `needs-suxlib` input so every other caller (suxrouter/sux-fileops/claude-config/
      # suxlib itself) is unaffected by default.
      - name: Mint app token for suxlib (private sibling dependency)
        id: suxlib-token
        if: inputs.needs-suxlib
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}
          owner: SuxOS
          repositories: suxlib
          permission-contents: read

      # $GITHUB_WORKSPACE is .../work/<repo>/<repo>, so ../suxlib lands where npm's
      # file:../suxlib resolution looks.
      - name: Clone suxlib (private sibling dependency)
        if: inputs.needs-suxlib
        env:
          SUXLIB_TOKEN: ${{ steps.suxlib-token.outputs.token }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch main "https://x-access-token:${SUXLIB_TOKEN}@github.com/SuxOS/suxlib.git" ../suxlib
          npm --prefix ../suxlib ci --omit=dev

      # Give the builder real symbol-aware navigation instead of grep-and-hope. Runner starts
      # clean each time (no local plugin config carries over), so nothing is set up unless this
      # step does it. Gated on tsconfig.json — a non-TS repo (e.g. suxrouter) skips entirely.
      # Installs real deps (npm ci) BEFORE the Claude session starts so the language server
      # resolves actual project types from turn one, not bare syntax.
      # Split out so the npm download cache (setup-node `cache: npm`, the same pattern
      # audit.yml/health.yml use) can key off the lockfile — it warms both `npm ci` and the
      # global language-server install, so the win is registry-flakiness resilience first,
      # a few seconds second. Gated on tsconfig via a detect step: a non-TS repo (suxrouter)
      # skips node setup + install entirely and has no lockfile for the cache to hash.
      - name: Detect TS repo
        id: detect
        run: |
          if [ -f tsconfig.json ]; then echo "ts=true" >> "$GITHUB_OUTPUT"; else echo "ts=false" >> "$GITHUB_OUTPUT"; fi

      - name: Set up Node with npm cache
        if: steps.detect.outputs.ts == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          cache: npm

      - name: Set up TypeScript language server
        id: lsp
        if: steps.detect.outputs.ts == 'true'
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npm install -g typescript-language-server typescript
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Claude — plan and build the batch into one PR
        id: claude
        env:
          # Only real env vars the SDK itself reads go here. claude-code-action's `prompt:`
          # is a plain string handed to the action — it is NOT a shell context, so bare $VAR
          # references are never substituted (confirmed: an earlier version of this prompt
          # shipped literal, unsubstituted "$COUNT"/"$TIER"/"$ISSUE_NUMBERS" text to Claude on
          # every run, which is why builds silently produced nothing). The documented pattern
          # (docs/custom-automations.md) is GitHub Actions `${{ }}` expressions written
          # directly inline in the prompt string below — no env-var indirection needed.
          ENABLE_PROMPT_CACHING_1H: "1"
          # The orchestrator picks the subagent model + reasoning effort per build (select
          # step, by tier): opus main fans out to sonnet subagents; effort scales high/medium/
          # low with the tier. These two the Claude Code runtime reads from the environment.
          CLAUDE_CODE_SUBAGENT_MODEL: ${{ needs.select.outputs.subagent_model }}
          CLAUDE_CODE_EFFORT_LEVEL: ${{ needs.select.outputs.effort }}
          # Unattended-CI resilience: wait out a subscription usage-limit/capacity (429/529)
          # window and retry instead of failing the build — the pool-exhaustion jam, solved
          # without a metered key (env-vars docs: "for unattended sessions such as CI jobs").
          CLAUDE_CODE_RETRY_WATCHDOG: "1"
          # A repo's gate commands (test/build) can legitimately run long; the 2-min default
          # would kill them mid-build. Raise the floor and the ceiling the model may set.
          BASH_DEFAULT_TIMEOUT_MS: "600000"
          BASH_MAX_TIMEOUT_MS: "1200000"
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_bots: suxbot[bot]
          prompt: |
            You are the builder. These ${{ needs.select.outputs.count }} open issues (priority
            tier: ${{ needs.select.outputs.tier }}) are yours to ship in ONE pull request on the
            current branch: ${{ needs.select.outputs.numbers }}

            Read each with `gh issue view <n>`. Then:

            1. PLAN — your call, not a prescribed shape. You have a turn budget of
               ${{ needs.select.outputs.turns }} and this job is killed at 30 minutes wall-clock
               no matter what — that's a hard stop, and anything not committed+pushed by then is
               lost, so plan to comfortably finish inside it, not to exactly fill it. Pick
               whatever execution shape actually fits this specific batch:
                 - Independent issues (disjoint files, no ordering dependency) are usually best
                   fanned out to Task-tool subagents in parallel, one per issue or tight group —
                   this is the common case and a reasonable default when you're not sure.
                 - Issues that touch the same files or depend on each other are done together,
                   serially, in order, to stay coherent — don't parallelize what isn't independent.
                 - A batch with a couple of genuinely hard/risky issues among easy ones can
                   benefit from a first fast pass on the easy majority, then a slower, more
                   careful second pass on the hard remainder once you've seen the rest of the
                   codebase — use that shape if it fits, don't force it if it doesn't.
               Your scope is not fixed — REDUCE or EXPAND it as the work reveals itself:
                 - REDUCE: drop an issue from THIS PR if it turns out unbuildable, would
                   conflict, is already superseded by / redundant with another issue in this
                   batch or work already merged, or you're running short on turns/time and it's
                   the lowest-value remaining piece. Note which and why in your final message; a
                   dropped issue keeps its claim released and gets retried later (by this builder
                   or a future one, possibly on a different model if it's since been marked
                   effort:large or security). If it's redundant/superseded rather than merely
                   deferred, say so explicitly so it can be closed instead of endlessly retried.
                 - EXPAND: if you finish the batch with clear turn AND wall-clock headroom
                   (you're well under budget, not scraping the 30-min stop), you MAY pull in more
                   open work rather than end early — a cold start costs more than a few extra
                   issues on a warm session. Only take issues that (a) are open and buildable
                   (trusted author; not already labelled `building`/`hold`/`needs-human`), and
                   (b) fit the budget you have left. BEFORE touching one, CLAIM it first:
                   `gh issue edit <n> --add-label building` — that's what stops a concurrent run
                   grabbing the same issue; an unclaimed issue you build is a double-build waiting
                   to happen. Prefer issues related to what you just built (same area/files) so
                   the shared context pays off. Don't reach past what you can finish cleanly.
               Collate naturally across whatever the final set is: dedupe overlapping work.
               Shipping a solid PR beats risking it on an over-ambitious plan — expand only when
               you have real headroom, trim the moment you don't.

            2. BUILD. Make the smallest correct change for each issue. Do NOT touch secrets, do
               NOT weaken a test to make it pass, do NOT touch code unrelated to these issues.
               ${{ steps.lsp.outputs.ready == 'true' && 'A TypeScript language server is running for this repo — prefer the LSP tool (goToDefinition/findReferences/hover) over grep for navigating symbols, checking call sites before a rename, and confirming types.' || '' }}

            3. GATE. All of these must pass before you commit:
               ${{ inputs.gates-summary }}
               Commit (conventional-commit message referencing the issues) and push to this
               branch. One coherent commit history for the batch is fine.

            4. RECORD DISPOSITION (mandatory once you've pushed a commit — this is what the next
               step reads to open the PR, so don't skip it). Write a JSON object to
               `${{ runner.temp }}/disposition.json` using the Write tool (absolute path, OUTSIDE
               the repo tree): `{"built": [n, ...], "dropped": [{"number": n, "reason": "..."}]}`.
               `built` is every issue number actually shipped in this push — the original batch
               MINUS anything you REDUCE-dropped PLUS anything you EXPAND-claimed — this is what
               drives the PR's `Closes #n` list, so an EXPAND issue missing from `built` won't get
               closed on merge and a REDUCE-dropped issue left IN `built` will get wrongly
               auto-closed without ever having been built. `dropped` is every issue you
               REDUCE-dropped, each with a short reason; those get their `building` claim released
               immediately instead of sitting locked until the reaper's timeout.

            5. CAPTURE INSIGHT (secondary — only after the build is done and pushed; skip if you
               couldn't finish the build). While working these issues you have the deepest view
               of this code anyone will have today. Don't waste it. If you noticed something
               genuinely worth a SEPARATE follow-up — a real bug OUT OF SCOPE of this batch, a
               concrete feature/improvement the code is asking for, a durable lesson about how
               this repo works that future work should know — record it so the pipeline can act
               on it later. Write a JSON array to the file `${{ runner.temp }}/observations.json`
               using the Write tool (absolute path, OUTSIDE the repo tree so it is never
               committed). Each element: {"title": short imperative, "body": what/why with
               file:line refs, "type": one of "bug"|"enhancement"|"documentation", "security":
               true/false, "effort": your rough gut estimate — "small"|"medium"|"large" (sizes
               how much work it looks like; only affects future batch sizing, not a commitment)}.
               A lesson-worth-recording is a "documentation" observation. Rules:
               at most 3 — the best ones, not a brain-dump; nothing already covered by an open
               issue (check `gh issue list --state open --limit 300` first); nothing that is
               just one of the issues you already built. If you have nothing that clears that
               bar, write `[]` or skip the file entirely — an empty capture is correct and
               better than noise. This is strictly secondary: never spend build turns you need
               for the gates on it.

               MEMORY: this repo's CLAUDE.md is your persistent memory across every future
               build — it's auto-loaded into your context at the start of each run. If, while
               building, you learned a DURABLE, non-obvious fact that future builds should know
               and act on — a gotcha, a convention, a "always do X here / never do Y", a
               constraint that isn't self-evident from the code — you MAY add a tight line or
               two to the nearest CLAUDE.md IN THIS PR (not a separate observation). Rules: only
               a genuinely durable, generalizable fact (not a note about this one issue); keep
               it a sentence or two, in the file's existing voice; never delete or rewrite
               existing guidance, only append; skip it entirely if nothing clears that bar (an
               unchanged CLAUDE.md is the common, correct case). The PR's security-review + your
               own gates still see the edit before it merges.

            If you get the gates passing, finish normally — a later step opens the PR. If you
            can't get them green (genuine design problem, missing context), do NOT push a broken
            commit — say so clearly in your final message and explain what's blocking it.
          # BUILD legitimately writes code, pushes, and fans out to subagents — tools stay broad.
          # bypassPermissions: a headless CI run has no human to satisfy the interactive
          # per-command approval gate (confirmed live: a build session hung retrying `env`,
          # burning turns until timeout, never producing a commit). Matches this org's own
          # ship-and-roll-back trust model (three-loop-pipeline.md) — CI + security-review
          # still gate the merge.
          claude_args: "--max-turns ${{ needs.select.outputs.turns }} --model ${{ needs.select.outputs.model }} --permission-mode bypassPermissions"

      - name: Push and open ONE PR, or release claims on failure
        # always(): this is the only thing that releases the `building` claim on this run's own
        # failure/cancellation — without it, a killed build step skips straight to the reaper's
        # REAP_STALE_HOURS backstop, leaving issues locked for hours instead of released immediately.
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.branch.outputs.name }}
          TIER: ${{ needs.select.outputs.tier }}
          ISSUE_NUMBERS_JSON: ${{ needs.select.outputs.numbers }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          DISPOSITION_FILE: ${{ runner.temp }}/disposition.json
        run: |
          set -euo pipefail
          nums=$(echo "$ISSUE_NUMBERS_JSON" | jq -r '.[]')

          # Only real success is a commit ahead of base — a dirty/uncommitted tree is a failure.
          if [ -z "$(git log "origin/${BASE_BRANCH}"..HEAD 2>/dev/null)" ]; then
            echo "no commits produced → build session couldn't finish; releasing claims"
            for n in $nums; do
              gh issue edit "$n" --repo "$GITHUB_REPOSITORY" --remove-label building 2>/dev/null || true
              gh issue comment "$n" --repo "$GITHUB_REPOSITORY" \
                --body "🤖 Auto-build attempted this issue in a batch but couldn't get the gates green. Released the \`building\` claim so a later run retries it. Run: $RUN_URL" 2>/dev/null || true
            done
            exit 0
          fi

          git push -f origin "$BRANCH"

          original_nums="$nums"
          batch_size=$(echo "$original_nums" | wc -w | tr -d ' ')

          # The builder's disposition.json (§4 of the prompt) is the source of truth for which
          # issues actually shipped in this push. `disposition_valid` tracks whether it's
          # present and well-formed (a `.built` array) — used below to decide whether the
          # original batch can safely be auto-closed (#446: a missing/malformed file used to
          # fall back to closing the WHOLE original batch via `Closes #n`, silently closing
          # issues the model dropped or never touched, e.g. because it judged them too large
          # and wrote no disposition at all).
          disposition_valid=false
          built=""
          if [ -s "$DISPOSITION_FILE" ] && jq -e '.built | type == "array"' "$DISPOSITION_FILE" >/dev/null 2>&1; then
            disposition_valid=true
            built=$(jq -r '.built // [] | .[]' "$DISPOSITION_FILE" 2>/dev/null || true)
          fi
          if [ -n "$built" ]; then
            nums="$built"
          fi

          if [ "$disposition_valid" = true ]; then
            dropped_nums=$(jq -r '.dropped // [] | .[].number' "$DISPOSITION_FILE" 2>/dev/null || true)
            for n in $dropped_nums; do
              reason=$(jq -r --arg n "$n" '.dropped[] | select((.number|tostring) == $n) | .reason // "no reason given"' "$DISPOSITION_FILE" 2>/dev/null || echo "no reason given")
              gh issue edit "$n" --repo "$GITHUB_REPOSITORY" --remove-label building 2>/dev/null || true
              gh issue comment "$n" --repo "$GITHUB_REPOSITORY" \
                --body "🤖 Dropped from this batch (not shipped in this PR): $reason. Released the \`building\` claim so this can be retried or picked up later. Run: $RUN_URL" 2>/dev/null || true
            done
          fi

          # Fail closed, not open: a multi-issue batch with no valid disposition record is
          # exactly the ambiguous case (#446) — the commit might address only some of the
          # original issues, or none of the harder ones. Don't auto-close any of them; flag
          # each instead so it's visible, and leave the `building` claim in place (the reaper
          # frees it after REAP_STALE_HOURS if this PR doesn't merge, so it can be retried). A
          # single-issue batch has no such ambiguity — a real commit can only be about that one
          # issue — so it keeps auto-closing even without a disposition file. #453: a
          # well-formed-but-empty `built: []` (e.g. every original issue got REDUCE-dropped but
          # an incidental commit still landed) must NOT fall through to auto-close either — gate
          # on `built` actually having entries, not just on the file being valid JSON.
          if [ -n "$built" ] || { [ "$disposition_valid" = false ] && [ "$batch_size" -eq 1 ]; }; then
            closes=$(for n in $nums; do echo "Closes #$n"; done)
          else
            closes=$(for n in $nums; do echo "Related to #$n (not auto-closed — no disposition record, please verify)"; done)
            for n in $nums; do
              gh issue comment "$n" --repo "$GITHUB_REPOSITORY" \
                --body "🤖 This batch pushed a commit but the disposition record doesn't confirm this issue shipped, so we can't tell which issue(s) it actually addresses. Not auto-closing — please verify against the PR and close manually if appropriate. Run: $RUN_URL" 2>/dev/null || true
            done
          fi

          title="build: drain ${TIER}-priority backlog ($(echo "$nums" | wc -w | tr -d ' ') issues)"
          body=$(printf 'Batch build of the %s-priority backlog.\n\n%s\n\n%s\n\nRun: %s' \
            "$TIER" "$closes" "🤖 Opened automatically by issue-build.yml." "$RUN_URL")

          # automerge.yml arms native auto-merge on any non-draft, non-hold PR once required
          # checks (CI + security-review) go green. Add `hold` to stop that.
          gh pr create --repo "$GITHUB_REPOSITORY" --base "$BASE_BRANCH" --head "$BRANCH" \
            --title "$title" --body "$body"

          # NOTE: the `building` claim is deliberately NOT released here. The PR's `Closes #n`
          # is now the durable "this issue is handled" marker — select's step-0 predicate skips
          # any issue referenced by an OPEN PR, so the claim's job (dedup) is done by the PR from
          # here on. Releasing at PR-open is exactly what let a fast requeue / parallel batch
          # re-select the same issues before the PR merged, producing duplicate PRs (observed
          # live 2026-07-15). On MERGE, `Closes #n` closes the issue (gone from the open set);
          # on unmerged CLOSE, the issue reopens to `building`-labelled + no-open-PR, and the
          # reaper releases it after REAP_STALE_HOURS so it retries. Both paths are covered
          # without a race window.

      # Backpressure for the observations below: if the bot's PR queue is already deep, don't
      # let the builder pile MORE feature work on top (bug/security/doc observations still flow).
      - name: Flood guard
        id: flood
        if: always()
        uses: SuxOS/.github/.github/actions/flood-guard@main
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          threshold: ${{ inputs.flood-threshold }}

      # The builder may have written mid-build observations (a bug out of scope, a feature the
      # code is asking for, a durable lesson) to a file OUTSIDE the repo tree. This is the ONLY
      # step that files them — the model has no gh-write access to issues here. Model-authored
      # content is parsed as real JSON (real language, no shell quoting/word-splitting surface),
      # type is re-validated against an allowlist, enhancements are dropped under flood
      # backpressure, and the whole thing is capped — the Safe Outputs pattern, identical in
      # shape to fixer.yml. Best-effort: a missing/empty/malformed file is a green no-op (the
      # build already shipped either way).
      - name: File builder observations
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          FEATURES_OK: ${{ steps.flood.outputs.features-ok }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;
            const obsFile = `${process.env.RUNNER_TEMP}/observations.json`;
            const MAX_OBS = 3;

            if (!fs.existsSync(obsFile)) { core.info("no observations file → nothing to file"); return; }
            let raw;
            try { raw = JSON.parse(fs.readFileSync(obsFile, "utf8")); } catch { core.warning("observations file is not valid JSON — ignoring"); return; }
            if (!Array.isArray(raw)) { core.warning("observations file is not a JSON array — ignoring"); return; }

            const filed = [];
            for (const p of raw.slice(0, MAX_OBS)) {
              const { title, body, type, security, effort } = p || {};
              if (!title || !body) { core.warning(`skipping observation with empty title/body`); continue; }
              if (!["bug", "enhancement", "documentation"].includes(type)) { core.warning(`skipping observation with unexpected type '${type}': ${title}`); continue; }
              if (type === "enhancement" && process.env.FEATURES_OK === "false") { core.info(`flood guard active → holding feature observation: ${title}`); continue; }

              const labels = [type];
              if (security === true) labels.push("security");
              // Missing/invalid effort is not fatal — select's default (medium) covers it.
              if (["small", "medium", "large"].includes(effort)) labels.push(`effort:${effort}`);

              try {
                const { data } = await github.rest.issues.create({ owner, repo, title, body, labels });
                core.info(`filed observation: ${data.html_url}`);
                filed.push(data.html_url);
              } catch (e) {
                core.warning(`failed to file observation (non-fatal): ${title} — ${e.message}`);
              }
            }
            // Never fail the run over observations — the build already shipped.
            if (filed.length > 0) {
              await core.summary.addHeading("issue-build: observations filed", 3).addList(filed).write();
            }

  # N -> K -> N=0: draining the existing backlog never waits on the clock — only NEW issues
  # arriving is cron-paced (fixer). While UNCLAIMED buildable backlog remains and the governor
  # isn't red, keep up to `parallel-batches` issue-build runs in flight at once by dispatching
  # however many more are needed to reach that cap. Self-terminates the moment nothing unclaimed
  # remains; the schedule trigger is the wake-up call once new work arrives or the governor
  # clears. The governor (red) is the runaway backstop; the cap bounds concurrency+spend.
  requeue:
    needs: [select, build]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Preflight — need the token
        id: pre
        run: |
          if [ "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}" != "true" ]; then
            echo "CLAUDE_CODE_OAUTH_TOKEN not set → issue-build inert"; echo "go=false" >> "$GITHUB_OUTPUT"
          else echo "go=true" >> "$GITHUB_OUTPUT"; fi

      - name: Check autonomy throttle
        id: throttle
        uses: SuxOS/.github/.github/actions/check-throttle@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          defer-at: "red"

      - name: Mint app token
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      - name: Non-buildable labels
        id: nonbuildable
        uses: SuxOS/.github/.github/actions/nonbuildable-labels@main

      # A plain GITHUB_TOKEN cannot dispatch new workflow runs — GitHub blocks that
      # specifically to prevent runaway self-triggering loops — hence the app token above,
      # same as select/build already use to mutate issues/PRs across a run boundary.
      - name: Fan out up to parallel-batches while unclaimed backlog remains
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          REF_NAME: ${{ github.ref_name }}
          MAX_ISSUES: ${{ inputs.max-issues }}
          PARALLEL_BATCHES: ${{ inputs.parallel-batches }}
          NONBUILDABLE_LABELS: ${{ steps.nonbuildable.outputs.labels }}
          INCLUDE: ${{ inputs.include }}
          EXCLUDE: ${{ inputs.exclude }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { owner, repo } = context.repo;
            const maxIssues = Math.max(1, Number(process.env.MAX_ISSUES) || 10);
            const cap = Math.max(1, Number(process.env.PARALLEL_BATCHES) || 1);
            const nonBuildableLabels = process.env.NONBUILDABLE_LABELS.split(",");
            const include = (process.env.INCLUDE || "").split(",").filter(Boolean);
            const exclude = (process.env.EXCLUDE || "").split(",").filter(Boolean);

            // UNCLAIMED buildable count — the same predicate `select` uses, both now sourced
            // from the nonbuildable-labels composite action (#317) so they can't drift.
            // "Unclaimed" is the key word: an issue that a concurrent batch has
            // already `building`-claimed, or that an open PR already covers, is NOT more work to
            // dispatch for — counting it would spawn batches that find nothing to do. Re-read
            // fresh (not select's stale output): build/other concurrent runs just changed state.
            const ORG_OWNER_IDS = [18266472]; // colinxs
            const isTrusted = (u, assoc) => ["OWNER", "MEMBER", "COLLABORATOR"].includes(assoc)
              || u.login === "suxbot[bot]" || ORG_OWNER_IDS.includes(u.id);
            const [all, openPrs] = await Promise.all([
              github.paginate(github.rest.issues.listForRepo, { owner, repo, state: "open", per_page: 100 }),
              github.paginate(github.rest.pulls.list, { owner, repo, state: "open", per_page: 100 }),
            ]);
            const CLOSING_KW = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const referencedByOpenPr = new Set();
            for (const pr of openPrs) {
              // Only a trusted-author PR's closing keywords count — an untrusted PR body
              // claiming "Closes #N" must not be able to suppress issue #N from selection
              // (decoy-PR DoS; security-review finding on the first version of this guard, #193).
              if (!isTrusted(pr.user, pr.author_association)) continue;
              for (const m of (pr.body || "").matchAll(CLOSING_KW)) referencedByOpenPr.add(Number(m[1]));
            }
            const unclaimed = all.filter((i) => {
              if (i.pull_request) return false;
              const labels = i.labels.map((l) => l.name);
              if (nonBuildableLabels.some((l) => labels.includes(l))) return false;
              if (referencedByOpenPr.has(i.number)) return false;
              if (include.length > 0 && !include.some((l) => labels.includes(l))) return false;
              if (exclude.length > 0 && exclude.some((l) => labels.includes(l))) return false;
              return isTrusted(i.user, i.author_association);
            }).length;

            if (unclaimed === 0) {
              core.info("no unclaimed buildable backlog — idling until the next scheduled run or new issue");
              return;
            }

            // Cheap first-pass hot-file mitigation (#441): #437 found self-check.yml and
            // CLAUDE.md are by far the two most common files touched across recent
            // bot/issue-build-* PRs (nearly every batch that adds a scripts/test-*.sh gate
            // touches the former; the RECORD DISPOSITION/CAPTURE INSIGHT instructions often
            // produce the latter), and a sibling builder PR overlapping on one of them is
            // #437's main observed collision source. Only matters when parallel-batches>1 —
            // with cap 1 there's no sibling batch to collide with. Exact-match on the newest
            // already-open builder PR's changed files only (no text-mining an issue's body);
            // if it touches either file, hold further dispatch until it merges rather than
            // attempt #437's general select-time overlap heuristic.
            if (cap > 1) {
              const HOT_FILES = new Set([".github/workflows/self-check.yml", "CLAUDE.md"]);
              const builderPrs = openPrs
                .filter((pr) => /^bot\/issue-build-\d+$/.test(pr.head.ref))
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              const newestBuilderPr = builderPrs[0];
              if (newestBuilderPr) {
                const changedFiles = await github.rest.pulls.listFiles({
                  owner, repo, pull_number: newestBuilderPr.number, per_page: 100,
                }).then((r) => r.data.map((f) => f.filename)).catch(() => []);
                if (changedFiles.some((f) => HOT_FILES.has(f))) {
                  core.info(`holding requeue dispatch — newest open builder PR #${newestBuilderPr.number} touches a hot file (self-check.yml/CLAUDE.md, #441); waiting for it to merge before dispatching another parallel batch`);
                  return;
                }
              }
            }

            // How many issue-build runs are already in flight for this repo (this run's own
            // requeue job still counts its run as in_progress, so it's included — we top UP to
            // the cap, we don't add cap-many on top). GitHub has no "runs for workflow X" filter
            // on the REST list that's reliable across reusable callers, so filter by name.
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner, repo, per_page: 100, status: "in_progress",
            }).then((r) => r.data.workflow_runs).catch(() => []);
            const queued = await github.rest.actions.listWorkflowRunsForRepo({
              owner, repo, per_page: 100, status: "queued",
            }).then((r) => r.data.workflow_runs).catch(() => []);
            const inFlight = [...runs, ...queued].filter((r) => /issue.?build/i.test(r.name || "")).length;

            // Dispatch enough to reach the cap, but never more batches than there is unclaimed
            // work to fill (each batch drains ~maxIssues), and never negative.
            const wantForWork = Math.ceil(unclaimed / maxIssues);
            const toDispatch = Math.max(0, Math.min(cap - inFlight, wantForWork));
            core.info(`unclaimed=${unclaimed} inFlight=${inFlight} cap=${cap} wantForWork=${wantForWork} → dispatching ${toDispatch}`);
            if (toDispatch === 0) {
              core.info("cap already saturated (or no headroom) — a running batch's own requeue will top up as it finishes");
              return;
            }

            // workflow_ref: "OWNER/REPO/.github/workflows/FILE.yml@refs/heads/main" — resolving
            // the file from it means no per-repo config is needed to know what to re-dispatch.
            const m = (process.env.WORKFLOW_REF || "").match(/\.github\/workflows\/([^@]+)/);
            const workflowFile = m ? m[1] : "issue-build.yml";
            const ref = process.env.REF_NAME || "main";
            for (let n = 0; n < toDispatch; n++) {
              try {
                await github.rest.actions.createWorkflowDispatch({ owner, repo, workflow_id: workflowFile, ref });
                core.info(`dispatched requeue ${n + 1}/${toDispatch} of ${workflowFile}`);
              } catch (e) {
                core.warning(`requeue dispatch ${n + 1} failed (non-fatal — the schedule still picks up the backlog): ${e.message}`);
              }
            }
