name: Offsite backup

# The vault (SuxOS/vault) is the life-record store and, as of the 2026-07-22 audit, a
# single-platform SPOF — zero off-GitHub backup exists. This workflow mirror-clones
# vault (plus sux and claude-config, the other repos whose loss would be expensive)
# nightly and ships tarballs to two independent, non-GitHub, off-Cloudflare-adjacent
# targets: Cloudflare R2 (primary — required) and Backblaze B2 (secondary — optional
# until Colin provisions its secrets, see the guard below). See issue #682.
#
# KISS per the issue: plain `git clone --mirror` + `tar` + `aws s3 cp` against R2/B2's
# S3-compatible endpoints. No new services, no Terraform, no extra infra.
#
# Runs directly in this repo (like budget-governor.yml/pin-consistency.yml) — it is
# NOT a reusable workflow_call file, since it only ever needs to act on this fixed,
# hardcoded repo list, not every caller repo.
#
# Two jobs:
#   backup          — nightly: clone --mirror, tar, upload to R2 (required) and B2
#                      (optional, inert until its secrets exist), then prune both
#                      to 14 dailies + 8 weeklies.
#   restore-verify   — gated to the 1st of the month: download the newest tarball for
#                      each repo from R2, untar, `git fsck --full` it, and fail loudly
#                      on corruption. A restore-verify smoke test, not a full restore.

on:
  schedule:
    - cron: "8 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Don't cancel-in-progress: an in-flight upload/prune killed mid-way is worse than
  # a slightly-delayed next run — durability over freshness for a backup job.
  group: backup-offsite
  cancel-in-progress: false

env:
  BACKUP_REPOS: "vault sux claude-config"
  R2_BUCKET: "backup"
  RETAIN_DAILY: "14"
  RETAIN_WEEKLY: "8"

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # Repos scoped exactly to the fixed backup list — vault is a private life-data
      # repo, so this must not be a broader org-wide token than strictly needed.
      - name: Mint org-scoped app token
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}
          tier: read
          owner: SuxOS
          repositories: "vault,sux,claude-config"

      - name: Mirror-clone and archive
        id: archive
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          stamp=$(date -u +%Y-%m-%d)
          mkdir -p backups
          for repo in $BACKUP_REPOS; do
            echo "cloning SuxOS/${repo} (mirror)..."
            git clone --mirror --quiet \
              "https://x-access-token:${GH_TOKEN}@github.com/SuxOS/${repo}.git" \
              "${repo}.git"
            tar czf "backups/${repo}-${stamp}.tar.gz" "${repo}.git"
            # Repo-level status only (size/name) — vault is private life-data, so
            # never log file listings or content from inside the mirror.
            echo "archived ${repo}: $(du -h "backups/${repo}-${stamp}.tar.gz" | cut -f1)"
            rm -rf "${repo}.git"
          done
          echo "stamp=${stamp}" >> "$GITHUB_OUTPUT"

      - name: Upload to Cloudflare R2 (primary, required)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "auto"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ACCOUNT_ID:-}" ]; then
            echo "::error::R2_ACCESS_KEY_ID/R2_SECRET_ACCESS_KEY/R2_ACCOUNT_ID not set — this is the only currently-provisioned offsite target, so refusing to report success with nothing actually backed up"
            exit 1
          fi
          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          for f in backups/*.tar.gz; do
            name=$(basename "$f")
            aws s3 cp "$f" "s3://${R2_BUCKET}/${name}" --endpoint-url "$endpoint"
            echo "uploaded ${name} to R2"
          done

      - name: Upload to Backblaze B2 (secondary, optional until provisioned)
        env:
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APP_KEY: ${{ secrets.B2_APP_KEY }}
          B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
        run: |
          set -euo pipefail
          # Inert-until-provisioned, same pattern as fabric-health.yml's GRAFANA_*
          # secrets: this leg is a nice-to-have second offsite copy, not the required
          # gate, so a missing secret must skip cleanly rather than fail the run.
          if [ -z "${B2_KEY_ID:-}" ] || [ -z "${B2_APP_KEY:-}" ] || [ -z "${B2_ENDPOINT:-}" ] || [ -z "${B2_BUCKET:-}" ]; then
            echo "B2_KEY_ID/B2_APP_KEY/B2_ENDPOINT/B2_BUCKET not fully set — Backblaze leg inert (no-op) until provisioned"
            exit 0
          fi
          export AWS_ACCESS_KEY_ID="$B2_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$B2_APP_KEY"
          export AWS_DEFAULT_REGION="auto"
          for f in backups/*.tar.gz; do
            name=$(basename "$f")
            aws s3 cp "$f" "s3://${B2_BUCKET}/${name}" --endpoint-url "$B2_ENDPOINT"
            echo "uploaded ${name} to B2"
          done

      - name: Prune old backups on R2 (14 dailies + 8 weeklies)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "auto"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ACCOUNT_ID:-}" ]; then
            echo "::error::R2 credentials not set — cannot prune"
            exit 1
          fi
          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          for repo in $BACKUP_REPOS; do
            mapfile -t dates < <(aws s3 ls "s3://${R2_BUCKET}/" --endpoint-url "$endpoint" \
              | awk '{print $4}' \
              | grep -E "^${repo}-[0-9]{4}-[0-9]{2}-[0-9]{2}\.tar\.gz\$" \
              | sed -E "s/^${repo}-([0-9-]+)\.tar\.gz\$/\1/" \
              | sort -r)
            rank=0
            declare -A seen_weeks=()
            weeks_kept=0
            for d in "${dates[@]:-}"; do
              [ -n "$d" ] || continue
              rank=$((rank + 1))
              if [ "$rank" -le "$RETAIN_DAILY" ]; then
                continue
              fi
              week=$(date -u -d "$d" +%G-%V 2>/dev/null || date -u -j -f "%Y-%m-%d" "$d" +%G-%V)
              if [ -z "${seen_weeks[$week]:-}" ] && [ "$weeks_kept" -lt "$RETAIN_WEEKLY" ]; then
                seen_weeks[$week]=1
                weeks_kept=$((weeks_kept + 1))
                continue
              fi
              echo "pruning ${repo}-${d}.tar.gz from R2 (rank ${rank}, past retention)"
              aws s3 rm "s3://${R2_BUCKET}/${repo}-${d}.tar.gz" --endpoint-url "$endpoint"
            done
            unset seen_weeks
          done

      - name: Prune old backups on B2 (14 dailies + 8 weeklies)
        env:
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APP_KEY: ${{ secrets.B2_APP_KEY }}
          B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
        run: |
          set -euo pipefail
          if [ -z "${B2_KEY_ID:-}" ] || [ -z "${B2_APP_KEY:-}" ] || [ -z "${B2_ENDPOINT:-}" ] || [ -z "${B2_BUCKET:-}" ]; then
            echo "B2 secrets not fully set — skipping B2 prune (leg inert)"
            exit 0
          fi
          export AWS_ACCESS_KEY_ID="$B2_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$B2_APP_KEY"
          export AWS_DEFAULT_REGION="auto"
          for repo in $BACKUP_REPOS; do
            mapfile -t dates < <(aws s3 ls "s3://${B2_BUCKET}/" --endpoint-url "$B2_ENDPOINT" \
              | awk '{print $4}' \
              | grep -E "^${repo}-[0-9]{4}-[0-9]{2}-[0-9]{2}\.tar\.gz\$" \
              | sed -E "s/^${repo}-([0-9-]+)\.tar\.gz\$/\1/" \
              | sort -r)
            rank=0
            declare -A seen_weeks=()
            weeks_kept=0
            for d in "${dates[@]:-}"; do
              [ -n "$d" ] || continue
              rank=$((rank + 1))
              if [ "$rank" -le "$RETAIN_DAILY" ]; then
                continue
              fi
              week=$(date -u -d "$d" +%G-%V 2>/dev/null || date -u -j -f "%Y-%m-%d" "$d" +%G-%V)
              if [ -z "${seen_weeks[$week]:-}" ] && [ "$weeks_kept" -lt "$RETAIN_WEEKLY" ]; then
                seen_weeks[$week]=1
                weeks_kept=$((weeks_kept + 1))
                continue
              fi
              echo "pruning ${repo}-${d}.tar.gz from B2 (rank ${rank}, past retention)"
              aws s3 rm "s3://${B2_BUCKET}/${repo}-${d}.tar.gz" --endpoint-url "$B2_ENDPOINT"
            done
            unset seen_weeks
          done

  restore-verify:
    needs: backup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check day-of-month (monthly restore-verify smoke test)
        id: day
        run: |
          set -euo pipefail
          day=$(date -u +%d)
          if [ "$day" = "01" ]; then
            echo "first=true" >> "$GITHUB_OUTPUT"
          else
            echo "first=false" >> "$GITHUB_OUTPUT"
            echo "not the 1st of the month (day=${day}) — skipping restore-verify until next month"
          fi

      - name: Download newest tarball per repo and git fsck it
        if: steps.day.outputs.first == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "auto"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ACCOUNT_ID:-}" ]; then
            echo "::error::R2 credentials not set — cannot run monthly restore-verify"
            exit 1
          fi
          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          failed=0
          for repo in $BACKUP_REPOS; do
            latest=$(aws s3 ls "s3://${R2_BUCKET}/" --endpoint-url "$endpoint" \
              | awk '{print $4}' \
              | grep -E "^${repo}-[0-9]{4}-[0-9]{2}-[0-9]{2}\.tar\.gz\$" \
              | sort -r | head -1 || true)
            if [ -z "$latest" ]; then
              echo "::error::no backup found for ${repo} on R2 — restore-verify cannot proceed"
              failed=1
              continue
            fi
            echo "restore-verify: ${repo} <- ${latest}"
            aws s3 cp "s3://${R2_BUCKET}/${latest}" "./${latest}" --endpoint-url "$endpoint"
            tar xzf "${latest}"
            if ! git --git-dir="${repo}.git" fsck --full; then
              echo "::error::git fsck FAILED for ${repo} (${latest}) — the offsite backup is CORRUPTED"
              failed=1
            else
              echo "restore-verify OK: ${repo} (${latest})"
            fi
            rm -rf "${repo}.git" "${latest}"
          done
          if [ "$failed" -ne 0 ]; then
            echo "::error::monthly restore-verify found at least one corrupted/missing offsite backup — see errors above"
            exit 1
          fi
