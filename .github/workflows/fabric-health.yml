name: Fabric health spine (reusable)

# S1 of the SuxOS v2 fabric-stability spec
# (docs/design/2026-07-16-fabric-stability-v2-design.md).
#
# One cron pass that turns the fabric's state into ONE ground-truth artifact
# (fabric-status.json) and ships it to Grafana Cloud the SAME way the sux edge
# already does (sux/src/grafana.ts): a low-cardinality Prometheus snapshot as
# Influx line protocol (suxos_* series) + a per-run event to the Loki stream
# {service="suxos-fabric"}. The Grafana push is DORMANT until GRAFANA_PROM_URL /
# GRAFANA_PROM_USER / GRAFANA_LOKI_TOKEN (and the Loki trio) are set — a clean
# no-op otherwise, so this is safe to land before the secrets exist.
#
# Stateless by design: it emits point-in-time gauges (e.g. suxos_backlog_zero),
# and the 7-day drain-to-zero streak in the Definition of Done is derived in
# Prometheus from series history (min_over_time(suxos_backlog_zero[7d]) == 1),
# NOT tracked in the workflow. No state to persist, nothing to corrupt.
#
# Read-only against every surveyed repo (no mutation) — with one exception: the §4
# next-arc reconciler (docs/design/2026-07-19-next-arc-decision-rule-design.md §3.4,
# #556) upserts a single tracking issue in THIS repo (.github) stating the current
# decision-table verdict, same dedup-by-title pattern as budget-governor.yml's org-wide
# report. That write is gated behind the `next-arc-reconciler` input (default false,
# #557): the underlying decision table is day-granularity, so self-fabric-health.yml's
# 15-minute cadence leaves it off and self-next-arc-reconciler.yml's daily cadence turns
# it on — see that file for the caller wiring. Caller (self-fabric-health.yml)
# owns the schedule and passes the repo list + optional edge smoke checks:
#   uses: SuxOS/.github/.github/workflows/fabric-health.yml@main
#   with: { repos: "sux suxlib suxrouter claude-config .github" }
#   secrets: inherit

on:
  workflow_call:
    inputs:
      repos:
        description: "Space/newline-separated repo names in this org to survey."
        type: string
        default: "sux suxlib suxrouter claude-config .github"
      backlog-exclude-labels:
        description: >-
          Comma-separated issue labels that make an open issue NOT build-eligible
          (held/blocked/tracking work is not backlog), ADDITIONAL to the
          nonbuildable-labels composite action's shared floor (building, hold,
          needs-human, tracking — issue-build.yml's buildable predicate), which
          is always applied regardless of this input so the two can't drift (#317).
        type: string
        default: "hold,blocked,throttle,epic"
      stuck-idle-days:
        description: "An open PR untouched for at least this many days counts as stuck."
        type: string
        default: "2"
      merged-window-hours:
        description: >-
          Trailing window (hours) for the per-repo merged_prs_in_window drain-controller
          signal (docs/design/2026-07-18-drain-controller-design.md §2.1). Deliberately an
          order of magnitude past this workflow's 15-min run cadence — the design doc's
          #357 log shows a 14-23 minute sample being too noisy to feed a controller
          directly.
        type: string
        default: "2"
      edge-smoke-checks:
        description: >-
          Newline-separated `service=url=expected-status` triples for edge deploy
          health (e.g. `sux=https://…/mcp=401`). Each emits suxos_edge_deploy_ok{service}.
          Empty (default) skips edge checks entirely — inert, never fails the run.
        type: string
        default: ""
      history-days:
        description: >-
          Trailing days to sample (one successful run per day, not every 15-min run) for
          the backlog-zero streak / naive growth-rate history read
          (docs/design/2026-07-19-next-arc-decision-rule-design.md §3.2, #554) — mechanizes
          the §4 gate's "7 consecutive days" precondition, previously only readable via a
          Grafana-only PromQL query this org has no read-back capability for.
        type: string
        default: "7"
      opus-budget-min:
        description: >-
          Opus-tier token-bucket capacity in runner-minutes — must match
          budget-governor.yml's own OPUS_BUDGET_MIN input so the §4 next-arc
          reconciler's headroom_fraction (budget_opus_avail_min / this) reads the
          same "≥50% idle headroom" the governor itself computes against
          (docs/design/2026-07-19-next-arc-decision-rule-design.md §3.4, #556). Not
          read back from the governor directly — there is no cross-workflow input
          read, only the "Autonomy throttle" issue body's absolute-minutes numbers.
        type: string
        default: "900"
      next-arc-reconciler:
        description: >-
          Gate for the §4 next-arc reconciler's tracking-issue write (the
          "Evaluate/Build/Refresh" steps below) — the decision table is inherently
          day-granularity (7-day streak, headroom trend), so a caller wiring this on
          a coarse daily schedule (see self-next-arc-reconciler.yml) sets this true;
          self-fabric-health.yml's 15-minute cadence leaves it false so it isn't
          upserting the same tracking issue 96 times a day for no benefit
          (docs/design/2026-07-19-next-arc-decision-rule-design.md §3.5, #557). The
          signals it reads (history, edge checks, budget headroom) are still
          collected every run regardless of this flag — only the tracking-issue
          write is gated.
        type: boolean
        default: false
      workflow-disabled-exempt:
        description: >-
          Comma-separated workflow file basenames that are exempt from
          suxos_workflow_disabled{repo,workflow} alerting — the workflow_call-only
          reusable definitions in this repo, which have no schedule/event trigger of
          their own and so are routinely left `disabled_manually` by design.
        type: string
        default: "audit.yml,automerge.yml,ci.yml,claude-autofix.yml,claude.yml,fabric-health.yml,fixer.yml,health.yml,issue-build.yml,pr-auto-update.yml,pr-drain.yml,pr-unstick.yml,pr-watch.yml,security-review.yml,skill-sync.yml"

permissions:
  contents: read
  issues: write
  pull-requests: read
  actions: read
  checks: read

concurrency:
  group: fabric-health-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  spine:
    name: Collect fabric health, emit status, ship to Grafana
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Non-buildable labels
        id: nonbuildable
        uses: SuxOS/.github/.github/actions/nonbuildable-labels@main

      # scripts/lib/is-trusted-author.jq is the single source of truth for the isTrusted
      # predicate (#551). fabric-health.yml is only ever invoked by self-fabric-health.yml
      # in THIS repo (see below), so this is a same-repo checkout — the default GITHUB_TOKEN
      # (contents: read, granted above) is enough, no app token needed.
      - name: Checkout SuxOS/.github (shared trust predicate)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: SuxOS/.github
          ref: main
          path: .suxos-ci

      # Self cross-run artifact fetch (docs/design/2026-07-18-drain-controller-design.md
      # §2.2, #475): the drain-controller's integral_error is a running sum, so each run
      # needs the PREVIOUS run's value. Mirrors issue-build.yml's cross-WORKFLOW spine
      # fetch (#452), just pointed at THIS workflow's own run history — fabric-health.yml
      # is only ever invoked by self-fabric-health.yml in THIS repo, so the already-granted
      # actions:read GITHUB_TOKEN is enough; no cross-repo app token needed. Collection-
      # integrity discipline (#305): a genuine cold start (no prior run yet) is NOT the
      # same as a failed fetch of a run that does exist — the former is a legitimate zero,
      # the latter must not silently read as one, so `state` distinguishes them and
      # `integral_ok` below only goes 0 for the latter.
      - name: Fetch prior fabric-status.json (drain-controller integral state)
        id: prior
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          state="cold_start"

          run_id=$( { gh run list --repo "${GITHUB_REPOSITORY}" --workflow self-fabric-health.yml \
            --status success --limit 1 --json databaseId 2>/dev/null \
            | jq -r '.[0].databaseId // empty'; } || true)

          if [ -n "$run_id" ]; then
            updated_at=$( { gh run view "$run_id" --repo "${GITHUB_REPOSITORY}" \
              --json updatedAt --jq '.updatedAt' 2>/dev/null; } || true)
            if [ -z "$updated_at" ]; then
              state="unavailable"
            else
              age_min=$(( ( $(date -u +%s) - $(date -u -d "$updated_at" +%s 2>/dev/null || echo 0) ) / 60 ))
              if [ "$age_min" -gt 60 ]; then
                # Stale prior run (~4x this workflow's 15-min cadence, same staleness cap
                # issue-build.yml's spine fetch uses) — a real cron gap (missed run,
                # disabled window), not normal cadence. integral_error was never
                # calibrated to integrate across a gap this size, so reset instead of
                # carrying it forward. A designed reset, not a fetch failure.
                state="stale"
              else
                rm -rf /tmp/prior-fabric-status && mkdir -p /tmp/prior-fabric-status
                if gh run download "$run_id" --repo "${GITHUB_REPOSITORY}" --name fabric-status \
                    --dir /tmp/prior-fabric-status 2>/dev/null \
                    && [ -f /tmp/prior-fabric-status/fabric-status.json ] \
                    && jq -e . /tmp/prior-fabric-status/fabric-status.json >/dev/null 2>&1; then
                  state="ok"
                else
                  state="unavailable"
                fi
              fi
            fi
          fi

          echo "state=$state" >> "$GITHUB_OUTPUT"
          if [ "$state" = "ok" ]; then
            echo "prior-file=/tmp/prior-fabric-status/fabric-status.json" >> "$GITHUB_OUTPUT"
          fi
          echo "drain-controller prior state: $state (run ${run_id:-none})"

      - name: Collect cross-repo health into fabric-status.json
        id: collect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: ${{ github.repository_owner }}
          REPOS: ${{ inputs.repos }}
          EXCLUDE_LABELS: ${{ inputs.backlog-exclude-labels }}
          NONBUILDABLE_LABELS: ${{ steps.nonbuildable.outputs.labels }}
          STUCK_IDLE_DAYS: ${{ inputs.stuck-idle-days }}
          DISABLED_EXEMPT: ${{ inputs.workflow-disabled-exempt }}
          MERGED_WINDOW_HOURS: ${{ inputs.merged-window-hours }}
          PRIOR_STATE: ${{ steps.prior.outputs.state }}
          PRIOR_FILE: ${{ steps.prior.outputs.prior-file }}
        run: |
          set -euo pipefail

          now_epoch=$(date -u +%s)
          stuck_before=$(date -u -d "-${STUCK_IDLE_DAYS} days" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-"${STUCK_IDLE_DAYS}"d +%Y-%m-%dT%H:%M:%SZ)
          merged_window_hours="${MERGED_WINDOW_HOURS:-2}"
          merged_cutoff=$(date -u -d "-${merged_window_hours} hours" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-"${merged_window_hours}"H +%Y-%m-%dT%H:%M:%SZ)

          # --- Drain-controller state (#475): load the prior run's per-repo integral_error,
          # if the "prior" step found one. Absent/stale/unavailable all degrade to "{}" (no
          # prior data), which reads as prior_integral=0 per repo below — a fresh start, same
          # fail-soft shape as every other spine signal.
          prior_state="${PRIOR_STATE:-cold_start}"
          if [ -n "${PRIOR_FILE:-}" ] && [ -f "${PRIOR_FILE:-}" ]; then
            prior_json=$(cat "$PRIOR_FILE")
          else
            prior_json="{}"
          fi
          # cold_start/stale are legitimate, EXPECTED zero-resets (no run yet / gap too wide
          # to integrate across) — only "unavailable" (a run exists but couldn't be fetched)
          # is a real collection failure (#305: don't mask it as a healthy cold start).
          case "$prior_state" in
            ok|cold_start|stale) integral_ok=1 ;;
            *) integral_ok=0 ;;
          esac

          # jq filter reused per repo: mark a PR "stuck" if it is BEHIND/DIRTY, has a
          # failing status rollup, or has been idle past the threshold.
          repos_json="[]"
          backlog_total=0
          issues_all_ok=1      # every repo's issue query observed → backlog_zero is assertable
          collection_all_ok=1  # every collector on every repo succeeded → spine not degraded
          throttle_any_active=0  # OR across every repo's own throttle level (#522)
          github_throttle_body=""  # captured from the loop below when repo == ".github"

          for repo in $REPOS; do
            slug="${ORG}/${repo}"

            # --- Backlog: open, non-PR issues that are build-eligible ---
            # collection-integrity contract (#305): capture whether each query actually
            # SUCCEEDED (<collector>_ok) so a transient API error surfaces as an explicit
            # "unknown" (suxos_collection_ok=0) instead of a healthy-looking zero. Without
            # this a failed issue query reads backlog 0 and can falsely satisfy the
            # backlog-zero Definition-of-Done streak on data that was never observed.
            # Uses `gh api` (not `gh issue list --json`, which doesn't expose
            # authorAssociation at all) with --paginate --slurp so the fetch is
            # exhaustive rather than a client-set --limit — no separate "did we hit the
            # cap" check needed (#345's concern doesn't apply to a paginated fetch). The
            # raw issues endpoint also returns PRs, so pull_request entries are dropped.
            if raw=$(gh api -X GET "repos/${slug}/issues?state=open&per_page=100" \
                --paginate --slurp 2>/dev/null); then
              issues=$(printf '%s' "$raw" | jq -c '(add // []) | map(select(.pull_request == null))')
              issues_ok=1
            else
              issues="[]"; issues_ok=0
            fi
            # Build-eligibility trust predicate: MUST mirror issue-build.yml's isTrusted
            # (OWNER/MEMBER/COLLABORATOR, or the suxbot bot identity, or the ORG_OWNER_IDS
            # numeric-id stopgap for #186) — issue-build structurally never builds an
            # untrusted-author issue, so counting one here inflates backlog_zero/the
            # drain-controller setpoint forever (#521). Sourced from the shared
            # scripts/lib/is-trusted-author.jq (#551) so this can't drift from
            # scripts/lib/is-trusted-author.js, which issue-build.yml's two copies use.
            backlog=$(printf '%s' "$issues" | jq -L "$GITHUB_WORKSPACE/.suxos-ci/scripts/lib" \
              --arg ex "$EXCLUDE_LABELS" --arg nb "$NONBUILDABLE_LABELS" '
              include "is-trusted-author";
              ((($ex | split(",")) + ($nb | split(","))) | map(select(length>0))) as $excl
              | [ .[]
                  | select((.labels | map(.name)) as $l | any($excl[]; . as $e | $l | index($e)) | not)
                  | select(is_trusted_author)
                ]
              | length')

            # --- PRs: open / red (failing checks) / stuck ---
            # Same cap-hit detection as the issues collector above (#345).
            if prs=$(gh pr list --repo "$slug" --state open --limit 201 \
                --json number,mergeable,mergeStateStatus,statusCheckRollup,updatedAt 2>/dev/null); then
              if [ "$(printf '%s' "$prs" | jq 'length')" -gt 200 ]; then
                prs="[]"; prs_ok=0
              else
                prs_ok=1
              fi
            else
              prs="[]"; prs_ok=0
            fi
            pr_stats=$(printf '%s' "$prs" | jq --arg before "$stuck_before" '
              def failing: any(.statusCheckRollup[]?;
                (.conclusion // .state // "") | ascii_upcase | . == "FAILURE" or . == "TIMED_OUT" or . == "ERROR");
              {
                open: length,
                red: ([ .[] | select(failing) ] | length),
                stuck: ([ .[] | select(
                    (.mergeStateStatus // "") as $m
                    | ($m == "BEHIND" or $m == "DIRTY")
                    or (.updatedAt < $before)) ] | length)
              }')

            # --- Merged PRs in the trailing window (drain-controller signal, #473) ---
            # Count-only, same collection-integrity contract as every other collector
            # here: a failed query degrades collection.merged to 0 (never a healthy-
            # looking zero) so consumers can't mistake "couldn't measure" for "no drain".
            if merged=$(gh pr list --repo "$slug" --state merged --limit 201 \
                --search "merged:>=${merged_cutoff}" --json number 2>/dev/null); then
              if [ "$(printf '%s' "$merged" | jq 'length')" -gt 200 ]; then
                merged_ok=0; merged_count=0
              else
                merged_ok=1; merged_count=$(printf '%s' "$merged" | jq 'length')
              fi
            else
              merged_ok=0; merged_count=0
            fi

            # --- Drain-controller integral_error + recommended_parallel_batches (#475/#476,
            # formula spec docs/design/2026-07-19-drain-controller-pi-formula-spec.md §2). Per-
            # repo, not fabric-wide (parent design doc §2.1). Constants match the spec exactly:
            # TARGET_DRAIN_HOURS=48, INTEGRAL_FLOOR=0, INTEGRAL_CAP=20, Kp=1, Ki=0.2,
            # OUTPUT_CAP=4. raw_output is written below as recommended_parallel_batches —
            # consumption (issue-build.yml's requeue) dampens it by budget-governor headroom
            # and floors at the static parallel-batches default (parent doc §2.4/§2.5); this
            # step only computes and persists the raw per-repo signal.
            prior_integral=$(printf '%s' "$prior_json" | jq -r --arg r "$repo" \
              '(.repos // [])[] | select(.repo == $r) | .integral_error // empty' 2>/dev/null || true)
            prior_integral="${prior_integral:-0}"
            # merged_ok=0 means merged_count is a fabricated 0 (#508); issues_ok=0 means
            # backlog is a fabricated 0 from an empty issues array (#575) — either way the
            # observation feeding `err` isn't real, and would permanently corrupt
            # integral_error (it becomes next run's prior_integral). Hold the integral
            # unchanged and derive raw_output from the held integral alone (err=0) so a
            # transient query failure on either collector doesn't corrupt the running PI
            # state.
            read -r integral_error raw_output <<<"$(awk -v prior="$prior_integral" -v backlog="$backlog" \
              -v merged="$merged_count" -v window="$merged_window_hours" -v merged_ok="$merged_ok" \
              -v issues_ok="$issues_ok" 'BEGIN {
                if (merged_ok == 1 && issues_ok == 1) {
                  merged_rate = (window > 0) ? merged / window : 0
                  setpoint = backlog / 48
                  err = setpoint - merged_rate
                } else {
                  err = 0
                }
                integral = prior + err
                if (integral < 0) integral = 0
                if (integral > 20) integral = 20
                raw = 1 * err + 0.2 * integral
                out = (raw >= 0) ? int(raw + 0.5) : -int(-raw + 0.5)
                if (out < 0) out = 0
                if (out > 4) out = 4
                printf "%.6f %d", integral, out
              }')"

            # --- Workflows: disabled_manually or disabled_inactivity, excluding known-by-design reusable defs ---
            # Same cap-hit detection as the issues/prs collectors above (#345, #381):
            # --limit 101 (one past the assumed real cap of 100 workflow files — far
            # more than any known caller repo has) so a full page reads as a collection
            # failure (wfs_ok=0) instead of a silent undercount that would omit
            # workflows past the page boundary from wf_red / suxos_workflow_disabled.
            if wfs=$(gh workflow list --repo "$slug" --all --limit 101 \
                --json id,name,path,state 2>/dev/null); then
              if [ "$(printf '%s' "$wfs" | jq 'length')" -gt 100 ]; then
                wfs="[]"; wfs_ok=0
              else
                wfs_ok=1
              fi
            else
              wfs="[]"; wfs_ok=0
            fi

            # --- Workflows: how many have a failing LAST run ---
            # A single `gh run list --limit 200` is a most-recent-runs window across ALL
            # workflows in the repo, so on a busy repo a low-traffic workflow's latest run
            # can fall outside that window and be silently omitted from wf_red (#345).
            # Query the latest run per workflow instead, so every workflow is observed
            # regardless of repo-wide run volume.
            #
            # Naive per-workflow querying is one `gh run list` call PER WORKFLOW PER REPO —
            # 100+ extra API calls org-wide on a cron schedule (#350). Cut that by first
            # batch-fetching the repo's 100 most-recent runs (one call) and reading each
            # workflow's latest conclusion off that when present; only a workflow whose
            # latest run fell outside that window still needs its own per-workflow call.
            # This keeps the #345 no-under-reporting guarantee (every workflow is still
            # observed one way or the other) while cutting calls for the common case where
            # most workflows show up in the recent-runs window.
            wf_red=0
            if [ "$wfs_ok" -eq 1 ]; then
              runs_ok=1
              batch_runs=$(gh run list --repo "$slug" --limit 100 \
                  --json workflowDatabaseId,conclusion,status 2>/dev/null) || batch_runs="[]"
              while IFS= read -r wf_id; do
                [ -z "$wf_id" ] && continue
                batch_concl=$(printf '%s' "$batch_runs" | jq -r --argjson id "$wf_id" '
                  [.[] | select(.workflowDatabaseId == $id)][0]
                  | select(. != null) | select(.status == "completed") | .conclusion // "none"')
                if [ -n "$batch_concl" ]; then
                  { [ "$batch_concl" = "failure" ] || [ "$batch_concl" = "timed_out" ]; } && wf_red=$((wf_red + 1))
                elif last_run=$(gh run list --repo "$slug" --workflow "$wf_id" --limit 1 \
                    --json conclusion,status 2>/dev/null); then
                  concl=$(printf '%s' "$last_run" | jq -r '.[0] | select(.status == "completed") | .conclusion // empty')
                  { [ "$concl" = "failure" ] || [ "$concl" = "timed_out" ]; } && wf_red=$((wf_red + 1))
                else
                  runs_ok=0
                fi
              done < <(printf '%s' "$wfs" | jq -r '.[].id')
            else
              runs_ok=0
            fi
            # The exempt list is the workflow_call-only reusable defs that live in THIS repo
            # (.github) and are left disabled_manually by design. In every caller repo those
            # same basenames are ACTIVE caller stubs (e.g. security-review.yml, a required
            # merge gate), so only apply the exemption when surveying .github — everywhere
            # else a manual disable is a real alert we must not suppress (#290). The exemption
            # covers only disabled_manually — disabled_inactivity (GitHub auto-disabling a
            # workflow after 60 days of repo inactivity) is never by-design, even in .github,
            # so it always alerts (#303).
            disabled_json=$(printf '%s' "$wfs" | jq --arg ex "$DISABLED_EXEMPT" --arg repo "$repo" '
              (if $repo == ".github"
                 then ($ex | split(",") | map(select(length>0)))
                 else [] end) as $excl
              | [ .[] | select(.state == "disabled_manually" or .state == "disabled_inactivity")
                  | select(if .state == "disabled_manually"
                           then (((.path | split("/") | last) as $b | $excl | index($b)) | not)
                           else true end)
                  | {file: (.path | split("/") | last), name: .name, state: .state} ]')

            # --- Budget throttle: this repo's own "Autonomy throttle" tracking issue
            # (#522) — budget-governor.yml writes one per managed repo, and a per-repo
            # `throttle-manual` pin or a stale write can leave one repo's level diverged
            # from the rest, so this must be read per repo like every other collector
            # here, not sampled once off .github. Same body-match (never a label) and
            # fail-open-to-green-on-lookup-error semantics as the fleet-wide read below.
            repo_throttle_body=$(gh issue list --repo "$slug" --state open \
                --search "\"Autonomy throttle\" in:title" --limit 100 \
                --json title,body 2>/dev/null \
              | jq -r '[.[] | select(.title == "Autonomy throttle")] | first | .body // ""') || true
            repo_throttle_level=$(grep -m1 -oE '^level: (green|yellow|red)$' <<<"$repo_throttle_body" | awk '{print $2}') || true
            repo_throttle_level=${repo_throttle_level:-green}
            repo_throttle_active=$([ "$repo_throttle_level" != "green" ] && echo 1 || echo 0)
            [ "$repo_throttle_active" -eq 1 ] && throttle_any_active=1
            [ "$repo" = ".github" ] && github_throttle_body="$repo_throttle_body"

            repo_obj=$(jq -n --arg repo "$repo" --argjson backlog "$backlog" \
              --argjson pr "$pr_stats" --argjson wf_red "$wf_red" \
              --argjson disabled "$disabled_json" \
              --argjson merged "$merged_count" \
              --argjson integral "$integral_error" --argjson checked_at "$now_epoch" \
              --argjson recommended "$raw_output" \
              --argjson throttle_active "$repo_throttle_active" \
              --argjson iok "$issues_ok" --argjson pok "$prs_ok" \
              --argjson rok "$runs_ok" --argjson wok "$wfs_ok" --argjson mok "$merged_ok" \
              --argjson gok "$integral_ok" \
              '{repo: $repo, backlog: $backlog, prs: $pr, workflow_red: $wf_red,
                workflows_disabled: $disabled,
                merged_prs_in_window: $merged,
                integral_error: $integral,
                recommended_parallel_batches: $recommended,
                budget_throttle_active: $throttle_active,
                checked_at: $checked_at,
                collection: {issues: $iok, prs: $pok, runs: $rok, workflows: $wok, merged: $mok, integral: $gok}}')
            repos_json=$(printf '%s' "$repos_json" | jq --argjson o "$repo_obj" '. + [$o]')
            backlog_total=$((backlog_total + backlog))
            # A single failed collector anywhere degrades the whole spine to "unknown".
            # issues_all_ok separately gates backlog_zero: a missed issue query means org
            # backlog can't be asserted zero (the merge-relevant 7-day DoD streak).
            [ "$issues_ok" -eq 1 ] || issues_all_ok=0
            if [ "$issues_ok" -eq 0 ] || [ "$prs_ok" -eq 0 ] \
                || [ "$runs_ok" -eq 0 ] || [ "$wfs_ok" -eq 0 ] || [ "$merged_ok" -eq 0 ] \
                || [ "$integral_ok" -eq 0 ]; then
              collection_all_ok=0
            fi
          done

          # --- Budget governor: fleet-wide throttle_active is now the OR of every repo's
          # own "Autonomy throttle" tracking issue level, computed in the loop above
          # (#522) — a single repo pinned via `throttle-manual` or left stale by a failed
          # write no longer hides behind a healthy-looking .github-only read. Per-repo
          # detail lives in each repos[].budget_throttle_active.
          throttle_active="$throttle_any_active"

          # budget-governor's token-bucket headroom (#501), read structurally off the
          # .github tracking-issue body (the fleet-wide numbers budget-governor computes
          # once and writes identically to every repo, .github included) instead of the
          # throttle-level line alone — the drain-controller's headroom dampener
          # (docs/design/2026-07-18-drain-controller-design.md §2.4/#476) needs this as a
          # number, not tracking-issue prose. Absent/unparseable (governor hasn't run yet,
          # a pre-#501 body with no such line, or .github isn't in $REPOS) degrades to
          # `null` in fabric-status.json below, NOT a fabricated 0 — a bare 0 would read as
          # "budget fully exhausted" and wrongly force maximum dampening, whereas null lets a
          # consumer fail-soft to "no dampening", the same missing-data contract every other
          # spine signal here already uses.
          opus_avail_min=$(grep -m1 -oE '^opus_avail_min: [0-9]+$' <<<"$github_throttle_body" | awk '{print $2}') || true
          total_avail_min=$(grep -m1 -oE '^total_avail_min: [0-9]+$' <<<"$github_throttle_body" | awk '{print $2}') || true

          # Gate backlog_zero on issue-collection success (#305): only assert org backlog
          # is zero when every repo's issue query was actually observed. An unobserved
          # backlog reads NOT zero so the 7-day DoD streak can't stay green across a gap.
          backlog_zero=$([ "$backlog_total" -eq 0 ] && [ "$issues_all_ok" -eq 1 ] && echo 1 || echo 0)

          jq -n \
            --argjson ts "$now_epoch" \
            --argjson repos "$repos_json" \
            --argjson backlog_total "$backlog_total" \
            --argjson backlog_zero "$backlog_zero" \
            --argjson throttle_active "$throttle_active" \
            --argjson collection_ok "$collection_all_ok" \
            --arg opus_avail_min "${opus_avail_min:-}" \
            --arg total_avail_min "${total_avail_min:-}" \
            '{
              schema: "suxos-fabric-status/v1",
              generated_at_epoch: $ts,
              backlog_total: $backlog_total,
              backlog_zero: $backlog_zero,
              budget_throttle_active: $throttle_active,
              budget_opus_avail_min: (if ($opus_avail_min | length) > 0 then ($opus_avail_min | tonumber) else null end),
              budget_total_avail_min: (if ($total_avail_min | length) > 0 then ($total_avail_min | tonumber) else null end),
              collection_ok: $collection_ok,
              repos: $repos
            }' > fabric-status.json

          echo "backlog_total=$backlog_total backlog_zero=$backlog_zero throttle=$throttle_active collection_ok=$collection_all_ok"
          echo "status-file=fabric-status.json" >> "$GITHUB_OUTPUT"

      # Bounded multi-day backlog history (docs/design/2026-07-19-next-arc-decision-rule-
      # design.md §3.2, #554): extends the #475 self cross-run fetch above from "one prior
      # run" to "one sampled run per trailing day", mechanizing the §4 gate's "7
      # consecutive days" precondition and a naive inflow growth rate — both previously
      # only computable via a Grafana-only PromQL query this org has no read-back
      # capability for. Same-repo run history (self-fabric-health.yml lives only in THIS
      # repo, see the #475 step above), so secrets.GITHUB_TOKEN is enough. A day with no
      # successful run (workflow didn't exist yet, was disabled, every run that day failed)
      # is a legitimate gap and correctly breaks the streak below — same "a gap resets,
      # it doesn't fabricate continuity" contract as the #475 step's stale/unavailable
      # states. `days_available` in the emitted `history` object makes a degraded read
      # (fewer sampled days than requested) visible to a consumer instead of silently
      # reading as a shorter-but-still-confident streak.
      - name: Multi-day backlog history (streak + growth rate, #554)
        id: history
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HISTORY_DAYS: ${{ inputs.history-days }}
          REPOS: ${{ inputs.repos }}
        run: |
          set -uo pipefail

          days="${HISTORY_DAYS:-7}"
          if ! [[ "$days" =~ ^[0-9]+$ ]] || [ "$days" -lt 1 ]; then
            echo "::error::history-days ('$days') must be a positive integer"
            exit 1
          fi

          # Day 0 = this run's own live snapshot (fabric-status.json, already on disk from
          # the "collect" step above) — the streak/growth math wants an unbroken sequence
          # INCLUDING today, not just the trailing history.
          today_entry=$(jq -c '{backlog_total, backlog_zero, collection_ok, repos: (.repos // [])}' fabric-status.json)
          calendar="[$today_entry]"   # newest-first; offsets 1..N appended below

          for offset in $(seq 1 "$days"); do
            day=$(date -u -d "-${offset} days" +%Y-%m-%d 2>/dev/null \
              || date -u -v-"${offset}"d +%Y-%m-%d)

            # One sample per day (the LATEST successful run that day), not every 15-min
            # run — keeps this to ~N gh calls, not ~96*N.
            run_id=$( { gh run list --repo "${GITHUB_REPOSITORY}" --workflow self-fabric-health.yml \
              --status success --created "$day" --limit 1 --json databaseId 2>/dev/null \
              | jq -r '.[0].databaseId // empty'; } || true)

            entry=null
            if [ -n "$run_id" ]; then
              rm -rf /tmp/hist-fabric-status && mkdir -p /tmp/hist-fabric-status
              if gh run download "$run_id" --repo "${GITHUB_REPOSITORY}" --name fabric-status \
                  --dir /tmp/hist-fabric-status 2>/dev/null \
                  && [ -f /tmp/hist-fabric-status/fabric-status.json ] \
                  && jq -e . /tmp/hist-fabric-status/fabric-status.json >/dev/null 2>&1; then
                entry=$(jq -c '{backlog_total, backlog_zero, collection_ok, repos: (.repos // [])}' \
                  /tmp/hist-fabric-status/fabric-status.json)
              fi
            fi
            calendar=$(printf '%s' "$calendar" | jq --argjson e "$entry" '. + [$e]')
          done

          days_available=$(printf '%s' "$calendar" | jq '[.[1:][] | select(. != null)] | length')

          # Per-repo and org-wide: a "day is zero" for a repo means that repo's own
          # backlog was 0 AND its issue collector succeeded that day (mirrors the org-wide
          # backlog_zero gate above — an unobserved backlog must not read as zero). Both
          # streak_zero/growth_rate walk newest-first and stop at the first null/non-zero
          # element, so a day missing from the calendar (org-level gap) or a repo missing
          # from that day's `repos[]` (added to $REPOS after that day) both correctly break
          # continuity instead of silently skipping over the gap.
          history_json=$(printf '%s' "$calendar" | jq -c --arg repos_str "$REPOS" '
            def streak_zero(arr):
              arr as $arr
              | reduce range(0; $arr|length) as $i
                  ({streak: 0, stopped: false};
                   if .stopped then .
                   elif ($arr[$i] == null) or ($arr[$i].backlog_zero != 1) then . + {stopped: true}
                   else .streak += 1 end
                  ) | .streak;

            def growth_rate(arr; field):
              arr as $arr
              | ([range(0; $arr|length) | select($arr[.] != null and $arr[.].collection_ok == 1)]) as $idxs
              | if ($idxs | length) < 2 then null
                else
                  ($arr[$idxs[0]]) as $newest
                  | ($arr[$idxs[-1]]) as $oldest
                  | ($idxs[-1] - $idxs[0]) as $span
                  | if $span == 0 then null else (($newest[field] - $oldest[field]) / $span) end
                end;

            . as $calendar
            | ($repos_str | split(" ") | map(select(length > 0))) as $repo_list
            | {
                backlog_zero_streak_days: streak_zero($calendar),
                backlog_growth_per_day: growth_rate($calendar; "backlog_total"),
                repos: ($repo_list | map({
                    key: .,
                    value: (
                      . as $r
                      | ($calendar | map(
                          if . == null then null
                          else (((.repos[] | select(.repo == $r)) // null)) as $ro
                            | if $ro == null then null
                              else { backlog_total: $ro.backlog,
                                     backlog_zero: (if $ro.backlog == 0 and $ro.collection.issues != 0 then 1 else 0 end),
                                     collection_ok: (if $ro.collection.issues != 0 then 1 else 0 end) }
                              end
                          end
                        )) as $repo_calendar
                      | { backlog_zero_streak_days: streak_zero($repo_calendar),
                          backlog_growth_per_day: growth_rate($repo_calendar; "backlog_total") }
                    )
                  }) | from_entries)
              }
          ')

          jq --argjson h "$history_json" --argjson days "$days" --argjson avail "$days_available" \
            '. + {history: ($h + {days_requested: $days, days_available: $avail})}' \
            fabric-status.json > fabric-status.json.tmp
          mv fabric-status.json.tmp fabric-status.json

          echo "backlog history: streak=$(printf '%s' "$history_json" | jq -r .backlog_zero_streak_days)d growth=$(printf '%s' "$history_json" | jq -r .backlog_growth_per_day)/day (days_available=$days_available/$days)"

      - name: Edge deploy smoke checks (optional)
        id: edge
        env:
          EDGE_SMOKE_CHECKS: ${{ inputs.edge-smoke-checks }}
        run: |
          set -euo pipefail
          : > edge-metrics.txt
          # Also fed into fabric-status.json's `edge_checks` array (next step,
          # docs/design/2026-07-19-next-arc-decision-rule-design.md §3.1, #532) — the
          # §4 next-arc reconciler's "edge panels burn error budget" row needs this
          # readable from the artifact, not only pushed to Grafana.
          : > edge-results.jsonl
          if [ -z "${EDGE_SMOKE_CHECKS//[[:space:]]/}" ]; then
            echo "no edge smoke checks configured — skipping"
            exit 0
          fi
          ts="$(date -u +%s)000000000"
          while IFS= read -r line; do
            [ -z "${line//[[:space:]]/}" ] && continue
            service="${line%%=*}"; rest="${line#*=}"
            url="${rest%%=*}"; want="${rest##*=}"
            got=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$url" || echo "000")
            ok=$([ "$got" = "$want" ] && echo 1 || echo 0)
            echo "edge $service $url want=$want got=$got ok=$ok"
            printf 'suxos_edge_deploy_ok,service=%s value=%s %s\n' "$service" "$ok" "$ts" >> edge-metrics.txt
            jq -n -c --arg service "$service" --argjson ok "$([ "$ok" = 1 ] && echo true || echo false)" \
              '{service: $service, ok: $ok}' >> edge-results.jsonl
          done <<< "$EDGE_SMOKE_CHECKS"

      - name: Fold edge-check verdicts into fabric-status.json
        id: fold-edge
        run: |
          set -euo pipefail
          edge_checks="[]"
          if [ -s edge-results.jsonl ]; then
            edge_checks=$(jq -s -c '.' edge-results.jsonl)
          fi
          jq --argjson edge_checks "$edge_checks" '. + {edge_checks: $edge_checks}' \
            fabric-status.json > fabric-status.json.tmp
          mv fabric-status.json.tmp fabric-status.json

      # §4 next-arc reconciler (docs/design/2026-07-19-next-arc-decision-rule-design.md
      # §3.4, #556) — evaluates docs/design/2026-07-16-suxos-vx-next-arc.md §4's
      # first-match decision table off the streak/headroom/inflow/edge signals this same
      # job already collected (the design doc's own scoping deliberately leaves the
      # gate's "fixer inflow re-enabled" precondition out of this reconciler — no signal
      # for it exists yet, tracked separately). Inflow-bound comparison per
      # docs/design/2026-07-19-inflow-bound-comparison-spec.md (#555): MIN_SIGNAL_PER_DAY
      # floor on backlog_growth_per_day is the near-zero tie-break, and a null growth
      # rate (insufficient history) falls through rather than fabricating a match.
      - name: Evaluate §4 next-arc decision table
        id: next-arc
        if: inputs.next-arc-reconciler
        env:
          OPUS_BUDGET_MIN: ${{ inputs.opus-budget-min }}
          WINDOW_HOURS: ${{ inputs.merged-window-hours }}
        run: |
          set -euo pipefail
          verdict=$(jq -c --argjson opus_budget "$OPUS_BUDGET_MIN" --argjson window "$WINDOW_HOURS" '
            (.history.backlog_zero_streak_days // 0) as $streak
            | (.history.backlog_growth_per_day) as $growth
            | (.budget_opus_avail_min) as $avail
            | (if $avail != null then ($avail / $opus_budget) else null end) as $headroom
            | ([.repos[] | select(.collection.merged != 0) | .merged_prs_in_window] | add // 0) as $merged_sum
            | (if $window > 0 then ($merged_sum * (24 / $window)) else 0 end) as $drain_rate
            | (($growth != null) and ($growth > 1) and ($growth > $drain_rate)) as $inflow_bound
            | ((.edge_checks // []) | any(.ok == false)) as $edge_red
            | (($streak >= 7) and (.collection_ok == 1)) as $drain_green
            | {
                row: (
                  if $drain_green and $headroom != null and $headroom >= 0.5 then "scale-unit-of-work"
                  elif $drain_green and $headroom != null and $headroom < 0.5 then "budget-cadence-tuning"
                  elif $drain_green and $headroom == null then "insufficient-data-headroom"
                  elif $inflow_bound then "self-direction"
                  elif $edge_red then "edge-reliability"
                  else "more-stability"
                  end),
                streak_days: $streak,
                days_available: (.history.days_available // 0),
                days_requested: (.history.days_requested // 0),
                growth_per_day: $growth,
                drain_rate_per_day: $drain_rate,
                headroom_fraction: $headroom,
                drain_green: $drain_green,
                inflow_bound: $inflow_bound,
                edge_red: $edge_red
              }' fabric-status.json)
          echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
          echo "next-arc verdict: $(printf '%s' "$verdict" | jq -r .row)"

      - name: Build §4 next-arc tracking-issue body
        id: next-arc-body
        if: inputs.next-arc-reconciler
        env:
          VERDICT: ${{ steps.next-arc.outputs.verdict }}
        run: |
          set -euo pipefail
          row=$(printf '%s' "$VERDICT" | jq -r '
            {"scale-unit-of-work": "Scale the unit of autonomous work",
             "budget-cadence-tuning": "Budget/cadence tuning",
             "insufficient-data-headroom": "Insufficient data (headroom unknown)",
             "self-direction": "Self-direction",
             "edge-reliability": "Edge reliability arc",
             "more-stability": "More stability"}[.row]')
          body=$(printf '%s\n' \
            "Auto-maintained by fabric-health.yml (#556). Last updated $(date -u '+%Y-%m-%d %H:%M UTC')." \
            "Evaluates docs/design/2026-07-16-suxos-vx-next-arc.md §4's first-match decision table." \
            "" \
            "**Current verdict: ${row}**" \
            "" \
            "Evidence:" \
            "$(printf '%s' "$VERDICT" | jq -r '
              "- backlog-zero streak: \(.streak_days)d (history sampled \(.days_available)/\(.days_requested) days) — drain_green=\(.drain_green)\n" +
              "- opus headroom fraction: \(.headroom_fraction // "unknown")\n" +
              "- backlog growth/day: \(.growth_per_day // "unknown (insufficient history)") vs drain rate/day: \(.drain_rate_per_day) — inflow_bound=\(.inflow_bound)\n" +
              "- edge panels red: \(.edge_red)"')" \
            "" \
            "Gate note: this verdict does NOT include the §4 gate's \"fixer inflow re-enabled for the last 3 days\" precondition — no signal for that exists yet (docs/design/2026-07-19-next-arc-decision-rule-design.md §2). Treat \`scale-unit-of-work\`/\`budget-cadence-tuning\` as provisional until that's checked by hand.")
          {
            echo "body<<EOF_NEXT_ARC_BODY"
            printf '%s\n' "$body"
            echo "EOF_NEXT_ARC_BODY"
          } >> "$GITHUB_OUTPUT"

      - name: Refresh §4 next-arc tracking issue
        if: inputs.next-arc-reconciler
        uses: SuxOS/.github/.github/actions/upsert-tracking-issue@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: open
          update-mode: replace
          title: "Next-arc decision (§4)"
          body: ${{ steps.next-arc-body.outputs.body }}
          labels: "tracking"

      - name: Ship snapshot to Grafana Cloud (Prometheus + Loki)
        env:
          GRAFANA_PROM_URL: ${{ secrets.GRAFANA_PROM_URL }}
          GRAFANA_PROM_USER: ${{ secrets.GRAFANA_PROM_USER }}
          GRAFANA_LOKI_URL: ${{ secrets.GRAFANA_LOKI_URL }}
          GRAFANA_LOKI_USER: ${{ secrets.GRAFANA_LOKI_USER }}
          GRAFANA_LOKI_TOKEN: ${{ secrets.GRAFANA_LOKI_TOKEN }}
        run: |
          set -euo pipefail
          status=$(cat fabric-status.json)
          ts="$(date -u +%s)000000000"  # Influx/Loki want nanosecond timestamps.

          # --- Build the Influx line-protocol snapshot (suxos_* series) ---
          {
            # suxos_pipeline_backlog is WITHHELD (no sample this tick, not a misleading 0)
            # when any collector failed (#327): a repo whose issue query errored still
            # contributes 0 to backlog_total, so a fully-degraded collection would otherwise
            # read as a healthy-looking "Backlog now" of 0 even though collection-integrity
            # is red. An absent sample is a dashboard gap, which is what we want here.
            if [ "$(jq '.collection_ok' <<< "$status")" -eq 1 ]; then
              printf 'suxos_pipeline_backlog value=%s %s\n' "$(jq '.backlog_total' <<< "$status")" "$ts"
            fi
            printf 'suxos_backlog_zero value=%s %s\n' "$(jq '.backlog_zero' <<< "$status")" "$ts"
            printf 'suxos_budget_throttle_active value=%s %s\n' "$(jq '.budget_throttle_active' <<< "$status")" "$ts"
            # Per-repo detail behind the fleet-wide OR above (#522) — lets the dashboard
            # show WHICH repo is throttled instead of only that at least one is.
            jq -r --arg ts "$ts" '.repos[] |
              "suxos_budget_throttle_active,repo=\(.repo) value=\(.budget_throttle_active) \($ts)"' <<< "$status"
            printf 'suxos_collector_ok value=1 %s\n' "$ts"
            # Per-repo/per-collector collection-integrity gauge (#305): 1 when that repo's
            # query succeeded, 0 when it errored. The dashboard alerts on any <1 so an
            # outage reads as an explicit "unknown", never a silent healthy zero.
            jq -r --arg ts "$ts" '.repos[] | .repo as $repo | .collection | to_entries[] |
              "suxos_collection_ok,repo=\($repo),collector=\(.key) value=\(.value) \($ts)"' <<< "$status"
            # Derived per-repo series are GATED on their collector (#305): a repo whose PR
            # or run query failed emits no pr_*/workflow_red series this tick — an absent
            # sample (dashboard gap) rather than a misleading 0 that reads green. The paired
            # suxos_collection_ok=0 above is what surfaces the outage.
            jq -r --arg ts "$ts" '.repos[] | select(.collection.prs == 1) |
              "suxos_pr_open_total,repo=\(.repo) value=\(.prs.open) \($ts)\n" +
              "suxos_pr_red_total,repo=\(.repo) value=\(.prs.red) \($ts)\n" +
              "suxos_pr_stuck_total,repo=\(.repo) value=\(.prs.stuck) \($ts)"' <<< "$status"
            jq -r --arg ts "$ts" '.repos[] | select(.collection.runs == 1) |
              "suxos_workflow_red_total,repo=\(.repo) value=\(.workflow_red) \($ts)"' <<< "$status"
            # Gated on collection.merged (#473/#305) — same absent-sample-not-a-
            # misleading-zero contract as the other derived per-repo series above.
            jq -r --arg ts "$ts" '.repos[] | select(.collection.merged == 1) |
              "suxos_merged_prs_in_window,repo=\(.repo) value=\(.merged_prs_in_window) \($ts)"' <<< "$status"
            # Gated on collection.integral (#475/#305) AND collection.issues (#543): the
            # formula's setpoint is backlog/48, so a failed issues query this tick must
            # also suppress emission, not just a failed prior-run artifact fetch — same
            # absent-sample-not-a-misleading-zero contract as the other derived per-repo
            # series above. collection.merged doesn't need to gate this series too: a
            # failed merged-PR query now holds integral_error at its prior (valid) value
            # instead of corrupting it (#508's awk fix above), so the value emitted here
            # is always a real observation, just possibly stale.
            jq -r --arg ts "$ts" '.repos[] | select(.collection.integral == 1 and .collection.issues == 1) |
              "suxos_drain_integral_error,repo=\(.repo) value=\(.integral_error) \($ts)\n" +
              "suxos_recommended_parallel_batches,repo=\(.repo) value=\(.recommended_parallel_batches) \($ts)"' <<< "$status"
            # One suxos_workflow_disabled{repo,workflow} series per non-exempt
            # disabled_manually or disabled_inactivity workflow — the dashboard
            # flags any that persists >48h.
            jq -r --arg ts "$ts" '.repos[] as $r | $r.workflows_disabled[]? |
              "suxos_workflow_disabled,repo=\($r.repo),workflow=\(.file) value=1 \($ts)"' <<< "$status"
          } > prom-body.txt
          # Append optional edge deploy series from the smoke-check step.
          [ -f edge-metrics.txt ] && cat edge-metrics.txt >> prom-body.txt

          if [ -n "${GRAFANA_PROM_URL:-}" ] && [ -n "${GRAFANA_PROM_USER:-}" ] && [ -n "${GRAFANA_LOKI_TOKEN:-}" ]; then
            # curl's own exit code (6=DNS, 7=connect refused, 28=timeout, 35=TLS, ...)
            # is what actually distinguishes an HTTP 000 cause — the http_code alone
            # can't (#333). `set +e` around the call so `set -e` above doesn't kill
            # the job on a nonzero curl exit before we get to log it.
            set +e
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              -u "${GRAFANA_PROM_USER}:${GRAFANA_LOKI_TOKEN}" \
              -H "content-type: text/plain" \
              --data-binary @prom-body.txt "$GRAFANA_PROM_URL")
            curl_exit=$?
            set -e
            [ -z "$code" ] && code="000"
            echo "grafana prometheus push HTTP $code (curl exit $curl_exit)"
            [ "${code:0:1}" = "2" ] || echo "::warning::grafana prometheus push non-2xx ($code, curl exit $curl_exit) — dashboard may be stale"
          else
            echo "GRAFANA_PROM_* secrets unset — prometheus push inert (no-op)"
          fi

          # --- Ship one rollup event to the Loki stream {service="suxos-fabric"} ---
          if [ -n "${GRAFANA_LOKI_URL:-}" ] && [ -n "${GRAFANA_LOKI_USER:-}" ] && [ -n "${GRAFANA_LOKI_TOKEN:-}" ]; then
            # Gated the same way the Prometheus emission above is (#529): a repo whose
            # runs/prs collector failed contributes a fabricated 0 to these sums otherwise,
            # silently understating the true total instead of surfacing the outage.
            red_total=$(jq '[.repos[] | select(.collection.runs == 1) | .workflow_red] | add // 0' <<< "$status")
            stuck_total=$(jq '[.repos[] | select(.collection.prs == 1) | .prs.stuck] | add // 0' <<< "$status")
            collection_ok=$(jq '.collection_ok' <<< "$status")
            # A degraded collection is error-level too (#305): "couldn't measure" is not "info".
            if [ "$red_total" -gt 0 ] || [ "$stuck_total" -gt 0 ] || [ "$collection_ok" -eq 0 ]; then
              level=error
            else
              level=info
            fi
            line=$(jq -c --argjson red_total "$red_total" --argjson stuck_total "$stuck_total" \
              '{backlog: (if .collection_ok == 1 then .backlog_total else null end), backlog_zero,
              throttle: .budget_throttle_active,
              collection_ok,
              workflow_red: $red_total,
              pr_stuck: $stuck_total}' <<< "$status")
            body=$(jq -n --arg ts "$ts" --arg line "$line" --arg level "$level" \
              '{streams: [{stream: {service: "suxos-fabric", level: $level}, values: [[$ts, $line]]}]}')
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              -u "${GRAFANA_LOKI_USER}:${GRAFANA_LOKI_TOKEN}" \
              -H "content-type: application/json" \
              --data-binary "$body" "$GRAFANA_LOKI_URL" || echo "000")
            echo "grafana loki push HTTP $code"
          else
            echo "GRAFANA_LOKI_* secrets unset — loki push inert (no-op)"
          fi

      - name: Upload fabric-status.json (ground truth for the orient tool)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fabric-status
          path: fabric-status.json
          retention-days: 14
