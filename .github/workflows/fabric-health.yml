name: Fabric health spine (reusable)

# S1 of the SuxOS v2 fabric-stability spec
# (docs/design/2026-07-16-fabric-stability-v2-design.md).
#
# One cron pass that turns the fabric's state into ONE ground-truth artifact
# (fabric-status.json) and ships it to Grafana Cloud the SAME way the sux edge
# already does (sux/src/grafana.ts): a low-cardinality Prometheus snapshot as
# Influx line protocol (suxos_* series) + a per-run event to the Loki stream
# {service="suxos-fabric"}. The Grafana push is DORMANT until GRAFANA_PROM_URL /
# GRAFANA_PROM_USER / GRAFANA_LOKI_TOKEN (and the Loki trio) are set — a clean
# no-op otherwise, so this is safe to land before the secrets exist.
#
# Stateless by design: it emits point-in-time gauges (e.g. suxos_backlog_zero),
# and the 7-day drain-to-zero streak in the Definition of Done is derived in
# Prometheus from series history (min_over_time(suxos_backlog_zero[7d]) == 1),
# NOT tracked in the workflow. No state to persist, nothing to corrupt.
#
# Read-only against every repo (no mutation). Caller (self-fabric-health.yml)
# owns the schedule and passes the repo list + optional edge smoke checks:
#   uses: SuxOS/.github/.github/workflows/fabric-health.yml@main
#   with: { repos: "sux suxlib suxrouter claude-config .github" }
#   secrets: inherit

on:
  workflow_call:
    inputs:
      repos:
        description: "Space/newline-separated repo names in this org to survey."
        type: string
        default: "sux suxlib suxrouter claude-config .github"
      backlog-exclude-labels:
        description: >-
          Comma-separated issue labels that make an open issue NOT build-eligible
          (held/blocked/tracking work is not backlog), ADDITIONAL to the
          nonbuildable-labels composite action's shared floor (building, hold,
          needs-human, tracking — issue-build.yml's buildable predicate), which
          is always applied regardless of this input so the two can't drift (#317).
        type: string
        default: "hold,blocked,throttle,epic"
      stuck-idle-days:
        description: "An open PR untouched for at least this many days counts as stuck."
        type: string
        default: "2"
      edge-smoke-checks:
        description: >-
          Newline-separated `service=url=expected-status` triples for edge deploy
          health (e.g. `sux=https://…/mcp=401`). Each emits suxos_edge_deploy_ok{service}.
          Empty (default) skips edge checks entirely — inert, never fails the run.
        type: string
        default: ""
      workflow-disabled-exempt:
        description: >-
          Comma-separated workflow file basenames that are exempt from
          suxos_workflow_disabled{repo,workflow} alerting — the workflow_call-only
          reusable definitions in this repo, which have no schedule/event trigger of
          their own and so are routinely left `disabled_manually` by design.
        type: string
        default: "audit.yml,automerge.yml,ci.yml,claude-autofix.yml,claude.yml,fabric-health.yml,fixer.yml,health.yml,issue-build.yml,pr-auto-update.yml,pr-drain.yml,pr-unstick.yml,pr-watch.yml,security-review.yml,skill-sync.yml"

permissions:
  contents: read
  issues: read
  pull-requests: read
  actions: read
  checks: read

concurrency:
  group: fabric-health-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  spine:
    name: Collect fabric health, emit status, ship to Grafana
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Non-buildable labels
        id: nonbuildable
        uses: SuxOS/.github/.github/actions/nonbuildable-labels@main

      - name: Collect cross-repo health into fabric-status.json
        id: collect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: ${{ github.repository_owner }}
          REPOS: ${{ inputs.repos }}
          EXCLUDE_LABELS: ${{ inputs.backlog-exclude-labels }}
          NONBUILDABLE_LABELS: ${{ steps.nonbuildable.outputs.labels }}
          STUCK_IDLE_DAYS: ${{ inputs.stuck-idle-days }}
          DISABLED_EXEMPT: ${{ inputs.workflow-disabled-exempt }}
        run: |
          set -euo pipefail

          now_epoch=$(date -u +%s)
          stuck_before=$(date -u -d "-${STUCK_IDLE_DAYS} days" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
            || date -u -v-"${STUCK_IDLE_DAYS}"d +%Y-%m-%dT%H:%M:%SZ)

          # jq filter reused per repo: mark a PR "stuck" if it is BEHIND/DIRTY, has a
          # failing status rollup, or has been idle past the threshold.
          repos_json="[]"
          backlog_total=0
          issues_all_ok=1      # every repo's issue query observed → backlog_zero is assertable
          collection_all_ok=1  # every collector on every repo succeeded → spine not degraded

          for repo in $REPOS; do
            slug="${ORG}/${repo}"

            # --- Backlog: open, non-PR issues that are build-eligible ---
            # collection-integrity contract (#305): capture whether each query actually
            # SUCCEEDED (<collector>_ok) so a transient API error surfaces as an explicit
            # "unknown" (suxos_collection_ok=0) instead of a healthy-looking zero. Without
            # this a failed issue query reads backlog 0 and can falsely satisfy the
            # backlog-zero Definition-of-Done streak on data that was never observed.
            # --limit 201 (one past the real 200 cap, #345): if exactly 201 rows come
            # back the true count is >200 and this page can't be trusted as complete —
            # treat it as a collection failure (issues_ok=0) rather than a silent
            # undercount that would read backlog_zero green on real backlog.
            if issues=$(gh issue list --repo "$slug" --state open --limit 201 \
                --json number,labels 2>/dev/null); then
              if [ "$(printf '%s' "$issues" | jq 'length')" -gt 200 ]; then
                issues="[]"; issues_ok=0
              else
                issues_ok=1
              fi
            else
              issues="[]"; issues_ok=0
            fi
            backlog=$(printf '%s' "$issues" | jq --arg ex "$EXCLUDE_LABELS" --arg nb "$NONBUILDABLE_LABELS" '
              ((($ex | split(",")) + ($nb | split(","))) | map(select(length>0))) as $excl
              | [ .[] | select((.labels | map(.name)) as $l | any($excl[]; . as $e | $l | index($e)) | not) ]
              | length')

            # --- PRs: open / red (failing checks) / stuck ---
            # Same cap-hit detection as the issues collector above (#345).
            if prs=$(gh pr list --repo "$slug" --state open --limit 201 \
                --json number,mergeable,mergeStateStatus,statusCheckRollup,updatedAt 2>/dev/null); then
              if [ "$(printf '%s' "$prs" | jq 'length')" -gt 200 ]; then
                prs="[]"; prs_ok=0
              else
                prs_ok=1
              fi
            else
              prs="[]"; prs_ok=0
            fi
            pr_stats=$(printf '%s' "$prs" | jq --arg before "$stuck_before" '
              def failing: any(.statusCheckRollup[]?;
                (.conclusion // .state // "") | ascii_upcase | . == "FAILURE" or . == "TIMED_OUT" or . == "ERROR");
              {
                open: length,
                red: ([ .[] | select(failing) ] | length),
                stuck: ([ .[] | select(
                    (.mergeStateStatus // "") as $m
                    | ($m == "BEHIND" or $m == "DIRTY")
                    or (.updatedAt < $before)) ] | length)
              }')

            # --- Workflows: disabled_manually or disabled_inactivity, excluding known-by-design reusable defs ---
            if wfs=$(gh workflow list --repo "$slug" --all \
                --json id,name,path,state 2>/dev/null); then
              wfs_ok=1
            else
              wfs="[]"; wfs_ok=0
            fi

            # --- Workflows: how many have a failing LAST run ---
            # A single `gh run list --limit 200` is a most-recent-runs window across ALL
            # workflows in the repo, so on a busy repo a low-traffic workflow's latest run
            # can fall outside that window and be silently omitted from wf_red (#345).
            # Query the latest run per workflow instead, so every workflow is observed
            # regardless of repo-wide run volume.
            #
            # Naive per-workflow querying is one `gh run list` call PER WORKFLOW PER REPO —
            # 100+ extra API calls org-wide on a cron schedule (#350). Cut that by first
            # batch-fetching the repo's 100 most-recent runs (one call) and reading each
            # workflow's latest conclusion off that when present; only a workflow whose
            # latest run fell outside that window still needs its own per-workflow call.
            # This keeps the #345 no-under-reporting guarantee (every workflow is still
            # observed one way or the other) while cutting calls for the common case where
            # most workflows show up in the recent-runs window.
            wf_red=0
            if [ "$wfs_ok" -eq 1 ]; then
              runs_ok=1
              batch_runs=$(gh run list --repo "$slug" --limit 100 \
                  --json workflowDatabaseId,conclusion,status 2>/dev/null) || batch_runs="[]"
              while IFS= read -r wf_id; do
                [ -z "$wf_id" ] && continue
                batch_concl=$(printf '%s' "$batch_runs" | jq -r --argjson id "$wf_id" '
                  [.[] | select(.workflowDatabaseId == $id)][0]
                  | select(. != null) | select(.status == "completed") | .conclusion // "none"')
                if [ -n "$batch_concl" ]; then
                  [ "$batch_concl" = "failure" ] && wf_red=$((wf_red + 1))
                elif last_run=$(gh run list --repo "$slug" --workflow "$wf_id" --limit 1 \
                    --json conclusion,status 2>/dev/null); then
                  concl=$(printf '%s' "$last_run" | jq -r '.[0] | select(.status == "completed") | .conclusion // empty')
                  [ "$concl" = "failure" ] && wf_red=$((wf_red + 1))
                else
                  runs_ok=0
                fi
              done < <(printf '%s' "$wfs" | jq -r '.[].id')
            else
              runs_ok=0
            fi
            # The exempt list is the workflow_call-only reusable defs that live in THIS repo
            # (.github) and are left disabled_manually by design. In every caller repo those
            # same basenames are ACTIVE caller stubs (e.g. security-review.yml, a required
            # merge gate), so only apply the exemption when surveying .github — everywhere
            # else a manual disable is a real alert we must not suppress (#290). The exemption
            # covers only disabled_manually — disabled_inactivity (GitHub auto-disabling a
            # workflow after 60 days of repo inactivity) is never by-design, even in .github,
            # so it always alerts (#303).
            disabled_json=$(printf '%s' "$wfs" | jq --arg ex "$DISABLED_EXEMPT" --arg repo "$repo" '
              (if $repo == ".github"
                 then ($ex | split(",") | map(select(length>0)))
                 else [] end) as $excl
              | [ .[] | select(.state == "disabled_manually" or .state == "disabled_inactivity")
                  | select(if .state == "disabled_manually"
                           then (((.path | split("/") | last) as $b | $excl | index($b)) | not)
                           else true end)
                  | {file: (.path | split("/") | last), name: .name, state: .state} ]')

            repo_obj=$(jq -n --arg repo "$repo" --argjson backlog "$backlog" \
              --argjson pr "$pr_stats" --argjson wf_red "$wf_red" \
              --argjson disabled "$disabled_json" \
              --argjson iok "$issues_ok" --argjson pok "$prs_ok" \
              --argjson rok "$runs_ok" --argjson wok "$wfs_ok" \
              '{repo: $repo, backlog: $backlog, prs: $pr, workflow_red: $wf_red,
                workflows_disabled: $disabled,
                collection: {issues: $iok, prs: $pok, runs: $rok, workflows: $wok}}')
            repos_json=$(printf '%s' "$repos_json" | jq --argjson o "$repo_obj" '. + [$o]')
            backlog_total=$((backlog_total + backlog))
            # A single failed collector anywhere degrades the whole spine to "unknown".
            # issues_all_ok separately gates backlog_zero: a missed issue query means org
            # backlog can't be asserted zero (the merge-relevant 7-day DoD streak).
            [ "$issues_ok" -eq 1 ] || issues_all_ok=0
            if [ "$issues_ok" -eq 0 ] || [ "$prs_ok" -eq 0 ] \
                || [ "$runs_ok" -eq 0 ] || [ "$wfs_ok" -eq 0 ]; then
              collection_all_ok=0
            fi
          done

          # --- Budget governor: throttle active when the .github "Autonomy throttle"
          # tracking issue's `level:` line is not green (#319). budget-governor.yml writes
          # the level into the issue BODY and labels it `tracking` — nothing applies a bare
          # `throttle` label — so match the same body line check-throttle/action.yml reads,
          # never a label. Fail-open to green on any lookup error, mirroring check-throttle:
          # a governor outage must not falsely report the org as throttled.
          throttle_level=$(gh issue list --repo "${ORG}/.github" --state open \
              --search "\"Autonomy throttle\" in:title" --limit 100 \
              --json title,body 2>/dev/null \
            | jq -r '[.[] | select(.title == "Autonomy throttle")] | first | .body // ""' \
            | grep -m1 -oE '^level: (green|yellow|red)$' | awk '{print $2}') || true
          throttle_level=${throttle_level:-green}
          throttle_active=$([ "$throttle_level" != "green" ] && echo 1 || echo 0)

          # Gate backlog_zero on issue-collection success (#305): only assert org backlog
          # is zero when every repo's issue query was actually observed. An unobserved
          # backlog reads NOT zero so the 7-day DoD streak can't stay green across a gap.
          backlog_zero=$([ "$backlog_total" -eq 0 ] && [ "$issues_all_ok" -eq 1 ] && echo 1 || echo 0)

          jq -n \
            --argjson ts "$now_epoch" \
            --argjson repos "$repos_json" \
            --argjson backlog_total "$backlog_total" \
            --argjson backlog_zero "$backlog_zero" \
            --argjson throttle_active "$throttle_active" \
            --argjson collection_ok "$collection_all_ok" \
            '{
              schema: "suxos-fabric-status/v1",
              generated_at_epoch: $ts,
              backlog_total: $backlog_total,
              backlog_zero: $backlog_zero,
              budget_throttle_active: $throttle_active,
              collection_ok: $collection_ok,
              repos: $repos
            }' > fabric-status.json

          echo "backlog_total=$backlog_total backlog_zero=$backlog_zero throttle=$throttle_active collection_ok=$collection_all_ok"
          echo "status-file=fabric-status.json" >> "$GITHUB_OUTPUT"

      - name: Edge deploy smoke checks (optional)
        id: edge
        env:
          EDGE_SMOKE_CHECKS: ${{ inputs.edge-smoke-checks }}
        run: |
          set -euo pipefail
          : > edge-metrics.txt
          if [ -z "${EDGE_SMOKE_CHECKS//[[:space:]]/}" ]; then
            echo "no edge smoke checks configured — skipping"
            exit 0
          fi
          ts="$(date -u +%s)000000000"
          while IFS= read -r line; do
            [ -z "${line//[[:space:]]/}" ] && continue
            service="${line%%=*}"; rest="${line#*=}"
            url="${rest%%=*}"; want="${rest##*=}"
            got=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$url" || echo "000")
            ok=$([ "$got" = "$want" ] && echo 1 || echo 0)
            echo "edge $service $url want=$want got=$got ok=$ok"
            printf 'suxos_edge_deploy_ok,service=%s value=%s %s\n' "$service" "$ok" "$ts" >> edge-metrics.txt
          done <<< "$EDGE_SMOKE_CHECKS"

      - name: Ship snapshot to Grafana Cloud (Prometheus + Loki)
        env:
          GRAFANA_PROM_URL: ${{ secrets.GRAFANA_PROM_URL }}
          GRAFANA_PROM_USER: ${{ secrets.GRAFANA_PROM_USER }}
          GRAFANA_LOKI_URL: ${{ secrets.GRAFANA_LOKI_URL }}
          GRAFANA_LOKI_USER: ${{ secrets.GRAFANA_LOKI_USER }}
          GRAFANA_LOKI_TOKEN: ${{ secrets.GRAFANA_LOKI_TOKEN }}
        run: |
          set -euo pipefail
          status=$(cat fabric-status.json)
          ts="$(date -u +%s)000000000"  # Influx/Loki want nanosecond timestamps.

          # --- Build the Influx line-protocol snapshot (suxos_* series) ---
          {
            # suxos_pipeline_backlog is WITHHELD (no sample this tick, not a misleading 0)
            # when any collector failed (#327): a repo whose issue query errored still
            # contributes 0 to backlog_total, so a fully-degraded collection would otherwise
            # read as a healthy-looking "Backlog now" of 0 even though collection-integrity
            # is red. An absent sample is a dashboard gap, which is what we want here.
            if [ "$(jq '.collection_ok' <<< "$status")" -eq 1 ]; then
              printf 'suxos_pipeline_backlog value=%s %s\n' "$(jq '.backlog_total' <<< "$status")" "$ts"
            fi
            printf 'suxos_backlog_zero value=%s %s\n' "$(jq '.backlog_zero' <<< "$status")" "$ts"
            printf 'suxos_budget_throttle_active value=%s %s\n' "$(jq '.budget_throttle_active' <<< "$status")" "$ts"
            printf 'suxos_collector_ok value=1 %s\n' "$ts"
            # Per-repo/per-collector collection-integrity gauge (#305): 1 when that repo's
            # query succeeded, 0 when it errored. The dashboard alerts on any <1 so an
            # outage reads as an explicit "unknown", never a silent healthy zero.
            jq -r --arg ts "$ts" '.repos[] | .repo as $repo | .collection | to_entries[] |
              "suxos_collection_ok,repo=\($repo),collector=\(.key) value=\(.value) \($ts)"' <<< "$status"
            # Derived per-repo series are GATED on their collector (#305): a repo whose PR
            # or run query failed emits no pr_*/workflow_red series this tick — an absent
            # sample (dashboard gap) rather than a misleading 0 that reads green. The paired
            # suxos_collection_ok=0 above is what surfaces the outage.
            jq -r --arg ts "$ts" '.repos[] | select(.collection.prs == 1) |
              "suxos_pr_open_total,repo=\(.repo) value=\(.prs.open) \($ts)\n" +
              "suxos_pr_red_total,repo=\(.repo) value=\(.prs.red) \($ts)\n" +
              "suxos_pr_stuck_total,repo=\(.repo) value=\(.prs.stuck) \($ts)"' <<< "$status"
            jq -r --arg ts "$ts" '.repos[] | select(.collection.runs == 1) |
              "suxos_workflow_red_total,repo=\(.repo) value=\(.workflow_red) \($ts)"' <<< "$status"
            # One suxos_workflow_disabled{repo,workflow} series per non-exempt
            # disabled_manually or disabled_inactivity workflow — the dashboard
            # flags any that persists >48h.
            jq -r --arg ts "$ts" '.repos[] as $r | $r.workflows_disabled[]? |
              "suxos_workflow_disabled,repo=\($r.repo),workflow=\(.file) value=1 \($ts)"' <<< "$status"
          } > prom-body.txt
          # Append optional edge deploy series from the smoke-check step.
          [ -f edge-metrics.txt ] && cat edge-metrics.txt >> prom-body.txt

          if [ -n "${GRAFANA_PROM_URL:-}" ] && [ -n "${GRAFANA_PROM_USER:-}" ] && [ -n "${GRAFANA_LOKI_TOKEN:-}" ]; then
            # curl's own exit code (6=DNS, 7=connect refused, 28=timeout, 35=TLS, ...)
            # is what actually distinguishes an HTTP 000 cause — the http_code alone
            # can't (#333). `set +e` around the call so `set -e` above doesn't kill
            # the job on a nonzero curl exit before we get to log it.
            set +e
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              -u "${GRAFANA_PROM_USER}:${GRAFANA_LOKI_TOKEN}" \
              -H "content-type: text/plain" \
              --data-binary @prom-body.txt "$GRAFANA_PROM_URL")
            curl_exit=$?
            set -e
            [ -z "$code" ] && code="000"
            echo "grafana prometheus push HTTP $code (curl exit $curl_exit)"
            [ "${code:0:1}" = "2" ] || echo "::warning::grafana prometheus push non-2xx ($code, curl exit $curl_exit) — dashboard may be stale"
          else
            echo "GRAFANA_PROM_* secrets unset — prometheus push inert (no-op)"
          fi

          # --- Ship one rollup event to the Loki stream {service="suxos-fabric"} ---
          if [ -n "${GRAFANA_LOKI_URL:-}" ] && [ -n "${GRAFANA_LOKI_USER:-}" ] && [ -n "${GRAFANA_LOKI_TOKEN:-}" ]; then
            red_total=$(jq '[.repos[].workflow_red] | add // 0' <<< "$status")
            stuck_total=$(jq '[.repos[].prs.stuck] | add // 0' <<< "$status")
            collection_ok=$(jq '.collection_ok' <<< "$status")
            # A degraded collection is error-level too (#305): "couldn't measure" is not "info".
            if [ "$red_total" -gt 0 ] || [ "$stuck_total" -gt 0 ] || [ "$collection_ok" -eq 0 ]; then
              level=error
            else
              level=info
            fi
            line=$(jq -c '{backlog: .backlog_total, backlog_zero, throttle: .budget_throttle_active,
              collection_ok,
              workflow_red: ([.repos[].workflow_red] | add // 0),
              pr_stuck: ([.repos[].prs.stuck] | add // 0)}' <<< "$status")
            body=$(jq -n --arg ts "$ts" --arg line "$line" --arg level "$level" \
              '{streams: [{stream: {service: "suxos-fabric", level: $level}, values: [[$ts, $line]]}]}')
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              -u "${GRAFANA_LOKI_USER}:${GRAFANA_LOKI_TOKEN}" \
              -H "content-type: application/json" \
              --data-binary "$body" "$GRAFANA_LOKI_URL" || echo "000")
            echo "grafana loki push HTTP $code"
          else
            echo "GRAFANA_LOKI_* secrets unset — loki push inert (no-op)"
          fi

      - name: Upload fabric-status.json (ground truth for the orient tool)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fabric-status
          path: fabric-status.json
          retention-days: 14
