name: PR unstick — periodic retry for needs-human + security-review-retry + unreachable-context PRs (reusable)

# Long-lived unstuck mechanism (docs/design/three-loop-pipeline.md §3.3 extension,
# 2026-07-15).
#
# Three independent stuck-states are swept here (see the steps below):
#   - `needs-human`         — the autofix ladder gave up; retry the free/cheap moves.
#   - `security-review-retry` — the org security gate deferred on an account five-hour
#     rate-limit (INFRA, not a finding); actively re-run the review instead of waiting on
#     `main` to move (SuxOS/.github#272). This one DOES re-invoke the reviewer — but that
#     run never reviewed the diff (the pool was exhausted), so it's the FIRST real review,
#     not a wasted duplicate.
#   - unreachable required context, generic cause (SuxOS/.github#379) — a required check
#     that has never reported at all (no failure to retry). detect-unreachable-checks
#     narrows this to the sub-case an empty commit can actually fix (predates-the-context
#     "onboarding window", or a harmless-no-op path-filter case) and excludes the
#     disabled-workflow sub-case, which needs re-enabling instead.
#
# The rebase/autofix ladder (pr-auto-update.yml -> claude-autofix.yml) already bounds
# itself: claude-autofix.yml gives up after `max-attempts` bot commits and tags
# `needs-human`. Without this workflow, `needs-human` is a dead end until either the
# operator notices and removes the label, or pr-drain.yml's close-stale sweep closes the
# PR after `stale-days` (14) of inactivity. That's a long silent gap for a solo operator
# who isn't glued to notifications — and it wastes a PR that might unstick itself for
# free: CI failures are sometimes flaky (network blip, OIDC hiccup — the same class of
# harness unreliability security-review.yml's no-verdict fix already treats as noise, not
# signal), and merge conflicts sometimes resolve themselves when main moves again.
#
# This does NOT spend a fresh LLM autofix attempt — that budget was already spent and
# exhausted per-PR by claude-autofix.yml. It only does the two FREE/cheap moves that
# might clear a stuck PR without any new judgment call:
#   1. Re-run the PR's failed check runs (catches transient/flaky failures).
#   2. `gh pr update-branch` (catches "the conflict/root cause got fixed elsewhere").
# then removes `needs-human` so the PR re-enters the normal flow. If it's still
# genuinely broken, the EXISTING claude-autofix.yml trigger fires again on the fresh CI
# failure and makes its own (correctly already-exhausted) call — no special-casing here.
#
# Bounded so this can't loop forever either: a cooldown between attempts (don't hammer a
# PR that just failed again) and a hard cycle cap (default 3) — past the cap, the PR
# waits for the operator or pr-drain.yml's close-stale backstop, same as today. State
# (cycle count + last-attempt time) lives in a single upserted marker comment on the PR,
# not a label — a label can't carry a timestamp for the cooldown check.
#
# Caller (needs its own schedule/dispatch trigger — daily is plenty; this is a slow,
# patient mechanism by design, not a fast retry loop):
#   uses: SuxOS/.github/.github/workflows/pr-unstick.yml@main
#   with: { cooldown-hours: "24", max-cycles: "3" }
#   secrets: inherit

on:
  workflow_call:
    inputs:
      cooldown-hours:
        description: "Minimum time since the last unstick attempt before trying this PR again."
        type: string
        default: "24"
      max-cycles:
        description: "Total unstick attempts per PR before giving up until the operator intervenes or pr-drain.yml's close-stale sweep closes it."
        type: string
        default: "3"
      pr-limit:
        description: "Max open needs-human PRs to consider per run."
        type: string
        default: "50"
      reachability-grace-minutes:
        description: >-
          Minutes since a PR's head commit before a required context that
          still hasn't reported is treated as a real jam (SuxOS/.github#323)
          rather than "still settling" — a fresh PR must never report as
          jammed.
        type: string
        default: "30"

permissions:
  contents: write
  pull-requests: write
  actions: write # gh run rerun --failed
  issues: write

concurrency:
  group: pr-unstick-${{ github.workflow }}
  cancel-in-progress: false

env:
  COOLDOWN_HOURS: ${{ inputs.cooldown-hours }}
  MAX_CYCLES: ${{ inputs.max-cycles }}
  PR_LIMIT: ${{ inputs.pr-limit }}

jobs:
  unstick:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Mint app token
        id: app-token
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      # Both sweeps below can trigger a `gh run rerun --failed` that re-invokes
      # security-review.yml (an LLM-costing check), so gate them the same way
      # issue-build.yml gates its own Claude spend (#331): defer only at red, since
      # this is backlog-draining retry work, not proactively new spend.
      - name: Check autonomy throttle
        id: throttle
        uses: SuxOS/.github/.github/actions/check-throttle@main
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          defer-at: "red"

      # The needs-human and security-review-retry sweeps below each loop over many PRs in
      # one `run:` step and re-check live hold/keep right before mutating each one (#454) —
      # a `uses:` step can't run mid-loop, so they call .github/actions/pr-live-hold-check's
      # check.sh directly instead of re-deriving the jq snippet (#461). SuxOS/.github is
      # PRIVATE, so this needs its own token scoped to just `.github` (same reasoning as
      # security-review.yml's classifier-token). continue-on-error degrades to skip (guarded
      # in the loops below), same posture as this file's other cross-repo steps.
      - name: Mint app token for shared-helper checkout (SuxOS/.github)
        id: helper-token
        if: steps.throttle.outputs.go == 'true'
        continue-on-error: true
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}
          owner: SuxOS
          repositories: .github
          permission-contents: read

      - name: Checkout SuxOS/.github (pr-live-hold-check helper)
        id: helper-checkout
        if: steps.throttle.outputs.go == 'true'
        continue-on-error: true
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: SuxOS/.github
          ref: main
          token: ${{ steps.helper-token.outputs.token }}
          path: .suxos-ci

      - name: Retry needs-human PRs past their cooldown, up to the cycle cap
        if: steps.throttle.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -uo pipefail

          if ! [[ "$COOLDOWN_HOURS" =~ ^[0-9]+$ ]] || ! [[ "$MAX_CYCLES" =~ ^[0-9]+$ ]]; then
            echo "::error::cooldown-hours ('$COOLDOWN_HOURS') and max-cycles ('$MAX_CYCLES') must be non-negative integers"
            exit 1
          fi
          cooldown_sec=$(( COOLDOWN_HOURS * 3600 ))
          now=$(date -u +%s)

          # --label narrows server-side BEFORE --limit is applied, so the cap binds on the
          # needs-human set (oldest included) instead of truncating the newest-created page
          # of ALL open PRs and only then filtering to needs-human (SuxOS/.github#366).
          if ! prs=$(gh pr list --state open --label needs-human --limit "$PR_LIMIT" \
            --json number,isDraft,labels,headRefOid,mergeStateStatus \
            --jq '[.[] | select(.isDraft | not) | select([.labels[].name] | (index("hold") or index("keep")) | not)]'); then
            echo "::error::gh pr list failed — aborting instead of treating as zero needs-human PRs"
            exit 1
          fi

          count=$(echo "$prs" | jq 'length')
          echo "needs-human candidates (not hold/keep): $count"
          if [ "$count" -eq 0 ]; then exit 0; fi

          MARKER='<!-- pr-unstick:'

          for n in $(echo "$prs" | jq -r '.[].number'); do
            echo "::group::PR #$n"

            # Read this PR's marker comment (if any) for cycle count + last-attempt time.
            # The marker is upserted (edited in place), never duplicated, so there's at
            # most one per PR — plain 'last' pick is unambiguous.
            if ! comments=$(gh api "repos/${GH_REPO}/issues/${n}/comments" --paginate 2>/dev/null); then
              echo "::warning::could not fetch comments for PR #$n — skipping this run rather than treating the fetch failure as 'no marker exists' (that would silently reset the cycle cap)"
              echo "::endgroup::"; continue
            fi
            marker=$(echo "$comments" | jq -c --arg m "$MARKER" '[.[] | select(.body | startswith($m))] | last')
            cycle=0
            last_at_epoch=0
            comment_id=""
            if [ "$marker" != "null" ] && [ -n "$marker" ]; then
              comment_id=$(echo "$marker" | jq -r '.id')
              body=$(echo "$marker" | jq -r '.body')
              cycle=$(echo "$body" | grep -oE 'cycle=[0-9]+' | head -1 | cut -d= -f2 || true)
              last_at=$(echo "$body" | grep -oE 'at=[0-9TZ:-]+' | head -1 | cut -d= -f2 || true)
              last_at_epoch=$(date -u -d "$last_at" +%s 2>/dev/null || echo 0)
              cycle=${cycle:-0}
            fi

            if [ "$cycle" -ge "$MAX_CYCLES" ]; then
              echo "#$n already used $cycle/$MAX_CYCLES unstick cycles — leaving to the operator / close-stale sweep"
              echo "::endgroup::"; continue
            fi
            age=$(( now - last_at_epoch ))
            if [ "$last_at_epoch" -gt 0 ] && [ "$age" -lt "$cooldown_sec" ]; then
              echo "#$n last attempt ${age}s ago, cooldown is ${cooldown_sec}s — skipping this run"
              echo "::endgroup::"; continue
            fi

            # #461: shared live-recheck helper (generalizes #454's fix) — re-reads this PR's
            # live labels immediately before mutating so a hold/keep added mid-sweep (e.g. an
            # operator pinning the PR precisely because they're now investigating it) is
            # honored. See .github/actions/pr-live-hold-check/check.sh.
            HELPER=".suxos-ci/.github/actions/pr-live-hold-check/check.sh"
            if [ ! -f "$HELPER" ]; then
              echo "::warning::shared live-recheck helper unavailable (checkout failed) — skipping PR #$n rather than mutating without a fresh label check"
              echo "::endgroup::"; continue
            fi
            if [ "$(bash "$HELPER" "$n")" = "true" ]; then
              echo "::endgroup::"; continue
            fi

            next_cycle=$(( cycle + 1 ))
            echo "#$n unstick cycle $next_cycle/$MAX_CYCLES — re-running failed checks + updating branch"

            sha=$(echo "$prs" | jq -r --argjson n "$n" '.[] | select(.number == $n) | .headRefOid')
            # Rerun every non-success conclusion, not just "failure" — timed_out/cancelled/
            # startup_failure are the exact transient "network blip, OIDC hiccup" modes this
            # workflow exists to clear (see docstring above), and a plain "failure" filter
            # silently skips them while the cycle/label/marker bookkeeping proceeds anyway.
            run_ids=$(gh run list --repo "$GH_REPO" --commit "$sha" --limit 100 --json databaseId,conclusion \
              --jq '[.[] | select(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "cancelled" or .conclusion == "startup_failure" or .conclusion == "action_required") | .databaseId] | .[]' 2>/dev/null || true)
            for rid in $run_ids; do
              gh run rerun "$rid" --repo "$GH_REPO" --failed 2>/dev/null \
                || echo "::warning::could not rerun failed jobs for run $rid on PR #$n"
            done

            gh pr update-branch "$n" 2>/dev/null \
              || echo "PR #$n not BEHIND (or update-branch no-op) — fine, the rerun above is the other half of this attempt"

            gh pr edit "$n" --remove-label needs-human 2>/dev/null || true

            marker_line="${MARKER} cycle=${next_cycle} at=$(date -u +%Y-%m-%dT%H:%M:%SZ) -->"
            summary_line="🔁 Auto-unstick attempt ${next_cycle}/${MAX_CYCLES}: re-ran this PR's failed checks and updated the branch onto main, then removed \`needs-human\`. If it's still red, the normal autofix/needs-human path re-applies on its own — this doesn't spend a fresh autofix attempt, it only retries the free/cheap moves (flaky reruns, staleness). After ${MAX_CYCLES} cycles this stops auto-retrying until a human looks or pr-drain.yml's close-stale sweep closes it."
            new_body="$(printf '%s\n%s' "$marker_line" "$summary_line")"
            if [ -n "$comment_id" ]; then
              gh api "repos/${GH_REPO}/issues/comments/${comment_id}" -X PATCH -f body="$new_body" >/dev/null 2>&1 \
                || echo "::warning::could not update the marker comment on PR #$n"
            else
              gh pr comment "$n" --body "$new_body" 2>/dev/null \
                || echo "::warning::could not post the marker comment on PR #$n"
            fi

            echo "::endgroup::"
            sleep 2
          done

      - name: Requeue security-review-retry PRs (rate-limit infra defers), honoring resetsAt
        if: steps.throttle.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          now=$(date -u +%s)

          # security-review.yml's Gate parks an account five-hour rate-limit (INFRA, not a
          # security finding) by leaving the PR ARMED (no `hold`) with a `security-review-retry`
          # marker label and a RED security-review run — it never passes an unreviewed diff
          # (SuxOS/.github#236 + #271). #271's requeue is incidental: it only re-fires when
          # `main` moves (pr-auto-update rebases armed PRs → checks re-fire). This is the
          # ACTIVE, main-churn-independent requeue (SuxOS/.github#272): re-run the failed
          # security-review check directly, and drop the marker once it goes green. `hold`/
          # `keep` are excluded — a real finding or an operator pin is not ours to auto-requeue.
          # Same server-side-narrow-before-limit fix as the needs-human sweep above
          # (SuxOS/.github#366): --label binds the cap to the security-review-retry set.
          if ! prs=$(gh pr list --state open --label security-review-retry --limit "$PR_LIMIT" \
            --json number,isDraft,labels,headRefOid \
            --jq '[.[] | select(.isDraft | not) | select([.labels[].name] | (index("hold") or index("keep")) | not)]'); then
            echo "::error::gh pr list failed (security-review-retry) — aborting instead of treating as zero retry PRs"
            exit 1
          fi

          count=$(echo "$prs" | jq 'length')
          echo "security-review-retry candidates (not hold/keep): $count"
          if [ "$count" -eq 0 ]; then exit 0; fi

          for n in $(echo "$prs" | jq -r '.[].number'); do
            echo "::group::PR #$n (security-review-retry)"

            # #461: same shared live-recheck helper as the needs-human sweep above — this PR's
            # labels were snapshotted once before the loop; re-check live now so a hold/keep
            # added mid-sweep is honored before we rerun a check or drop the marker label.
            HELPER=".suxos-ci/.github/actions/pr-live-hold-check/check.sh"
            if [ ! -f "$HELPER" ]; then
              echo "::warning::shared live-recheck helper unavailable (checkout failed) — skipping PR #$n rather than mutating without a fresh label check"
              echo "::endgroup::"; continue
            fi
            if [ "$(bash "$HELPER" "$n")" = "true" ]; then
              echo "::endgroup::"; continue
            fi

            sha=$(echo "$prs" | jq -r --argjson n "$n" '.[] | select(.number == $n) | .headRefOid')

            # Latest security-review run for the CURRENT head SHA. The reusable job is always
            # named "security-review"; the caller workflow is "Security review" (scaffold-caller)
            # or "Self security review" (this repo) — match either case-insensitively so a stale
            # marker left on an already-synchronized head self-corrects to the fresh run.
            if ! runs=$(gh run list --repo "$GH_REPO" --commit "$sha" --limit 100 \
              --json databaseId,conclusion,status,workflowName,name,createdAt 2>/dev/null); then
              echo "::warning::could not list runs for PR #$n head $sha — skipping this run"
              echo "::endgroup::"; continue
            fi
            sr=$(echo "$runs" | jq -c '[.[] | select((((.workflowName // "") + " " + (.name // "")) | test("security[ -]?review"; "i")))] | sort_by(.createdAt) | last // empty')
            if [ -z "$sr" ]; then
              echo "no security-review run on head $sha yet — leaving it to the on-synchronize path"
              echo "::endgroup::"; continue
            fi

            sr_status=$(echo "$sr" | jq -r '.status // ""')
            sr_conclusion=$(echo "$sr" | jq -r '.conclusion // ""')

            # Green again → the review recovered; drop the marker. This is the "remove the
            # label on success" half of the requeue (security-review.yml itself never clears it).
            if [ "$sr_conclusion" = "success" ]; then
              gh pr edit "$n" --remove-label security-review-retry 2>/dev/null \
                || echo "::warning::could not remove security-review-retry from PR #$n"
              echo "#$n security-review is green again — removed security-review-retry"
              echo "::endgroup::"; continue
            fi

            # Still queued/running → a rerun is already in flight; don't pile on.
            if [ "$sr_status" != "completed" ]; then
              echo "#$n security-review still '$sr_status' — waiting for it to finish"
              echo "::endgroup::"; continue
            fi

            # Completed non-success (rate-limit red, or a genuine re-fail). Gate the rerun on
            # the rate limit's resetsAt when the deferral comment carries one, so we don't just
            # re-hit the same five-hour ceiling; absent one, proceed (the daily cadence already
            # clears the five-hour window). resetsAt may be epoch seconds or milliseconds.
            reset_epoch=0
            if comments=$(gh api "repos/${GH_REPO}/issues/${n}/comments" --paginate 2>/dev/null); then
              raw=$(echo "$comments" \
                | jq -r '[.[] | select(.body | test("security[ -]?review"; "i")) | .body] | join("\n")' \
                | grep -oiE 'resets?[-_ ]?at["=: ]*[0-9]{10,13}' | grep -oE '[0-9]{10,13}' | head -1 || true)
              if [ -n "$raw" ]; then
                if [ "${#raw}" -ge 13 ]; then reset_epoch=$(( raw / 1000 )); else reset_epoch="$raw"; fi
              fi
            fi
            if [ "$reset_epoch" -gt 0 ] && [ "$now" -lt "$reset_epoch" ]; then
              wait=$(( reset_epoch - now ))
              echo "#$n rate limit resets in ${wait}s (resetsAt=$reset_epoch) — deferring rerun to a later sweep"
              echo "::endgroup::"; continue
            fi

            rid=$(echo "$sr" | jq -r '.databaseId')
            if gh run rerun "$rid" --repo "$GH_REPO" --failed 2>/dev/null; then
              echo "#$n re-ran failed security-review run $rid — marker stays until the review is green"
            else
              echo "::warning::could not rerun security-review run $rid for PR #$n"
            fi

            echo "::endgroup::"
            sleep 2
          done

      # Answers the INVERSE question from the two sweeps above: those retry a
      # check-run that already has a failure conclusion; this finds a required
      # context that has NO conclusion because it never ran at all (disabled
      # workflow, path-filtered required workflow, onboarding window) — a PR
      # blocked forever with no failing check to fix, invisible to both sweeps
      # above (SuxOS/.github#323). Detects and explains only: never reruns
      # checks, never edits the PR. Runs even if the throttle deferred the
      # sweeps above — it's read-only, not LLM spend.
      - name: Detect required contexts that can never report on an open PR's head
        id: detect-unreachable
        uses: SuxOS/.github/.github/actions/detect-unreachable-checks@main
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          grace-minutes: ${{ inputs.reachability-grace-minutes }}
          pr-limit: ${{ inputs.pr-limit }}

      # Auto-remediates the majority sub-case the detector above can only warn about
      # (SuxOS/.github#379): a required context that never reports because this PR
      # predates it ("onboarding window"). detect-unreachable-checks already narrowed
      # this to PRs whose ONLY never-reporting cause is generic (not a disabled
      # workflow, which needs re-enabling instead — not ours to auto-fix). Pushing an
      # empty commit re-fires `synchronize` for real; if the actual cause is instead a
      # path-filtered required workflow, the push is a harmless no-op — that workflow
      # still won't match the diff and the PR stays flagged for a human. Bounded by the
      # same cooldown/cycle-cap marker-comment pattern as the needs-human sweep above so
      # a genuine path-filter case can't loop forever.
      - name: Push an empty commit for onboarding-window unreachable-context PRs, honoring the cycle cap
        if: (success() || failure()) && steps.throttle.outputs.go == 'true' && steps.detect-unreachable.outputs.generic-unreachable-prs != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          GENERIC_PRS: ${{ steps.detect-unreachable.outputs.generic-unreachable-prs }}
        run: |
          set -uo pipefail

          if ! [[ "$COOLDOWN_HOURS" =~ ^[0-9]+$ ]] || ! [[ "$MAX_CYCLES" =~ ^[0-9]+$ ]]; then
            echo "::error::cooldown-hours ('$COOLDOWN_HOURS') and max-cycles ('$MAX_CYCLES') must be non-negative integers"
            exit 1
          fi
          cooldown_sec=$(( COOLDOWN_HOURS * 3600 ))
          now=$(date -u +%s)
          MARKER='<!-- pr-unstick-reachability:'

          IFS=',' read -ra prs_arr <<< "$GENERIC_PRS"
          for n in "${prs_arr[@]}"; do
            [ -z "$n" ] && continue
            echo "::group::PR #$n (unreachable required context, generic cause)"

            if ! pr=$(gh pr view "$n" --json isDraft,labels,headRefName,headRefOid,isCrossRepository 2>/dev/null); then
              echo "::warning::could not fetch PR #$n — skipping"
              echo "::endgroup::"; continue
            fi
            is_draft=$(echo "$pr" | jq -r '.isDraft')
            has_hold=$(echo "$pr" | jq -r '([.labels[].name] | index("hold")) or ([.labels[].name] | index("keep")) // false')
            if [ "$is_draft" = "true" ] || [ "$has_hold" = "true" ]; then
              echo "#$n is draft or hold/keep-labeled — leaving to the operator"
              echo "::endgroup::"; continue
            fi
            if [ "$(echo "$pr" | jq -r '.isCrossRepository')" = "true" ]; then
              echo "#$n head branch is on a fork — pushing there isn't ours to force; skipping"
              echo "::endgroup::"; continue
            fi

            if ! comments=$(gh api "repos/${GH_REPO}/issues/${n}/comments" --paginate 2>/dev/null); then
              echo "::warning::could not fetch comments for PR #$n — skipping this run rather than resetting the cycle cap"
              echo "::endgroup::"; continue
            fi
            marker=$(echo "$comments" | jq -c --arg m "$MARKER" '[.[] | select(.body | startswith($m))] | last')
            cycle=0
            last_at_epoch=0
            comment_id=""
            if [ "$marker" != "null" ] && [ -n "$marker" ]; then
              comment_id=$(echo "$marker" | jq -r '.id')
              body=$(echo "$marker" | jq -r '.body')
              cycle=$(echo "$body" | grep -oE 'cycle=[0-9]+' | head -1 | cut -d= -f2 || true)
              last_at=$(echo "$body" | grep -oE 'at=[0-9TZ:-]+' | head -1 | cut -d= -f2 || true)
              last_at_epoch=$(date -u -d "$last_at" +%s 2>/dev/null || echo 0)
              cycle=${cycle:-0}
            fi

            if [ "$cycle" -ge "$MAX_CYCLES" ]; then
              echo "#$n already used $cycle/$MAX_CYCLES reachability-retry cycles — leaving to the operator"
              echo "::endgroup::"; continue
            fi
            age=$(( now - last_at_epoch ))
            if [ "$last_at_epoch" -gt 0 ] && [ "$age" -lt "$cooldown_sec" ]; then
              echo "#$n last attempt ${age}s ago, cooldown is ${cooldown_sec}s — skipping this run"
              echo "::endgroup::"; continue
            fi

            head_sha=$(echo "$pr" | jq -r '.headRefOid')
            head_ref=$(echo "$pr" | jq -r '.headRefName')

            # Re-read the branch tip right before writing: skip rather than race a push
            # that landed between detect-unreachable-checks running and this step running.
            current_sha=$(gh api "repos/${GH_REPO}/git/refs/heads/${head_ref}" --jq '.object.sha' 2>/dev/null || echo "")
            if [ -z "$current_sha" ] || [ "$current_sha" != "$head_sha" ]; then
              echo "::warning::PR #$n branch ${head_ref} moved (or is unreadable) since it was last checked — skipping this run rather than racing a concurrent push"
              echo "::endgroup::"; continue
            fi

            # #454/#461: same shared live-recheck helper as the needs-human and
            # security-review-retry sweeps above — this PR's hold/keep labels were last
            # read when `pr` was fetched at the top of this loop iteration; re-check live
            # now, immediately before pushing, so a hold/keep added mid-sweep is honored
            # (SuxOS/.github#487).
            HELPER=".suxos-ci/.github/actions/pr-live-hold-check/check.sh"
            if [ ! -f "$HELPER" ]; then
              echo "::warning::shared live-recheck helper unavailable (checkout failed) — skipping PR #$n rather than mutating without a fresh label check"
              echo "::endgroup::"; continue
            fi
            if [ "$(bash "$HELPER" "$n")" = "true" ]; then
              echo "::endgroup::"; continue
            fi

            tree_sha=$(gh api "repos/${GH_REPO}/git/commits/${head_sha}" --jq '.tree.sha' 2>/dev/null || echo "")
            if [ -z "$tree_sha" ]; then
              echo "::warning::could not read the tree for PR #$n head ${head_sha} — skipping"
              echo "::endgroup::"; continue
            fi

            next_cycle=$(( cycle + 1 ))
            msg="chore: empty commit to re-fire required checks (pr-unstick reachability retry ${next_cycle}/${MAX_CYCLES})"
            new_sha=$(gh api "repos/${GH_REPO}/git/commits" -f message="$msg" -f "tree=${tree_sha}" -f "parents[]=${head_sha}" --jq '.sha' 2>/dev/null || echo "")
            if [ -z "$new_sha" ]; then
              echo "::warning::could not create an empty commit for PR #$n — skipping"
              echo "::endgroup::"; continue
            fi
            if ! gh api "repos/${GH_REPO}/git/refs/heads/${head_ref}" -X PATCH -f "sha=${new_sha}" -F force=false >/dev/null 2>&1; then
              echo "::warning::could not update ${head_ref} to the new empty commit for PR #$n — skipping"
              echo "::endgroup::"; continue
            fi
            echo "#$n pushed empty commit ${new_sha} onto ${head_ref} to re-fire 'synchronize' (reachability cycle ${next_cycle}/${MAX_CYCLES})"

            marker_line="${MARKER} cycle=${next_cycle} at=$(date -u +%Y-%m-%dT%H:%M:%SZ) -->"
            summary_line="🔁 Auto-unstick attempt ${next_cycle}/${MAX_CYCLES}: pushed an empty commit to re-fire \`synchronize\` because a required check has never reported on this PR's head — most likely because this PR predates that check being required (the 'onboarding window' case). If the real cause is instead a path-filtered required workflow, this was a harmless no-op and the PR stays flagged for a human. After ${MAX_CYCLES} cycles this stops auto-retrying until a human looks."
            new_body="$(printf '%s\n%s' "$marker_line" "$summary_line")"
            if [ -n "$comment_id" ]; then
              gh api "repos/${GH_REPO}/issues/comments/${comment_id}" -X PATCH -f body="$new_body" >/dev/null 2>&1 \
                || echo "::warning::could not update the marker comment on PR #$n"
            else
              gh pr comment "$n" --body "$new_body" 2>/dev/null \
                || echo "::warning::could not post the marker comment on PR #$n"
            fi

            echo "::endgroup::"
            sleep 2
          done
