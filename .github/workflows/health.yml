name: Health check (reusable)

# Daily regression canary (tests) + live smoke check of the deployed service.
# On failure it opens (or updates) a tracking issue so a broken deploy or a
# drifted dependency is noticed even when no one pushed that day.
#
# Caller (needs its own schedule/dispatch trigger + `with: smoke-url`):
#   uses: SuxOS/.github/.github/workflows/health.yml@main
#   with: { smoke-url: "https://example.workers.dev/mcp", expected-status: "401" }
#   secrets: inherit
#
# Non-Node caller (no package.json): pass `enabled: false` to skip the npm
# install step (also pass `test-script: ""` since it needs npm dependencies).

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "22"
      enabled:
        description: "Set to false to skip the npm install step entirely (for non-Node callers)."
        type: boolean
        default: true
      test-script:
        type: string
        default: "test"
      smoke-url:
        description: "URL to smoke-check. Empty to skip the single-endpoint check entirely."
        type: string
        default: ""
      expected-status:
        description: "Expected HTTP status code from smoke-url (the healthy signal)."
        type: string
        default: "401"
      smoke-checks:
        description: >-
          Newline-separated `url=expected-status` pairs to smoke-check, for
          services with multiple health-relevant endpoints (e.g. `/mcp` expecting
          401 plus a public `/health` expecting 200). Checked in addition to
          `smoke-url`/`expected-status`; the check fails if any endpoint mismatches.
        type: string
        default: ""
      sibling-repos:
        description: >-
          Space/comma/newline-separated PRIVATE sibling repo names (same org) that
          this repo depends on via `file:../<name>` in package.json. Each is cloned
          to `../<name>` before `npm ci` so the file: dep resolves on a clean runner
          (this repo's own CI already does this; the canary needs the same). Requires
          `SUX_BOT_APP_ID` / `SUX_BOT_PRIVATE_KEY` via `secrets: inherit`. Empty (the
          default) skips the clone entirely, so callers with no private siblings are
          unaffected.
        type: string
        default: ""

permissions:
  contents: read
  issues: write

concurrency:
  group: health-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  health:
    name: Regression canary + smoke check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.enabled && 'npm' || '' }}

      # package.json can depend on "<pkg>": "file:../<name>" — a PRIVATE sibling repo,
      # not a submodule — so a clean runner has no ../<name> and `npm ci` fails resolving
      # the file: dep. This is exactly why the health canary went red the day sux adopted
      # file:../suxlib while its own CI (which already clones the sibling) stayed green.
      # Mint one read-only token scoped to just those repos from the same App identity
      # automerge.yml/ci.yml already use, provided to this reusable workflow via the
      # caller's `secrets: inherit`.
      - name: Mint app token for private sibling repos
        id: sibling-token
        if: inputs.enabled && inputs.sibling-repos != ''
        uses: SuxOS/.github/.github/actions/mint-app-token@main
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ inputs.sibling-repos }}
          permission-contents: read

      # $GITHUB_WORKSPACE is .../work/<repo>/<repo>, so ../<name> lands at
      # .../work/<repo>/<name> — exactly where npm's file:../<name> resolution looks.
      # Repo names come from the trusted caller stub (not event payload); passed via env
      # and word-split, with commas normalized to spaces so any list form works.
      - name: "Clone private sibling repos (file: deps)"
        if: inputs.enabled && inputs.sibling-repos != ''
        env:
          SIBLING_TOKEN: ${{ steps.sibling-token.outputs.token }}
          SIBLING_REPOS: ${{ inputs.sibling-repos }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          for repo in $(printf '%s' "$SIBLING_REPOS" | tr ',' ' '); do
            git clone --depth 1 --branch main \
              "https://x-access-token:${SIBLING_TOKEN}@github.com/${OWNER}/${repo}.git" "../${repo}"
            # Install the sibling's own deps (so the depender's tsc/tests can resolve
            # them through the file: dep) only when it actually has a package.json.
            if [ -f "../${repo}/package.json" ]; then
              npm --prefix "../${repo}" ci --omit=dev
            fi
          done

      - name: Install dependencies
        if: inputs.enabled
        run: npm ci

      - name: Test
        if: inputs.enabled && inputs.test-script != ''
        env:
          TEST_SCRIPT: ${{ inputs.test-script }}
        run: npm run "$TEST_SCRIPT"

      - name: Smoke check
        if: inputs.smoke-url != '' || inputs.smoke-checks != ''
        env:
          SMOKE_URL: ${{ inputs.smoke-url }}
          EXPECTED_STATUS: ${{ inputs.expected-status }}
          SMOKE_CHECKS: ${{ inputs.smoke-checks }}
        run: |
          set -euo pipefail
          checks=""
          if [ -n "${SMOKE_URL}" ]; then
            checks="${SMOKE_URL}=${EXPECTED_STATUS}"
          fi
          if [ -n "${SMOKE_CHECKS}" ]; then
            checks="${checks}
          ${SMOKE_CHECKS}"
          fi
          failed=0
          while IFS= read -r pair; do
            pair="$(printf '%s' "$pair" | tr -d '[:space:]')"
            [ -z "$pair" ] && continue
            url="${pair%=*}"
            expected="${pair##*=}"
            code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$url" || echo 000)"
            echo "GET $url -> HTTP ${code}"
            if [ "${code}" != "${expected}" ]; then
              echo "::error::Expected HTTP ${expected} from ${url}, got ${code}"
              failed=1
            else
              echo "Service is up (${code} as expected)."
            fi
          done <<< "$checks"
          if [ "$failed" != "0" ]; then
            exit 1
          fi

      - name: Open or update health-check issue on failure
        if: failure()
        uses: SuxOS/.github/.github/actions/upsert-tracking-issue@main
        with:
          github-token: ${{ github.token }}
          title: "health check failed"
          body: |
            The scheduled health check failed.

            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Commit: ${{ github.sha }}

            This is either a regression in the test suite or the deployed service
            not responding with the expected status on the smoke URL. See the run logs above.
