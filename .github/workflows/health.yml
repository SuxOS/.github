name: Health check (reusable)

# Daily regression canary (tests) + live smoke check of the deployed service.
# On failure it opens (or updates) a tracking issue so a broken deploy or a
# drifted dependency is noticed even when no one pushed that day.
#
# Caller (needs its own schedule/dispatch trigger + `with: smoke-url`):
#   uses: SuxOS/.github/.github/workflows/health.yml@main
#   with: { smoke-url: "https://example.workers.dev/mcp", expected-status: "401" }
#   secrets: inherit
#
# Non-Node caller (no package.json): pass `enabled: false` to skip the npm
# install step (also pass `test-script: ""` since it needs npm dependencies).

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "22"
      enabled:
        description: "Set to false to skip the npm install step entirely (for non-Node callers)."
        type: boolean
        default: true
      test-script:
        type: string
        default: "test"
      smoke-url:
        description: "URL to smoke-check. Empty to skip the smoke check entirely."
        type: string
        default: "https://sux.colinxs.workers.dev/mcp"
      expected-status:
        description: "Expected HTTP status code from smoke-url (the healthy signal)."
        type: string
        default: "401"

permissions:
  contents: read
  issues: write

concurrency:
  group: health-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  health:
    name: Regression canary + smoke check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.enabled && 'npm' || '' }}

      - name: Install dependencies
        if: inputs.enabled
        run: npm ci

      - name: Test
        if: inputs.enabled && inputs.test-script != ''
        run: npm run ${{ inputs.test-script }}

      - name: Smoke check
        if: inputs.smoke-url != ''
        env:
          SMOKE_URL: ${{ inputs.smoke-url }}
          EXPECTED_STATUS: ${{ inputs.expected-status }}
        run: |
          set -euo pipefail
          code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$SMOKE_URL")" || true
          code="${code:-000}"
          echo "GET $SMOKE_URL -> HTTP ${code}"
          if [ "${code}" != "${EXPECTED_STATUS}" ]; then
            echo "::error::Expected HTTP ${EXPECTED_STATUS} from ${SMOKE_URL}, got ${code}"
            exit 1
          fi
          echo "Service is up (${code} as expected)."

      - name: Open or update health-check issue on failure
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const title = "health check failed";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The scheduled health check failed on ${new Date().toISOString()}.`,
              "",
              `- Workflow run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              "",
              "This is either a regression in the test suite or the deployed service",
              "not responding with the expected status on the smoke URL. See the run logs above.",
            ].join("\n");
            try {
              const existing = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open",
                per_page: 100,
              });
              const hit = existing.data.find(
                (i) => !i.pull_request && i.title === title,
              );
              if (hit) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: hit.number,
                  body,
                });
                core.info(`Updated existing issue #${hit.number}.`);
              } else {
                const created = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                });
                core.info(`Opened issue #${created.data.number}.`);
              }
            } catch (e) {
              core.warning(`Could not open/update health issue: ${e.message}`);
            }
