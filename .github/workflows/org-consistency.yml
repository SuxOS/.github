name: Org consistency sweep

# Weekly Opus pass over ALL org repos checked out side by side, hunting what no single-repo
# workflow can see: inter-repo drift and cross-repo refactor opportunities. Findings are
# filed as ordinary issues in the affected repo and flow into the existing issue-build
# pipeline. Deterministic checks stay where they are (pin-consistency owns SHA
# drift) — this pass is for the judgment-shaped inconsistencies a script can't express.
# The infrequent-expensive tier of docs/design/budget-and-cadence.md.
#
# Safe Outputs pattern (same as fixer.yml): read-only agent, structured output, a separate
# least-privileged step files the issues. Runs directly in this repo — NOT a reusable.

on:
  schedule:
    - cron: "47 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: read # check-throttle reads this repo's throttle issue

concurrency:
  group: org-consistency
  cancel-in-progress: false

env:
  MODEL: "opus"
  MAX_TURNS: "40"

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check autonomy throttle
        id: throttle
        uses: SuxOS/.github/.github/actions/check-throttle@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          defer-at: "yellow" # most deferrable work — skip on yellow or red

      - name: Preflight — need the token
        id: pre
        run: |
          if [ "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}" != "true" ]; then
            echo "CLAUDE_CODE_OAUTH_TOKEN not set → org-consistency inert"; echo "go=false" >> "$GITHUB_OUTPUT"
          else echo "go=true" >> "$GITHUB_OUTPUT"; fi

      # .github/managed-repos.json lives in this repo, so it must be checked out before
      # it can be read — this also serves as the sweep agent's `.github` workspace, so
      # the later steps don't check it out again.
      - name: Checkout .github (this repo)
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Managed-repo list (.github/managed-repos.json, single source of truth shared
      # with pin-consistency.yml/deep-audit.yml/budget-governor.yml — see #233/#253).
      # all_space feeds the ALLOWED_REPOS re-validation below; schema_enum feeds the
      # structured-output json-schema `repo` enum — both derived here so neither can
      # drift from this list independently again (#256).
      - name: Load managed-repo list
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        id: repos
        run: |
          set -euo pipefail
          {
            echo "all_csv=$(jq -r '(.repos + [".github"]) | join(",")' .github/managed-repos.json)"
            echo "all_space=$(jq -r '(.repos + [".github"]) | join(" ")' .github/managed-repos.json)"
            echo "schema_enum=$(jq -c '(.repos + [".github"])' .github/managed-repos.json)"
            # Product repos only (excludes .github, which is checked out separately above) —
            # drives the checkout loop and the prompt's repo-path list below, so a repo added
            # to managed-repos.json can't drift out of sync with either again (#402).
            echo "product_space=$(jq -r '.repos | join(" ")' .github/managed-repos.json)"
            echo "product_paths=$(jq -r '.repos | map("repos/" + .) | join(", ")' .github/managed-repos.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Mint org-scoped app token
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}
          owner: SuxOS
          repositories: ${{ steps.repos.outputs.all_csv }}

      # One loop over managed-repos.json's repo list instead of one hardcoded checkout
      # step per repo — #395 had to hand-add a suxlib step here after it landed in
      # managed-repos.json; this makes that class of drift impossible (#402).
      - name: Checkout product repos
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PRODUCT_REPOS: ${{ steps.repos.outputs.product_space }}
        run: |
          set -euo pipefail
          for repo in $PRODUCT_REPOS; do
            gh repo clone "SuxOS/$repo" "repos/$repo" -- --depth=1
          done

      - name: Claude — cross-repo consistency and refactor sweep
        id: claude
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        # The action hard-fails when the model ends its turn without emitting structured_output.
        # Without this, that aborts the job red instead of reaching "File findings as issues"
        # below, which already treats an empty VERDICT as a clean no-op pass. Same fix as
        # fixer/triage/issue-build (#141/#140/#142) and security-review.yml (#139).
        continue-on-error: true
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1
        env:
          ENABLE_PROMPT_CACHING_1H: "1"
          # Unattended-CI resilience: wait out a subscription usage-limit/capacity (429/529) window
          # and retry instead of failing — the pool-exhaustion jam, without a metered key.
          CLAUDE_CODE_RETRY_WATCHDOG: "1"
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          # Inert here today (schedule/workflow_dispatch only, no bot-authored trigger event
          # exists for this job) — added for consistency with every other claude-code-action
          # step in the org so a future trigger change doesn't quietly need this rediscovered.
          allowed_bots: suxbot[bot]
          prompt: |
            You are the weekly org-consistency auditor. The workspace root is the org's
            `.github` hub repo (reusable workflows + scaffold); the product repos are checked
            out under ${{ steps.repos.outputs.product_paths }}. You see what no single-repo
            pass can: drift BETWEEN them.

            Hunt, in priority order:
              1. Caller-stub drift: each repo's `.github/workflows/*.yml` thin callers vs.
                 what `scripts/scaffold-caller.sh` emits and what the reusable's inputs
                 expect — missing stubs, stale `with:` overrides that now equal (or fight)
                 the hub default, `required-gates` lists naming checks that don't exist in
                 that repo, forked copies of workflows that exist as reusables.
              2. Convention drift: same concept solved differently across repos (label
                 taxonomies, branch naming, CLAUDE.md guidance that contradicts another
                 repo's, node versions, lint/test entry points) where convergence is cheap.
              3. Duplicated logic that wants extraction: near-identical code/scripts in two+
                 repos (especially sux ↔ suxlib) that belongs in one place.
              4. API-shape drift: suxrouter's vendored/consumed interfaces vs. what sux
                 actually serves; docs describing cross-repo behavior that no longer matches.
              5. Intra-repo refactor opportunities ONLY when they generalize across repos
                 (fixing the class beats fixing the instance).

            Deterministic pin/SHA drift is pin-consistency.yml's job — skip pure SHA
            mismatches unless they change behavior.

            Before reporting: `gh issue list --limit 200 --state all` in the affected repo
            (use `--repo SuxOS/<name>`) and skip anything already covered. Dedupe candidates;
            one root cause spanning three repos is ONE finding filed where the fix belongs.

            Do NOT file issues yourself — you have no write access. Return findings via the
            structured output schema: `repo` is the repo whose issue tracker should carry the
            work; title short and imperative; body with concrete paths in EVERY affected
            repo, why it matters, and a suggested direction. Only report what you can point
            at concretely — an empty findings list is a fine outcome.
          claude_args: >-
            --max-turns ${{ env.MAX_TURNS }} --model ${{ env.MODEL }}
            --allowedTools "Read,Grep,Glob,Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(gh issue list:*)"
            --json-schema '{"type":"object","properties":{"findings":{"type":"array","items":{"type":"object","properties":{"repo":{"type":"string","enum":${{ steps.repos.outputs.schema_enum }}},"title":{"type":"string"},"body":{"type":"string"}},"required":["repo","title","body"],"additionalProperties":false}}},"required":["findings"],"additionalProperties":false}'

      # The ONLY step that files issues (Safe Outputs). Re-validates repo against the
      # allowlist even though the schema already constrains it.
      - name: File findings as issues
        if: steps.pre.outputs.go == 'true' && steps.throttle.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERDICT: ${{ steps.claude.outputs.structured_output }}
          ALLOWED_REPOS: ${{ steps.repos.outputs.all_space }}
        run: |
          set -euo pipefail
          if [ -z "${VERDICT:-}" ]; then echo "no structured output → nothing to file"; exit 0; fi
          echo "findings: $(jq '.findings | length' <<<"$VERDICT")"
          jq -c '.findings[]' <<<"$VERDICT" | while read -r f; do
            repo=$(jq -r '.repo' <<<"$f")
            title=$(jq -r '.title' <<<"$f")
            body=$(jq -r '.body' <<<"$f")
            ok=false
            for a in $ALLOWED_REPOS; do [ "$repo" = "$a" ] && ok=true; done
            if [ "$ok" != "true" ]; then
              echo "::warning::skipping finding for unexpected repo '$repo': $title"; continue
            fi
            body=$(printf '%s\n\n---\nFiled by the weekly org-consistency sweep (SuxOS/.github).' "$body")
            if ! url=$(gh issue create --repo "SuxOS/$repo" --title "$title" --body "$body" \
              --label enhancement \
              || gh issue create --repo "SuxOS/$repo" --title "$title" --body "$body"); then
              echo "::warning::failed to file '$title' in $repo, skipping"; continue
            fi
            echo "filed: $url"
          done
