name: Self-check (actionlint)

# Self-CI for THIS repo. The product here is reusable workflows, so there is no
# app to build — instead we lint the workflow YAML itself. actionlint also runs
# shellcheck over embedded `run:` blocks, catching quoting/injection bugs.

on:
  push:
    branches: [main]
    paths: [".github/workflows/**", ".github/actions/**"]
  # NO path filter on pull_request: `actionlint` is a REQUIRED status check in the branch
  # ruleset, and a required check that is path-filtered creates a merge deadlock — a PR that
  # touches no workflow file (a docs-only PR, or a bot `documentation`-type build) never
  # produces the check, so the ruleset blocks it forever and even an admin merge is refused
  # ("Required status check 'actionlint' is expected"). Running actionlint on every PR is
  # ~7s and passes trivially when no workflow changed, so it always reports and the gate can
  # be satisfied. (The push trigger keeps its filter — it's self-CI on main, not a merge gate.)
  pull_request:

permissions:
  contents: read

concurrency:
  group: self-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install actionlint
        id: actionlint
        run: bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/03d0035246f3e81f36aed592ffb4bebf33a03106/scripts/download-actionlint.bash) # v1.7.7
        shell: bash

      - name: Run actionlint
        run: ${{ steps.actionlint.outputs.executable }} -color
        shell: bash

  invariants:
    name: scaffold-caller regression guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Assert scaffold-caller.sh security-review template regression
        run: bash scripts/test-scaffold-caller-regression.sh
        shell: bash

      - name: Assert assert-branch-protection fail-open/fail-closed logic
        run: bash scripts/test-assert-branch-protection.sh
        shell: bash

      - name: Assert security-review no-verdict classifier (infra retry vs diff fail-closed)
        run: bash scripts/test-classify-security-noverdict.sh
        shell: bash

      - name: Assert budget-governor live rate-limit signal
        run: bash scripts/test-budget-governor-ratelimit.sh
        shell: bash

      - name: Assert budget-governor opus-tier workflow-name classification
        run: bash scripts/test-budget-governor-opus-classify.sh
        shell: bash

      - name: Assert detect-unreachable-checks reachability guard logic
        run: bash scripts/test-detect-unreachable-checks.sh
        shell: bash

      - name: Assert grafana/*.json exprs match the metrics/labels fabric-health emits
        run: bash scripts/test-dashboard-queries.sh
        shell: bash

      - name: Assert issue-build prerequisite-gating defers issues behind unmerged prerequisites
        run: bash scripts/test-issue-build-prereq-gating.sh
        shell: bash

      - name: Assert caller-stub conformance check flags missing/dead/stale/misconfigured stubs
        run: bash scripts/test-caller-conformance.sh
        shell: bash

      - name: Assert caller-stub remediation only ever adds missing / removes dead stubs
        run: bash scripts/test-remediate-caller-stubs.sh
        shell: bash

      - name: Assert gh-list-exhaustive pages past a capped page or fails loud
        run: bash scripts/test-gh-list-exhaustive.sh
        shell: bash

      - name: Assert fabric-health workflow_red batch/fallback/cap-hit rollup
        run: bash scripts/test-fabric-health-sweep.sh
        shell: bash

      - name: Assert no new bespoke 'gh ... list --limit' call sites outside the tracked allowlist
        run: bash scripts/test-no-new-gh-list-limit.sh
        shell: bash
