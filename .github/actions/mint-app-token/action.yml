name: Mint app token
description: >-
  Mint a short-lived GitHub App installation token for the SUX bot identity.
  Pushes/merges must use this token, never GITHUB_TOKEN, so that CI and deploy
  workflows fire on the resulting commit. Pinned version and secret wiring live
  here so a token-action bump or bot-secret rename is a one-file edit.

inputs:
  app-id:
    description: GitHub App ID (pass secrets.SUX_BOT_APP_ID).
    required: true
  private-key:
    description: GitHub App private key (pass secrets.SUX_BOT_PRIVATE_KEY).
    required: true
  owner:
    description: >-
      Optional org/user to scope the token to (passthrough to create-github-app-token's
      own `owner:`). Leave unset for the default same-calling-repo-only behavior.
    required: false
    default: ""
  repositories:
    description: >-
      Optional comma-separated repo list to scope the token to (passthrough to
      create-github-app-token's own `repositories:`). Requires `owner` to also be set.
      Leave unset for the default same-calling-repo-only behavior.
    required: false
    default: ""
  permission-contents:
    description: >-
      Optional `contents` permission override (passthrough to create-github-app-token's
      own `permission-contents:`), e.g. `read` for a checkout-only token.
    required: false
    default: ""
  permission-pull-requests:
    description: >-
      Optional `pull-requests` permission override (passthrough to create-github-app-token's
      own `permission-pull-requests:`), e.g. `write` for a token that opens/updates PRs.
    required: false
    default: ""

outputs:
  token:
    description: Short-lived GitHub App installation token.
    value: ${{ steps.app-token.outputs.token }}

runs:
  using: composite
  steps:
    - name: Mint app token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
        owner: ${{ inputs.owner }}
        repositories: ${{ inputs.repositories }}
        permission-contents: ${{ inputs.permission-contents }}
        permission-pull-requests: ${{ inputs.permission-pull-requests }}
