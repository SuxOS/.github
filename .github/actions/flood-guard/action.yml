name: Flood guard
description: >-
  Backpressure for autonomous FEATURE generation. Counts the org bot's open PRs
  in this repo; when that queue is at/over `threshold`, feature proposals stand
  down (bugs/security/docs still flow — the flood the operator fears is features,
  not fixes). A deep bot-PR queue means the merge/rebase loops aren't keeping up,
  so piling on more feature work just grows the pile. This is the deterministic
  half of the operator's "if the bots flood with features, disable auto-feature"
  rule (three-loop-pipeline.md). FAIL-OPEN: any lookup failure reads as ok=true —
  a guard outage must never stall the pipeline.

inputs:
  github-token:
    description: Token with pull-requests:read for this repo (the ambient GITHUB_TOKEN is fine).
    required: true
  threshold:
    description: >-
      Open bot-authored PR count at which feature generation stands down. The
      queue depth the operator is willing to carry before applying backpressure.
    required: false
    default: "8"

outputs:
  features-ok:
    description: '"true" when feature generation should run, "false" when the bot-PR queue is flooded.'
    value: ${{ steps.check.outputs.features_ok }}
  open-bot-prs:
    description: Count of open bot-authored PRs observed (for logging/telemetry).
    value: ${{ steps.check.outputs.open_bot_prs }}

runs:
  using: composite
  steps:
    # The org bot surfaces as "suxbot" in either the app/suxbot or suxbot[bot]
    # form, so narrow server-side with both --app and --author (#393) rather
    # than fetching the repo's whole open-PR list and filtering client-side —
    # that would silently undercount once a repo passes 100 total open PRs.
    # gh-list-exhaustive (#396) additionally pages each of these two queries
    # past a single bounded page (or refuses to guess) instead of just
    # trusting one --limit 100 call, and continue-on-error preserves this
    # action's fail-open contract: a refusal/failure here still reaches the
    # count step below with that query's json output empty.
    - name: List open PRs by app
      id: list-app
      continue-on-error: true
      uses: SuxOS/.github/.github/actions/gh-list-exhaustive@main
      with:
        github-token: ${{ inputs.github-token }}
        json-fields: number
        args: |
          pr
          list
          --repo
          ${{ github.repository }}
          --state
          open
          --app
          suxbot

    - name: List open PRs by author
      id: list-author
      continue-on-error: true
      uses: SuxOS/.github/.github/actions/gh-list-exhaustive@main
      with:
        github-token: ${{ inputs.github-token }}
        json-fields: number
        args: |
          pr
          list
          --repo
          ${{ github.repository }}
          --state
          open
          --author
          suxbot[bot]

    - name: Count open bot PRs
      id: check
      shell: bash
      env:
        THRESHOLD: ${{ inputs.threshold }}
        APP_JSON: ${{ steps.list-app.outputs.json }}
        AUTHOR_JSON: ${{ steps.list-author.outputs.json }}
      run: |
        set -uo pipefail

        # Fail-open: either query failing/refusing leaves its *_JSON empty, which
        # falls back to an empty array below — a partial outage undercounts rather
        # than crashing. A GitHub App's bot account has exactly one login,
        # <slug>[bot], and --app <slug> is gh's sugar for filtering by that same
        # login — so these two queries return the SAME PRs, not disjoint sets.
        # Dedupe by number instead of summing them (#399: summing double-counted
        # every real bot PR, tripping the guard at roughly half the configured
        # threshold).
        count=$(jq -s '[.[][]] | unique_by(.number) | length' \
          <(printf '%s' "${APP_JSON:-[]}") <(printf '%s' "${AUTHOR_JSON:-[]}")) || count=0

        features_ok=true
        [ "$count" -ge "$THRESHOLD" ] && features_ok=false

        if [ "$features_ok" = "false" ]; then
          echo "::notice::flood guard tripped — ${count} open bot PRs (threshold ${THRESHOLD}). Feature generation stands down this run; bug/security/doc work still flows. Merge the queue to release backpressure."
        else
          echo "flood guard clear — ${count} open bot PRs (threshold ${THRESHOLD})."
        fi
        echo "open_bot_prs=$count" >> "$GITHUB_OUTPUT"
        echo "features_ok=$features_ok" >> "$GITHUB_OUTPUT"
