name: Upsert tracking issue
description: >-
  Maintain a single rolling tracking issue: find the open issue with an exact
  title and comment on it (or replace its body), create it when missing, or
  comment-and-close it on recovery. The shared upsert used by the scheduled
  maintenance workflows so the list -> match-by-title -> comment/create/close
  flow lives in one place.

inputs:
  repo:
    description: >-
      "owner/name" of the repo to upsert the tracking issue in. Defaults to the
      calling workflow's own repo; set this to target a different repo (e.g. a
      caller repo's fixer upserting a cross-repo tracking issue in `.github`,
      #480) — the token in github-token must have issues:write on that repo.
    required: false
    default: ${{ github.repository }}
  title:
    description: Exact issue title used to find (and, when creating, name) the tracking issue.
    required: true
  body:
    description: >-
      Issue body when creating or refreshing (mode=open); the comment posted
      just before closing (mode=close).
    required: true
  mode:
    description: "open (create/refresh the issue) or close (comment-and-close it if present)."
    required: false
    default: open
  update-mode:
    description: >-
      How to update an existing issue when mode=open: comment (append a new
      comment) or replace (overwrite the body).
    required: false
    default: comment
  github-token:
    description: Token with issues:write used for the gh calls.
    required: true
  list-limit:
    description: >-
      Max open issues to page through when looking for the existing tracking
      issue by title. Raise on repos with more open issues than this so an
      existing tracking issue past the first page isn't missed and duplicated.
    required: false
    default: "100"
  labels:
    description: >-
      Comma-separated labels to guarantee on the tracking issue (create with
      them; ensure on an existing one too, so an issue that predates this
      input still gets tagged). Bookkeeping issues carry no other signal that
      marks them as non-work, so callers like issue-build's backlog selector
      can exclude them by label instead of misreading them as buildable work.
    required: false
    default: ""

outputs:
  issue-number:
    description: Number of the created/updated/closed issue (empty when none).
    value: ${{ steps.upsert.outputs.issue-number }}

runs:
  using: composite
  steps:
    - name: Upsert tracking issue
      id: upsert
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ inputs.repo }}
        TITLE: ${{ inputs.title }}
        BODY: ${{ inputs.body }}
        MODE: ${{ inputs.mode }}
        UPDATE_MODE: ${{ inputs.update-mode }}
        LIST_LIMIT: ${{ inputs.list-limit }}
        LABELS: ${{ inputs.labels }}
      run: |
        set -uo pipefail

        # gh issue create/edit --label errors on a label the repo doesn't have yet —
        # ensure each one exists first (idempotent; a repo that already has it no-ops).
        if [ -n "$LABELS" ]; then
          IFS=',' read -ra _labels <<<"$LABELS"
          for l in "${_labels[@]}"; do
            gh label create "$l" --repo "$REPO" --color ededed --description "Bookkeeping issue maintained by automation — not buildable work" 2>/dev/null || true
          done
        fi

        # Exhaustive lookup: grow the page size and re-list until a page comes back
        # shorter than requested (no more open issues) or a title match is found,
        # instead of trusting a single bounded call. gh already paginates the
        # underlying API internally for a given --limit; LIST_LIMIT is just the
        # starting point so small repos stay a single call.
        existing=""
        limit="$LIST_LIMIT"
        while :; do
          page=$(gh issue list --repo "$REPO" --state open --limit "$limit" --json number,title) \
            || { echo "::error::gh issue list failed while searching for tracking issue '$TITLE'"; exit 1; }
          existing=$(printf '%s' "$page" | jq -r --arg t "$TITLE" '[.[] | select(.title == $t) | .number] | first // empty')
          count=$(printf '%s' "$page" | jq 'length')
          if [ -n "$existing" ] || [ "$count" -lt "$limit" ]; then
            break
          fi
          limit=$((limit * 4))
        done

        case "$MODE" in
          close)
            if [ -n "$existing" ]; then
              if ! gh issue comment "$existing" --repo "$REPO" --body "$BODY"; then
                echo "::error::failed to comment on tracking issue #$existing"
                exit 1
              fi
              if ! gh issue close "$existing" --repo "$REPO"; then
                echo "::error::failed to close tracking issue #$existing"
                exit 1
              fi
              echo "closed tracking issue #$existing"
            else
              echo "no open tracking issue to close"
            fi
            echo "issue-number=$existing" >>"$GITHUB_OUTPUT"
            ;;
          open)
            if [ -n "$existing" ]; then
              if [ "$UPDATE_MODE" = "replace" ]; then
                if ! gh issue edit "$existing" --repo "$REPO" --body "$BODY"; then
                  echo "::error::failed to refresh tracking issue #$existing"
                  exit 1
                fi
                echo "refreshed tracking issue #$existing"
              else
                if ! gh issue comment "$existing" --repo "$REPO" --body "$BODY"; then
                  echo "::error::failed to comment on tracking issue #$existing"
                  exit 1
                fi
                echo "commented on tracking issue #$existing"
              fi
              if [ -n "$LABELS" ]; then
                gh issue edit "$existing" --repo "$REPO" --add-label "$LABELS" \
                  || echo "::warning::failed to label tracking issue #$existing (non-fatal)"
              fi
              echo "issue-number=$existing" >>"$GITHUB_OUTPUT"
            else
              if [ -n "$LABELS" ]; then
                url=$(gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY" --label "$LABELS") \
                  || { echo "::error::failed to create tracking issue"; exit 1; }
              else
                url=$(gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY") \
                  || { echo "::error::failed to create tracking issue"; exit 1; }
              fi
              num=$(printf '%s' "$url" | grep -oE '[0-9]+$' || true)
              if [ -z "$num" ]; then
                echo "::error::created tracking issue but could not parse its number from url: $url"
                exit 1
              fi
              echo "opened tracking issue #$num"
              echo "issue-number=$num" >>"$GITHUB_OUTPUT"
            fi
            ;;
          *)
            echo "::error::unknown mode: $MODE"
            exit 1
            ;;
        esac
